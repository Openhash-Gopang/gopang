# hondi-proxy Cloudflare Worker 배포 설정
# 2026-07-12 — CI/CD 자동배포 구축(수동 복사-붙여넣기 방식 근본 해결).
#
# 바인딩은 Cloudflare 대시보드(Workers & Pages > hondi-proxy > Bindings)
# 실사 확인 + `wrangler kv namespace list`로 정확한 ID 확보한 값을
# 그대로 반영했다 — 추측으로 만들지 않았다.
#
# RATE_LIMIT_KV는 대시보드에 없어서 여기 안 넣는다(worker.js가
# `if(env.RATE_LIMIT_KV)`로 방어적으로 처리하므로 없어도 안전하게
# 스킵됨 — _checkRateLimit 함수 참조).
# QR_SESSIONS_KV는 현재 worker.js 코드에서 실제로는 안 쓰이지만
# (grep으로 참조 0건 확인), 기존 배포 설정을 그대로 유지하기 위해
# 넣어둔다 — 임의로 빼면 대시보드 설정과 어긋난다.

name = "hondi-proxy"
main = "worker.js"
account_id = "8897e584cfc42457b462f76fdcf6e157"
compatibility_date = "2026-07-12"

[[kv_namespaces]]
binding = "AI_SETUP_SEALS_KV"
id = "e1ae4dd08b344f9c9208ea4235e17d3e"

[[kv_namespaces]]
binding = "QR_SESSIONS_KV"
id = "af7cad0be99e4072bbca8d81d71edd98"

# 2026-07-16 추가 — GOV_OPEN_DATA_MAP 리졸버(/api/stats/resolve)용 캐시.
# [정정 2026-07-16] 이 주석은 원래 "Wrangler가 .toml을 우선 읽는다"고
# 적혀 있었으나 이는 사실과 반대다 — Wrangler는 wrangler.json이 있으면
# .toml을 통째로 무시한다(공식 문서 확인). 당시 이 블록을 추가해도
# 실제로는 .json이 배포에 쓰이고 있어 문제가 "우연히" 해소된 것뿐이었다.
# 이번에 .json 자체를 삭제해 이 파일 하나만 유효하도록 통합했다.
[[kv_namespaces]]
binding = "GOV_DATA_KV"
id = "cf1dc69a346747ac8319a6cab85640cf"

[[services]]
binding = "AGENT_SIGNER"
service = "gopang-agent-signer"
environment = "production"  # wrangler.json에서 이관(2026-07-16)

# 2026-07-16 추가 — 혜택 카탈로그 임베딩 기반 의미검색(docs/HANDOFF-
# 5단계오케스트레이션-임베딩설계_2026-07-16.md 설계 반영). 별도 GPU
# 서버 없이 Cloudflare Workers AI(bge-m3, BAAI 오픈소스 임베딩 모델)
# + Vectorize(네이티브 벡터DB)로 해결한다 — 둘 다 별도 API 키·계정
# 불필요, 기존 Cloudflare 계정 안에서 바로 쓸 수 있다.
#
# [ai] 바인딩은 id가 필요 없다(계정 단위로 자동 제공) — env.AI.run(...)
# 으로 바로 호출 가능.
[ai]
binding = "AI"

# ★ 배포 전 필수 — 아래 index_name의 Vectorize 인덱스를 먼저 만들어야
# 한다(로컬에선 실행 못 함, 배포 권한 있는 쪽에서 1회 실행):
#   wrangler vectorize create hondi-benefit-catalog --dimensions=1024 --metric=cosine
# (bge-m3 임베딩 차원은 1024 — 다른 값이면 이 커맨드의 --dimensions도
# 맞춰 바꿔야 한다. 정확한 차원은 최초 소량 테스트 임베딩 생성 후
# 응답의 벡터 길이로 재확인 권장.)
[[vectorize]]
binding = "VECTORIZE"
index_name = "hondi-benefit-catalog"

# 2026-07-16 통합 — wrangler.json 제거 후 이관된 필드
# (observability, AGENT_SIGNER의 environment) — wrangler.json에는 있었으나
# .toml엔 빠져 있던 설정. Wrangler는 두 파일이 공존하면 .json만 읽고
# .toml을 통째로 무시하므로(v3.91+ 공식 동작), 이 프로젝트는 .json을
# 삭제하고 .toml 하나로 통합한다 — 두 파일을 계속 동기화하는 방식은
# 오늘 같은 사고(AI/VECTORIZE 바인딩이 조용히 무시됨)를 반복시킨다.

[observability]
enabled = true

[observability.logs]
enabled = true

[observability.traces]
enabled = true
