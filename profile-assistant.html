<script type="module">
// ══════════════════════════════════════════════════════════════
// profile-assistant 전용 탭 (2026-07-11 신설)
//
// ★ 설계 배경: 기존엔 AC가 [CALL_PROFILE_ASSISTANT]로 "같은 창"의
// system을 profile-assistant로 바꿔치기했다(call-ai.js
// _switchToProfileAssistantSP()). 이 방식은 (a) 튜토리얼이 AC 자신의
// 대본(§0-1-T)에도 섞여 있어 AC가 실제 사용자 지시를 대본으로 착각하고
// 가로채는 사고가 실사로 확인됐고, (b) "탭을 닫으면 중단 지점이 남는다"
// 같은 GWP 방식 서비스(K-Law 등)와 다른 이질적인 UX였다. 이 페이지는
// K-Law·K-Market과 완전히 동일한 "새 탭 + GWP_DONE 보고" 패턴으로
// 재설계한 것이다 — AC는 이제 다른 GWP 서비스와 똑같이
// [GWP: profile-assistant] 태그만 내면 된다(gwp-registry.js 등록,
// _gwpLaunch() 재사용 — 이 페이지 쪽에 새 백엔드 불필요).
//
// ★ 재개(resume) 원리: 이 탭과 원래 창(hondi.net)은 반드시 같은
// 오리진이므로 localStorage를 그대로 공유한다. 튜토리얼/프로필 진행
// 상태(hondi_tutorial_step·hondi_tutorial_done·hondi_profile_step·
// hondi_profile_partial 등)는 매 단계 완료 즉시(AI 응답 태그를 감지하는
// 순간) localStorage에 기록한다 — "정상 종료 이벤트"에 의존하지 않으므로
// 탭이 강제로 닫히거나 브라우저가 죽어도 마지막으로 완료된 단계까지는
// 항상 보존된다. 다음에 이 탭이 다시 열리면 그 상태를 읽어 정확히
// 중단 지점부터 이어간다.
// ══════════════════════════════════════════════════════════════
import { _loadSpByKey } from '/src/gopang/ai/manifest-loader.js';
import { handleProfileSubmit } from '/src/gopang/ui/welcome.js';
import { escHtml, appendBubble, appendTyping, wireBackButton, wireInputBar,
         wireMic, wireAttachAndCamera } from '/src/gopang/ui/chat-shell.js';

const RELAY_ENDPOINT = 'https://hondi-proxy.tensor-city.workers.dev';
const _qs    = new URLSearchParams(location.search);
const RETURN = _qs.get('return') || 'https://hondi.net';

wireBackButton({ onBack: () => { window.close(); location.href = RETURN; } });
const _inputBar = wireInputBar();
wireMic('chat-input', 'mic-btn', _inputBar);
// ★ 2026-07-22 신설 — 이 페이지는 첨부/카메라 UI가 아예 없었다(다른
// GWP 탭 2곳과 레이아웃을 통일하며 새로 추가). 이미지는 doSend()에서
// vision 메시지(content: [{type:'text'},{type:'image_url'}])로
// callPaAI()에 그대로 실어 보낸다 — 아래 messages.push 부분 참고.
const _attach = wireAttachAndCamera({ inputBar: _inputBar });

// ── 상태 판독(진입 시 1회) ──────────────────────────────────
function _loadUser() { try { return JSON.parse(localStorage.getItem('gopang_user_v4') || 'null'); } catch { return null; } }
const _tutDone = () => { try { return localStorage.getItem('hondi_tutorial_done') === '1'; } catch { return false; } };
const _tutStep = () => { try { return parseInt(localStorage.getItem('hondi_tutorial_step') || '0', 10); } catch { return 0; } };

// _buildProfileContext — call-ai.js의 동명 함수를 그대로 이식(순수 함수,
// localStorage만 읽으므로 call-ai.js 전체를 이 독립 탭에 끌어들이지 않고
// 여기 복제한다 — manifest-loader.js를 별도 파일로 뺀 것과 같은 이유).
function _buildProfileContext() {
  let reg = {};
  try { reg = JSON.parse(localStorage.getItem('gopang_user_v4') || '{}'); } catch {}
  let partial = {};
  try { partial = JSON.parse(localStorage.getItem('hondi_profile_partial') || '{}'); } catch {}
  const ctx = Object.assign({}, {
    guid: reg.ipv6 || reg.guid || '', handle: reg.handle || '',
    nickname: reg.nickname || '', region: reg.region || '', e164: reg.e164 || '',
  }, partial);
  const step = parseInt(localStorage.getItem('hondi_profile_step') || '0', 10);
  const firstGreeted  = localStorage.getItem('hondi_first_greeted')  === '1';
  const namePending   = localStorage.getItem('hondi_name_pending')   === '1';
  const assistantName = localStorage.getItem('hondi_assistant_name') || '';
  let doneFlag = false, skippedFlag = false;
  try {
    doneFlag    = localStorage.getItem('hondi_profile_done')    === '1';
    skippedFlag = localStorage.getItem('hondi_profile_skipped') === '1';
  } catch {}
  const lines = ['[CONTEXT: PROFILE_ONBOARDING]'];
  lines.push(`step: ${step}`, `done: ${doneFlag}`, `skipped: ${skippedFlag}`,
             `first_greeted: ${firstGreeted}`, `name_pending: ${namePending}`);
  if (assistantName)      lines.push(`assistant_name: ${assistantName}`);
  if (ctx.guid)           lines.push(`guid: ${ctx.guid}`);
  if (ctx.handle)         lines.push(`handle: ${ctx.handle}`);
  if (ctx.nickname)       lines.push(`nickname: ${ctx.nickname}`);
  if (ctx.region)         lines.push(`region: ${ctx.region}`);
  if (ctx.e164)           lines.push(`e164: ${ctx.e164}`);
  if (ctx.name)           lines.push(`name: ${ctx.name}`);
  if (ctx.address)        lines.push(`address: ${ctx.address}`);
  if (ctx.phone)          lines.push(`phone: ${ctx.phone}`);
  if (ctx.entity_type)    lines.push(`entity_type: ${ctx.entity_type}`);
  if (ctx.entity_subtype) lines.push(`entity_subtype: ${ctx.entity_subtype}`);
  if (ctx.schema_id)      lines.push(`schema_id: ${ctx.schema_id}`);
  if (ctx.products)       lines.push(`products: ${JSON.stringify(ctx.products)}`);
  if (ctx.description)    lines.push(`description: ${ctx.description}`);
  lines.push('[/CONTEXT]');
  return lines.join('\n');
}

// ── SP 로드 ──────────────────────────────────────────────
let systemPrompt = null, messages = [];
async function ensureSystemPrompt() {
  if (systemPrompt) return systemPrompt;
  systemPrompt = await _loadSpByKey('profile-assistant', 'Profile-Assistant')
    .catch(e => { throw new Error('profile-assistant SP 로드 실패: ' + e.message); });
  messages = [{ role: 'system', content: systemPrompt }];
  return systemPrompt;
}

// ── AI 호출 (expert-chat.html과 동일한 후보 폴백 패턴) ──────
function _loadCfg() { try { return JSON.parse(localStorage.getItem('gopang_cfg') || '{}'); } catch { return {}; } }
function _buildCandidates() {
  const cfg = _loadCfg();
  const candidates = [];
  if (Array.isArray(cfg.providers)) {
    for (const p of cfg.providers) {
      if (!p?.apiKey || !p?.model || !p?.baseUrl) continue;
      candidates.push({ provider: p.provider, baseUrl: p.baseUrl.replace(/\/+$/,''), model: p.model, apiKey: p.apiKey });
    }
  }
  if (!candidates.length && cfg.apiKey && cfg.endpoint && !cfg.endpoint.includes('workers.dev')) {
    candidates.push({ provider: 'legacy', baseUrl: cfg.endpoint.replace(/\/+$/,''), model: cfg.model || 'gpt-4o-mini', apiKey: cfg.apiKey });
  }
  candidates.push({ provider: 'deepseek-default', baseUrl: RELAY_ENDPOINT, model: 'hondi-flash', apiKey: null });
  return candidates;
}
async function _pumpSSE(response, onJson) {
  if (!response.ok) {
    let msg = `HTTP ${response.status}`;
    try { const b = await response.json(); msg = b.message || b.error?.message || b.error || msg; } catch (e) {}
    throw new Error(msg);
  }
  const reader = response.body.getReader();
  const decoder = new TextDecoder('utf-8');
  let buf = '';
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      const t = line.trim();
      if (!t.startsWith('data:')) continue;
      const payload = t.slice(5).trim();
      if (payload === '[DONE]') continue;
      let json;
      try { json = JSON.parse(payload); } catch (e) { continue; }
      onJson(json);
    }
  }
}
async function callPaAI(msgs, onChunk) {
  const candidates = _buildCandidates();
  const user = _loadUser();
  let lastErr = null;
  for (const c of candidates) {
    try {
      const reqBody = { model: c.model, messages: msgs, max_tokens: 1200, temperature: 0.5, stream: true };
      const resp = c.provider === 'legacy'
        ? await fetch(`${c.baseUrl}/chat/completions`, {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${c.apiKey}` },
            body: JSON.stringify(reqBody),
          })
        : c.provider === 'deepseek-default'
        ? await fetch(`${c.baseUrl}/deepseek`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...reqBody, guid: user?.ipv6 || null }),
          })
        : await fetch(`${RELAY_ENDPOINT}/llm/relay`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ provider: c.provider, baseUrl: c.baseUrl, apiKey: c.apiKey, ...reqBody }),
          });
      let fullText = '';
      await _pumpSSE(resp, (json) => {
        const delta = json.choices?.[0]?.delta?.content || '';
        if (delta) { fullText += delta; onChunk && onChunk(delta, fullText); }
      });
      return fullText;
    } catch (e) {
      lastErr = e;
      console.warn(`[PA] ${c.provider} 실패 — 다음 후보로 전환:`, e.message);
      continue;
    }
  }
  throw lastErr || new Error('모든 호출 후보 실패');
}

// ── 태그 처리 (call-ai.js _handleProfileTags에서 이식 — 탭 종료 방식만 다름) ──
function _stripInternalTags(s) {
  return String(s ?? '')
    .replace(/\[TUTORIAL_STEP:[^\]]*\]/g, '')
    .replace(/\[TUTORIAL_ADVANCE:\d+\]/g, '')
    .replace(/\[PANEL_ACTION:close\]/g, '')
    .replace(/PROFILE_SUBMIT\s*\{[\s\S]*?\n\}/, '')
    .replace(/\[PROFILE_SKIP\]/g, '')
    .replace(/\[PARTIAL_SAVE\][\s\S]*?\}/g, '')
    .replace(/\[\d+\/\d+단계\]/g, '')
    .replace(/\[PROFILE_INTERRUPT_HANDOFF\]/g, '')
    .trim();
}

let _closing = false;
// ── 프로필 완성 요약 (2026-07-13 신설) ──────────────────────
// GWP_DONE의 summary로 실려 나가면 engine.js가 채팅 버블에 자동 표시한다
// (다른 GWP 서비스와 동일 메커니즘). profile-assistant SP의 [§PROFILE_CARD]
// 포맷(이모지+한 줄)을 클라이언트 쪽에서 동일하게 재현 — 두 표현이
// 어긋나지 않도록 SP 문서 쪽 포맷을 바꾸면 여기도 함께 갱신해야 한다.
function _buildProfileSummaryText(profile) {
  const isBiz = profile.entity_type && profile.entity_type !== 'person';
  const label = profile.name || profile.nickname || '(이름 미상)';
  const lines = [];
  if (!isBiz) {
    lines.push(`👤 ${label}`);
    if (profile.address) lines.push(`📍 ${profile.address}`);
    if (profile.phone)   lines.push(`📞 ${profile.phone}`);
    lines.push(profile.is_public ? '🌐 다른 이용자에게 공개돼요' : '🔒 비공개로 둘게요');
  } else {
    lines.push(`🏪 ${label}`);
    if (profile.address) lines.push(`📍 ${profile.address}`);
    if (profile.products) lines.push(`🍜 ${profile.products}`);
    if (profile.gdc_accepted) lines.push('💳 GDC 결제도 받아요');
    lines.push(profile.is_public ? '🌐 K-Market 등에서 검색돼요' : '🔒 비공개로 둘게요');
  }
  return `🎉 프로필 완성됐어요!\n\n${lines.join('\n')}`;
}

function _closeTabSoon(delayMs = 900) {
  if (_closing) return;
  _closing = true;
  setTimeout(() => { window.close(); location.href = RETURN; }, delayMs);
}

// ── 업종 템플릿 조회 (2026-07-13 신설) ─────────────────────
// 동종업계(같은 schema_id) 공개 프로필 최대 8건에서 다수가 가진
// industry_fields 키만 추출한다 — 개별 업체명·연락처는 절대 넘기지
// 않고 "필드 구조"만 참조로 넘긴다. /search는 handleSearch가
// schema_id alias를 KSIC_LABELS로 자동 해석해준다(worker.js 2026-07-13).
async function _lookupIndustryTemplate(schemaId) {
  try {
    const res = await fetch(`${RELAY_ENDPOINT}/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ schema_id: schemaId, lim: 8 }),
    });
    const data = await res.json().catch(() => ({}));
    const items = Array.isArray(data.results) ? data.results
      : (Array.isArray(data.items) ? data.items : []);
    if (!items.length) return '';

    const fieldCounts = {};
    for (const it of items) {
      const fields = it.extra?.public?.industry_fields || {};
      for (const k of Object.keys(fields)) {
        if (k === 'schema_id' || k === 'status') continue;
        fieldCounts[k] = (fieldCounts[k] || 0) + 1;
      }
    }
    const majorityThreshold = Math.max(2, Math.ceil(items.length / 2));
    // 2026-07-13 신설 — 상위 4개로 상한. 상한이 없으면 피어 데이터가
    // 풍부한 업종일수록 STEP2 추가 질문이 한없이 길어질 위험이 있다는
    // 사고실험 결과 반영(불필요한 질문 남발 방지). 빈도 높은 순으로
    // 정렬 후 자른다 — 가장 흔한 패턴부터 우선.
    const MAX_TEMPLATE_FIELDS = 4;
    const majorityFields = Object.entries(fieldCounts)
      .filter(([, c]) => c >= majorityThreshold)
      .sort((a, b) => b[1] - a[1])
      .slice(0, MAX_TEMPLATE_FIELDS)
      .map(([k]) => k);
    if (!majorityFields.length) return '';
    return `동종업계 ${items.length}건 중 다수가 보유한 필드: ${majorityFields.join(', ')}`;
  } catch (e) {
    console.warn('[PA] 업종 템플릿 조회 실패(무시):', e.message);
    return '';
  }
}

async function _handleReplyTags(fullReply) {
  // 업종 템플릿 조회 [INDUSTRY_TEMPLATE_LOOKUP: schema_id=NN]
  const templateMatch = fullReply.match(/\[INDUSTRY_TEMPLATE_LOOKUP:\s*schema_id=(\d+)\]/);
  if (templateMatch) {
    const summary = await _lookupIndustryTemplate(templateMatch[1]);
    const ctx = summary
      ? `[CONTEXT: INDUSTRY_TEMPLATE]\n${summary}\n[/CONTEXT]`
      : `[CONTEXT: INDUSTRY_TEMPLATE]\n(참조할 동종업계 사례 없음 — 본인 업종 지식으로 진행)\n[/CONTEXT]`;
    await sendTurn(ctx);
    return;
  }
  // 진행 중 필드 저장 [PARTIAL_SAVE]
  if (!localStorage.getItem('hondi_profile_done')) {
    const partialMatch = fullReply.match(/\[PARTIAL_SAVE\]\s*(\{[\s\S]*?\})/);
    if (partialMatch) {
      try {
        const incoming = JSON.parse(partialMatch[1]);
        const existing = JSON.parse(localStorage.getItem('hondi_profile_partial') || '{}');
        localStorage.setItem('hondi_profile_partial', JSON.stringify(Object.assign(existing, incoming)));
      } catch {}
    }
  }
  // 단계 업데이트 [N/6단계]
  const stepMatch = fullReply.match(/\[(\d+)\/\d+단계\]/);
  if (stepMatch && !localStorage.getItem('hondi_profile_done')) {
    try { localStorage.setItem('hondi_profile_step', stepMatch[1]); } catch {}
  }
  // TUTORIAL_ADVANCE — 매 단계 즉시 저장(탭 강제종료에도 보존)
  const tutAdv = fullReply.match(/\[TUTORIAL_ADVANCE:(\d+)\]/);
  if (tutAdv) {
    const nextStep = parseInt(tutAdv[1], 10);
    try {
      if (nextStep >= 7) {
        localStorage.setItem('hondi_tutorial_done', '1');
        localStorage.removeItem('hondi_tutorial_step');
      } else {
        localStorage.setItem('hondi_tutorial_step', String(nextStep));
      }
    } catch {}
  }
  // PROFILE_SUBMIT — 실제 서버 등록(welcome.js 그대로 재사용)
  if (fullReply.includes('PROFILE_SUBMIT')) {
    let savedProfile = null;
    try { savedProfile = await handleProfileSubmit(fullReply); }
    catch (e) { console.warn('[PA] handleProfileSubmit 실패:', e.message); }
    try {
      localStorage.setItem('hondi_profile_done', '1');
      localStorage.removeItem('hondi_profile_step');
      localStorage.removeItem('hondi_profile_skipped');
      localStorage.removeItem('hondi_profile_partial');
    } catch {}
    // 2026-07-13 신설 — 이 페이지 상단 주석은 애초에 "K-Law·market과 동일한
    // GWP_DONE 보고 패턴"이라고 설명하고 있었지만, 실제로는 한 번도
    // window.opener.postMessage(GWP_DONE)을 호출하지 않고 있었다(발견된
    // gap — _closeTabSoon()이 그냥 탭만 닫음). 그래서 원래 창(AC)이 완료
    // 사실도, 요약도 전혀 받지 못했다. 이제 실제로 보고한다.
    if (savedProfile && window.opener && !window.opener.closed) {
      try {
        window.opener.postMessage({
          type:         'GWP_DONE',
          summary:      _buildProfileSummaryText(savedProfile),
          session_id:   crypto.randomUUID(),
          reporter_svc: 'profile-assistant',
        }, RETURN);
      } catch (e) {
        console.warn('[PA] GWP_DONE 보고 실패(무시, 프로필 저장 자체는 정상 처리됨):', e.message);
      }
    }
    _closeTabSoon();
    return;
  }
  // PROFILE_SKIP — 재개를 위해 단계·작성분 보존, 탭만 닫는다
  if (fullReply.includes('[PROFILE_SKIP]')) {
    try { localStorage.setItem('hondi_profile_skipped', '1'); } catch {}
    _closeTabSoon();
    return;
  }
  // PROFILE_INTERRUPT_HANDOFF — 프로필과 무관한 요청, AC에게 돌려보낸다
  // (같은 창 전환 시절엔 AC SP로 바꿔치기했지만, 새 탭 구조에서는 그냥
  // 이 탭을 닫아 원래 창의 AC가 이어받게 하면 된다 — AC는 이미 그 창에서
  // 대기 중이다.)
  if (fullReply.includes('[PROFILE_INTERRUPT_HANDOFF]')) {
    _closeTabSoon(300);
    return;
  }
  // PANEL_ACTION:close — 튜토리얼 종료 후 "닫을까요?"에 사용자가 동의
  if (fullReply.includes('[PANEL_ACTION:close]')) {
    _closeTabSoon();
    return;
  }
}

async function sendTurn(text, imageDataUrl) {
  const typing = appendTyping();
  const aiBubble = appendBubble('ai', '');
  aiBubble.style.display = 'none';
  try {
    await ensureSystemPrompt();
    messages.push(imageDataUrl ? {
      role: 'user',
      content: [
        ...(text ? [{ type: 'text', text }] : []),
        { type: 'image_url', image_url: { url: imageDataUrl } },
      ],
    } : { role: 'user', content: text });
    let shown = false;
    const full = await callPaAI(messages, (delta, fullText) => {
      if (!shown) { typing.remove(); aiBubble.style.display = ''; shown = true; }
      aiBubble.innerHTML = escHtml(_stripInternalTags(fullText)).replace(/\n/g, '<br>');
      document.getElementById('chat-thread').scrollTop = 1e9;
    });
    messages.push({ role: 'assistant', content: full });
    aiBubble.innerHTML = escHtml(_stripInternalTags(full)).replace(/\n/g, '<br>');
    await _handleReplyTags(full);
  } catch (e) {
    typing.remove();
    aiBubble.remove();
    appendBubble('ai', `⚠️ 응답 중 오류가 발생했습니다: ${escHtml(e.message)}. 잠시 후 다시 시도해 주세요.`);
  }
}

// ── 진입 트리거 — 튜토리얼 미완료면 PHASE -1부터, 완료면 PHASE 0부터 ──
async function startGreeting() {
  const ctxBlock = _buildProfileContext();
  if (!_tutDone()) {
    document.getElementById('tb-sub').textContent = '앱 사용법 안내 중…';
    await sendTurn(
      `[INTERNAL: AGENT-COMMON→profile-assistant 인계(튜토리얼부터) — ` +
      `사용자에게 보이지 않는 내부 신호입니다. AC가 이미 첫 인사를 마쳤고 ` +
      `사용자가 방금 준비됐다고 답했습니다. 재인사하지 말고, PHASE -1 STEP 0부터 ` +
      `곧바로 시작하세요.]\n\n${ctxBlock}`
    );
  } else {
    document.getElementById('tb-sub').textContent = '프로필 작성 중…';
    await sendTurn(
      `[INTERNAL: AGENT-COMMON→profile-assistant 인계 — 사용자에게 보이지 않는 ` +
      `내부 신호입니다. 앱 사용법 튜토리얼은 이미 완료된 상태입니다. 재인사하지 ` +
      `말고, [CONTEXT]를 읽어 PHASE 0 분기부터 자연스럽게 이어서 시작하세요.]\n\n${ctxBlock}`
    );
  }
}

// ── 입력 바 ──────────────────────────────────────────────
// 자동 리사이즈·아이콘 접힘·전송 버튼 활성화는 wireInputBar()가 이미
// 처리한다(위에서 배선됨) — 여기서는 실제 전송 로직만 담당.
const input = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
});
sendBtn.addEventListener('click', doSend);
async function doSend() {
  const text = input.value.trim();
  const file = _attach.getAttachedFile();
  if (!text && !file) return;
  input.value = ''; input.dispatchEvent(new Event('input'));

  let imageDataUrl = null;
  if (file) {
    try { imageDataUrl = await _attach.fileToDataUrl(file); }
    catch (e) { appendBubble('ai', `⚠️ 이미지를 읽지 못했습니다: ${escHtml(e.message)}`); return; }
    _attach.setAttachedFile(null);
  }

  appendBubble('user',
    (text ? escHtml(text).replace(/\n/g, '<br>') : '') +
    (imageDataUrl ? `<img src="${imageDataUrl}" style="max-width:180px;max-height:160px;border-radius:8px;display:block;margin-top:4px">` : '')
  );
  sendTurn(text, imageDataUrl);
}

// ── 탭 종료 시 최소 기록(정상 종료 못 해도 안전망) ──────────
// 위 _handleReplyTags에서 이미 매 단계 즉시 저장하므로 이건 사실상
// 이중 안전망이다 — 스트리밍 도중 탭이 닫히는 극단적 타이밍에도
// 마지막으로 완료된 단계는 이미 저장돼 있다.
window.addEventListener('pagehide', () => {
  console.info('[PA] 탭 종료 — 마지막 저장 단계: 튜토리얼=' +
    (localStorage.getItem('hondi_tutorial_step') || (localStorage.getItem('hondi_tutorial_done')==='1'?'완료':'0')) +
    ', 프로필=' + (localStorage.getItem('hondi_profile_step') || '0'));
});

// ── PDV 필드 사전 요청 (2026-07-13 신설) ────────────────────
// 지금까지 이 페이지는 GWP_PDV_REQUEST를 한 번도 보낸 적이 없었다
// (수신 측 _handlePdvRequest는 이미 있었지만 발신이 빠져 있던 gap).
// 원래 창(AC)에게 부족한 필드를 요청해, 사용자 승인 시에만
// hondi_profile_partial에 미리 채워 같은 질문을 다시 안 묻게 한다.
function _requestPdvFields(fields, reason) {
  return new Promise((resolve) => {
    if (!window.opener || window.opener.closed) { resolve(null); return; }
    const requestId = 'pareq-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
    let settled = false;
    const timer = setTimeout(() => {
      if (settled) return;
      settled = true;
      window.removeEventListener('message', onMsg);
      resolve(null); // 타임아웃 — 평소처럼 대화로 물어보는 경로로 자연스럽게 폴백
    }, 20000);
    function onMsg(e) {
      if (e.source !== window.opener) return; // 원래 창에서 온 응답만 신뢰
      const msg = e.data;
      if (!msg || msg.type !== 'GWP_PDV_RESPONSE' || msg.request_id !== requestId) return;
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      window.removeEventListener('message', onMsg);
      resolve(msg.approved ? msg.values : null);
    }
    window.addEventListener('message', onMsg);
    window.opener.postMessage({
      type: 'GWP_PDV_REQUEST',
      request_id: requestId,
      requesting_sp: 'profile-assistant',
      fields,
      reason,
    }, RETURN);
  });
}

async function _prefillFromPdvIfNeeded() {
  try {
    const partial = JSON.parse(localStorage.getItem('hondi_profile_partial') || '{}');
    const needed = [];
    if (!partial.products) needed.push('취급 상품·서비스');
    if (!partial.entity_subtype) needed.push('업종');
    if (!needed.length) return;

    const values = await _requestPdvFields(needed, '프로필 작성에 참고하기 위해');
    if (!values) return;

    // PDV 필드명 → profile-assistant 필드명 매핑
    const FIELD_MAP = { '취급 상품·서비스': 'products', '업종': 'entity_subtype' };
    let changed = false;
    for (const [pdvField, profileKey] of Object.entries(FIELD_MAP)) {
      const v = values[pdvField];
      if (!v || (typeof v === 'object' && v.not_in_pdv)) continue;
      if (!partial[profileKey]) { partial[profileKey] = v; changed = true; }
    }
    if (changed) localStorage.setItem('hondi_profile_partial', JSON.stringify(partial));
  } catch (e) {
    console.warn('[PA] PDV 필드 요청 실패(무시, 평소처럼 대화로 진행):', e.message);
  }
}

(async () => {
  await _prefillFromPdvIfNeeded();
  startGreeting();
})();
</script>
