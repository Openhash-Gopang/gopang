<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="/pdv-store.js"></script>
<style>
:root{
  --blue:#1A73E8;--blue-lt:#EEF4FF;--blue-dk:#1557B0;
  --border:#DADCE0;--txt2:#5F6368;--txt3:#9AA0A6;
  --font:'Pretendard',-apple-system,'Helvetica Neue',sans-serif;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  --person:#712B13;--person-bg:#FAECE7;
  --thing:#085041;--thing-bg:#E1F5EE;
  --org:#633806;--org-bg:#FAEEDA;
  --ai:#3C3489;--ai-bg:#EEEDFE;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);color:#111;background:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.header{display:flex;align-items:center;gap:10px;padding:calc(var(--safe-t) + 14px) 16px 14px;border-bottom:1px solid var(--border)}
.icon-btn{width:32px;height:32px;border-radius:50%;border:none;background:none;color:var(--txt2);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.header h1{flex:1;font-size:16px;font-weight:700}
.tabbar{display:flex;gap:6px;overflow-x:auto;padding:10px 12px;border-bottom:1px solid var(--border);-ms-overflow-style:none;scrollbar-width:none}
.tabbar::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 13px;border-radius:16px;font-size:12.5px;border:1px solid var(--border);color:var(--txt2);background:#fff;white-space:nowrap}
.tab.active{background:var(--blue-lt);color:var(--blue-dk);border-color:var(--blue)}
.list{padding-bottom:calc(var(--safe-b) + 12px)}
.card{display:block;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--border);padding:13px 16px;font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
.card:active{background:#f9fafb}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:8px}
.card-who{display:flex;align-items:center;gap:6px;min-width:0}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;flex-shrink:0}
.badge.person{background:var(--person-bg);color:var(--person)}
.badge.thing{background:var(--thing-bg);color:var(--thing)}
.badge.org{background:var(--org-bg);color:var(--org)}
.badge.ai{background:var(--ai-bg);color:var(--ai)}
.badge.uncategorized{background:#f3f4f6;color:var(--txt3)}
.name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.date{font-size:11px;color:var(--txt3);flex-shrink:0}
.what{font-size:13px;color:#333;line-height:1.5}
.why{font-size:11.5px;color:var(--txt3);margin-top:2px}
.locked{opacity:.7}
.locked .what{color:var(--txt3)}
.empty{padding:40px 24px;text-align:center;color:var(--txt3);font-size:13px;line-height:1.7}
.empty-tab-note{padding:16px 20px;background:#f9fafb;border-radius:10px;margin:12px 16px;font-size:12px;color:var(--txt3);line-height:1.7}

.detail{position:fixed;inset:0;background:#fff;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;z-index:5}
.detail.open{transform:translateX(0)}
.detail-body{padding:18px 16px;overflow-y:auto}
.detail-name{font-size:19px;font-weight:700;margin:2px 0 4px}
.detail-field{border-top:1px solid var(--border);padding:13px 0}
.detail-field:first-of-type{border-top:none;margin-top:8px}
.field-label{font-size:11.5px;color:var(--txt3);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.field-value{font-size:14.5px;line-height:1.6;color:#111}
.field-value.muted{color:var(--txt3)}
.sensitive-note{margin-top:16px;padding:12px 14px;border-radius:10px;background:#FAEEDA;color:#633806;font-size:12.5px;line-height:1.6;display:flex;gap:8px;align-items:flex-start}
</style>
</head>
<body>

<div class="header">
  <button class="icon-btn" onclick="parent.closePDV && parent.closePDV()" aria-label="닫기"><i class="ti ti-arrow-left"></i></button>
  <h1>PDV · 대화 이력</h1>
  <button class="icon-btn" aria-label="검색"><i class="ti ti-search"></i></button>
</div>

<div class="tabbar" id="tabbar">
  <button class="tab active" data-cat="all">전체 (시간순)</button>
  <button class="tab" data-cat="person">사람</button>
  <button class="tab" data-cat="thing">사물</button>
  <button class="tab" data-cat="org">기관</button>
  <button class="tab" data-cat="ai">공용 AI 전문가</button>
</div>

<div class="list" id="list"></div>

<div class="detail" id="detail">
  <div class="header">
    <button class="icon-btn" onclick="closeDetail()" aria-label="목록으로"><i class="ti ti-arrow-left"></i></button>
    <h1 id="detail-title">대화 상세</h1>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
// 이번 카테고리 분류가 어떤 근거로 나오는지, 데이터가 왜 비어있는지는
// pdv-store.js 파일 상단 주석(2026-07-01 저장소 실사 결과)이 최신 진실이다.
const EMPTY_TAB_NOTE = {
  person: '1:1 대화 상대의 PDV 기록 기능은 아직 구현되어 있지 않습니다. 지금은 Hondi 자체 AI 서브시스템과의 상호작용만 기록됩니다.',
  thing: '사물(기기) 상대방의 PDV 기록 기능은 아직 구현되어 있지 않습니다.',
  org: '실제 사업자 식별 정보 없이, K-Market 등 거래형 서비스 이용 기록을 근사치로 표시합니다. 어느 사업자였는지는 확인할 수 없습니다.',
  ai: '',
  all: '',
};

const CAT_CLASS = { person:'person', thing:'thing', org:'org', ai:'ai', uncategorized:'uncategorized' };

let RECORDS = [];
let activeCat = 'all';

function fmtDate(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return '';
  return (d.getMonth()+1).toString().padStart(2,'0') + '.' + d.getDate().toString().padStart(2,'0');
}

// L2 이상만 risk_level:'high' 레코드 상세를 볼 수 있음 — 백엔드 인증 미구현이라
// 현재는 항상 L0으로 취급(fail-safe). window.GopangAuth가 생기면 자동 반영됨.
function canViewHighRisk() {
  const tier = (parent.GopangAuth && parent.GopangAuth.tier) || 'L0';
  return tier === 'L2' || tier === 'L3';
}

function renderList() {
  const listEl = document.getElementById('list');
  const note = EMPTY_TAB_NOTE[activeCat];
  const noteHtml = note ? `<div class="empty-tab-note">${note}</div>` : '';

  const filtered = RECORDS.filter(r => activeCat === 'all' || r.category === activeCat);

  if (!filtered.length) {
    listEl.innerHTML = noteHtml + `<div class="empty">표시할 기록이 없습니다.</div>`;
    return;
  }

  listEl.innerHTML = noteHtml + filtered.map(r => {
    const cls = CAT_CLASS[r.category] || 'uncategorized';
    const locked = r.risk_level === 'high' && !canViewHighRisk();
    const w = r.summary_6w_view || {};
    const name = r.service || r.serviceId || w.who || '기록';
    const what = locked ? '민감도 높음 — 인증 후 열람 가능' : (w.what || r.summary || '(요약 없음)');
    const why  = locked ? '' : (w.why ? `<div class="why">왜: ${w.why}</div>` : '');
    return `
      <button class="card ${locked ? 'locked' : ''}" data-id="${r._id}">
        <div class="card-top">
          <div class="card-who"><span class="badge ${cls}">${r.category_label}</span><span class="name">${name}</span></div>
          <span class="date">${fmtDate(r.ts || r.when)}</span>
        </div>
        <div class="what">${locked ? '<i class="ti ti-lock" style="font-size:12px;margin-right:4px"></i>' : ''}${what}</div>
        ${why}
      </button>`;
  }).join('');

  listEl.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openDetail(Number(card.getAttribute('data-id'))));
  });
}

function openDetail(id) {
  const r = RECORDS.find(x => x._id === id);
  if (!r) return;
  const locked = r.risk_level === 'high' && !canViewHighRisk();
  const w = r.summary_6w_view || {};

  document.getElementById('detail-title').textContent = r.service || r.serviceId || '대화 상세';

  if (locked) {
    document.getElementById('detail-body').innerHTML = `
      <div class="detail-name">${r.service || r.serviceId || '기록'}</div>
      <div class="sensitive-note"><i class="ti ti-lock"></i>이 기록은 위험도(risk_level)가 높음으로 분류되어 있습니다. 인증 등급이 올라간 뒤(L2 이상) 열람할 수 있습니다.</div>`;
  } else {
    const rows = [
      ['ti-calendar','언제', w.when || fmtDate(r.ts) || '확인불가'],
      ['ti-map-pin','어디서', w.where || '확인불가'],
      ['ti-user','누가', w.who || '확인불가'],
      ['ti-message','무엇을', w.what || r.summary || '확인불가'],
      ['ti-route','어떻게', w.how || '확인불가'],
      ['ti-help-circle','왜', w.why || '확인불가'],
    ];
    document.getElementById('detail-body').innerHTML = `
      <div class="detail-name">${r.service || r.serviceId || '기록'}</div>
      ${rows.map(([icon,label,val]) => `
        <div class="detail-field">
          <div class="field-label"><i class="ti ${icon}"></i>${label}</div>
          <div class="field-value ${val==='확인불가' ? 'muted' : ''}">${val}</div>
        </div>`).join('')}
      ${r.risk_level ? `<div class="sensitive-note"><i class="ti ti-alert-triangle"></i>위험도: ${r.risk_level}</div>` : ''}
      <div class="detail-field">
        <div class="field-label"><i class="ti ${r.category === 'org' ? 'ti-info-circle' : 'ti-tag'}"></i>분류 근거</div>
        <div class="field-value muted">${r.category === 'org'
          ? '실거래(MKT) 서비스 이용으로 근사 분류됨 — 실제 사업자 식별자 아님'
          : `svc/serviceId "${r.serviceId || r.svc || '-'}"를 GWP_REGISTRY와 대조해 분류됨`}</div>
      </div>`;
  }

  document.getElementById('detail').classList.add('open');
}
function closeDetail() {
  document.getElementById('detail').classList.remove('open');
}

document.getElementById('tabbar').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.getAttribute('data-cat');
  renderList();
});

async function boot() {
  if (!window.GopangPDV) {
    document.getElementById('list').innerHTML = '<div class="empty">PDV 저장소 모듈(pdv-store.js)을 불러오지 못했습니다.</div>';
    return;
  }
  RECORDS = await window.GopangPDV.list();
  renderList();
}
boot();
</script>

</body>
</html>
