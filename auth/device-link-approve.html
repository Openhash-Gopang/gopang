<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혼디 — 새 기기 연결 승인</title>
<script src="/gopang-wallet.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: #f8f9fa;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  #card {
    background: white; border: 1px solid #e5e7eb; border-radius: 12px;
    padding: 32px 28px; width: 100%; max-width: 380px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    text-align: center;
  }
  h1 { font-size: 17px; color: #111827; margin-bottom: 18px; }
  .pc-label {
    background: #f3f4f6; border-radius: 10px; padding: 12px;
    font-size: 14px; color: #374151; margin-bottom: 18px;
  }
  .warn {
    font-size: 12px; color: #92400e; background: #fffbeb;
    border: 1px solid #fde68a; border-radius: 8px; padding: 10px 12px;
    margin-bottom: 20px; line-height: 1.5; text-align: left;
  }
  button {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
    background: #0057A8; color: #fff; margin-bottom: 10px;
  }
  button.secondary { background: #f3f4f6; color: #374151; }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  #status { font-size: 13px; color: #6b7280; margin-top: 14px; min-height: 18px; }
  #status.error { color: #dc2626; }
  #status.success { color: #059669; }
  .spinner {
    width: 24px; height: 24px; border: 2.5px solid #e5e7eb; border-top-color: #0057A8;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hide { display: none; }
  /* 2026-07-20 신설 — USB 원격 디버깅이 반복적으로 불안정해(모토로라
     기기·Edge 조합에서 연결은 인식되지만 세션이 안 붙는 문제가 실사로
     반복 확인됨), 화면 자체에 단계별 로그를 항상 보여주는 패널을 만든다.
     이러면 콘솔 접근 없이도 정확히 어느 단계에서 무슨 에러가 났는지
     바로 알 수 있다. */
  #debug-log {
    margin-top: 16px; text-align: left; font-family: monospace;
    font-size: 11px; background: #111827; color: #d1fae5;
    border-radius: 8px; padding: 10px 12px; max-height: 220px;
    overflow-y: auto; line-height: 1.6; white-space: pre-wrap; word-break: break-all;
  }
  #debug-log .err { color: #fca5a5; }
  #debug-log .ok  { color: #6ee7b7; }
</style>
</head>
<body>
<div id="card">
  <div id="loading">
    <h1>불러오는 중...</h1>
    <div class="spinner"></div>
  </div>

  <div id="content" class="hide">
    <h1>새 기기에서 로그인을 요청했습니다</h1>
    <div class="pc-label" id="pc-label"></div>
    <div class="warn">
      본인이 직접 다른 기기(위 기기 정보 참고)에서 로그인을 시도한 게
      맞는지 확인해 주세요. 승인하면 <strong>이 계정 전체(GDC 잔액 포함)를
      사용할 수 있는 권한</strong>이 그 기기에 전달됩니다.
    </div>
    <button id="btn-approve">본인이 맞습니다 — 로그인 허용</button>
    <button id="btn-deny" class="secondary">본인 아님 — 거부</button>
    <!-- 2026-07-22 신설 — deliver 단계(암호화 봉투 전달)만 네트워크
         오류로 실패했을 때, verify부터 처음부터 다시 하지 않고 이미
         암호화까지 끝난 봉투를 그대로 재전송할 수 있는 버튼. 실사로
         "Failed to fetch"가 여러 번 반복되는 사례가 확인됨. -->
    <button id="btn-retry-deliver" class="secondary hide">전달 다시 시도</button>
  </div>

  <div id="unlock" class="hide">
    <h1>지갑 잠금 해제가 필요합니다</h1>
    <div class="warn">
      브라우저 보안 정책상, 지문/얼굴 인식은 화면을 직접 눌러야만 뜹니다.
      아래 버튼을 눌러 인증을 진행해 주세요.
    </div>
    <button id="btn-unlock">지갑 잠금 해제</button>
  </div>

  <div id="error" class="hide">
    <h1 id="error-title">문제가 발생했습니다</h1>
    <p id="error-msg" style="font-size:13px;color:#6b7280;margin-top:8px"></p>
  </div>

  <div id="status"></div>
  <div id="debug-log"></div>
</div>

<script>
(() => {
  const WORKER = 'https://hondi-proxy.tensor-city.workers.dev';
  const sessionId = new URLSearchParams(location.search).get('sessionId');

  const $ = (id) => document.getElementById(id);
  const show = (id) => { ['loading','content','error','unlock'].forEach(x => $(x).classList.add('hide')); $(id).classList.remove('hide'); };
  const setStatus = (msg, kind) => { $('status').textContent = msg || ''; $('status').className = kind || ''; };

  // 2026-07-20 신설 — USB 원격 디버깅이 반복적으로 불안정해, 화면에
  // 직접 단계별 로그를 남긴다. 각 단계 진입·성공·실패를 전부 기록해서
  // 콘솔 접근 없이도 정확히 어느 지점에서 무엇이 잘못됐는지 바로 보이게
  // 한다(예: "X25519 key data must be 256 bits"처럼 원인이 짧은 메시지
  // 뒤에 숨어 어느 단계인지 알기 어려웠던 사고를 재발 방지).
  function dlog(msg, kind) {
    const el = $('debug-log');
    const line = document.createElement('div');
    if (kind) line.className = kind;
    const t = new Date().toLocaleTimeString('ko-KR', { hour12: false });
    line.textContent = `[${t}] ${msg}`;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  let sessionData = null;

  // ★ 2026-07-21 신설 — 실사로 발견: 이 페이지가 열리자마자 백그라운드에서
  // 자동 실행되는 gopang-wallet.js 초기화 IIFE가 (WebAuthn PRF가 등록된
  // 기기에서는) navigator.credentials.get()을 사용자 제스처 없이 호출한다.
  // 브라우저는 제스처 없는 WebAuthn 호출은 프롬프트조차 띄우지 않고
  // 조용히 막아버릴 수 있어(실사로 확인: 지문 창이 아예 안 뜸), 예전에는
  // 이게 8초간 원인 불명으로 멈춰있다가 "지갑을 불러오지 못했습니다"라는
  // 애매한 메시지로만 끝났다. 이제는 짧게만 기다려보고, 안 되면 즉시
  // "탭하면 잠금 해제" 버튼으로 전환한다 — 버튼 클릭 자체가 진짜 사용자
  // 제스처이므로, 그 안에서 다시 지갑을 불러오면 생체인증 프롬프트가
  // 정상적으로 뜬다.
  async function waitForWallet(timeoutMs = 2000) {
    const start = Date.now();
    while (window.gopangWallet === undefined) {
      if (Date.now() - start > timeoutMs) return null; // 조용히 포기 — 호출부가 unlock 버튼으로 전환
      await new Promise(r => setTimeout(r, 150));
    }
    return window.gopangWallet || null;
  }

  // 잠금 해제 버튼(진짜 사용자 제스처 안)에서 직접 지갑을 다시 불러온다.
  async function unlockWalletDirectly() {
    if (typeof window.GopangWallet === 'undefined') {
      throw new Error('지갑 모듈을 불러오지 못했습니다. 새로고침해 주세요.');
    }
    let wallet;
    try {
      wallet = await window.GopangWallet.load();
    } catch (e) {
      if (e?.code === 'WALLET_DECRYPT_FAILED') {
        throw new Error('이 기기의 지갑을 열 수 없습니다. 설정 화면에서 백업 키로 복구해 주세요.');
      }
      throw e;
    }
    if (!wallet) throw new Error('이 기기에 등록된 지갑이 없습니다. 먼저 혼디 앱에 로그인해 주세요.');
    // gopang_user_v4에서 guid 연결(자동 초기화 IIFE와 동일한 규칙)
    const stored = (() => {
      try { return JSON.parse(localStorage.getItem('gopang_user_v4') || 'null'); }
      catch { return null; }
    })();
    if (stored?.ipv6) wallet.setIdentity({ guid: stored.ipv6, handle: stored.handle || null });
    window.gopangWallet = wallet; // 나머지 흐름(및 다른 탭)과 일관되게 전역에도 반영
    return wallet;
  }

  async function proceedWithWallet(wallet) {
    if (!wallet.guid) {
      show('error');
      $('error-title').textContent = '먼저 로그인해 주세요';
      $('error-msg').textContent = '혼디 앱에 먼저 로그인한 뒤 다시 시도해 주세요.';
      return;
    }

    const res = await fetch(`${WORKER}/auth/device-link/session?sessionId=${encodeURIComponent(sessionId)}&guid=${encodeURIComponent(wallet.guid)}`);
    const data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.detail || data.error || '요청을 확인할 수 없습니다.');

    sessionData = data;
    $('pc-label').textContent = data.pcLabel || '알 수 없는 기기';
    // ★ 2026-07-20 UX 개선(사용자 지시 — 구글 방식) — 코드를 화면에
    // 보여주고 PC에 옮겨 적게 하던 방식을 없앤다. 폰은 이미 /session에서
    // code를 받아뒀으므로, "본인이 맞습니다" 버튼을 누르면 그 코드를
    // 폰이 스스로 /verify에 제출한다 — 사람이 숫자를 옮겨 적을 필요가
    // 없다. 서버 쪽 검증 로직(코드 일치 확인)은 전혀 안 바뀌었고, 누가
    // 그 코드를 "안다"는 사실 자체가 이미 이 세션의 소유자(같은 guid로
    // /session을 조회할 수 있었다는 것)라는 증거이므로 보안 수준은
    // 그대로다 — 단지 그 값을 사람이 눈으로 보고 옮겨 적던 단계를
    // 자동화했을 뿐이다.
    show('content');
  }

  async function init() {
    if (!sessionId) {
      show('error');
      $('error-msg').textContent = '잘못된 접근입니다.';
      return;
    }
    try {
      const wallet = await waitForWallet();
      if (!wallet) {
        // 조용히 실패 — WebAuthn이 사용자 제스처 없이 막혔을 가능성이 가장
        // 크므로, 에러로 끝내지 않고 탭-투-언락 버튼으로 넘긴다.
        show('unlock');
        return;
      }
      await proceedWithWallet(wallet);
    } catch (e) {
      show('error');
      $('error-msg').textContent = e.message || '요청을 확인할 수 없습니다. 만료됐을 수 있습니다.';
    }
  }

  $('btn-unlock').addEventListener('click', async () => {
    $('btn-unlock').disabled = true;
    $('btn-unlock').textContent = '확인 중...';
    try {
      const wallet = await unlockWalletDirectly(); // 진짜 탭 안에서 호출 — 생체인증 프롬프트 정상 표시돼야 함
      await proceedWithWallet(wallet);
    } catch (e) {
      show('error');
      $('error-msg').textContent = e.message || '지갑을 열지 못했습니다.';
    }
  });

  $('btn-deny').addEventListener('click', () => {
    show('error');
    $('error-title').textContent = '거부했습니다';
    $('error-msg').textContent = '이 요청을 승인하지 않았습니다. 창을 닫으셔도 됩니다.';
  });

  // ★ 2026-07-22 신설 — deliver만 따로 재시도 가능하게 분리(아래 참조).
  // 3회·최대 2초 간격으로는 실사에서 반복 실패가 계속 확인돼, 5회·최대
  // 4초 간격으로 늘렸다. 그래도 실패하면 verify/암호화를 다시 안 해도
  // 되도록 sealed를 _pendingDeliver에 남겨 수동 재전송 버튼이 재사용한다.
  let _pendingDeliver = null; // { guid, sealed } — 암호화 성공 후에만 채워짐

  async function deliverWithRetry(guid, sealed, maxAttempts = 5) {
    let lastErr;
    for (let attempt = 1; attempt <= maxAttempts; attempt++) {
      try {
        dlog(`deliver 시도 ${attempt}/${maxAttempts}...`);
        const res = await fetch(`${WORKER}/auth/device-link/deliver`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, guid, sealed }),
        });
        const data = await res.json();
        dlog('deliver 응답: ' + JSON.stringify(data));
        if (!res.ok || !data.ok) throw new Error(data.detail || data.error || '전달에 실패했습니다.');
        return { ok: true };
      } catch (e) {
        lastErr = e;
        dlog(`deliver 시도 ${attempt}/${maxAttempts} 실패: ${e.message}`, 'err');
        if (attempt < maxAttempts) await new Promise(r => setTimeout(r, Math.min(1000 * attempt, 4000)));
      }
    }
    return { ok: false, error: lastErr };
  }

  function _onDeliverSuccess() {
    setStatus('완료됐습니다. 요청했던 기기의 화면을 확인해 주세요.', 'success');
    dlog('전체 완료', 'ok');
    $('content').innerHTML = '<h1>✅ 연결 완료</h1><p style="font-size:13px;color:#6b7280;margin-top:8px">이 창은 닫으셔도 됩니다.</p>';
  }

  $('btn-approve').addEventListener('click', async () => {
    $('btn-approve').disabled = true;
    $('btn-deny').disabled = true;
    setStatus('확인 중...');
    dlog('승인 시작');

    try {
      let wallet = await waitForWallet();
      if (!wallet) wallet = await unlockWalletDirectly(); // 방어적 폴백 — 이 시점엔 보통 이미 준비돼 있음
      dlog('지갑 준비 완료 · guid=' + wallet.guid, 'ok');

      const verifyRes = await fetch(`${WORKER}/auth/device-link/verify`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, code: sessionData.code }),
      });
      const verifyData = await verifyRes.json();
      dlog('verify 응답: ' + JSON.stringify(verifyData));
      if (!verifyRes.ok || !verifyData.ok) throw new Error(verifyData.detail || verifyData.error || '요청이 만료됐거나 이미 처리됐습니다.');
      dlog('verify 성공', 'ok');

      setStatus('지갑을 안전하게 전달하는 중...');

      const privKeyB64u = await wallet.exportPrivateKey();
      dlog('개인키 추출 완료(길이만 표시): ' + privKeyB64u.length + '자');

      const storedUser = (() => {
        try { return JSON.parse(localStorage.getItem('gopang_user_v4') || 'null'); }
        catch { return null; }
      })();
      dlog('로컬 계정정보 확인: ' + (storedUser ? 'ipv6=' + storedUser.ipv6 : '없음'));

      // ★ 2026-07-20 신설(실사 발견 — 주피터 지시) — 지갑 키와 계정
      // 정보만 옮기면, PC는 "hondi_first_greeted" 같은 '평생 1회' 온보딩
      // 완료 플래그가 없어서 이미 오래전에 가입한 사용자를 방금 막
      // 가입한 사람으로 오인해 신규 환영 인사(프로필 질문 등)를 다시
      // 시작해버린다 — 이 플래그들은 서버가 아니라 이 브라우저의
      // localStorage에만 있었던 게 근본 원인이다(call-ai.js §_buildFirst
      // ContactContext). 상세 PDV(대화 기록 등)까지 옮길 필요는 없고,
      // "이미 인사를 마친 계정이다"라는 이 최소 신호 세 개만 옮기면
      // 충분하다.
      const onboardingFlags = {
        firstGreeted: localStorage.getItem('hondi_first_greeted') === '1',
        tutorialDone: localStorage.getItem('hondi_tutorial_done') === '1',
        tutorialStep: localStorage.getItem('hondi_tutorial_step') || null,
      };
      dlog('온보딩 플래그 확인: ' + JSON.stringify(onboardingFlags));

      const pcKeyLen = (() => {
        try {
          const bin = atob(sessionData.pcPubKeyB64u.replace(/-/g, '+').replace(/_/g, '/'));
          return bin.length;
        } catch (e) { return -1; }
      })();
      dlog('상대 기기 공개키(pcPubKeyB64u) 디코딩 길이: ' + pcKeyLen + '바이트 (32여야 정상)', pcKeyLen === 32 ? 'ok' : 'err');
      if (pcKeyLen !== 32) {
        throw new Error(`상대 기기 공개키 형식이 잘못됐습니다(${pcKeyLen}바이트, 32바이트여야 함) — 그 기기에서 device-link.html을 새로고침 후 다시 시도해 주세요.`);
      }

      const plaintext = JSON.stringify({ privKeyB64u, userRecord: storedUser, onboardingFlags });
      const sealed = await GopangWallet.sealForRecipient(sessionData.pcPubKeyB64u, plaintext);
      dlog('봉투 암호화 완료', 'ok');
      _pendingDeliver = { guid: wallet.guid, sealed }; // 이후 실패해도 수동 재전송이 재사용

      // ★ 2026-07-20 신설, 2026-07-22 강화 — verify·암호화까지 전부
      // 성공한 뒤 deliver 호출만 "Failed to fetch"(네트워크 레벨 실패,
      // HTTP 에러 응답이 아님)로 반복 실패하는 사례가 실사로 확인됐다
      // (3회·최대 2초 간격으로는 부족했음 — 5회·최대 4초 간격으로 강화).
      // 그래도 실패하면 verify부터 다시 하지 않도록, "전달 다시 시도"
      // 버튼을 노출해 이미 암호화 끝난 sealed를 그대로 재사용한다.
      const result = await deliverWithRetry(wallet.guid, sealed);
      if (!result.ok) {
        setStatus('전달에 실패했습니다 — 아래 "전달 다시 시도" 버튼을 눌러 주세요. (처음부터 다시 하지 않아도 됩니다)', 'error');
        $('btn-retry-deliver').classList.remove('hide');
        $('btn-deny').disabled = false;
        return;
      }

      _onDeliverSuccess();
    } catch (e) {
      setStatus(e.message, 'error');
      dlog('오류: ' + e.message + (e.stack ? '\n' + e.stack : ''), 'err');
      $('btn-approve').disabled = false;
      $('btn-deny').disabled = false;
    }
  });

  $('btn-retry-deliver').addEventListener('click', async () => {
    if (!_pendingDeliver) { dlog('재전송할 봉투가 없음 — 처음부터 다시 시도해 주세요.', 'err'); return; }
    $('btn-retry-deliver').disabled = true;
    setStatus('다시 전달하는 중...');
    const result = await deliverWithRetry(_pendingDeliver.guid, _pendingDeliver.sealed);
    $('btn-retry-deliver').disabled = false;
    if (!result.ok) {
      setStatus('다시 실패했습니다 — 와이파이/데이터 연결 상태를 확인하고 다시 눌러 주세요.', 'error');
      return;
    }
    $('btn-retry-deliver').classList.add('hide');
    _onDeliverSuccess();
  });

  init();
})();
</script>
</body>
</html>
