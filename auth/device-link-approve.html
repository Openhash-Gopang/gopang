<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혼디 — 새 기기 연결 승인</title>
<script src="/gopang-wallet.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: #f8f9fa;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  #card {
    background: white; border: 1px solid #e5e7eb; border-radius: 12px;
    padding: 32px 28px; width: 100%; max-width: 380px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    text-align: center;
  }
  h1 { font-size: 17px; color: #111827; margin-bottom: 18px; }
  .pc-label {
    background: #f3f4f6; border-radius: 10px; padding: 12px;
    font-size: 14px; color: #374151; margin-bottom: 18px;
  }
  .warn {
    font-size: 12px; color: #92400e; background: #fffbeb;
    border: 1px solid #fde68a; border-radius: 8px; padding: 10px 12px;
    margin-bottom: 20px; line-height: 1.5; text-align: left;
  }
  button {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
    background: #0057A8; color: #fff; margin-bottom: 10px;
  }
  button.secondary { background: #f3f4f6; color: #374151; }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  #status { font-size: 13px; color: #6b7280; margin-top: 14px; min-height: 18px; }
  #status.error { color: #dc2626; }
  #status.success { color: #059669; }
  .spinner {
    width: 24px; height: 24px; border: 2.5px solid #e5e7eb; border-top-color: #0057A8;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hide { display: none; }
</style>
</head>
<body>
<div id="card">
  <div id="loading">
    <h1>불러오는 중...</h1>
    <div class="spinner"></div>
  </div>

  <div id="content" class="hide">
    <h1>새 기기에서 로그인을 요청했습니다</h1>
    <div class="pc-label" id="pc-label"></div>
    <div class="warn">
      본인이 PC에서 직접 로그인을 시도한 게 맞는지, 위 기기 정보를 확인해
      주세요. 승인하면 <strong>이 계정 전체(GDC 잔액 포함)를 사용할 수 있는
      권한</strong>이 그 PC에 전달됩니다.
    </div>
    <button id="btn-approve">본인이 맞습니다 — 로그인 허용</button>
    <button id="btn-deny" class="secondary">본인 아님 — 거부</button>
  </div>

  <div id="error" class="hide">
    <h1 id="error-title">문제가 발생했습니다</h1>
    <p id="error-msg" style="font-size:13px;color:#6b7280;margin-top:8px"></p>
  </div>

  <div id="status"></div>
</div>

<script>
(() => {
  const WORKER = 'https://hondi-proxy.tensor-city.workers.dev';
  const sessionId = new URLSearchParams(location.search).get('sessionId');

  const $ = (id) => document.getElementById(id);
  const show = (id) => { ['loading','content','error'].forEach(x => $(x).classList.add('hide')); $(id).classList.remove('hide'); };
  const setStatus = (msg, kind) => { $('status').textContent = msg || ''; $('status').className = kind || ''; };

  let sessionData = null;

  async function waitForWallet(timeoutMs = 8000) {
    const start = Date.now();
    while (window.gopangWallet === undefined) {
      if (Date.now() - start > timeoutMs) throw new Error('지갑을 불러오지 못했습니다.');
      await new Promise(r => setTimeout(r, 150));
    }
    if (!window.gopangWallet) throw new Error('지갑이 없습니다.');
    return window.gopangWallet;
  }

  async function init() {
    if (!sessionId) {
      show('error');
      $('error-msg').textContent = '잘못된 접근입니다.';
      return;
    }
    try {
      const wallet = await waitForWallet();
      if (!wallet.guid) {
        show('error');
        $('error-title').textContent = '먼저 로그인해 주세요';
        $('error-msg').textContent = '혼디 앱에 먼저 로그인한 뒤 다시 시도해 주세요.';
        return;
      }

      const res = await fetch(`${WORKER}/auth/device-link/session?sessionId=${encodeURIComponent(sessionId)}&guid=${encodeURIComponent(wallet.guid)}`);
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.detail || data.error || '요청을 확인할 수 없습니다.');

      sessionData = data;
      $('pc-label').textContent = data.pcLabel || '알 수 없는 기기';
      // ★ 2026-07-20 UX 개선(사용자 지시 — 구글 방식) — 코드를 화면에
      // 보여주고 PC에 옮겨 적게 하던 방식을 없앤다. 폰은 이미 /session에서
      // code를 받아뒀으므로, "본인이 맞습니다" 버튼을 누르면 그 코드를
      // 폰이 스스로 /verify에 제출한다 — 사람이 숫자를 옮겨 적을 필요가
      // 없다. 서버 쪽 검증 로직(코드 일치 확인)은 전혀 안 바뀌었고, 누가
      // 그 코드를 "안다"는 사실 자체가 이미 이 세션의 소유자(같은 guid로
      // /session을 조회할 수 있었다는 것)라는 증거이므로 보안 수준은
      // 그대로다 — 단지 그 값을 사람이 눈으로 보고 옮겨 적던 단계를
      // 자동화했을 뿐이다.
      show('content');
    } catch (e) {
      show('error');
      $('error-msg').textContent = e.message || '요청을 확인할 수 없습니다. 만료됐을 수 있습니다.';
    }
  }

  $('btn-deny').addEventListener('click', () => {
    show('error');
    $('error-title').textContent = '거부했습니다';
    $('error-msg').textContent = '이 요청을 승인하지 않았습니다. 창을 닫으셔도 됩니다.';
  });

  $('btn-approve').addEventListener('click', async () => {
    $('btn-approve').disabled = true;
    $('btn-deny').disabled = true;
    setStatus('확인 중...');

    try {
      const wallet = await waitForWallet();

      // ★ 2026-07-20 변경 — 예전엔 여기서 "PC가 코드를 입력할 때까지"
      // 폴링으로 기다렸다(PC 쪽에서 사람이 코드를 옮겨 적어야 approved
      // 상태가 됐으므로). 이제 그 사람 개입을 없앴으니, 폰이 이미 알고
      // 있는 code를 스스로 /verify에 제출해 곧바로 approved로 전환한다
      // — 기다릴 대상이 없어져 폴링 루프 자체가 필요 없다.
      const verifyRes = await fetch(`${WORKER}/auth/device-link/verify`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, code: sessionData.code }),
      });
      const verifyData = await verifyRes.json();
      if (!verifyRes.ok || !verifyData.ok) throw new Error(verifyData.detail || verifyData.error || '요청이 만료됐거나 이미 처리됐습니다.');

      setStatus('지갑을 안전하게 전달하는 중...');

      // 기존 sealForRecipient()를 그대로 재사용 — PC의 1회용 공개키로
      // 봉투 암호화(새 암호화 로직 없음, gopang-wallet.js §X25519 참조).
      const privKeyB64u = await wallet.exportPrivateKey();
      // ★ 2026-07-20 수정: privKeyB64u·handle만 보내던 걸로는 부족했다
      // (실사 발견 — PC에서 로그아웃·계정 삭제 버튼이 작동하지 않음).
      // gopang-wallet.js의 싱글턴 자동 초기화 IIFE는 매 페이지 로드마다
      // localStorage의 gopang_user_v4.ipv6를 읽어 지갑에 연결하는데,
      // PC 쪽에서 이 레코드를 통째로 써주지 않으면 지갑 키는 옮겨져도
      // 앱은 "게스트"로 인식한다(handle 없음 → 로그아웃 버튼 숨김,
      // nickname/e164 불일치 → 계정 삭제 확인 실패). gopang_user_v4
      // 전체를 그대로 넘겨 PC가 동일하게 복원하게 한다.
      const storedUser = (() => {
        try { return JSON.parse(localStorage.getItem('gopang_user_v4') || 'null'); }
        catch { return null; }
      })();
      const plaintext = JSON.stringify({ privKeyB64u, userRecord: storedUser });
      const sealed = await GopangWallet.sealForRecipient(sessionData.pcPubKeyB64u, plaintext);

      const res = await fetch(`${WORKER}/auth/device-link/deliver`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, guid: wallet.guid, sealed }),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.detail || data.error || '전달에 실패했습니다.');

      setStatus('완료됐습니다. PC 화면을 확인해 주세요.', 'success');
      $('content').innerHTML = '<h1>✅ 연결 완료</h1><p style="font-size:13px;color:#6b7280;margin-top:8px">이 창은 닫으셔도 됩니다.</p>';
    } catch (e) {
      setStatus(e.message, 'error');
      $('btn-approve').disabled = false;
      $('btn-deny').disabled = false;
    }
  });

  init();
})();
</script>
</body>
</html>
