<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혼디 QR 로그인</title>
<style>
  body{margin:0;font-family:-apple-system,'Pretendard',sans-serif;background:#f9fafb;
       display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#fff;border-radius:20px;padding:32px 28px;max-width:360px;width:100%;
        box-sizing:border-box;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06)}
  h1{font-size:17px;color:#111827;margin:0 0 6px}
  p{font-size:13px;color:#6b7280;line-height:1.6;margin:0 0 20px}
  #qr-box{width:240px;height:240px;margin:0 auto 16px;border-radius:12px;overflow:hidden;
          border:1px solid #e5e7eb;display:flex;align-items:center;justify-content:center;background:#fff}
  #qr-box img{width:100%;height:100%;display:block}
  #status{font-size:13px;color:#9ca3af;min-height:18px}
  #status.approved{color:#16a34a;font-weight:600}
  #status.expired{color:#dc2626;font-weight:600}
  #retry{display:none;margin-top:12px;background:#1A73E8;color:#fff;border:none;
         border-radius:10px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
  <div class="card">
    <h1>스마트폰으로 로그인</h1>
    <p>혼디 앱(스마트폰)의 카메라 또는 QR 스캐너로<br>아래 코드를 찍어주세요.</p>
    <div id="qr-box"><span style="font-size:12px;color:#9ca3af">QR 생성 중…</span></div>
    <div id="status">대기 중…</div>
    <button id="retry">새 QR 받기</button>
  </div>

<script>
const PROXY_URL = 'https://hondi-proxy.tensor-city.workers.dev';
const STORE_KEY = 'gopang_user_v4';
let pollTimer = null;
let currentSid = null;

async function startQrLogin() {
  clearInterval(pollTimer);
  const statusEl = document.getElementById('status');
  const qrBox = document.getElementById('qr-box');
  const retryBtn = document.getElementById('retry');
  retryBtn.style.display = 'none';
  statusEl.className = '';
  statusEl.textContent = 'QR 생성 중…';

  let sid;
  try {
    // svc:'*' — 특정 하위서비스가 아니라 hondi.net 자체 로그인이므로
    // 전 서비스에 유효한 토큰을 요청한다. 이래야 klaw/k-tax 등에 갈 때
    // 다시 QR을 띄우지 않고 자동 로그인된다.
    const res = await fetch(`${PROXY_URL}/auth/qr/create`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ svc: '*', level: 'L0' }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error('create_failed');
    sid = data.sid;
  } catch (e) {
    statusEl.className = 'expired';
    statusEl.textContent = 'QR 생성 실패 — 네트워크를 확인하세요.';
    retryBtn.style.display = 'inline-block';
    return;
  }

  currentSid = sid;
  const scanUrl = `https://hondi.net/auth/qr-scan.html?sid=${encodeURIComponent(sid)}`;
  const qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(scanUrl)}`;
  qrBox.innerHTML = `<img src="${qrImgUrl}" alt="QR 코드">`;
  statusEl.textContent = '스마트폰 스캔을 기다리는 중…';

  const startedAt = Date.now();
  pollTimer = setInterval(async () => {
    if (sid !== currentSid) return; // 새 QR로 교체된 경우 이전 폴링 무시
    if (Date.now() - startedAt > 180000) {
      clearInterval(pollTimer);
      statusEl.className = 'expired';
      statusEl.textContent = 'QR이 만료되었습니다.';
      retryBtn.style.display = 'inline-block';
      return;
    }
    try {
      const res = await fetch(`${PROXY_URL}/auth/qr/status?sid=${encodeURIComponent(sid)}`);
      const data = await res.json();
      if (data.status === 'approved') {
        clearInterval(pollTimer);
        const user = {
          ipv6: data.guid, handle: data.handle,
          e164: data.e164 || '', country_code: data.country_code || 'KR',
          nickname: data.nickname || '', name: data.nickname || data.handle,
          isGuest: false, isTemp: false,
          registeredAt: new Date().toISOString(),
        };
        // sessionStorage — 이 PC는 개인 기기가 아닐 수 있다. 로그인 정보는
        // 이 탭/브라우저가 닫히면 자동으로 사라져야 한다(localStorage 금지).
        sessionStorage.setItem(STORE_KEY, JSON.stringify(user));
        sessionStorage.setItem('gopang_qr_token', data.token);
        statusEl.className = 'approved';
        statusEl.textContent = `로그인 완료 (${data.handle}) — 이동 중…`;
        setTimeout(() => { location.href = '/webapp.html'; }, 800);
      } else if (data.status === 'expired') {
        clearInterval(pollTimer);
        statusEl.className = 'expired';
        statusEl.textContent = 'QR이 만료되었습니다.';
        retryBtn.style.display = 'inline-block';
      }
      // 'pending'이면 계속 대기
    } catch (e) {
      // 네트워크 순간 오류는 무시하고 다음 폴링에서 재시도
    }
  }, 2000);
}

document.getElementById('retry').onclick = startQrLogin;
startQrLogin();
</script>
</body>
</html>
