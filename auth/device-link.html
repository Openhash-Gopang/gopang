<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>нҳјл”” вҖ” PCм—җм„ң лЎңк·ёмқё</title>
<script src="/gopang-wallet.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: #f8f9fa;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  #card {
    background: white; border: 1px solid #e5e7eb; border-radius: 12px;
    padding: 32px 28px; width: 100%; max-width: 380px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  h1 { font-size: 18px; color: #111827; margin-bottom: 6px; }
  p.desc { font-size: 13px; color: #6b7280; margin-bottom: 20px; line-height: 1.6; }
  label { display:block; font-size: 12px; color:#374151; margin-bottom:6px; font-weight:600; }
  input {
    width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 8px;
    font-size: 15px; margin-bottom: 16px; font-family: inherit;
  }
  input:focus { outline: none; border-color: #0057A8; }
  button {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
    background: #0057A8; color: #fff;
  }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  button.secondary { background: #f3f4f6; color: #374151; }
  #status { font-size: 13px; color: #6b7280; margin-top: 14px; text-align: center; min-height: 18px; }
  #status.error { color: #dc2626; }
  #status.success { color: #059669; }
  .step { display: none; }
  .step.active { display: block; }
  .timer { font-size: 12px; color: #9ca3af; text-align: center; margin-top: 8px; }
  .spinner {
    width: 22px; height: 22px; border: 2.5px solid #e5e7eb; border-top-color: #0057A8;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="card">
  <h1>PCм—җм„ң нҳјл”” лЎңк·ёмқё</h1>
  <p class="desc">
    мҠӨл§ҲнҠёнҸ°кіј мҷ„м „нһҲ к°ҷмқҖ кі„м •мңјлЎң PCм—җм„ңлҸ„ мқҙмҡ©н•  мҲҳ мһҲмҠөлӢҲлӢӨ.
    л¬ёмһҗ(SMS) м—Ҷмқҙ, мҠӨл§ҲнҠёнҸ°м—җм„ң нҷ•мқё н•ң лІҲмқҙл©ҙ лҗ©лӢҲлӢӨ.
  </p>

  <!-- STEP 1: м „нҷ”лІҲнҳё мһ…л Ҙ -->
  <div class="step active" id="step-phone">
    <label for="phone">мҠӨл§ҲнҠёнҸ°м—җ л“ұлЎқлҗң м „нҷ”лІҲнҳё</label>
    <input id="phone" type="tel" placeholder="010-1234-5678" autocomplete="tel">
    <button id="btn-request">мҠӨл§ҲнҠёнҸ°мңјлЎң мҡ”мІӯ ліҙлӮҙкё°</button>
  </div>

  <!-- STEP 2: мҠ№мқё лҢҖкё° (2026-07-20 UX к°ңм„  вҖ” кө¬кёҖ л°©мӢқ, PCм—җ мһ…л Ҙн•  мҪ”л“ң м—ҶмқҢ) -->
  <div class="step" id="step-code">
    <div class="spinner" id="code-spinner"></div>
    <p style="text-align:center;font-size:14px;color:#374151;margin-bottom:6px">
      мҠӨл§ҲнҠёнҸ° м•ҢлҰјмқ„ м—ҙм–ҙ <strong>"ліёмқёмқҙ л§һмҠөлӢҲлӢӨ"</strong>лҘј лҲҢлҹ¬мЈјм„ёмҡ”
    </p>
    <div class="timer" id="timer"></div>
    <button id="btn-sms-fallback" class="secondary" style="opacity:0.5;font-size:12px;padding:9px;margin-top:14px">
      м•ҢлҰјмқҙ м•Ҳ мҷ”лӮҳмҡ”? л¬ёмһҗлЎң л°ӣкё°
    </button>
  </div>

  <div id="status"></div>
</div>

<script>
(() => {
  const WORKER = 'https://hondi-proxy.tensor-city.workers.dev';
  const RETURN_URL = new URLSearchParams(location.search).get('return') || '/webapp.html';
  const PREFILLED_PHONE = new URLSearchParams(location.search).get('phone') || '';

  const $ = (id) => document.getElementById(id);
  const stepPhone = $('step-phone'), stepCode = $('step-code');
  const statusEl = $('status');

  let sessionId = null;
  let pcKeyPair = null;   // { publicKey, privateKey (CryptoKey), publicKeyB64u }
  let pollTimer = null;
  let countdownTimer = null;

  function setStatus(msg, kind) {
    statusEl.textContent = msg || '';
    statusEl.className = kind || '';
  }

  function normalizePhoneToE164(v) {
    const digits = v.replace(/[^0-9]/g, '');
    if (!digits) return null;
    // вҳ… 2026-07-20 мҲҳм • вҖ” лІ„к·ёмҳҖлӢӨ. auth.jsмқҳ buildE164()/COUNTRIES.KRмқ„
    // нҷ•мқён•ҙліҙлӢҲ мқҙ мӢңмҠӨн…ңмқҳ мӢӨм ң кҙҖлЎҖлҠ” "+82" л’Өм—җ "010"мқ„ к·ёлҢҖлЎң л¶ҷмқҙлҠ”
    // кІғмқҙлӢӨ(мҳҲ: 010-9662-7170 вҶ’ "+8201096627170") вҖ” н‘ңмӨҖ E.164мІҳлҹј
    // м•һмһҗлҰ¬ 0мқ„ м ңкұ°н•ҳлҠ” кІҢ м•„лӢҲлӢӨ. 0мқ„ м ңкұ°н•ҳлҚҳ мқҙм „ мҪ”л“ңк°Җ
    // "+821096627170"(мқҙ мӢңмҠӨн…ң кё°мӨҖмңјлЎңлҠ” нӢҖлҰ° нҳ•мӢқ)мқ„ л§Ңл“Өм–ҙ
    // /auth/device-link/initмқҙ 400мңјлЎң кұ°л¶Җн•ҳкі  мһҲм—ҲлӢӨ.
    return '+82' + digits;
  }

  // в”Җв”Җ STEP 1: мҡ”мІӯ ліҙлӮҙкё° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  function e164ToKrDisplay(e164) {
    // "+8201012345678" вҶ’ "01012345678"(мқҙлҜё м•һмһҗлҰ¬ 0 нҸ¬н•Ё, 11мһҗлҰ¬) вҶ’
    // "010-1234-5678". мң„ м •к·ңнҷ” мҲҳм •кіј м§қмқ„ мқҙлЈЁлҠ” мҲҳм • вҖ” м—¬кё°м„ңлҸ„
    // "0"мқ„ м¶”к°ҖлЎң лҚ” л¶ҷмқҙл©ҙ 12мһҗлҰ¬к°Җ лҸј нҳ•мӢқмқҙ к№ЁмЎҢм—ҲлӢӨ.
    const digits = e164.replace(/^\+82/, '');
    if (digits.length !== 11) return e164; // мҳҲмғҒ л°– нҳ•мӢқмқҙл©ҙ к·ёлҢҖлЎң л°ҳнҷҳ(м •к·ңнҷ” лӢЁкі„м—җм„ң мһ¬кІҖмҰқлҗЁ)
    return `${digits.slice(0,3)}-${digits.slice(3,7)}-${digits.slice(7)}`;
  }
  if (PREFILLED_PHONE) {
    $('phone').value = e164ToKrDisplay(PREFILLED_PHONE);
    setStatus('ліёмқё кі„м • нҷ•мқё вҖ” лІҲнҳёк°Җ мһҗлҸҷмңјлЎң мұ„мӣҢмЎҢмҠөлӢҲлӢӨ.');
  }

  $('btn-request').addEventListener('click', async () => {
    // кё°кё° л¶Ҳмқјм№ҳ нҷ”л©ҙ(auth.js)м—җм„ң л„ҳм–ҙмҳЁ кІҪмҡ°лҸ„ мң„м—җм„ң мқҙлҜё н‘ңмӨҖ
    // "010-1234-5678" нҳ•мӢқмңјлЎң мұ„мӣҢл’ҖмңјлҜҖлЎң, м•„лһҳлҠ” н•ӯмғҒ к°ҷмқҖ кІҪлЎң
    // (normalizePhoneToE164)лЎң мІҳлҰ¬н•ңлӢӨ вҖ” лі„лҸ„ л¶„кё° л¶Ҳн•„мҡ”.
    const e164 = normalizePhoneToE164($('phone').value);
    if (!e164) { setStatus('м „нҷ”лІҲнҳёлҘј мһ…л Ҙн•ҙ мЈјм„ёмҡ”.', 'error'); return; }

    $('btn-request').disabled = true;
    setStatus('мҠӨл§ҲнҠёнҸ°м—җ мҡ”мІӯмқ„ ліҙлӮҙлҠ” мӨ‘...');

    try {
      // PC м „мҡ© 1нҡҢмҡ© X25519 нӮӨнҺҳм–ҙ вҖ” к°ңмқёнӮӨлҠ” мқҙ нҺҳмқҙм§Җ л©”лӘЁлҰ¬м—җл§Ң мЎҙмһ¬,
      // м„ңлІ„В·IndexedDB м–ҙл””м—җлҸ„ м ҖмһҘн•ҳм§Җ м•ҠлҠ”лӢӨ(1нҡҢм„ұ).
      pcKeyPair = await GopangWallet.generateX25519KeyPair();

      const pcLabel = (() => {
        const ua = navigator.userAgent;
        const browser = /Chrome/.test(ua) ? 'Chrome' : /Firefox/.test(ua) ? 'Firefox' : /Safari/.test(ua) ? 'Safari' : 'лёҢлқјмҡ°м Җ';
        const os = /Windows/.test(ua) ? 'Windows' : /Mac/.test(ua) ? 'Mac' : /Linux/.test(ua) ? 'Linux' : '';
        return `${browser} В· ${os}`.trim();
      })();

      const res = await fetch(`${WORKER}/auth/device-link/init`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ e164, pcPubKeyB64u: pcKeyPair.publicKeyB64u, pcLabel }),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.detail || data.error || 'мҡ”мІӯ мӢӨнҢЁ');

      sessionId = data.sessionId;
      stepPhone.classList.remove('active');
      stepCode.classList.add('active');
      setStatus('мҠӨл§ҲнҠёнҸ° м•ҢлҰјмқ„ нҷ•мқён•ҙ мЈјм„ёмҡ”.');
      startCountdown(data.expires_in || 90);
      startPolling();
      setupSmsFallback(data.pushSent);
    } catch (e) {
      setStatus(e.message || 'мҡ”мІӯм—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ.', 'error');
      $('btn-request').disabled = false;
    }
  });

  // в”Җв”Җ SMS нҸҙл°ұ(2м•Ҳ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // мӮ¬кі мӢӨн—ҳ в‘ў: мӣ№н‘ёмӢң л°ңмҶЎ мһҗмІҙк°Җ мӢӨнҢЁн–ҲлӢӨкі  м„ңлІ„к°Җ нҷ•мӢӨнһҲ нҢҗлӢЁн•ң
  // кІҪмҡ°(pushSent:false вҖ” кө¬лҸ… м—ҶмқҢ/л§ҢлЈҢ л“ұ)лҠ” кё°лӢӨл Өлҙҗм•ј мҶҢмҡ©м—ҶмңјлӢҲ
  // мҰүмӢң к°•мЎ°н•ҙм„ң ліҙм—¬мӨҖлӢӨ.
  // мӮ¬кі мӢӨн—ҳ в‘Ҙ: л°ҳлҢҖлЎң н‘ёмӢңк°Җ м •мғҒ л°ңмҶЎлҗң кІҪмҡ°м—”, м•ҢлҰјмқҙ ліҙнҶө 1~2мҙҲ
  // м•Ҳм—җ лҸ„м°©н•ҳлҜҖлЎң мӮ¬мҡ©мһҗк°Җ м„ұкёүн•ҳкІҢ лҲҢлҹ¬ л¶Ҳн•„мҡ”н•ң SMS л№„мҡ©мқҙ
  // лӮҳк°Җм§Җ м•ҠлҸ„лЎқ 8мҙҲк°„мқҖ нқҗлҰ¬кІҢ л’ҖлӢӨк°Җ к·ё л’Өм—җ к°•мЎ°н•ңлӢӨ.
  let smsFallbackTimer = null;
  function setupSmsFallback(pushSent) {
    const btn = $('btn-sms-fallback');
    btn.style.opacity = '0.5';
    btn.disabled = false;
    if (pushSent === false) {
      btn.style.opacity = '1';
    } else {
      smsFallbackTimer = setTimeout(() => { btn.style.opacity = '1'; }, 8000);
    }
  }

  $('btn-sms-fallback').addEventListener('click', async () => {
    const btn = $('btn-sms-fallback');
    if (!sessionId || btn.disabled) return;
    btn.disabled = true; // м—°нғҖ л°©м§Җ(мӮ¬кі мӢӨн—ҳ в‘Ө) вҖ” м„ңлІ„лҸ„ лі„лҸ„лЎң мһ¬нҷ•мқён•Ё
    const original = btn.textContent;
    btn.textContent = 'л¬ёмһҗ л°ңмҶЎ мӨ‘...';
    try {
      const res = await fetch(`${WORKER}/auth/device-link/resend-sms`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId }),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.detail || data.error || 'л¬ёмһҗ л°ңмҶЎ мӢӨнҢЁ');

      btn.textContent = 'л¬ёмһҗлҘј ліҙлғҲмҠөлӢҲлӢӨ';
      setStatus('л¬ёмһҗлЎң л°ӣмқҖ л§ҒнҒ¬лҘј мҠӨл§ҲнҠёнҸ°м—җм„ң м—ҙм–ҙ мҠ№мқён•ҙ мЈјм„ёмҡ”.');
      // м„ңлІ„к°Җ м„ём…ҳ TTLмқ„ 5л¶„мңјлЎң м—°мһҘн–ҲмңјлҜҖлЎң(мӮ¬кі мӢӨн—ҳ в‘ ), PCмқҳ
      // м№ҙмҡҙнҠёлӢӨмҡҙлҸ„ к°ҷмқҙ лҠҳл ӨмӨҖлӢӨ вҖ” м•Ҳ к·ёлҹ¬л©ҙ нҷ”л©ҙмғҒ нғҖмқҙлЁёл§Ң лЁјм Җ
      // лҒқлӮҳ мӮ¬мҡ©мһҗк°Җ м•„м§Ғ мң нҡЁн•ң м„ём…ҳмқ„ нҸ¬кё°н•ҳкІҢ лҗңлӢӨ.
      if (countdownTimer) clearInterval(countdownTimer);
      startCountdown(data.expires_in || 300);
    } catch (e) {
      setStatus(e.message, 'error');
      btn.textContent = original;
      btn.disabled = false;
    }
  });

  // (2026-07-20 мӮӯм ң вҖ” STEP 2 "мҪ”л“ң нҷ•мқё" лІ„нҠј мһҗмІҙк°Җ м—Ҷм–ҙмЎҢлӢӨ. нҸ°мқҙ
  // мҠ№мқё лІ„нҠјмқ„ лҲ„лҘҙл©ҙ мҠӨмҠӨлЎң codeлҘј /verifyм—җ м ңм¶ңн•ҳлҜҖлЎң, PCлҠ”
  // мқҙм ңл¶Җн„° мҳӨм§Ғ pollingл§ҢмңјлЎң кІ°кіј(delivered)лҘј кё°лӢӨлҰ°лӢӨ.)

  // в”Җв”Җ лҙүнҲ¬ polling в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  function startPolling() {
    pollTimer = setInterval(async () => {
      try {
        const res = await fetch(`${WORKER}/auth/device-link/poll?sessionId=${encodeURIComponent(sessionId)}`);
        const data = await res.json();
        if (!data.ok) return;

        if (data.state === 'expired') {
          stopPolling();
          _showExpiredGuidance();
          return;
        }
        if (data.state === 'delivered' && data.sealed) {
          stopPolling();
          await finishImport(data.sealed);
        }
      } catch { /* мқјмӢңм Ғ л„ӨнҠёмӣҢнҒ¬ мҳӨлҘҳлҠ” л¬ҙмӢңн•ҳкі  лӢӨмқҢ pollingм—җм„ң мһ¬мӢңлҸ„ */ }
    }, 2000);
  }
  function stopPolling() { if (pollTimer) clearInterval(pollTimer); pollTimer = null; }

  function startCountdown(seconds) {
    let remain = seconds;
    const el = $('timer');
    const tick = () => {
      if (remain <= 0) {
        clearInterval(countdownTimer);
        el.textContent = 'л§ҢлЈҢлҗЁ';
        stopPolling();
        _showExpiredGuidance();
        return;
      }
      el.textContent = `${remain}мҙҲ нӣ„ л§ҢлЈҢ`;
      remain -= 1;
    };
    tick();
    countdownTimer = setInterval(tick, 1000);
  }

  // в”Җв”Җ л§ҢлЈҢ мӢң м•ҲлӮҙ (2026-07-21 мӢ м„Ө) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // мқҙ мҠ№мқё л°©мӢқмқҖ м„ңлІ„к°Җ м ҲлҢҖ нҷ•мқён•  мҲҳ м—ҶлҠ” м „м ң мң„м—җ м„ң мһҲлӢӨ вҖ”
  // "к°ңмқёнӮӨлҘј к°Җм§„ лӢӨлҘё кё°кё°к°Җ мӢӨм ңлЎң мЎҙмһ¬н•ҳлҠ”к°Җ"лҠ” м„ңлІ„к°Җ мӣҗлҰ¬мғҒ
  // м•Ң мҲҳ м—ҶлӢӨ(к°ңмқёнӮӨлҠ” м„ңлІ„м—җ м—ҶлӢӨ). к·ёлһҳм„ң "лӢӨмӢң мӢңлҸ„н•ҳл©ҙ лҗ  мҲҳлҸ„
  // мһҲлӢӨ"лҠ” кё°мЎҙ л¬ёкө¬лҠ”, к·ё м „м ң мһҗмІҙк°Җ м„ұлҰҪн•ҳм§Җ м•ҠлҠ” кІҪмҡ°(нӮӨлҘј к°Җм§„
  // мң мқјн•ң кё°кё°мқҳ м ҖмһҘмҶҢлҘј м§Җмҡҙ кІҪмҡ° л“ұ)м—җлҠ” мӮ¬мӢӨкіј лӢӨлҘҙлӢӨ вҖ” мӮ¬мҡ©мһҗк°Җ
  // мҳҒмӣҗнһҲ мһ¬мӢңлҸ„л§Ң л°ҳліөн•ҳкІҢ л§Ңл“ лӢӨ. к·ё л¶Ҳнҷ•мӢӨм„ұ мһҗмІҙлҘј мҶ”м§ҒнһҲ м•ҢлҰ¬кі ,
  // мӢӨм§Ҳм Ғмқё лӢӨмқҢ лӢЁкі„(л°ұм—… нӮӨ ліөкө¬ лҳҗлҠ” мқҙ кі„м • нҸ¬кё°)лҘј м•ҲлӮҙн•ңлӢӨ.
  function _showExpiredGuidance() {
    setStatus(
      'мқ‘лӢөмқҙ м—Ҷм–ҙ л§ҢлЈҢлҗҗмҠөлӢҲлӢӨ. мқҙ л°©мӢқмқҖ к°ңмқёнӮӨлҘј к°Җм§„ лӢӨлҘё кё°кё°к°Җ ' +
      'мӢӨм ңлЎң мЎҙмһ¬н•ҙм•јл§Ң мһ‘лҸҷн•©лӢҲлӢӨ вҖ” м„ңлІ„лҠ” к·ёлҹ° кё°кё°к°Җ м§„м§ң мһҲлҠ”м§Җ ' +
      'нҷ•мқён•  л°©лІ•мқҙ м—Ҷм–ҙ, мһҲм–ҙлҸ„ м—Ҷм–ҙлҸ„ м§ҖкёҲкіј лҳ‘к°ҷмқҙ "мқ‘лӢө м—ҶмқҢ"мңјлЎң ' +
      'ліҙмһ…лӢҲлӢӨ. к·ё кё°кё°к°Җ нҷ•мӢӨнһҲ мһҲлӢӨл©ҙ лӢӨмӢң мӢңлҸ„н•ҙ мЈјм„ёмҡ”. л§Ңм•Ҫ мқҙ ' +
      'кі„м •мқ„ м“°лҚҳ кё°кё°к°Җ мқҙкІғлҝҗмқҙм—Ҳкі  к·ё кё°кё°мқҳ лҚ°мқҙн„°лҘј м§Җмҡҙ м Ғмқҙ ' +
      'мһҲлӢӨл©ҙ, мқҙ л°©мӢқмңјлЎңлҠ” ліөкө¬н•  мҲҳ м—ҶмҠөлӢҲлӢӨ вҖ” к°Җмһ… мӢң м ҖмһҘн•ҙл‘” ' +
      'л°ұм—… нӮӨ(4лӢЁм–ҙ мӢңл“ң)к°Җ мһҲмңјл©ҙ "л°ұм—… нӮӨлҘј м§Ғм ‘ к°–кі  мһҲм–ҙмҡ”" ' +
      'кІҪлЎңлЎң ліөкө¬н•ҳкі , м—ҶлӢӨл©ҙ мқҙ кі„м •мқҖ лҗҳмӮҙлҰҙ мҲҳ м—ҶмңјлӢҲ мғҲлЎң ' +
      'к°Җмһ…н•ҙ мЈјм„ёмҡ”.',
      'error'
    );
    resetToStep1();
  }

  function resetToStep1() {
    stepCode.classList.remove('active');
    stepPhone.classList.add('active');
    $('btn-request').disabled = false;
    sessionId = null; pcKeyPair = null;
    if (smsFallbackTimer) { clearTimeout(smsFallbackTimer); smsFallbackTimer = null; }
    const smsBtn = $('btn-sms-fallback');
    smsBtn.disabled = false;
    smsBtn.textContent = 'м•ҢлҰјмқҙ м•Ҳ мҷ”лӮҳмҡ”? л¬ёмһҗлЎң л°ӣкё°';
    smsBtn.style.opacity = '0.5';
  }

  // в”Җв”Җ лҙүнҲ¬ ліөнҳёнҷ” вҶ’ м§Җк°‘ ліөмӣҗ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  async function finishImport(sealed) {
    try {
      const plaintext = await GopangWallet.openSealedWithKey(pcKeyPair.privateKey, sealed);
      const { privKeyB64u, userRecord, onboardingFlags } = JSON.parse(plaintext);
      if (!privKeyB64u) throw new Error('м „лӢ¬л°ӣмқҖ лҚ°мқҙн„° нҳ•мӢқмқҙ мҳ¬л°”лҘҙм§Җ м•ҠмҠөлӢҲлӢӨ.');

      await GopangWallet.restoreFromPrivateKey(privKeyB64u);

      // вҳ… 2026-07-20 мӢ м„Ө вҖ” gopang_user_v4лҘј нҸ°кіј лҸҷмқјн•ҳкІҢ мқҙ кё°кё°м—җлҸ„
      // мҚЁмӨҖлӢӨ. gopang-wallet.jsмқҳ мӢұкёҖн„ҙ мһҗлҸҷ мҙҲкё°нҷ” IIFEк°Җ лӢӨмқҢ нҺҳмқҙм§Җ
      // лЎңл“ң(webapp.html) л•Ң мқҙ к°’мқ„ мқҪм–ҙ м§Җк°‘м—җ guidлҘј м—°кІ°н•ҳкі ,
      // к·ё к°’мқҙ м—Ҷмңјл©ҙ(лЎңк·ём•„мӣғ лІ„нҠјмқҙ мҲЁкІЁм§ҖлҠ” л“ұ) м•ұмқҙ мқҙ кі„м •мқ„
      // "кІҢмҠӨнҠё"лЎң мҳӨмқён•ңлӢӨ вҖ” м§Җк°‘ нӮӨл§Ң мҳ®кё°кі  мқҙ кё°лЎқмқ„ л№ лңЁлҰ¬л©ҙ кі„м •
      // мӮӯм ңВ·лЎңк·ём•„мӣғмқҙ м •мғҒ лҸҷмһ‘н•ҳм§Җ м•ҠлҠ”лӢӨлҠ” кІҢ мӢӨмӮ¬лЎң нҷ•мқёлҗҗлӢӨ.
      if (userRecord && userRecord.ipv6) {
        localStorage.setItem('gopang_user_v4', JSON.stringify(userRecord));
      } else {
        // нҸ° мӘҪм—җлҸ„ gopang_user_v4к°Җ м—ҶлҚҳ кІҪмҡ°(л“ңл¬ҫ) вҖ” мөңмҶҢн•ң м§Җк°‘
        // ліөмӣҗмқҖ лҗҗмңјлӢҲ кі„мҶҚ м§„н–үн•ҳлҗҳ, кі„м • мӮӯм ңВ·лЎңк·ём•„мӣғмқҙ м •мғҒ
        // лҸҷмһ‘н•ҳм§Җ м•Ҡмқ„ мҲҳ мһҲмқҢмқ„ м•ҢлҰ°лӢӨ.
        console.warn('[DeviceLink] нҸ°мқҳ gopang_user_v4к°Җ л№„м–ҙмһҲм–ҙ кі„м • мӢқлі„ м •ліҙлҘј мҳ®кё°м§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.');
      }

      // вҳ… 2026-07-20 мӢ м„Ө(мӢӨмӮ¬ л°ңкІ¬ вҖ” мЈјн”јн„° м§ҖмӢң) вҖ” мҳЁліҙл”© мҷ„лЈҢ н”Ңлһҳк·ё
      // (hondi_first_greeted л“ұ)лҸ„ к°ҷмқҙ м•Ҳ мҳ®кё°л©ҙ, мҳӨлһҳм „м—җ к°Җмһ…н•ң
      // мӮ¬мҡ©мһҗмқёлҚ°лҸ„ PCм—җм„ңлҠ” "нҸүмғқ 1нҡҢ" мӢ к·ң нҷҳмҳҒ мқёмӮ¬В·н”„лЎңн•„ м§Ҳл¬ёмқҙ
      // лӢӨмӢң мӢңмһ‘лҸјлІ„лҰ°лӢӨ(call-ai.jsмқҳ _buildFirstContactContextк°Җ
      // localStorageл§Ң ліҙкі  нҢҗлӢЁн•ҳкё° л•Ңл¬ё). мғҒм„ё PDVВ·лҢҖнҷ” кё°лЎқк№Ңм§Җ
      // мҳ®кёё н•„мҡ”лҠ” м—Ҷкі , мқҙ мөңмҶҢ мӢ нҳёл§Ң мҳ®кё°л©ҙ м¶©л¶„н•ҳлӢӨ.
      if (onboardingFlags) {
        if (onboardingFlags.firstGreeted) localStorage.setItem('hondi_first_greeted', '1');
        if (onboardingFlags.tutorialDone) localStorage.setItem('hondi_tutorial_done', '1');
        if (onboardingFlags.tutorialStep) localStorage.setItem('hondi_tutorial_step', onboardingFlags.tutorialStep);
      }

      setStatus('мҷ„лЈҢлҗҗмҠөлӢҲлӢӨ. мқҙлҸҷ мӨ‘...', 'success');
      setTimeout(() => { location.href = RETURN_URL; }, 800);
    } catch (e) {
      setStatus('м§Җк°‘ к°Җм ёмҳӨкё°м—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ: ' + e.message, 'error');
      resetToStep1();
    } finally {
      // нҺҳм–ҙл§Ғ м „мҡ© 1нҡҢмҡ© нӮӨлҠ” мҰүмӢң нҸҗкё°(мҲңл°©н–Ҙ л№„л°Җм„ұ) вҖ” м°ёмЎ°л§Ң лҒҠм–ҙлҸ„
      // CryptoKey мһҗмІҙк°Җ non-extractableмқҙлқј л©”лӘЁлҰ¬м—җм„ң мһ¬м¶”м¶ң л¶Ҳк°ҖлҠҘн•ҳлӢӨ.
      pcKeyPair = null;
    }
  }
})();
</script>
