<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고팡 인증</title>
<script src="/gopang-wallet.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: #f8f9fa;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  /* ── 로딩 (silent iframe 모드) ── */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: #6b7280;
    font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2.5px solid #e5e7eb;
    border-top-color: #3ecf8e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 등록/복원 UI (리다이렉트 모드) ── */
  #auth-card {
    display: none;
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 32px 28px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .auth-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .auth-logo-icon {
    width: 32px; height: 32px;
    background: #3ecf8e;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: white;
    font-family: monospace;
  }
  .auth-logo-text {
    font-size: 16px; font-weight: 600; color: #111827;
    letter-spacing: -0.3px;
  }
  .auth-service {
    font-size: 11px;
    color: #6b7280;
    background: #f3f4f6;
    border: 1px solid #e5e7eb;
    border-radius: 99px;
    padding: 2px 10px;
    font-family: monospace;
  }
  h2 {
    font-size: 18px; font-weight: 600;
    color: #111827; margin-bottom: 6px;
    letter-spacing: -0.4px;
  }
  .auth-desc {
    font-size: 13px; color: #6b7280;
    line-height: 1.6; margin-bottom: 24px;
  }

  /* ── 4단어 입력 ── */
  .input-group { margin-bottom: 16px; }
  .input-group label {
    display: block;
    font-size: 12px; font-weight: 500;
    color: #374151; margin-bottom: 6px;
    letter-spacing: 0.2px;
  }
  .input-group input {
    width: 100%; padding: 10px 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px; color: #111827;
    background: #f9fafb;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-group input:focus {
    border-color: #3ecf8e;
    box-shadow: 0 0 0 3px rgba(62,207,142,0.12);
    background: white;
  }
  .input-group input::placeholder { color: #9ca3af; }

  /* ── 얼굴 인증 영역 ── */
  #face-area {
    margin-bottom: 16px;
    text-align: center;
  }
  #face-video-wrap {
    display: none;
    position: relative;
    width: 200px; height: 200px;
    margin: 0 auto 12px;
  }
  #face-video {
    width: 200px; height: 200px;
    border-radius: 50%;
    object-fit: cover;
    transform: scaleX(-1);
    background: #111;
  }
  .face-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 3px solid rgba(62,207,142,0.8);
    pointer-events: none;
  }
  #face-status {
    font-size: 12px; color: #6b7280;
    margin-bottom: 8px;
  }

  /* ── 버튼 ── */
  .btn-primary {
    width: 100%; padding: 12px;
    background: #3ecf8e; color: white;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-bottom: 8px;
  }
  .btn-primary:hover { background: #29a374; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled {
    background: #d1d5db; cursor: not-allowed;
  }
  .btn-secondary {
    width: 100%; padding: 10px;
    background: transparent;
    color: #6b7280;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    font-size: 13px; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: #9ca3af; color: #374151; }

  /* ── 에러/성공 메시지 ── */
  .msg {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
  }
  .msg.error   { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; }
  .msg.success { background: #f0fdf8; color: #059669; border: 1px solid #a7f3d0; }

  /* ── 기기 변경 안내 ── */
  #device-change-notice {
    display: none;
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    color: #92400e;
    margin-bottom: 16px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<!-- 로딩 (silent 모드) -->
<div id="loading">
  <div class="spinner"></div>
  <span>인증 확인 중…</span>
</div>

<!-- 안내 카드 (리다이렉트 모드 — 미가입/기기 불일치일 때만 표시) -->
<!-- v6.0: 이 페이지는 더 이상 정체성을 발급하지 않으므로 시드/얼굴 입력 폼이
     없다. 등록·로그인은 항상 hondi.net(webapp.html)의 진짜 가입 흐름에서만
     일어난다. -->
<div id="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-icon">G</div>
    <span class="auth-logo-text">고팡</span>
    <span class="auth-service" id="svc-label"></span>
  </div>

  <h2 id="auth-title">고팡 로그인</h2>
  <p class="auth-desc" id="auth-desc">
    고팡 계정으로 로그인하면 모든 하위 서비스를 이용할 수 있습니다.
  </p>

  <!-- 2026-07-19 삭제 — "폰으로 QR 스캔해 이 기기 승인" 방식은 폐기됐다
       (주피터 지시: 가입 시점 전화번호 문자 인증 1회만이 유일한 본인
       인증 경로). 예전엔 이 기기에 개인키(지갑)가 없을 때 "다른 기기에
       있는 지갑으로 QR 서명"을 대안으로 뒀지만, 그 대안 자체를 없앤다
       — 이 기기에서 로그인 정보를 못 찾으면 hondi.net의 진짜 로그인
       흐름(전화번호 인증)으로 보내는 것 하나만 남긴다. -->
  <button class="btn-primary" id="register-btn" onclick="goRegister()">
    hondi.net에서 로그인
  </button>
</div>

<script type="module">
// ══════════════════════════════════════════════════════════
// silent-auth.html — v6.0
//
// 이전 버전: 기기 지문(_buildDeviceFingerprint)으로 자체 ipv6를 만들고,
// 4단어 시드(PBKDF2)로 별도 정체성을 발급하는 독자적인 인증 시스템이었다.
// 문제: (1) 지문은 동일 기종 기기 간 충돌 가능성이 있고, (2) 이 페이지가
// hondi.net과 같은 출처(origin)라서 gopang_user_v4를 공유하는데, 여기서
// "신규 등록"이 발동하면 실제 전화번호 기반 가입으로 만들어진 진짜 정체성을
// 통째로 덮어써 버렸다.
//
// v6.0: 이 페이지는 더 이상 정체성을 "만들지" 않는다. hondi.net의 진짜
// 가입 흐름(webapp.html → src/gopang/core/auth.js)이 이미 써놓은
// gopang_user_v4 + window.gopangWallet(Ed25519)을 그대로 읽어, 하위
// 서비스에게 "이 사람이 진짜 그 guid의 개인키를 갖고 있다"를 Worker
// /auth/issue(서명 검증 + TOFU)로 증명한 뒤 결과만 중계한다.
// ══════════════════════════════════════════════════════════

const params    = new URLSearchParams(location.search);
const SERVICE   = params.get('svc')    || '*';
const ORIGIN    = params.get('origin') || '*';
const RETURN    = params.get('return') || null;
const IS_SILENT = (window.parent !== window);   // iframe 여부
const WORKER    = 'https://hondi-proxy.tensor-city.workers.dev';
const _GOPANG_ORIGIN = 'https://hondi.net'; // 2026-07-21 — postMessage 타겟/검증용

window.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('svc-label').textContent = SERVICE;
  if (IS_SILENT) {
    await _runSilentMode();
  } else {
    await _runRedirectMode();
  }
});

// ── 같은 오리진 탭에게 서명 대신 부탁 (2026-07-21 신설, 같은 날 재설계) ──
// 이 문서는 보통 klaw 등 하위 서비스가 만드는 보이지 않는 iframe 안에서
// 실행된다 — 사용자 제스처가 없어 WebAuthn을 새로 못 띄운다. hondi.net
// 오리진에 지갑이 이미 풀려 있는 다른 탭(예: 방금 klaw를 열었던 그
// webapp.html 탭)이 있으면, 그 탭의 이미 열려 있는 개인키로 대신
// 서명받는다.
//
// ★ 1차 시도(BroadcastChannel)는 실사에서 실패가 재현됐다 — 최신
// Chrome은 BroadcastChannel도 최상위 사이트(top-level site)별로 격리
// 한다(스토리지 파티셔닝). klaw.hondi.net 안의 이 iframe이 여는 채널과
// webapp.html 탭이 여는 같은 이름의 채널은 최상위 사이트가 서로 달라
// 완전히 격리된 별개 채널이 되어 서로 절대 못 본다 — 처음에 iframe이
// localStorage를 못 읽던 문제와 근본적으로 같은 원인이다.
//
// postMessage는 스토리지가 아니라 "실제로 쥐고 있는 창(window) 객체
// 참조"로 직접 통신하므로 이 파티셔닝의 영향을 받지 않는다. 이 iframe의
// window.parent는 klaw의 최상위 창이고, klaw는 window.open()으로 열렸으니
// window.parent.opener가 바로 그 webapp.html 창이다 — 이 체인으로 직접
// postMessage하면 격리 없이 도달한다.
function _tryRelaySign(sigMsg, timeoutMs = 1200) {
  const opener = window.parent?.opener;
  if (!opener || opener.closed) return Promise.resolve(null);
  return new Promise((resolve) => {
    const requestId = Math.random().toString(36).slice(2);
    let settled = false;
    const done = (result) => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      window.removeEventListener('message', onMessage);
      resolve(result);
    };
    const timer = setTimeout(() => done(null), timeoutMs);
    function onMessage(ev) {
      if (ev.origin !== _GOPANG_ORIGIN) return;
      const msg = ev.data;
      if (msg?.type === 'GOPANG_SIGN_RESPONSE' && msg.requestId === requestId) {
        done({ signature: msg.signature, publicKeyB64u: msg.publicKeyB64u, guid: msg.guid });
      }
    }
    window.addEventListener('message', onMessage);
    try {
      opener.postMessage({ type: 'GOPANG_SIGN_REQUEST', requestId, sigMsg }, _GOPANG_ORIGIN);
    } catch (e) {
      done(null);
    }
  });
}

// ── window.gopangWallet 준비 대기 (gopang-wallet.js 싱글턴은 비동기 초기화) ──
function _waitForWallet(timeoutMs = 4000) {
  return new Promise((resolve) => {
    if (window.gopangWallet) { resolve(window.gopangWallet); return; }
    const start = Date.now();
    const t = setInterval(() => {
      if (window.gopangWallet) { clearInterval(t); resolve(window.gopangWallet); }
      else if (Date.now() - start > timeoutMs) { clearInterval(t); resolve(null); }
    }, 100);
  });
}

// ── 로컬 정체성 + 지갑 서명으로 /auth/issue 호출 (공통) ──────────────
async function _issueViaWorker(svc, level = 'L0') {
  // 2026-07-19 삭제 — 여기 있던 "QR 세션 토큰이 sessionStorage에 있으면
  // 지갑 서명 없이 통과" 분기는 QR 로그인 자체를 폐기하면서 함께
  // 제거했다(아무도 이 토큰을 더 이상 발급하지 않으므로 죽은 코드였다).
  const user = _getLocalUser();
  if (!user?.ipv6 || !user?.handle) return { ok: false, reason: 'NOT_REGISTERED' };

  // 공개키는 암호화돼 있지 않으므로 지갑을 열지 않고도 바로 읽을 수 있다
  // — 릴레이 요청에 필요한 sigMsg를 지갑 로딩과 무관하게 먼저 구성한다.
  const cachedPubkey = localStorage.getItem('gopang_wallet_pubkey');
  const ts = Date.now();
  let signature, publicKeyB64u;

  if (cachedPubkey) {
    const relaySigMsg = `auth-issue:${user.ipv6}:${cachedPubkey}:${svc}:${ts}`;
    const relayResult = await _tryRelaySign(relaySigMsg);
    if (relayResult?.signature) {
      signature = relayResult.signature;
      publicKeyB64u = relayResult.publicKeyB64u;
    }
  }

  if (!signature) {
    // 릴레이 응답이 없었다(다른 탭이 없거나 준비 안 됨) — 이 문서 자체에서
    // 로컬 로딩을 시도한다. WebAuthn이 필요하면 여기서도 여전히 막힐 수
    // 있지만, 최소한 릴레이로 해결되는 흔한 경우(다른 탭이 열려 있는 경우)는
    // 새 프롬프트 없이 즉시 통과한다.
    const wallet = await _waitForWallet();
    if (!wallet?.publicKeyB64u || typeof wallet.signPayload !== 'function') {
      return { ok: false, reason: 'WALLET_NOT_READY' };
    }
    const sigMsg = `auth-issue:${user.ipv6}:${wallet.publicKeyB64u}:${svc}:${ts}`;
    try { signature = await wallet.signPayload(sigMsg); }
    catch (e) { return { ok: false, reason: 'SIGN_FAILED' }; }
    publicKeyB64u = wallet.publicKeyB64u;
  }

  try {
    const res = await fetch(`${WORKER}/auth/issue`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ guid: user.ipv6, pubkey: publicKeyB64u, signature, ts, level, svc }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) return { ok: false, reason: data?.code || `http_${res.status}` };
    // 2026-07-15(발견④ 수정): data.token(handleIssue가 이미 서명해 내려주는 실제
    // Bearer 토큰 문자열)을 그동안 여기서 버리고 있었다 — 그때 QR 경로(2026-07-19
    // 삭제됨)는 token을 이미 정확히 포함시켰는데, 지갑 경로만 빠뜨린 누락이었다.
    // 이 필드가 없으면 handlePdvQuery(worker.js)가 "검증 불가"로 보고 L2/L3
    // scope를 전부 L1로 강등시킨다(worker.js 4749행대 TODO 참고) — 이 한 줄이
    // L2/L3 인증 배선 미완의 실제 원인 지점이었다.
    return { ok: true, ipv6: user.ipv6, level: data.level || level, exp: Math.floor(ts / 1000) + 3600, token: data.token };
  } catch (e) {
    return { ok: false, reason: 'NETWORK' };
  }
}

// ── Silent 모드: 서버 검증된 토큰을 postMessage로 전달 ──────
async function _runSilentMode() {
  const result = await _issueViaWorker(SERVICE, params.get('level') || 'L0');
  if (!result.ok) {
    // PUBKEY_MISMATCH: 이 기기에 있는 로컬 기록과 서버에 핀(pin)된 키가 다름
    // (탈취/오염된 로컬 데이터). NOT_REGISTERED: 가입 자체가 안 됨.
    // 두 경우 모두 "여기서 새 정체성을 만들지" 않고 그대로 실패를 알린다.
    _postToParent(null, result.reason);
    return;
  }
  // 2026-07-15(발견④ 수정): result.token을 postMessage 페이로드에도 포함시켜야
  // gopang-sso.js의 _trySilentIframe이 세션에 저장하는 객체에 실제 서명된
  // Bearer 토큰이 담긴다 — 위 _issueViaWorker 수정과 반드시 짝을 이뤄야 함.
  _postToParent({ ipv6: result.ipv6, level: result.level, exp: result.exp, token: result.token }, null);
}

function _postToParent(token, error) {
  const targetOrigin = ORIGIN !== '*'
    ? ORIGIN
    : (document.referrer ? new URL(document.referrer).origin : '*');
  window.parent.postMessage({
    type:  'GOPANG_SSO_TOKEN',
    token: token || null,
    error: error || null,
  }, targetOrigin);
}

// ── 리다이렉트 모드: 로그인 UI 대신 가입 여부만 안내 ────────
// v6.0: 이 페이지는 더 이상 4단어 시드/전화번호 입력 폼을 직접 받지 않는다.
// 등록은 hondi.net(webapp.html)의 진짜 가입 흐름에서만 일어난다 — 두 곳에서
// 각자 정체성을 만들면 다시 같은 충돌 버그로 되돌아간다.
async function _runRedirectMode() {
  document.getElementById('loading').style.display = 'none';

  const result = await _issueViaWorker(SERVICE, params.get('level') || 'L0');

  if (result.ok) {
    const token = btoa(JSON.stringify({ ipv6: result.ipv6, level: result.level, exp: result.exp }))
      .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    if (RETURN) {
      const returnUrl = new URL(decodeURIComponent(RETURN));
      returnUrl.searchParams.set('gopang_token', token);
      location.href = returnUrl.toString();
    } else {
      location.href = 'https://hondi.net';
    }
    return;
  }

  // 미가입/기기 불일치 — 이 기기(PC 등)엔 로그인 정보가 없다.
  // 2026-07-19: 예전엔 여기서 "폰으로 QR 스캔" 대안을 안내했지만, QR
  // 로그인 방식 자체를 폐기했다(주피터 지시 — 가입 시점 전화번호 문자
  // 인증 1회만이 유일한 본인 인증 경로). hondi.net의 진짜 로그인
  // 흐름(전화번호 인증)으로 보내는 것 하나만 남긴다.
  document.getElementById('auth-card').style.display = 'block';
  const title = document.getElementById('auth-title');
  const desc  = document.getElementById('auth-desc');
  if (result.reason === 'PUBKEY_MISMATCH') {
    title.textContent = '이 기기는 등록된 기기가 아닙니다';
    desc.textContent  = 'hondi.net에서 전화번호로 다시 로그인해주세요.';
  } else {
    title.textContent = '고팡 로그인이 필요합니다';
    desc.textContent  = 'hondi.net에서 전화번호로 로그인해주세요.';
  }
}

window.goRegister = function() {
  const returnParam = RETURN ? `&return=${encodeURIComponent(RETURN)}` : '';
  location.href = `https://hondi.net?register=1&svc=${SERVICE}${returnParam}`;
};

// ── 유틸 ─────────────────────────────────────────────────
function _getLocalUser() {
  try { return JSON.parse(localStorage.getItem('gopang_user_v4') || 'null'); }
  catch { return null; }
}
