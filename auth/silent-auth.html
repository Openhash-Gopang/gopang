<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고팡 인증</title>
<script src="/gopang-wallet.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: #f8f9fa;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  /* ── 로딩 (silent iframe 모드) ── */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: #6b7280;
    font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2.5px solid #e5e7eb;
    border-top-color: #3ecf8e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 등록/복원 UI (리다이렉트 모드) ── */
  #auth-card {
    display: none;
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 32px 28px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .auth-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .auth-logo-icon {
    width: 32px; height: 32px;
    background: #3ecf8e;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: white;
    font-family: monospace;
  }
  .auth-logo-text {
    font-size: 16px; font-weight: 600; color: #111827;
    letter-spacing: -0.3px;
  }
  .auth-service {
    font-size: 11px;
    color: #6b7280;
    background: #f3f4f6;
    border: 1px solid #e5e7eb;
    border-radius: 99px;
    padding: 2px 10px;
    font-family: monospace;
  }
  h2 {
    font-size: 18px; font-weight: 600;
    color: #111827; margin-bottom: 6px;
    letter-spacing: -0.4px;
  }
  .auth-desc {
    font-size: 13px; color: #6b7280;
    line-height: 1.6; margin-bottom: 24px;
  }

  /* ── 4단어 입력 ── */
  .input-group { margin-bottom: 16px; }
  .input-group label {
    display: block;
    font-size: 12px; font-weight: 500;
    color: #374151; margin-bottom: 6px;
    letter-spacing: 0.2px;
  }
  .input-group input {
    width: 100%; padding: 10px 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px; color: #111827;
    background: #f9fafb;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-group input:focus {
    border-color: #3ecf8e;
    box-shadow: 0 0 0 3px rgba(62,207,142,0.12);
    background: white;
  }
  .input-group input::placeholder { color: #9ca3af; }

  /* ── 얼굴 인증 영역 ── */
  #face-area {
    margin-bottom: 16px;
    text-align: center;
  }
  #face-video-wrap {
    display: none;
    position: relative;
    width: 200px; height: 200px;
    margin: 0 auto 12px;
  }
  #face-video {
    width: 200px; height: 200px;
    border-radius: 50%;
    object-fit: cover;
    transform: scaleX(-1);
    background: #111;
  }
  .face-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 3px solid rgba(62,207,142,0.8);
    pointer-events: none;
  }
  #face-status {
    font-size: 12px; color: #6b7280;
    margin-bottom: 8px;
  }

  /* ── 버튼 ── */
  .btn-primary {
    width: 100%; padding: 12px;
    background: #3ecf8e; color: white;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-bottom: 8px;
  }
  .btn-primary:hover { background: #29a374; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled {
    background: #d1d5db; cursor: not-allowed;
  }
  .btn-secondary {
    width: 100%; padding: 10px;
    background: transparent;
    color: #6b7280;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    font-size: 13px; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: #9ca3af; color: #374151; }

  /* ── 에러/성공 메시지 ── */
  .msg {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
  }
  .msg.error   { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; }
  .msg.success { background: #f0fdf8; color: #059669; border: 1px solid #a7f3d0; }

  /* ── 기기 변경 안내 ── */
  #device-change-notice {
    display: none;
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    color: #92400e;
    margin-bottom: 16px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<!-- 로딩 (silent 모드) -->
<div id="loading">
  <div class="spinner"></div>
  <span>인증 확인 중…</span>
</div>

<!-- 안내 카드 (리다이렉트 모드 — 미가입/기기 불일치일 때만 표시) -->
<!-- v6.0: 이 페이지는 더 이상 정체성을 발급하지 않으므로 시드/얼굴 입력 폼이
     없다. 등록·로그인은 항상 hondi.net(webapp.html)의 진짜 가입 흐름에서만
     일어난다. -->
<div id="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-icon">G</div>
    <span class="auth-logo-text">고팡</span>
    <span class="auth-service" id="svc-label"></span>
  </div>

  <h2 id="auth-title">고팡 로그인</h2>
  <p class="auth-desc" id="auth-desc">
    고팡 계정으로 로그인하면 모든 하위 서비스를 이용할 수 있습니다.
  </p>

  <!-- 폰(개인 기기)으로 QR을 스캔해 이 PC/기기에 로그인 승인 -->
  <div id="qr-sso-box" style="margin:20px 0;text-align:center">
    <div id="qr-sso-img" style="width:180px;height:180px;margin:0 auto 10px;
         border:1px solid #e5e7eb;border-radius:10px;display:flex;
         align-items:center;justify-content:center;background:#fafafa">
      <span style="font-size:11px;color:#9ca3af">QR 생성 중…</span>
    </div>
    <div id="qr-sso-status" style="font-size:12px;color:#9ca3af">
      혼디 앱이 설치된 내 스마트폰으로 스캔하세요
    </div>
  </div>

  <div style="text-align:center;font-size:12px;color:#9ca3af;margin:12px 0">또는</div>

  <!-- hondi.net 가입/복구로 이동 -->
  <button class="btn-primary" id="register-btn" onclick="goRegister()">
    hondi.net에서 계속하기
  </button>
</div>

<script type="module">
// ══════════════════════════════════════════════════════════
// silent-auth.html — v6.0
//
// 이전 버전: 기기 지문(_buildDeviceFingerprint)으로 자체 ipv6를 만들고,
// 4단어 시드(PBKDF2)로 별도 정체성을 발급하는 독자적인 인증 시스템이었다.
// 문제: (1) 지문은 동일 기종 기기 간 충돌 가능성이 있고, (2) 이 페이지가
// hondi.net과 같은 출처(origin)라서 gopang_user_v4를 공유하는데, 여기서
// "신규 등록"이 발동하면 실제 전화번호 기반 가입으로 만들어진 진짜 정체성을
// 통째로 덮어써 버렸다.
//
// v6.0: 이 페이지는 더 이상 정체성을 "만들지" 않는다. hondi.net의 진짜
// 가입 흐름(webapp.html → src/gopang/core/auth.js)이 이미 써놓은
// gopang_user_v4 + window.gopangWallet(Ed25519)을 그대로 읽어, 하위
// 서비스에게 "이 사람이 진짜 그 guid의 개인키를 갖고 있다"를 Worker
// /auth/issue(서명 검증 + TOFU)로 증명한 뒤 결과만 중계한다.
// ══════════════════════════════════════════════════════════

const params    = new URLSearchParams(location.search);
const SERVICE   = params.get('svc')    || '*';
const ORIGIN    = params.get('origin') || '*';
const RETURN    = params.get('return') || null;
const IS_SILENT = (window.parent !== window);   // iframe 여부
const WORKER    = 'https://hondi-proxy.tensor-city.workers.dev';

window.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('svc-label').textContent = SERVICE;
  if (IS_SILENT) {
    await _runSilentMode();
  } else {
    await _runRedirectMode();
  }
});

// ── window.gopangWallet 준비 대기 (gopang-wallet.js 싱글턴은 비동기 초기화) ──
function _waitForWallet(timeoutMs = 4000) {
  return new Promise((resolve) => {
    if (window.gopangWallet) { resolve(window.gopangWallet); return; }
    const start = Date.now();
    const t = setInterval(() => {
      if (window.gopangWallet) { clearInterval(t); resolve(window.gopangWallet); }
      else if (Date.now() - start > timeoutMs) { clearInterval(t); resolve(null); }
    }, 100);
  });
}

// ── 로컬 정체성 + 지갑 서명으로 /auth/issue 호출 (공통) ──────────────
async function _issueViaWorker(svc, level = 'L0') {
  const user = _getLocalUser();
  if (!user?.ipv6 || !user?.handle) return { ok: false, reason: 'NOT_REGISTERED' };

  const wallet = await _waitForWallet();
  if (!wallet?.publicKeyB64u || typeof wallet.signPayload !== 'function') {
    return { ok: false, reason: 'WALLET_NOT_READY' };
  }

  const ts = Date.now();
  const sigMsg = `auth-issue:${user.ipv6}:${wallet.publicKeyB64u}:${svc}:${ts}`;
  let signature;
  try { signature = await wallet.signPayload(sigMsg); }
  catch (e) { return { ok: false, reason: 'SIGN_FAILED' }; }

  try {
    const res = await fetch(`${WORKER}/auth/issue`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ guid: user.ipv6, pubkey: wallet.publicKeyB64u, signature, ts, level, svc }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) return { ok: false, reason: data?.code || `http_${res.status}` };
    return { ok: true, ipv6: user.ipv6, level: data.level || level, exp: Math.floor(ts / 1000) + 3600 };
  } catch (e) {
    return { ok: false, reason: 'NETWORK' };
  }
}

// ── Silent 모드: 서버 검증된 토큰을 postMessage로 전달 ──────
async function _runSilentMode() {
  const result = await _issueViaWorker(SERVICE, params.get('level') || 'L0');
  if (!result.ok) {
    // PUBKEY_MISMATCH: 이 기기에 있는 로컬 기록과 서버에 핀(pin)된 키가 다름
    // (탈취/오염된 로컬 데이터). NOT_REGISTERED: 가입 자체가 안 됨.
    // 두 경우 모두 "여기서 새 정체성을 만들지" 않고 그대로 실패를 알린다.
    _postToParent(null, result.reason);
    return;
  }
  _postToParent({ ipv6: result.ipv6, level: result.level, exp: result.exp }, null);
}

function _postToParent(token, error) {
  const targetOrigin = ORIGIN !== '*'
    ? ORIGIN
    : (document.referrer ? new URL(document.referrer).origin : '*');
  window.parent.postMessage({
    type:  'GOPANG_SSO_TOKEN',
    token: token || null,
    error: error || null,
  }, targetOrigin);
}

// ── 리다이렉트 모드: 로그인 UI 대신 가입 여부만 안내 ────────
// v6.0: 이 페이지는 더 이상 4단어 시드/전화번호 입력 폼을 직접 받지 않는다.
// 등록은 hondi.net(webapp.html)의 진짜 가입 흐름에서만 일어난다 — 두 곳에서
// 각자 정체성을 만들면 다시 같은 충돌 버그로 되돌아간다.
async function _runRedirectMode() {
  document.getElementById('loading').style.display = 'none';

  const result = await _issueViaWorker(SERVICE, params.get('level') || 'L0');

  if (result.ok) {
    const token = btoa(JSON.stringify({ ipv6: result.ipv6, level: result.level, exp: result.exp }))
      .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    if (RETURN) {
      const returnUrl = new URL(decodeURIComponent(RETURN));
      returnUrl.searchParams.set('gopang_token', token);
      location.href = returnUrl.toString();
    } else {
      location.href = 'https://hondi.net';
    }
    return;
  }

  // 미가입/기기 불일치 — 이 기기(PC 등)엔 개인키가 없다.
  // 열쇠는 폰(개인 기기)에 있으므로, QR로 폰의 서명을 받아온다.
  // (백업 키를 직접 붙여넣는 방법은 hondi.net 설정에도 남아 있다 — 대안일 뿐.)
  document.getElementById('auth-card').style.display = 'block';
  const title = document.getElementById('auth-title');
  const desc  = document.getElementById('auth-desc');
  if (result.reason === 'PUBKEY_MISMATCH') {
    title.textContent = '이 기기는 등록된 기기가 아닙니다';
    desc.textContent  = '내 스마트폰으로 QR을 스캔해 이 기기를 승인하세요.';
  } else {
    title.textContent = '고팡 로그인이 필요합니다';
    desc.textContent  = '내 스마트폰으로 QR을 스캔해 로그인하세요.';
  }
  _startQrSso();
}

// ── QR SSO — 폰(개인 기기, 이미 로그인됨)이 이 세션을 대신 승인 ──────────
async function _startQrSso() {
  const imgBox = document.getElementById('qr-sso-img');
  const statusEl = document.getElementById('qr-sso-status');
  let sid;
  try {
    const res = await fetch(`${WORKER}/auth/qr/create`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ svc: SERVICE, level: params.get('level') || 'L0' }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error('create_failed');
    sid = data.sid;
  } catch (e) {
    imgBox.innerHTML = '<span style="font-size:11px;color:#dc2626">QR 생성 실패</span>';
    return;
  }

  const scanUrl = `https://hondi.net/auth/qr-scan.html?sid=${encodeURIComponent(sid)}`;
  const qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(scanUrl)}`;
  imgBox.innerHTML = `<img src="${qrImgUrl}" style="width:100%;height:100%;border-radius:10px" alt="QR">`;

  const startedAt = Date.now();
  const poll = setInterval(async () => {
    if (Date.now() - startedAt > 180000) {
      clearInterval(poll);
      statusEl.textContent = 'QR이 만료되었습니다. 새로고침 해주세요.';
      return;
    }
    try {
      const res = await fetch(`${WORKER}/auth/qr/status?sid=${encodeURIComponent(sid)}`);
      const data = await res.json();
      if (data.status === 'approved') {
        clearInterval(poll);
        statusEl.textContent = '승인됨 — 이동 중…';
        if (RETURN) {
          const returnUrl = new URL(decodeURIComponent(RETURN));
          returnUrl.searchParams.set('gopang_token', data.token);
          location.href = returnUrl.toString();
        } else {
          location.href = 'https://hondi.net';
        }
      } else if (data.status === 'expired') {
        clearInterval(poll);
        statusEl.textContent = 'QR이 만료되었습니다. 새로고침 해주세요.';
      }
    } catch (e) { /* 다음 폴링에서 재시도 */ }
  }, 2000);
}

window.goRegister = function() {
  const returnParam = RETURN ? `&return=${encodeURIComponent(RETURN)}` : '';
  location.href = `https://hondi.net?register=1&svc=${SERVICE}${returnParam}`;
};

// ── 유틸 ─────────────────────────────────────────────────
function _getLocalUser() {
  try { return JSON.parse(localStorage.getItem('gopang_user_v4') || 'null'); }
  catch { return null; }
}
</script>
</body>
</html>
