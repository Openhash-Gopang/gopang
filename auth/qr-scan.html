<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혼디 로그인</title>
<style>
  body{margin:0;font-family:-apple-system,'Pretendard',sans-serif;background:#f9fafb;
       display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;box-sizing:border-box}
  .card{background:#fff;border-radius:20px;padding:28px 22px;max-width:360px;width:100%;
        box-sizing:border-box;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06)}
  h1{font-size:16px;color:#111827;margin:0 0 10px;font-weight:700}
  p{font-size:13px;color:#374151;line-height:1.6;margin:0 0 20px}
  button{width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;
         font-weight:700;cursor:pointer;font-family:inherit;background:#0057A8;color:#fff}
</style>
</head>
<body>
  <!--
    2026-07-19 폐기 — QR 스캔 로그인 방식 자체를 없앴다(주피터 지시:
    가입 시점 전화번호 문자 인증 1회만이 유일한 본인 인증 경로). 이
    페이지를 가리키던 유일한 진입점(auth/silent-auth.html의 QR
    생성 로직)도 같은 날 제거했다 — 지금은 옛 QR 코드를 스캔했거나
    북마크로 직접 들어온 경우에만 도달한다. /auth/qr/approve를 계속
    호출할 수 있는 상태로 남겨두면 폐기 방침과 어긋나므로, 승인 UI
    자체를 없애고 로그인 페이지로만 안내한다.
  -->
  <div class="card">
    <h1>QR 로그인은 더 이상 지원하지 않습니다</h1>
    <p>전화번호 인증으로 로그인해주세요.</p>
    <button onclick="location.href='https://hondi.net'">hondi.net에서 로그인</button>
  </div>
</body>
</html>
