<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고팡 v2 — AI 법률·의료 비서</title>
  <style>
    /* ── 전역 리셋 + 변수 ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:   #0f1117;
      --bg-secondary: #1a1d27;
      --bg-panel:     #20243a;
      --border:       #2e3250;
      --text-primary: #e8eaf6;
      --text-muted:   #8892b0;
      --accent:       #5c6bc0;
      --accent-glow:  #7986cb;
      --s0: #27ae60; --s1: #f39c12; --s2: #e67e22; --s3: #e74c3c;
      --radius: 10px;
      --transition: 0.2s ease;
    }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 헤더 ──────────────────────────────────────────── */
    .app-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .app-logo { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
    .app-logo span { color: var(--accent-glow); }
    .boot-status {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .boot-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--s0);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Shell 컨테이너 ─────────────────────────────────── */
    #gopang-shell { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    .shell-container { display: flex; flex-direction: column; height: 100%; }

    /* ── 탭 바 ─────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 4px;
      padding: 8px 16px 0;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
    }
    .tab-btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
      background: var(--bg-primary);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      transition: var(--transition);
      white-space: nowrap;
    }
    .tab-btn:hover { background: var(--bg-panel); color: var(--text-primary); }
    .tab-btn.active {
      background: var(--bg-panel);
      color: var(--text-primary);
      border-color: var(--accent);
    }
    .tab-add { opacity: 0.4; cursor: not-allowed !important; }

    /* ── 메인 ───────────────────────────────────────────── */
    .shell-main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 0;
      overflow: hidden;
    }

    /* ── 메신저 패널 ────────────────────────────────────── */
    .messenger-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .message-user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
    }
    .message-ai {
      align-self: flex-start;
      background: var(--bg-panel);
      border: 1px solid var(--border);
    }

    /* ── 위험 배지 ──────────────────────────────────────── */
    .risk-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
    }
    .risk-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      background: var(--s0);
      color: #fff;
    }

    /* ── 입력 영역 ──────────────────────────────────────── */
    .input-area {
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
    }
    textarea {
      width: 100%;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      padding: 10px;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      transition: border-color var(--transition);
    }
    textarea:focus { border-color: var(--accent); }
    .input-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }
    button {
      padding: 7px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-panel);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 0.83rem;
      transition: var(--transition);
    }
    button:hover { background: var(--bg-secondary); }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    .btn-primary:hover { background: var(--accent-glow); }

    /* ── 결과 패널 ──────────────────────────────────────── */
    .result-panel {
      overflow-y: auto;
      padding: 16px;
      background: var(--bg-secondary);
    }
    .result-panel h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .legal-flags { font-size: 0.85rem; }
    .flag-item {
      padding: 6px 10px;
      margin-bottom: 6px;
      background: var(--bg-panel);
      border-left: 3px solid var(--s2);
      border-radius: 0 var(--radius) var(--radius) 0;
      list-style: none;
    }
    .no-flags { color: var(--text-muted); font-size: 0.83rem; }

    /* ── 상태 바 ────────────────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--text-muted);
      flex-shrink: 0;
      overflow-x: auto;
      flex-wrap: wrap;
    }
    .status-bar code {
      font-family: 'Courier New', monospace;
      color: var(--accent-glow);
    }
    .btn-evidence {
      margin-left: auto;
      background: linear-gradient(135deg, #5c6bc0, #7986cb);
      color: #fff;
      border: none;
      padding: 6px 14px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* ── 부팅 스플래시 ──────────────────────────────────── */
    #boot-splash {
      position: fixed; inset: 0;
      background: var(--bg-primary);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      z-index: 1000;
      transition: opacity 0.4s ease;
    }
    #boot-splash.hidden { opacity: 0; pointer-events: none; }
    .splash-logo { font-size: 2.5rem; font-weight: 800; }
    .splash-logo span { color: var(--accent-glow); }
    .splash-msg { color: var(--text-muted); font-size: 0.9rem; }
    .progress-bar {
      width: 240px; height: 3px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-glow));
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* ── 반응형 ─────────────────────────────────────────── */
    @media (max-width: 700px) {
      .shell-main { grid-template-columns: 1fr; }
      .result-panel { display: none; }
    }
  </style>
</head>
<body>

<!-- 부팅 스플래시 -->
<div id="boot-splash">
  <div class="splash-logo">고<span>팡</span> v2</div>
  <div class="splash-msg" id="splash-msg">플랫폼 초기화 중...</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<!-- 앱 헤더 -->
<header class="app-header">
  <div class="app-logo">고<span>팡</span> v2</div>
  <div class="boot-status">
    <div class="boot-dot" id="boot-dot"></div>
    <span id="boot-label">준비 중</span>
  </div>
</header>

<!-- Shell UI 마운트 포인트 -->
<div id="gopang-shell">
  <!-- shell-ui.js가 여기에 렌더링합니다 -->
</div>

<script type="module">
  // ── 스플래시 진행 관리 ──────────────────────────────────
  const splash    = document.getElementById('boot-splash');
  const splashMsg = document.getElementById('splash-msg');
  const progress  = document.getElementById('progress-fill');
  const bootDot   = document.getElementById('boot-dot');
  const bootLabel = document.getElementById('boot-label');

  const STEPS = [
    [10, '코어 초기화 중...'],
    [30, 'PDV + OpenHash 로드 중...'],
    [50, '도메인 플러그인 등록 중...'],
    [70, 'AI 비서 파이프라인 연결 중...'],
    [85, '네트워크 + GDC 초기화 중...'],
    [95, 'Shell UI 렌더링 중...'],
    [100, '준비 완료'],
  ];

  let step = 0;
  const advance = () => {
    if (step >= STEPS.length) return;
    const [pct, msg] = STEPS[step++];
    progress.style.width = pct + '%';
    splashMsg.textContent = msg;
  };

  // 부트 이벤트로 진행도 업데이트 (모듈 로드 후)
  window._bootAdvance = advance;

  // ── 앱 로드 ─────────────────────────────────────────────
  try {
    advance(); // 10%

    // app.js import (브라우저 ESM)
    const { bootstrap } = await import('./src/app.js');

    // 각 단계마다 진행도 올리기
    const origLog = console.log.bind(console);
    console.log = (...args) => {
      origLog(...args);
      if (args[0]?.startsWith?.('[BOOT]')) advance();
    };

    await bootstrap();

    console.log = origLog;

    // 완료 처리
    bootDot.style.background = '#27ae60';
    bootDot.style.animation = 'none';
    bootLabel.textContent = '정상 작동 중';

    setTimeout(() => splash.classList.add('hidden'), 400);

  } catch (err) {
    splashMsg.textContent = `❌ 오류: ${err.message}`;
    progress.style.background = '#e74c3c';
    bootDot.style.background = '#e74c3c';
    bootDot.style.animation = 'none';
    bootLabel.textContent = '오류 발생';
    console.error('[Shell] 부트스트랩 실패:', err);
  }
</script>

</body>
</html>
