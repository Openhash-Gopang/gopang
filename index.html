<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고팡 (Gopang)</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #f8f9fa;
    font-family: -apple-system, 'Noto Sans KR', sans-serif;
  }
  .loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    background: #f8f9fa;
  }
  .logo {
    width: 48px; height: 48px;
    background: #3ecf8e; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700; color: white;
    font-family: monospace;
  }
  .msg { font-size: 14px; color: #9ca3af; }
</style>
</head>
<body>
<div class="loading" id="loader">
  <div class="logo">G</div>
  <div class="msg">로딩 중...</div>
</div>

<script>
  (function () {
    // ── 기기 판별 ──────────────────────────────────────────
    // 1순위: 터치 기반 모바일 UA
    var ua = navigator.userAgent || '';
    var isMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);

    // 2순위: 화면 너비 (태블릿 세로 포함, 768px 이하를 모바일로)
    var isNarrow = window.innerWidth <= 768;

    // 3순위: 터치 포인트 (마우스 없는 기기)
    var isTouch = (navigator.maxTouchPoints > 1) && !window.matchMedia('(pointer:fine)').matches;

    var isMobile = isMobileUA || (isNarrow && isTouch);

    // URL 파라미터로 강제 override 가능: ?view=mobile / ?view=desktop
    var params = new URLSearchParams(window.location.search);
    var forceView = params.get('view');
    if (forceView === 'mobile')  isMobile = true;
    if (forceView === 'desktop') isMobile = false;

    // ── 리다이렉트 ─────────────────────────────────────────
    var target = isMobile ? 'webapp.html' : 'desktop.html';

    // 쿼리스트링·해시 그대로 전달
    var qs = window.location.search;
    var hash = window.location.hash;

    // view 파라미터는 목적지에 전달하지 않음 (무한 루프 방지)
    if (forceView) {
      var sp = new URLSearchParams(qs);
      sp.delete('view');
      qs = sp.toString() ? '?' + sp.toString() : '';
    }

    window.location.replace(target + qs + hash);
  })();
</script>
</body>
</html>
