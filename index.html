<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>고팡</title>

  <!-- ── PWA 핵심 ──────────────────────────────────────── -->
  <link rel="manifest" href="/manifest.json"/>

  <!-- iOS Safari — 홈 화면 추가 -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="고팡"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png"/>
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png"/>
  <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png"/>

  <!-- iOS 스플래시 스크린 배경색 -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>

  <!-- Android Chrome -->
  <meta name="theme-color" content="#09090F"/>
  <meta name="mobile-web-app-capable" content="yes"/>

  <!-- 일반 메타 -->
  <meta name="description" content="고팡(Gopang) AI 법률·의료·생활 비서"/>
  <meta name="application-name" content="고팡"/>
  <link rel="icon" type="image/png" href="/icons/icon-192.png"/>

  <!-- safe-area 대응 (노치·홈인디케이터) -->
  <style>
    :root {
      --safe-top:    env(safe-area-inset-top,    0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left:   env(safe-area-inset-left,   0px);
      --safe-right:  env(safe-area-inset-right,  0px);
    }
  </style>
  <style>
    /* ── Apple HIG 토큰 ─────────────────────────────────── */
    :root {
      --bg:           #09090F;
      --bg-elevated:  rgba(28,28,30,0.92);
      --bg-glass:     rgba(44,44,46,0.72);
      --bg-input:     rgba(58,58,60,0.9);
      --sep:          rgba(255,255,255,0.08);
      --sep-strong:   rgba(255,255,255,0.14);
      --label:        rgba(255,255,255,0.96);
      --label-2:      rgba(255,255,255,0.55);
      --label-3:      rgba(255,255,255,0.28);
      --tint:         #0A84FF;
      --tint-dim:     rgba(10,132,255,0.18);
      --green:        #30D158;
      --red:          #FF453A;
      --yellow:       #FFD60A;
      --orange:       #FF9F0A;
      --r-sm:         10px;
      --r-md:         14px;
      --r-lg:         20px;
      --r-xl:         26px;
      --blur:         saturate(180%) blur(24px);
      --blur-sm:      saturate(160%) blur(12px);
      --font:         -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --font-display: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out:     cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--label);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Apple HIG macOS 다크 — 미세 방사형 하이라이트 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%,
          rgba(10,132,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 100% 100%,
          rgba(94,92,230,0.05) 0%, transparent 60%);
    }
    #app { position: relative; z-index: 1; }

    /* ── 앱 레이아웃 ────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      position: relative;
    }

    /* ── 상단 여백 (헤더 없음 — 요구사항) ─────────────── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: calc(52px + var(--safe-top));
      padding-top: var(--safe-top);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 18px;
      padding-left: 18px;
      gap: 10px;
    }

    /* ── PWA 설치 배너 ─────────────────────────────────── */
    .install-banner {
      position: fixed;
      bottom: calc(90px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      width: calc(100% - 32px);
      max-width: 420px;
      background: var(--bg-elevated);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--sep-strong);
      border-radius: var(--r-xl);
      padding: 16px 18px;
      z-index: 300;
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s var(--ease-out), transform 0.3s var(--ease-spring);
    }
    .install-banner.show {
      opacity: 1;
      pointer-events: all;
      transform: translateX(-50%) translateY(0);
    }
    .install-banner-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--bg-panel, #20243a);
    }
    .install-banner-icon img { width: 100%; height: 100%; object-fit: cover; }
    .install-banner-text { flex: 1; }
    .install-banner-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--label);
      margin-bottom: 2px;
    }
    .install-banner-sub {
      font-size: 12px;
      color: var(--label-2);
      line-height: 1.4;
    }
    .install-banner-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    .install-btn {
      padding: 7px 14px;
      border-radius: 20px;
      border: none;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .install-btn:active { opacity: 0.7; }
    .install-btn-primary { background: var(--tint); color: #fff; }
    .install-btn-dismiss {
      background: transparent;
      color: var(--label-3);
      font-weight: 400;
      font-size: 12px;
      text-align: center;
    }

    /* ── 우상단 버튼 그룹 ──────────────────────────────── */
    .top-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--bg-glass);
      backdrop-filter: var(--blur-sm);
      -webkit-backdrop-filter: var(--blur-sm);
      color: var(--label);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      transition: background 0.15s, transform 0.12s var(--ease-spring);
      -webkit-tap-highlight-color: transparent;
    }
    .top-btn:hover  { background: rgba(255,255,255,0.12); }
    .top-btn:active { transform: scale(0.93); }

    .btn-ai {
      width: auto;
      padding: 0 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--tint);
      gap: 5px;
    }
    .btn-ai .ai-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--label-3);   /* 초기: 비활성 회색 */
      transition: background 0.3s, transform 0.3s;
    }
    /* 활성 상태 — .btn-ai.active 일 때 dot도 초록 + 애니메이션 */
    .btn-ai.active .ai-dot {
      background: var(--green);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .btn-ai.active { background: var(--tint-dim); color: var(--tint); }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.7); }
    }

    /* ── 메시지 영역 ────────────────────────────────────── */
    #message-list {
      flex: 1;
      overflow-y: auto;
      padding: 60px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }
    #message-list::-webkit-scrollbar { width: 0; }

    .msg-row {
      display: flex;
      padding: 3px 16px;
      animation: msg-in 0.28s var(--ease-out) both;
    }
    @keyframes msg-in {
      from { opacity:0; transform: translateY(10px) scale(0.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    .msg-row.user  { justify-content: flex-end; }
    .msg-row.ai    { justify-content: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: var(--r-lg);
      font-size: 15px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble-user {
      background: var(--tint);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble-ai {
      background: var(--bg-glass);
      backdrop-filter: var(--blur-sm);
      -webkit-backdrop-filter: var(--blur-sm);
      color: var(--label);
      border-bottom-left-radius: 4px;
    }

    /* 위험 배지 (버블 아래 inline) */
    .risk-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .risk-chip.s0 { background: rgba(48,209,88,0.18);  color: var(--green);  }
    .risk-chip.s1 { background: rgba(255,214,10,0.18); color: var(--yellow); }
    .risk-chip.s2 { background: rgba(255,159,10,0.18); color: var(--orange); }
    .risk-chip.s3 { background: rgba(255,69,58,0.18);  color: var(--red);    }

    /* AI 타이핑 인디케이터 */
    .typing-indicator {
      display: flex; align-items: center; gap: 4px;
      padding: 12px 16px;
    }
    .typing-indicator span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--label-2);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-5px); }
    }

    /* ── 하단 입력 영역 (Apple Messages / Claude.ai 스타일) */
    .input-dock {
      flex-shrink: 0;
      padding: 8px 12px calc(20px + var(--safe-bottom));
      background: rgba(0,0,0,0.7);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-top: 1px solid var(--sep);
    }

    /* 상태 바 (한 줄, 소형) */
    .status-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 4px 8px;
      font-size: 11px;
      color: var(--label-3);
      letter-spacing: 0.01em;
    }
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .status-strip code {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 10px;
      color: var(--label-3);
    }

    /* 입력 컨테이너 */
    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--bg-input);
      border-radius: var(--r-xl);
      padding: 6px 6px 6px 10px;
      border: 1px solid var(--sep-strong);
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within {
      border-color: rgba(10,132,255,0.5);
    }

    /* 좌측 액션 버튼 */
    .input-actions-left {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      padding-bottom: 2px;
    }
    .ia-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--label-2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: color 0.12s, background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .ia-btn:hover  { color: var(--label); background: rgba(255,255,255,0.06); }
    .ia-btn:active { transform: scale(0.9); }

    /* 버전 선택 드롭다운 */
    .version-select {
      background: transparent;
      border: none;
      color: var(--label-2);
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      padding: 4px 2px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .version-select:hover { color: var(--label); }
    .version-select option { background: #1c1c1e; }

    /* textarea */
    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--label);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.4;
      resize: none;
      max-height: 140px;
      min-height: 22px;
      overflow-y: auto;
      padding: 4px 0;
      align-self: flex-end;
    }
    #msg-input::placeholder { color: var(--label-3); }
    #msg-input::-webkit-scrollbar { width: 0; }

    /* 전송 버튼 */
    .send-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--tint);
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 15px;
      transition: background 0.15s, transform 0.1s var(--ease-spring), opacity 0.15s;
      align-self: flex-end;
    }
    .send-btn:disabled { background: var(--bg-glass); opacity: 0.4; }
    .send-btn:not(:disabled):hover  { background: #0071e3; }
    .send-btn:not(:disabled):active { transform: scale(0.88); }

    /* ── 설정 패널 ──────────────────────────────────────── */
    .settings-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
    }
    .settings-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .settings-sheet {
      width: 100%;
      max-width: 520px;
      background: var(--bg-elevated);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      padding: 20px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.3s var(--ease-out);
      border-top: 1px solid var(--sep-strong);
    }
    .settings-overlay.open .settings-sheet {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--sep-strong);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .sheet-title {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 600;
      color: var(--label);
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    .setting-group {
      margin-bottom: 20px;
    }
    .setting-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--label-2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .setting-field {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--sep-strong);
      border-radius: var(--r-md);
      color: var(--label);
      font-family: var(--font);
      font-size: 15px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }
    .setting-field:focus { border-color: var(--tint); }
    .setting-field option { background: #1c1c1e; }

    .setting-field-mono {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 13px;
      letter-spacing: 0.01em;
    }
    .setting-field::placeholder { color: var(--label-3); }

    .sheet-save {
      width: 100%;
      padding: 13px;
      background: var(--tint);
      border: none;
      border-radius: var(--r-md);
      color: #fff;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s, transform 0.1s;
    }
    .sheet-save:hover  { background: #0071e3; }
    .sheet-save:active { transform: scale(0.98); }

    /* ── AI 비서 시스템 패널 ────────────────────────────── */
    .ai-overlay {
      position: fixed; inset: 0;
      z-index: 150;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .ai-overlay.open { opacity: 1; pointer-events: all; }
    .ai-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .ai-card {
      position: relative;
      width: 90%;
      max-width: 380px;
      background: var(--bg-elevated);
      border-radius: var(--r-xl);
      padding: 24px 20px 20px;
      border: 1px solid var(--sep-strong);
      transform: scale(0.94) translateY(8px);
      transition: transform 0.24s var(--ease-spring);
    }
    .ai-overlay.open .ai-card { transform: scale(1) translateY(0); }

    .ai-card-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #0A84FF, #5E5CE6);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      margin-bottom: 14px;
    }
    .ai-card-title {
      font-family: var(--font-display);
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .ai-card-sub {
      font-size: 13px;
      color: var(--label-2);
      margin-bottom: 18px;
      line-height: 1.4;
    }
    .ai-card-btn {
      width: 100%;
      padding: 12px;
      border-radius: var(--r-md);
      border: none;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .ai-card-btn:active { transform: scale(0.97); }
    .ai-card-btn-primary { background: var(--tint); color: #fff; }
    .ai-card-btn-primary:hover { background: #0071e3; }
    .ai-card-btn-secondary {
      background: var(--bg-input);
      color: var(--label-2);
    }

    /* ── 파일 첨부 미리보기 ─────────────────────────────── */
    .attach-preview {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-glass);
      border-radius: var(--r-md);
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--label-2);
    }
    .attach-preview .remove-attach {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--label-3);
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      width: auto; height: auto;
      border-radius: 0;
    }

    /* ── 반응형 ─────────────────────────────────────────── */
    @media (min-width: 680px) {
      .input-dock { padding: 8px 20% 28px; }
      #message-list { padding: 60px 16% 16px; }
    }
  </style>
</head>
<body>

<!-- ── PWA 설치 배너 ─────────────────────────────────── -->
<div class="install-banner" id="install-banner">
  <div class="install-banner-icon">
    <img src="/icons/icon-192.png" alt="고팡 아이콘"/>
  </div>
  <div class="install-banner-text">
    <div class="install-banner-title">고팡 앱 설치</div>
    <div class="install-banner-sub">
      홈 화면에 추가하면<br>
      주소창 없이 바로 실행됩니다
    </div>
  </div>
  <div class="install-banner-actions">
    <button class="install-btn install-btn-primary" onclick="installPWA()">설치</button>
    <button class="install-btn install-btn-dismiss" onclick="dismissInstall()">나중에</button>
  </div>
</div>

<!-- iOS Safari 전용 설치 안내 (beforeinstallprompt 미지원) -->
<div class="install-banner" id="ios-install-banner">
  <div class="install-banner-icon">
    <img src="/icons/icon-192.png" alt="고팡 아이콘"/>
  </div>
  <div class="install-banner-text">
    <div class="install-banner-title">홈 화면에 추가</div>
    <div class="install-banner-sub" id="ios-install-text">
      Safari 하단 <strong style="color:var(--tint)">공유 버튼 →</strong>
      <strong style="color:var(--tint)">홈 화면에 추가</strong>
    </div>
  </div>

<script>
// ══════════════════════════════════════════════════════════
// PWA — Service Worker 등록 + 설치 프롬프트
// ══════════════════════════════════════════════════════════

let _deferredInstallPrompt = null;   // beforeinstallprompt 이벤트 보관
const _INSTALL_DISMISSED_KEY = 'gopang_install_dismissed';
const _INSTALL_DONE_KEY      = 'gopang_installed';

// ── Service Worker 등록 ────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(reg => console.log('[PWA] SW 등록 완료:', reg.scope))
      .catch(err => console.warn('[PWA] SW 등록 실패:', err));
  });
}

// ── Android/Chrome — beforeinstallprompt 이벤트 ─────────
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredInstallPrompt = e;

  // 설치 버튼 상단에 표시
  const installBtn = document.getElementById('btn-install');
  if (installBtn) installBtn.style.display = 'flex';

  // 이미 설치됐거나 사용자가 7일 이내 거절한 경우 표시 안 함
  if (_shouldShowInstallBanner()) {
    // 첫 방문 또는 재방문 시 2초 후 배너 표시
    setTimeout(() => _showInstallBanner('android'), 2000);
  }
});

// ── 앱이 이미 설치된 상태로 실행 시 ────────────────────────
window.addEventListener('appinstalled', () => {
  console.log('[PWA] 앱 설치 완료');
  localStorage.setItem(_INSTALL_DONE_KEY, Date.now());
  _hideInstallBanner();
  // 설치 버튼 숨김
  const btn = document.getElementById('btn-install');
  if (btn) btn.style.display = 'none';
});

// ── iOS Safari 감지 ──────────────────────────────────────
function _isIOS() {
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}
function _isInStandaloneMode() {
  return window.matchMedia('(display-mode: standalone)').matches ||
         window.navigator.standalone === true;
}

// ── 배너 표시 여부 판단 ───────────────────────────────────
function _shouldShowInstallBanner() {
  if (localStorage.getItem(_INSTALL_DONE_KEY))    return false;  // 이미 설치
  if (_isInStandaloneMode())                       return false;  // 이미 독립 실행 중
  const dismissed = localStorage.getItem(_INSTALL_DISMISSED_KEY);
  if (dismissed && Date.now() - dismissed < 7 * 24 * 60 * 60 * 1000) return false; // 7일 이내 거절
  return true;
}

// ── 배너 표시 ────────────────────────────────────────────
function _showInstallBanner(type) {
  if (type === 'ios') {
    document.getElementById('ios-install-banner')?.classList.add('show');
  } else {
    document.getElementById('install-banner')?.classList.add('show');
  }
}
function _hideInstallBanner() {
  document.getElementById('install-banner')?.classList.remove('show');
  document.getElementById('ios-install-banner')?.classList.remove('show');
}

// ── 설치 버튼 클릭 ────────────────────────────────────────
async function installPWA() {
  if (!_deferredInstallPrompt) return;
  _hideInstallBanner();
  _deferredInstallPrompt.prompt();
  const { outcome } = await _deferredInstallPrompt.userChoice;
  console.log('[PWA] 설치 선택:', outcome);
  if (outcome === 'accepted') {
    localStorage.setItem(_INSTALL_DONE_KEY, Date.now());
  }
  _deferredInstallPrompt = null;
}

// ── 나중에 버튼 ──────────────────────────────────────────
function dismissInstall() {
  _hideInstallBanner();
  localStorage.setItem(_INSTALL_DISMISSED_KEY, Date.now());
}
function dismissIOSInstall() {
  _hideInstallBanner();
  localStorage.setItem(_INSTALL_DISMISSED_KEY, Date.now());
}

// ── 사용자가 직접 설치 요청 (홈 화면 추가 버튼 등) ─────────
function requestInstall() {
  if (_isInStandaloneMode()) {
    appendBubble?.('ai', '✅ 고팡은 이미 홈 화면에 설치되어 있습니다.');
    return;
  }
  if (_deferredInstallPrompt) {
    installPWA();
  } else if (_isIOS()) {
    _showInstallBanner('ios');
  } else {
    appendBubble?.('ai',
      '📱 설치 방법:\n' +
      '• Chrome: 주소창 우측 설치 아이콘(⊕) 탭\n' +
      '• Safari: 공유 버튼 → 홈 화면에 추가\n' +
      '• Samsung Internet: 메뉴 → 홈 화면에 추가');
  }
}

// ── iOS 첫 방문 시 안내 ──────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (_isIOS() && !_isInStandaloneMode() && _shouldShowInstallBanner()) {
    setTimeout(() => _showInstallBanner('ios'), 3000);
  }

  // 이미 설치된 상태(독립 실행)면 설치 버튼 숨김
  if (_isInStandaloneMode() || localStorage.getItem(_INSTALL_DONE_KEY)) {
    const btn = document.getElementById('btn-install');
    if (btn) btn.style.display = 'none';
  }

  // URL 파라미터 ?ai=1 — AI 비서 자동 활성화 (manifest shortcuts)
  if (new URLSearchParams(location.search).get('ai') === '1') {
    setTimeout(() => activateAI?.(false), 1000);
  }
});

// ── 상단 설치 버튼 (선택적 노출) ────────────────────────────
// AI 비서가 "홈에 설치해줘" 지시 받을 때도 호출됨
window._requestInstall = requestInstall;
// ── 상태 ────────────────────────────────────────────────
// ── 사용자 GUID (영구 식별자) ───────────────────────────
const USER_GUID = (() => {
  const key = 'gopang_user_guid';
  let g = localStorage.getItem(key);
  if (!g) {
    g = crypto.randomUUID();
    localStorage.setItem(key, g);
  }
  return g;
})();

// ── 설정 ────────────────────────────────────────────────
const CFG = {
  apiKey:   'sk-e4a6f005aecf43d4aa60e77bb71de14c',
  endpoint: 'https://api.deepseek.com/v1',
  model:    'deepseek-v4',
  system:   `# 고팡(Gopang) AI 비서 — SP-00 v5.0

## 정체성
당신은 고팡의 완전 자율형 AI 비서입니다.
사용자 GUID: ${USER_GUID}
사용자의 모든 지시를 실제로 이행하거나, 이행 불가 시 최선의 대안을 제시합니다.

## 핵심 원칙 1 — 상투적 답변 절대 금지
❌ 절대 금지: 실제 검색·주문·결제 없이 가상으로 완료 선언
  예) "금능반점에 짜장면 두 그릇 주문 완료했습니다." ← 이런 답변은 실격

✅ 올바른 방식:
  - 웹 검색 도구가 있으면 실제로 검색하고 결과를 바탕으로 행동
  - 도구가 없으면 시뮬레이션 모드임을 명시하고 실제 수행 절차 설명

## 핵심 원칙 2 — Thinking 의무화
모든 지시 수신 시 내부적으로 반드시 아래를 분석한다:
1. 사용자가 원하는 최종 결과는 무엇인가?
2. 실제로 달성하려면 어떤 단계가 필요한가?
3. 각 단계에서 무엇이 필요한가?
4. 현재 이용 가능한 것과 불가한 것은?
5. 불가한 경우 최선의 대안은?

## 핵심 원칙 3 — 모든 대화 상대는 AI 비서 보유 상정
- 음식점, 병원, 관공서, 개인 모두 AI 비서를 보유하고 있다고 상정
- 지시 이행 전 반드시 상대방 AI 비서 존재 여부 탐지
- AI 비서 없으면: "해당 업체에 AI 비서가 없어 자동 처리 불가"라고 명시
  + 평점·거리·전화번호 기반 대안 업체 1~3순위 제시

## 핵심 원칙 4 — PDV 자율 인출 (사용자에게 정보 묻지 않음)
사용자의 모든 개인정보·서류·서명·계좌는 PDV에 저장되어 있다고 상정.
❌ 금지: "주민등록번호 알려주세요", "발급 목적이 무엇인가요?"
✅ 올바른 방식: PDV에서 직접 인출 → 처리 → 결과만 보고

예외 (이때만 사용자에게 확인):
- PDV에 해당 정보 없을 때
- 50만원 초과 결제 승인 필요 시
- 법적 계약 명시적 동의 필요 시

## 처리 흐름 (음식 주문 예시)
사용자: "짜장면 두 그릇 시켜줘"

[실제 처리 — 웹 검색 도구 있는 경우]
1. GPS/PDV에서 현재 위치 파악
2. 인근 중국음식점 웹 검색 (네이버·카카오 지도)
3. 평점·거리·배달 가능 여부 평가
4. 상위 업체 AI 비서 존재 여부 탐지
5a. AI 비서 있음 → 주문·결제 완료 보고
5b. AI 비서 없음 → "자동 처리 불가" + 추천 업체 1~3순위 제시

[시뮬레이션 모드 — 도구 없는 경우]
- "시뮬레이션 모드"임을 명시
- 위 단계를 어떻게 수행할지 구체적으로 설명
- 현재 제공 가능한 대안 정보 제시

## 결제 자동화 규칙
- 5만원 이하: 자동 결제
- 5만~50만원: 알림 후 5초 내 미응답 → 자동 결제
- 50만원 초과: 반드시 명시적 승인 요구

## 응답 형식

[AI 비서 있음 — 완전 처리]
⚡ {업체명} AI 비서와 소통 중...
→ {단계} 완료
✅ {최종 결과}
💳 {금액}원 자동 결제 완료
✍️ 쌍방 디지털 서명 완료
📋 PDV #{seq} | {목적} | S0 | {시각}

[AI 비서 없음 — 대안 제시]
🔍 {업체명} AI 비서 탐색...
❌ 해당 업체에 AI 비서가 없어 자동 처리 불가.
📍 추천:
1순위: {업체} ★{평점} | {거리} | 전화: {번호}
2순위: {업체} ★{평점} | {거리} | 전화: {번호}
📋 PDV #{seq} | {목적}(대안제시) | S0

## 위험 등급
S0(정상) / S1(주의) / S2(경고+보류) / S3(긴급차단)

// ── 위치 획득 (GPS 실제 좌표 우선) ──────────────────────────
// 원칙:
//   1순위: GPS 실제 좌표 (navigator.geolocation)
//   2순위: PDV 프로필에 저장된 주소
//   절대 금지: 임의로 도시 추정 ("서울" "역삼동" 등 가정 금지)
let _userLocation = null;   // { lat, lng, address, source }

function _initLocation() {
  if (!navigator.geolocation) {
    _loadLocationFromPDV();
    return;
  }
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      _userLocation = {
        lat:     pos.coords.latitude,
        lng:     pos.coords.longitude,
        accuracy: pos.coords.accuracy,
        source:  'GPS',
        address: null,  // 역지오코딩은 AI가 필요 시 수행
      };
      // CFG.system의 위치 플레이스홀더 갱신
      _updateLocationInPrompt();
      console.log(`[Location] GPS 획득: ${_userLocation.lat.toFixed(4)}, ${_userLocation.lng.toFixed(4)}`);
    },
    (err) => {
      console.warn('[Location] GPS 실패:', err.message);
      _loadLocationFromPDV();
    },
    { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
  );
}

function _loadLocationFromPDV() {
  try {
    const pdvAddr = localStorage.getItem('gopang_profile_address');
    if (pdvAddr) {
      _userLocation = { source: 'PDV', address: pdvAddr, lat: null, lng: null };
      _updateLocationInPrompt();
      console.log('[Location] PDV 주소 사용:', pdvAddr);
    } else {
      // 위치 정보 없음 — 임의 추정 금지
      _userLocation = { source: 'UNKNOWN', address: null, lat: null, lng: null };
      console.warn('[Location] 위치 정보 없음 — GPS 권한을 허용하거나 PDV에 주소를 등록하세요.');
    }
  } catch {}
}

// 위치 확인 후 시스템 프롬프트에 실제 좌표/주소 주입
function _updateLocationInPrompt() {
  if (!_userLocation) return;
  let locStr = '';
  if (_userLocation.source === 'GPS' && _userLocation.lat) {
    locStr = `GPS좌표(${_userLocation.lat.toFixed(5)},${_userLocation.lng.toFixed(5)}) 정확도±${Math.round(_userLocation.accuracy)}m`;
  } else if (_userLocation.source === 'PDV' && _userLocation.address) {
    locStr = `PDV주소:${_userLocation.address}`;
  } else {
    locStr = '위치정보없음(GPS권한허용또는PDV주소등록필요)';
  }
  // 프롬프트에 현재 위치 주입 (AI가 임의 추정하지 않도록)
  CFG.locationStr = locStr;
}

// ── 메시지 전송 ─────────────────────────────────────────
async function sendMessage() {
  const inp  = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text && !attachFile) return;

  const capturedFile = attachFile;   // 전송 전에 캡처 (removeAttach 전)

  // 사용자 버블 — 이미지 첨부 시 미리보기 포함
  if (capturedFile && capturedFile.type.startsWith('image/')) {
    const objUrl = URL.createObjectURL(capturedFile);
    appendBubble('user',
      `${text ? text + '<br>' : ''}<img src="${objUrl}"
        style="max-width:220px;max-height:180px;border-radius:10px;
               margin-top:${text?'6px':'0'};display:block"
        onload="URL.revokeObjectURL(this.src)">`, true);
  } else {
    if (text) appendBubble('user', text);
    if (capturedFile) appendBubble('user', `📎 ${capturedFile.name}`, false);
  }

  history.push({ role: 'user', content: text || `[첨부: ${capturedFile?.name}]` });
  inp.value = '';
  inp.style.height = 'auto';
  updateSendBtn();
  removeAttach();

  if (aiActive) {
    await callAI(text, capturedFile);
  } else {
    _runPipelineBackground(text);
    appendBubble('ai', '🔵 AI 버튼을 눌러 AI 비서를 활성화하세요.');
  }
}

// ── 고팡 파이프라인 백그라운드 실행 ─────────────────────
// 대화 중 결과를 표시하지 않음 — 사용자 요청 시 showRiskAnalysis() 호출
let _lastPipelineResult = null;

async function _runPipelineBackground(text) {
  try {
    const { runPipeline } = await import('./src/ai-secretary/pipeline.js');
    const result = await runPipeline(
      { content: text, senderId: 'user', attachment: attachFile ?? null },
      {}
    );
    _lastPipelineResult = result;

    // OpenHash ref는 상태 바에만 조용히 업데이트
    if (result?.anchorHash) {
      const el = document.getElementById('hash-ref');
      if (el) el.textContent = result.anchorHash.slice(0, 8) + '…';
    }

    // S3 감지 시 즉시 경고 (위험 등급 S3만 예외적으로 즉시 표시)
    if (result?.riskResult?.level === 'S3') {
      const chip = riskChip('S3', result.riskResult.legalFlags ?? []);
      appendBubble('ai',
        `🛑 위험 감지 — 즉시 확인이 필요합니다. ${chip}`, true);
    }
  } catch (e) {
    // 파이프라인 오류는 콘솔에만 기록, 사용자에게 표시하지 않음
    console.warn('[Pipeline]', e.message);
  }
}

// 사용자 요청 시 분석 결과 표시 (예: "분석 결과 보여줘")
function showRiskAnalysis() {
  if (!_lastPipelineResult) {
    appendBubble('ai', '분석된 메시지가 없습니다.');
    return;
  }
  const r   = _lastPipelineResult.riskResult;
  const chip = riskChip(r?.level ?? 'S0', r?.legalFlags ?? []);
  appendBubble('ai',
    `분석 완료 ${chip}${r?.legalFlags?.length ? '<br>' + r.legalFlags.join(' · ') : ''}`,
    true);
}

// ── DeepSeek API 호출 ───────────────────────────────────
// ── 모델별 비전 지원 여부 ────────────────────────────────
const VISION_MODELS = new Set([
  'deepseek-v4', 'gpt-4o', 'gpt-4o-mini',
  'claude-sonnet-4-20250514', 'claude-opus-4-20250514',
  'gemini-2.0-flash', 'gemini-1.5-pro',
]);
function _modelSupportsVision(model) {
  return VISION_MODELS.has(model);
}

// 이미지 File → base64 data URL 변환
function _fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result);   // "data:image/jpeg;base64,..."
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function callAI(userText, imageFile = null) {
  showTyping();

  // ── 위치 주입 ─────────────────────────────────────────
  const locNote = _userLocation
    ? `\n\n[현재 위치 — 반드시 이 정보만 사용할 것, 임의로 다른 도시 추정 절대 금지]\n` +
      (_userLocation.source === 'GPS' && _userLocation.lat
        ? `GPS좌표: ${_userLocation.lat.toFixed(5)}, ${_userLocation.lng.toFixed(5)} (정확도 ±${Math.round(_userLocation.accuracy||0)}m)`
        : _userLocation.source === 'PDV' && _userLocation.address
          ? `PDV등록주소: ${_userLocation.address}`
          : `위치정보 없음 — 임의 추정 절대 금지.`)
    : `\n\n[위치 정보 없음 — GPS 권한 미허용. 임의 추정 절대 금지.]`;

  // ── 이미지 → content 배열 변환 ──────────────────────
  let userContent;

  if (imageFile && imageFile.type.startsWith('image/')) {
    if (!_modelSupportsVision(CFG.model)) {
      // 비전 미지원 모델 — 이미지 무시, 사용자에게 안내
      hideTyping();
      appendBubble('ai',
        `⚠️ 현재 모델(${CFG.model})은 이미지를 지원하지 않습니다.\n` +
        `설정에서 "DeepSeek V4" 또는 "GPT-4o"로 변경하세요.`);
      if (userText) {
        // 텍스트만이라도 처리
        showTyping();
      } else {
        return;
      }
      userContent = userText;
    } else {
      // 비전 지원 모델 — base64 변환 후 multipart content
      try {
        const dataUrl  = await _fileToBase64(imageFile);
        const mimeType = imageFile.type;          // "image/jpeg" 등
        const base64   = dataUrl.split(',')[1];   // base64 부분만

        userContent = [];
        if (userText) {
          userContent.push({ type: 'text', text: userText });
        }
        userContent.push({
          type: 'image_url',
          image_url: {
            url:    `data:${mimeType};base64,${base64}`,
            detail: 'high',   // 'auto' | 'low' | 'high'
          },
        });
        if (!userText) {
          userContent.push({ type: 'text', text: '이 이미지를 분석해 주세요.' });
        }
      } catch (e) {
        hideTyping();
        appendBubble('ai', `⚠️ 이미지 변환 오류: ${e.message}`);
        return;
      }
    }
  } else {
    // 일반 텍스트
    userContent = userText;
  }

  // ── 메시지 구성 ───────────────────────────────────────
  const messages = [
    { role: 'system', content: CFG.system + locNote },
    ...history.slice(-18),   // 최근 이력 (이미지 포함 시 토큰 절약)
    { role: 'user', content: userContent },
  ];

  // ── 엔드포인트 결정 ───────────────────────────────────
  const baseUrl = document.getElementById('setting-endpoint')?.value === 'custom'
    ? document.getElementById('custom-endpoint-url')?.value || CFG.endpoint
    : CFG.endpoint;

  try {
    const res = await fetch(`${baseUrl}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': `Bearer ${CFG.apiKey}`,
      },
      body: JSON.stringify({
        model:       CFG.model,
        messages,
        max_tokens:  2048,
        temperature: 0.7,
        stream:      false,
      }),
    });

    if (!res.ok) {
      const errBody = await res.text().catch(() => '');
      throw new Error(`API ${res.status}${errBody ? ': ' + errBody.slice(0,120) : ''}`);
    }
    const data  = await res.json();
    const reply = data.choices?.[0]?.message?.content ?? '응답 없음';

    hideTyping();
    history.push({ role: 'assistant', content: reply });
    appendBubble('ai', reply);

  } catch (err) {
    hideTyping();
    appendBubble('ai', `⚠️ API 오류: ${err.message}`);
    console.error('[AI]', err);
  }
}

// ── 버블 렌더링 ─────────────────────────────────────────
function appendBubble(role, text, isHTML = false) {
  const list = document.getElementById('message-list');
  const row  = document.createElement('div');
  row.className = `msg-row ${role}`;

  const bubble = document.createElement('div');
  bubble.className = `bubble bubble-${role}`;
  if (isHTML) bubble.innerHTML = text;
  else        bubble.textContent = text;

  row.appendChild(bubble);
  list.appendChild(row);
  list.scrollTop = list.scrollHeight;
}

function riskChip(level, flags) {
  const map = { S0:'✅ 안전', S1:'⚠️ 주의', S2:'🚨 경고', S3:'🛑 차단' };
  const cls = level.toLowerCase();
  const label = map[level] ?? '—';
  const flagStr = flags.length ? ` · ${flags.slice(0,3).join(' ')}` : '';
  return `<span class="risk-chip ${cls}">${label}${flagStr}</span>`;
}

let typingEl = null;
function showTyping() {
  const list = document.getElementById('message-list');
  typingEl = document.createElement('div');
  typingEl.className = 'msg-row ai';
  typingEl.id = 'typing-row';
  typingEl.innerHTML = `<div class="typing-indicator">
    <span></span><span></span><span></span>
  </div>`;
  list.appendChild(typingEl);
  list.scrollTop = list.scrollHeight;
}
function hideTyping() {
  document.getElementById('typing-row')?.remove();
  typingEl = null;
}

function toggleAI() {

    document.getElementById('btn-ai').classList.remove('active');
    return;
  }
  // 미활성 → 카드 열기

}
// silent=true : 버튼 클릭이 아닌 자동 활성화 (메시지 미표시)
// silent=false: 버튼 클릭으로 활성화 (안내 메시지 표시)

  if (aiActive) return;   // 이미 활성 상태면 무시
  aiActive = true;
  document.getElementById('btn-ai').classList.add('active');

    appendBubble('ai', '귀하의 AI 비서입니다. 지시하십시오.');
  }
}

function openSettings() {
  // 현재 값 반영
  document.getElementById('setting-apikey').value  = CFG.apiKey;
  document.getElementById('setting-system').value  = CFG.system;
  const modelSel = document.getElementById('setting-model');
  if (modelSel) modelSel.value = CFG.model;
  const epSel = document.getElementById('setting-endpoint');
  if (epSel) epSel.value = CFG.endpoint;
  document.getElementById('settings-overlay').classList.add('open');
}
function handleOverlayClick(e) {
  if (e.target.id === 'settings-overlay') closeSettings();
}
function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}
function saveSettings() {
  const model = document.getElementById('setting-model').value;
  const epVal = document.getElementById('setting-endpoint').value;
  const key   = document.getElementById('setting-apikey').value.trim();
  const sys   = document.getElementById('setting-system').value.trim();

  if (model) CFG.model    = model;
  if (key)   CFG.apiKey   = key;
  if (sys)   CFG.system   = sys;

  if (epVal === 'custom') {
    const customUrl = document.getElementById('custom-endpoint-url').value.trim();
    if (customUrl) CFG.endpoint = customUrl;
  } else {
    CFG.endpoint = epVal;
  }

  // 로컬 저장 (API key 제외)
  try {
    localStorage.setItem('gopang_cfg', JSON.stringify({
      model: CFG.model, endpoint: CFG.endpoint, system: CFG.system
    }));
  } catch {}

  closeSettings();
  appendBubble('ai', `⚙️ 설정 저장: ${CFG.model}`);
}
function loadSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem('gopang_cfg') || '{}');
    if (saved.model)    CFG.model    = saved.model;
    if (saved.endpoint) CFG.endpoint = saved.endpoint;
    if (saved.system)   CFG.system   = saved.system;
  } catch {}
}

function runSearch() {
  const q = document.getElementById('search-input').value.trim();
  const resultEl = document.getElementById('search-result');
  if (!q) {
    resultEl.innerHTML = '';
    return;
  }

  // ── 1. 대화 상대 검색 (대화 이력 기반) ────────────────
  const contactMatches = _searchContacts(q);

  // ── 2. PDV 데이터 검색 (localStorage 기반) ─────────────
  const pdvMatches = _searchPDV(q);

  // ── 결과 렌더링 ────────────────────────────────────────
  let html = '';

  if (contactMatches.length > 0) {
    html += `<div style="font-size:11px;font-weight:600;color:var(--label-3);
                          letter-spacing:0.05em;text-transform:uppercase;
                          margin-bottom:6px">👤 대화 상대</div>`;
    contactMatches.forEach(c => {
      html += `<div style="padding:8px 10px;border-radius:var(--r-md);
                            background:var(--bg-input);margin-bottom:6px;
                            font-size:14px;cursor:pointer"
                   onclick="selectContact('${c.id}')">
                 <span style="color:var(--label)">${_highlight(c.name, q)}</span>
                 <span style="color:var(--label-3);font-size:12px;margin-left:8px">
                   ${c.guid ? c.guid.slice(0,8)+'…' : ''}
                 </span>
               </div>`;
    });
  }

  if (pdvMatches.length > 0) {
    html += `<div style="font-size:11px;font-weight:600;color:var(--label-3);
                          letter-spacing:0.05em;text-transform:uppercase;
                          margin:${contactMatches.length?'12px':0} 0 6px">
               🔐 PDV 데이터
             </div>`;
    pdvMatches.forEach(p => {
      html += `<div style="padding:8px 10px;border-radius:var(--r-md);
                            background:var(--bg-input);margin-bottom:6px;font-size:13px">
                 <span style="color:var(--label-2)">${_highlight(p.key, q)}</span>
                 <span style="color:var(--label-3);font-size:11px;margin-left:6px">
                   ${p.date}
                 </span>
               </div>`;
    });
  }

  if (!html) {
    html = `<div style="color:var(--label-3);font-size:13px;text-align:center;
                         padding:20px 0">
              검색 결과 없음
              <div style="font-size:11px;margin-top:6px">
                웹 검색은 AI 비서에게 직접 지시하세요.
              </div>
            </div>`;
  }

  resultEl.innerHTML = html;
}

// 대화 상대 검색 — history 기반 + localStorage 연락처
function _searchContacts(q) {
  const results = [];
  const seen = new Set();
  const lq = q.toLowerCase();

  // 현재 대화 이력에서 AI 이외 발신자 추출
  history.forEach(m => {
    if (m.role === 'assistant') return;
    // 향후 다자간 대화 시 senderId로 분류
  });

  // localStorage 저장된 연락처 검색
  try {
    const contacts = JSON.parse(localStorage.getItem('gopang_contacts') || '[]');
    contacts.forEach(c => {
      if (!seen.has(c.id) &&
          (c.name?.toLowerCase().includes(lq) ||
           c.guid?.toLowerCase().includes(lq))) {
        seen.add(c.id);
        results.push(c);
      }
    });
  } catch {}

  return results;
}

// PDV 데이터 검색 — localStorage 키 기반
function _searchPDV(q) {
  const results = [];
  const lq = q.toLowerCase();
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (!key.startsWith('gopang_')) continue;
      if (key === 'gopang_user_guid' || key === 'gopang_cfg' ||
          key === 'gopang_contacts') continue;
      if (key.toLowerCase().includes(lq)) {
        const val = localStorage.getItem(key);
        let date = '';
        try { date = JSON.parse(val)?.ts ?? ''; } catch {}
        results.push({ key: key.replace('gopang_',''), date });
      }
    }
  } catch {}
  return results.slice(0, 10);
}

// 검색어 강조
function _highlight(text, q) {
  if (!text) return '';
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re,
    '<span style="color:var(--tint);font-weight:600">$1</span>');
}

// 연락처 선택 시 채팅으로 이동
function selectContact(id) {
  closeSearch();
  // 향후: 해당 연락처와의 대화 스레드로 전환
  console.log('[Search] 연락처 선택:', id);
}

// ── GUID 상태 스트립 표시 ────────────────────────────────
function showGUID() {
  const el = document.getElementById('status-text');
  if (el) el.title = `GUID: ${USER_GUID}`;
}

// ── 파일 첨부 ───────────────────────────────────────────
function triggerAttach() {
  document.getElementById('file-input').click();
}
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  attachFile = file;

  const nameEl    = document.getElementById('attach-name');
  const previewEl = document.getElementById('attach-preview');

  if (file.type.startsWith('image/')) {
    // 이미지 — 썸네일 + 파일명 표시
    const objUrl = URL.createObjectURL(file);
    nameEl.innerHTML =
      `<img src="${objUrl}" style="height:32px;width:32px;object-fit:cover;
        border-radius:6px;margin-right:4px;vertical-align:middle"
        onload="URL.revokeObjectURL(this.src)">
       <span>${file.name}</span>`;

    // 비전 미지원 모델 경고
    if (!_modelSupportsVision(CFG.model)) {
      nameEl.innerHTML +=
        `<span style="color:var(--orange);font-size:11px;margin-left:6px">
          ⚠️ 현재 모델은 이미지 미지원 — 설정에서 DeepSeek V4로 변경
        </span>`;
    }
  } else {
    // 일반 파일
    nameEl.innerHTML = `<span>📎 ${file.name}</span>`;
  }

  previewEl.style.display = 'flex';
  e.target.value = '';
}

function removeAttach() {
  attachFile = null;
  document.getElementById('attach-preview').style.display = 'none';
  document.getElementById('attach-name').innerHTML = '';
}

// ── 마이크 (Web Speech API) ─────────────────────────────
function toggleMic() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    appendBubble('ai', '이 브라우저는 음성 입력을 지원하지 않습니다.');
    return;
  }

  if (micActive) {
    recognition?.stop();
    micActive = false;
    document.getElementById('btn-mic').style.color = '';
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'ko-KR';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript;
    document.getElementById('msg-input').value = t;
    autoResize(document.getElementById('msg-input'));
    updateSendBtn();
    micActive = false;
    document.getElementById('btn-mic').style.color = '';
  };
  recognition.onerror = () => {
    micActive = false;
    document.getElementById('btn-mic').style.color = '';
  };
  recognition.onend = () => { micActive = false; };

  recognition.start();
  micActive = true;
  document.getElementById('btn-mic').style.color = 'var(--red)';
}
</script>
