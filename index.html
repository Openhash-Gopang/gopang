<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혼디 (Hondi)</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #ffffff;
    font-family: -apple-system, 'Noto Sans KR', sans-serif;
  }
</style>
<script>
  /* ── 기기 판별 후 즉시 리다이렉트 (중간 로딩 화면 없음) ──────────
     이전 버전은 "G" 로딩 화면을 잠깐 보여줬는데,
     PWA 캐시와 겹쳐 깨진 로고가 0.1초 노출되는 문제가 있었다.
     이제는 JS를 <head>에서 동기 실행해 화면을 그리기 전에 이동한다.
  ─────────────────────────────────────────────────────────────── */
  (function () {
    var ua = navigator.userAgent || '';
    var isMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
    var isNarrow   = window.innerWidth <= 768;
    var isTouch    = (navigator.maxTouchPoints > 1) && !window.matchMedia('(pointer:fine)').matches;
    var isMobile   = isMobileUA || (isNarrow && isTouch);

    var params     = new URLSearchParams(window.location.search);
    var forceView  = params.get('view');
    if (forceView === 'mobile')  isMobile = true;
    if (forceView === 'desktop') isMobile = false;

    var target = isMobile ? 'webapp.html' : 'desktop.html';
    var qs     = window.location.search;
    var hash   = window.location.hash;

    if (forceView) {
      var sp = new URLSearchParams(qs);
      sp.delete('view');
      qs = sp.toString() ? '?' + sp.toString() : '';
    }

    window.location.replace(target + qs + hash);
  })();
</script>
</head>
<body>
<!-- 스크립트가 <head>에서 동기 실행되므로 이 body는 정상적으로 렌더되지 않습니다.
     JS가 비활성화된 극히 드문 경우를 위한 폴백 안내입니다. -->
<noscript>
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:15px;color:#555;text-align:center;padding:24px;">
    JavaScript를 활성화한 후 페이지를 새로고침해 주세요.<br>
    혼디는 JavaScript가 필요합니다.
  </div>
</noscript>
</body>
</html>
