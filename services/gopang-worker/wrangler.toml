# ── Durable Objects ──────────────────────────────────────────
[[durable_objects.bindings]]
name = "ESCROW_SIGNER"
class_name = "EscrowSigner"

[[durable_objects.bindings]]
name = "LEDGER_WRITER"
class_name = "LedgerWriter"

[[migrations]]
tag = "v1"
# [2026-07-21 수정] Cloudflare가 최근 정책을 바꿔 신규 Durable Object
# 네임스페이스는 new_classes(구 key-value 백엔드)로 생성 불가 —
# new_sqlite_classes(SQLite 백엔드)만 허용됨(code 10097). 실제 배포 시도
# 중 발견. 기능은 key-value 백엔드와 동일(SQL 쿼리는 추가 옵션일 뿐 필수
# 아님)하므로 EscrowSigner/LedgerWriter 로직 변경 불필요.
new_sqlite_classes = ["EscrowSigner", "LedgerWriter"]

# ── 크론 트리거 ────────────────────────────────────────────
[triggers]
crons = [
  "0 * * * *",   # 매시 정각 — 원장 앵커링
  "0 18 * * *",  # 매일 03:00 KST — 무결성감사/에스크로자동릴리즈/리뷰이상탐지
]

# ── Secrets (wrangler secret put <NAME> 로 별도 등록, 이 파일엔 값 없음) ──
# L1_ADMIN_EMAIL, L1_ADMIN_PASSWORD
# ESCROW_PRIVATE_KEY, ESCROW_PUBLIC_KEY
# TOSS_CLIENT_KEY, TOSS_SECRET_KEY, TOSS_WEBHOOK_SECRET
# PUSH_GATEWAY_URL
# NTS_SERVICE_KEY        (1번: 국세청 사업자등록정보 API 서비스키)
# KAKAO_REST_KEY         (선행종속 B절: 카카오 주소검색 API)
# APP_BASE_URL           (8번: PG 결제 성공/실패 리다이렉트 base)
# LEDGER_WRITE_SECRET    (2026-07-21 신설: /internal/ledger-entries 인증용 공유
#                         시크릿. hondi-proxy PocketBase 서버들의 OS 환경변수
#                         LEDGER_WRITE_SECRET과 반드시 동일한 값이어야 함 —
#                         README "원장 통합" 절 참조)
