name = "market-proxy"
main = "src/index.js"
compatibility_date = "2026-07-01"

# ── KV 네임스페이스 (2026-07-21 wrangler kv namespace create 실행 결과로 채움) ──
[[kv_namespaces]]
binding = "L1_REGISTRY_KV"
id = "2b2cb21a53d34db5841b20ccd022f601"

[[kv_namespaces]]
binding = "PENDING_REGION_KV"
id = "780dea8f38da43659bc1c5c5608b814e"

[[kv_namespaces]]
binding = "OPS_ALERTS_KV"
id = "245ea108426f45a08860291e45f878f4"

[[kv_namespaces]]
binding = "SHARED_ATTR_INDEX"
id = "0a5107a78c4e4fbb8723111f1e781f14"

[[kv_namespaces]]
binding = "REWARD_COUNTER_KV"
id = "8fae71b2b1674c86b1a4d098f192c36e"

[[kv_namespaces]]
binding = "PUSH_SUBSCRIPTIONS_KV"
id = "afb81fe8eaee440098688d50057b9c25"

[[kv_namespaces]]
binding = "CONFIG_KV"
id = "6e8c77fb2f1143f6ac1aa17e7cd491bf"

[[kv_namespaces]]
