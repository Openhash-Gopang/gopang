<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로필 등록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap">
<script src="/gopang-wallet.js?v=20260624"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#f5f5f5;color:#111;
  display:flex;flex-direction:column;min-height:100dvh}

/* ── 상단 바 ── */
.topbar{background:#4B7BE5;padding:calc(env(safe-area-inset-top,0px)+12px) 16px 0;
  display:flex;align-items:center;gap:10px;flex-shrink:0}
.back-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#fff;flex-shrink:0;font-size:20px;text-decoration:none}
.topbar-title{font-size:17px;font-weight:600;color:#fff;flex:1}
.topbar-mode{font-size:12px;color:rgba(255,255,255,.7);font-weight:400}

/* ── 진행 바 ── */
.progress-wrap{background:#4B7BE5;padding:10px 16px 18px;flex-shrink:0}
.progress-bar{height:4px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#fff;border-radius:2px;width:0%;transition:width .4s ease}

/* ── 스크롤 본문 ── */
.scroll-body{flex:1;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom,0px)+20px);
  scrollbar-width:none}
.scroll-body::-webkit-scrollbar{display:none}

/* ── 섹션 ── */
.section{background:#fff;margin-bottom:8px;padding:16px}
.section-flat{background:#fff;margin-bottom:8px}

/* ── 이름 필드 ── */
.name-input{width:100%;border:none;outline:none;font-size:22px;font-weight:600;
  color:#111;font-family:inherit;background:transparent;
  padding:4px 0;border-bottom:2px solid #1A73E8}
.name-input::placeholder{color:#c7c7cc;font-weight:400}

/* ── 퀵 액션 ── */
.qa-row{display:flex;justify-content:space-around;padding:14px 8px 10px;gap:4px}
.qa-item{display:flex;flex-direction:column;align-items:center;gap:6px;
  background:none;border:none;cursor:pointer;font-family:inherit;flex:1;padding:0}
.qa-circle{width:46px;height:46px;border-radius:50%;background:#EEF4FF;
  display:flex;align-items:center;justify-content:center;color:#1A73E8;font-size:18px;
  transition:transform .12s}
.qa-circle.primary{background:#1A73E8;color:#fff}
.qa-item:active .qa-circle{transform:scale(.92)}
.qa-label{font-size:11px;color:#374151;text-align:center;line-height:1.3;white-space:nowrap}

/* ── 아바타 프리뷰 ── */
.avatar-preview{width:72px;height:72px;border-radius:50%;background:#1A73E8;
  display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;
  color:#fff;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.15);
  margin:0 auto 12px;overflow:hidden;cursor:pointer;flex-shrink:0}
.avatar-preview img{width:100%;height:100%;object-fit:cover}

/* ── 정보 행 ── */
.info-row{display:flex;align-items:center;gap:12px;padding:13px 16px;
  border-bottom:.5px solid #f5f5f5}
.info-row:last-child{border-bottom:none}
.info-icon{color:#1A73E8;flex-shrink:0;font-size:19px;display:flex;align-items:center}
.info-input{flex:1;border:none;outline:none;font-size:15px;color:#111;
  font-family:inherit;background:transparent;min-width:0}
.info-input::placeholder{color:#9ca3af}
.info-btn{width:28px;height:28px;border-radius:8px;background:none;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;color:#c7c7cc;transition:color .15s}
.info-btn.blue{color:#1A73E8}
.info-btn.green{color:#22c55e}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .8s linear infinite}

/* ── 위치 상태 ── */
.loc-status{display:none;align-items:center;gap:6px;margin:0 16px 8px;
  padding:7px 10px;border-radius:8px;font-size:12px}
.loc-status.show{display:flex}
.loc-status.searching{background:#EEF4FF;color:#1557B0}
.loc-status.found{background:#f0fdf4;color:#166534}
.loc-status.error{background:#fef2f2;color:#991b1b}
.loc-status-icon{font-size:13px;flex-shrink:0}

/* ── 커스텀 필드 ── */
.custom-field{background:#fff;border-bottom:.5px solid #f5f5f5;position:relative}
.custom-header{display:flex;align-items:center;gap:10px;padding:11px 16px 0}
.custom-icon{font-size:17px;color:#1A73E8;flex-shrink:0}
.custom-name-inp{flex:1;border:none;outline:none;font-size:13px;font-weight:600;
  color:#9ca3af;font-family:inherit;background:transparent;
  text-transform:uppercase;letter-spacing:.04em}
.custom-name-inp::placeholder{color:#c7c7cc;font-weight:400;text-transform:none;letter-spacing:0}
.custom-del{width:26px;height:26px;border-radius:50%;background:none;border:none;
  cursor:pointer;color:#c7c7cc;display:flex;align-items:center;justify-content:center;font-size:15px}
.custom-value-row{display:flex;align-items:center;gap:8px;padding:6px 16px 11px}
.custom-val-inp{flex:1;border:none;outline:none;font-size:15px;color:#111;
  font-family:inherit;background:transparent}
.custom-val-inp::placeholder{color:#9ca3af}
.custom-attach{width:28px;height:28px;border-radius:8px;background:none;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#c7c7cc;font-size:16px;flex-shrink:0}
.ai-chip{display:inline-flex;align-items:center;gap:3px;
  margin:0 16px 10px;padding:3px 9px;border-radius:20px;
  font-size:11px;font-weight:500;color:#1557B0;background:#EEF4FF}
.ai-chip-icon{font-size:11px}

/* ── 필드 추가 버튼 ── */
.add-row{display:flex;align-items:center;gap:12px;padding:13px 16px;
  cursor:pointer;background:#fff;border:none;width:100%;font-family:inherit;
  border-top:.5px solid #f5f5f5}
.add-row-icon{font-size:19px;color:#1A73E8}
.add-row-label{font-size:15px;color:#1A73E8;font-weight:500}

/* ── 누락 정보 ── */
.missing-section{background:#fff;margin-bottom:8px}
.missing-head{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 8px}
.missing-head-title{font-size:15px;font-weight:600;color:#111}
.missing-row{display:flex;align-items:center;gap:14px;padding:10px 16px;
  border-top:.5px solid #f5f5f5;cursor:pointer;background:none;
  border-right:none;border-left:none;border-bottom:none;
  width:100%;font-family:inherit;text-align:left}
.missing-icon{font-size:18px;color:#1A73E8}
.missing-label{font-size:15px;color:#111}

/* ── 제출 영역 ── */
.submit-wrap{padding:4px 16px 8px;background:#fff;margin-bottom:8px}
.submit-btn{width:100%;padding:14px;background:#1A73E8;color:#fff;border:none;
  border-radius:12px;font-size:16px;font-weight:600;font-family:inherit;
  cursor:pointer;margin-top:12px;transition:opacity .15s}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.submit-note{font-size:12px;color:#9ca3af;text-align:center;
  margin-top:8px;line-height:1.6;padding-bottom:4px}

/* ── AI 분류 로딩 오버레이 ── */
.ai-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.ai-overlay.show{display:flex}
.ai-spinner-box{background:#fff;border-radius:20px;padding:28px 32px;
  text-align:center;min-width:220px}
.ai-spinner{width:40px;height:40px;border:3px solid #EEF4FF;
  border-top-color:#1A73E8;border-radius:50%;animation:spin .8s linear infinite;
  margin:0 auto 14px}
.ai-status-msg{font-size:14px;color:#374151;font-weight:500}
.ai-status-sub{font-size:12px;color:#9ca3af;margin-top:4px}

/* ── 토스트 ── */
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+20px);
  left:50%;transform:translateX(-50%) translateY(10px);
  background:#111;color:#fff;border-radius:10px;
  padding:10px 18px;font-size:13px;font-weight:500;
  z-index:1000;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.hidden{display:none!important}
</style>
</head>
<body>

<!-- 상단 바 -->
<div class="topbar">
  <a href="javascript:history.back()" class="back-btn" aria-label="뒤로">&#8592;</a>
  <span class="topbar-title" id="pageTitle">프로필 등록</span>
</div>
<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<!-- 스크롤 본문 -->
<div class="scroll-body">

  <!-- 아바타 + 이름 -->
  <div class="section" style="text-align:center;padding:20px 16px 16px">
    <div class="avatar-preview" id="avatarPreview" onclick="document.getElementById('avatarFileInput').click()">
      <span id="avatarLetter">?</span>
    </div>
    <input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="handleAvatarFile(this)">
    <input class="name-input" id="nameInput" type="text" placeholder="이름 또는 상호" oninput="onNameInput(this.value)">
  </div>

  <!-- 퀵 액션 -->
  <div class="section-flat">
    <div class="qa-row">
      <button class="qa-item" onclick="document.getElementById('avatarFileInput').click()">
        <span class="qa-circle"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#1A73E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></span>
        <span class="qa-label">사진 추가</span>
      </button>
      <button class="qa-item" onclick="triggerMedia('sound')">
        <span class="qa-circle"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#1A73E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></span>
        <span class="qa-label">사운드</span>
      </button>
      <button class="qa-item" id="qrBtn" onclick="showQR()">
        <span class="qa-circle"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#1A73E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><line x1="14" y1="14" x2="21" y2="14"/><line x1="14" y1="21" x2="21" y2="21"/><line x1="17.5" y1="14" x2="17.5" y2="21"/></svg></span>
        <span class="qa-label">혼디코드</span>
      </button>
      <button class="qa-item" onclick="shareProfile()">
        <span class="qa-circle"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#1A73E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></span>
        <span class="qa-label">공유</span>
      </button>
    </div>
    <input type="file" id="soundInput" accept="audio/*" style="display:none" onchange="handleMediaFile(this,'sound')">
  </div>

  <!-- 기본 필드: 위치 + 전화 -->
  <div class="section-flat" id="baseFieldsWrap">

    <!-- 위치 행 -->
    <div class="info-row">
      <span class="info-icon"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#1A73E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span>
      <input class="info-input" id="locationInput" type="text" placeholder="주소 또는 위치">
      <button class="info-btn blue" id="locBtn" onclick="autoLocation()" aria-label="현재 위치 자동 검색" title="현재 위치">
        <span id="locBtnIcon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1A73E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg></span>
      </button>
      <button class="info-btn" onclick="document.getElementById('locFileInput').click()" aria-label="파일 첨부"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
      <input type="file" id="locFileInput" style="display:none" onchange="handleMediaFile(this,'file')">
    </div>
    <div class="loc-status" id="locStatus">
      <span class="loc-status-icon" id="locStatusIcon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1A73E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg></span>
      <span id="locStatusText">위치를 확인하는 중...</span>
    </div>

    <!-- 전화 행 -->
    <div class="info-row">
      <span class="info-icon"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#1A73E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 14a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 3.27h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L7.91 10a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span>
      <input class="info-input" id="phoneInput" type="tel" placeholder="전화번호">
      <button class="info-btn" onclick="document.getElementById('phoneFileInput').click()" aria-label="파일 첨부"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
      <input type="file" id="phoneFileInput" style="display:none" onchange="handleMediaFile(this,'file')">
    </div>

    <!-- 커스텀 필드 목록 -->
    <div id="customFields"></div>

    <!-- 필드 추가 버튼 -->
    <button class="add-row" onclick="addCustomField()">
      <span class="add-row-icon"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#1A73E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></span>
      <span class="add-row-label">필드 추가</span>
    </button>
  </div>

  <!-- 누락된 정보 추가 -->
  <div class="missing-section" id="missingSection">
    <div class="missing-head">
      <span class="missing-head-title">누락된 정보 추가</span>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#c7c7cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <div id="missingRows"></div>
  </div>

  <!-- 제출 -->
  <div class="submit-wrap">
    <button class="submit-btn" id="submitBtn" onclick="submitProfile()">완료</button>
    <div class="submit-note" id="submitNote">
      AI가 내용을 분석하여 유형과 분류를 자동으로 결정합니다
    </div>
  </div>

</div>

<!-- AI 분류 오버레이 -->
<div class="ai-overlay" id="aiOverlay">
  <div class="ai-spinner-box">
    <div class="ai-spinner"></div>
    <div class="ai-status-msg" id="aiStatusMsg">AI가 분석 중입니다</div>
    <div class="ai-status-sub" id="aiStatusSub">잠시만 기다려 주세요...</div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
const PROXY    = 'https://hondi-proxy.tensor-city.workers.dev';
const IS_EDIT  = new URLSearchParams(location.search).get('edit') === '1';
const _stored  = (() => { try { return JSON.parse(localStorage.getItem('gopang_user_v4') || 'null'); } catch { return null; } })();
const _handle  = (_stored?.handle || '').replace(/^@/, '');
const _guid    = _stored?.ipv6 || '';

let _existingProfile = null;
let _avatarDataURL   = null;
let _soundDataURL    = null;
let _mediaAttachments = {};

// ── 초기화 ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  if (IS_EDIT) {
    document.getElementById('pageTitle').textContent = '프로필 수정';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('submitBtn').textContent = '완료';
    document.getElementById('submitNote').textContent = 'AI가 변경된 내용을 재분류합니다';
    await loadExistingProfile();
  } else {
    setProgress(15);
  }
  renderMissingRows();
});

// ── 기존 프로필 로드 (수정 모드) ──────────────────────────
async function loadExistingProfile() {
  if (!_handle) { showToast('로그인이 필요합니다'); return; }
  setAIStatus('기존 프로필을 불러오는 중...', '');
  document.getElementById('aiOverlay').classList.add('show');
  try {
    const res  = await fetch(`${PROXY}/profile/@${_handle}`);
    const data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || '프로필 로드 실패');
    _existingProfile = data.profile;
    fillForm(_existingProfile);
  } catch(e) {
    showToast('프로필 로드 실패: ' + e.message);
  } finally {
    document.getElementById('aiOverlay').classList.remove('show');
  }
}

// ── 폼 채우기 (수정 모드) ────────────────────────────────
function fillForm(p) {
  const pub   = p.extra?.public || {};
  const ident = pub.identity  || {};
  const cont  = pub.contact   || {};
  const loc   = pub.location  || {};

  document.getElementById('nameInput').value = p.name || '';
  onNameInput(p.name || '');

  const phone = cont.phone_display || p.phone || '';
  document.getElementById('phoneInput').value = phone;

  const address = loc.address_short || p.address || '';
  document.getElementById('locationInput').value = address;

  const desc = ident.description || p.description || '';
  if (desc) addCustomField('소개', desc, 'text');

  const website = cont.website || p.website || '';
  if (website) addCustomField('웹사이트', website, 'url');

  const tags = (ident.tags || p.search_tags || p.tags || []).join(', ');
  if (tags) addCustomField('태그', tags, 'text');

  const cf = p.custom_fields || [];
  cf.filter(f => f.public).forEach(f => addCustomField(f.key, f.value, 'text'));

  renderMissingRows();
}

// ── 이름 입력 → 아바타 이니셜 + 진행 바 ──────────────────
function onNameInput(v) {
  const letter = (v || '?')[0];
  document.getElementById('avatarLetter').textContent = letter;
  if (!IS_EDIT) setProgress(v.trim() ? 40 : 15);
  renderMissingRows();
}

function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct + '%';
}

// ── 아바타 파일 ──────────────────────────────────────────
function handleAvatarFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    _avatarDataURL = e.target.result;
    const prev = document.getElementById('avatarPreview');
    prev.innerHTML = `<img src="${_avatarDataURL}" alt="아바타">`;
    _mediaAttachments.avatar = { dataURL: _avatarDataURL, type: 'image', name: file.name };
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function handleMediaFile(input, type) {

// ── 현재 위치 자동 검색 ───────────────────────────────────
function autoLocation() {
  if (!navigator.geolocation) { setLocStatus('error', 'alert', '위치 기능을 지원하지 않는 브라우저입니다'); return; }
  const btn  = document.getElementById('locBtn');
  const icon = document.getElementById('locBtnIcon');
  btn.style.color = '#9ca3af';
  icon.style.animation = 'spin .8s linear infinite';
  icon.style.display = 'inline-block';
  setLocStatus('searching', 'spin', '위치를 확인하는 중...');

  navigator.geolocation.getCurrentPosition(async pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    setLocStatus('searching', 'spin', '주소를 변환하는 중...');
    try {
      const res  = await fetch(`${PROXY}/geocode?lat=${lat}&lng=${lng}`);
      const data = await res.json();
      const doc  = data?.documents?.[0];
      const addr = doc?.road_address?.address_name
                || doc?.address?.address_name
                || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      document.getElementById('locationInput').value = addr;
      btn.classList.add('green'); btn.classList.remove('blue');
      icon.innerHTML = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><polyline points="9 10 12 13 15 10"/></svg>`; icon.style.animation = '';
      setLocStatus('found', 'ok', '위치가 자동으로 입력됐습니다');
      setTimeout(() => hideLocStatus(), 3500);
      if (!IS_EDIT) setProgress(60);
      renderMissingRows();
    } catch {
      const coords = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      document.getElementById('locationInput').value = coords;
      icon.innerHTML = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><polyline points="9 10 12 13 15 10"/></svg>`; icon.style.animation = '';
      setLocStatus('found', 'ok', '좌표로 입력됐습니다. 직접 수정하셔도 됩니다');
      setTimeout(() => hideLocStatus(), 5000);
    }
  }, err => {
    icon.style.animation = '';
    icon.innerHTML = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1A73E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>`;
    btn.classList.remove('green'); btn.classList.add('blue');
    const msg = err.code === 1 ? '위치 권한이 차단됐습니다. 브라우저 설정에서 허용해 주세요'
              : err.code === 2 ? '위치 정보를 가져올 수 없습니다'
              : '위치 요청 시간이 초과됐습니다';
    setLocStatus('error', 'alert', msg);
    setTimeout(() => hideLocStatus(), 5000);
  }, { timeout: 9000, enableHighAccuracy: true });
}

function setLocStatus(cls, icon, msg) {
  const el = document.getElementById('locStatus');
  el.className = 'loc-status show ' + cls;
  const iconMap = {
    spin:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1A73E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`,

    alert: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,

function classify(val) {
  const v = (val || '').toLowerCase();
  if (v.match(/\.(jpg|jpeg|png|gif|webp|svg|heic|avif)$/)) return {type:'image', label:'이미지', color:'#166534', bg:'#dcfce7'};
  if (v.match(/\.(mp3|wav|ogg|m4a|flac|aac|opus)$/))      return {type:'sound', label:'사운드', color:'#92400e', bg:'#fef3c7'};
  if (v.match(/\.(pdf|doc|docx|xls|xlsx|ppt|pptx|hwp)$/)) return {type:'file',  label:'문서',   color:'#374151', bg:'#f3f4f6'};
  if (v.match(/^https?:\/\//) || v.startsWith('www.'))    return {type:'url',   label:'링크',   color:'#1557B0', bg:'#EEF4FF'};
  if (v.match(/^\d{2,4}[-.\s]?\d{3,4}[-.\s]?\d{4}$/))    return {type:'phone', label:'전화번호', color:'#1557B0', bg:'#EEF4FF'};
  if (v.length > 0)                                       return {type:'text',  label:'텍스트', color:'#1557B0', bg:'#EEF4FF'};
  return {type:'default', label:'', color:'', bg:''};
}

function handleCustomFile(input) {
  const file = input.files[0];
  if (!file) return;
  const row  = input.closest('.custom-field');

  valInp.value = file.name;

  const key = 'custom_' + Date.now();
  _mediaAttachments[key] = { name: file.name, type: classify(file.name).type, size: file.size };
  input.value = '';
}

  if (key === 'location') { document.getElementById('locationInput').focus(); return; }

}

// ── 프로필 제출 ──────────────────────────────────────────
async function submitProfile() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showToast('이름을 입력해 주세요'); document.getElementById('nameInput').focus(); return; }

  const location = document.getElementById('locationInput').value.trim();
  const phone    = document.getElementById('phoneInput').value.trim();

  const customFields = [];
  document.querySelectorAll('.custom-field').forEach(wrap => {
    const k = wrap.querySelector('.custom-name-inp').value.trim();
    const v = wrap.querySelector('.custom-val-inp').value.trim();
    if (k && v) customFields.push({ key: k, value: v, type: classify(v).type, public: true });
  });

  const rawData = {
    name,
    location,
    phone,
    custom_fields: customFields,
    media: Object.values(_mediaAttachments),
    handle: _handle,
    guid:   _guid,
  };

  showAIOverlay('AI가 분석 중입니다', '유형과 분류를 판단하고 있습니다...');

  try {
    // 2026-07-05: 내장 리터럴(systemPrompt 하드코딩) 제거 — 이제
    // prompts/SP-17_profile-classifier_*.txt(sp-catalog.json 경유)가
    // 유일한 정본이다. {{HANDLE}}/{{GUID}} 플레이스홀더는 여기서 치환한다
    // (원래 코드의 ${_handle}/${_guid} 보간과 동일한 효과).
    const manifestRes = await fetch('/prompts/sp-catalog.json', { cache: 'no-cache' });
    if (!manifestRes.ok) throw new Error('manifest fetch 실패: ' + manifestRes.status);
    const manifest = await manifestRes.json();
    const spFile = manifest['SP-17_profile-classifier'];
    if (!spFile) throw new Error('manifest 에 SP-17_profile-classifier 키 없음');
    const spRes = await fetch('/prompts/' + spFile);
    if (!spRes.ok) throw new Error('SP-17 로드 실패: ' + spRes.status);
    const spTemplate = await spRes.text();
    const systemPrompt = spTemplate
      .replace('{{HANDLE}}', _handle)
      .replace('{{GUID}}', _guid);

    const userMsg = `다음 프로필 정보를 분류해 주세요:

이름: ${name}
위치: ${location || '(없음)'}
전화: ${phone || '(없음)'}
추가 필드: ${customFields.map(f => `${f.key}=${f.value}`).join(', ') || '(없음)'}
첨부 미디어: ${Object.values(_mediaAttachments).map(m => m.name).join(', ') || '(없음)'}`;

    setAIStatus('프로필 유형 분류 중...', '이름과 내용을 분석하고 있습니다');
    const res = await fetch(`${PROXY}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'deepseek-v4-flash',
        max_tokens: 600,
        temperature: 0.1,
        stream: false,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user',   content: userMsg },
        ],
      }),
    });
    const aiData = await res.json();
    const aiText = aiData?.choices?.[0]?.message?.content || '';

    const match = aiText.match(/PROFILE_SUBMIT\s*(\{[\s\S]*?\})\s*(?:$|\n)/);
    if (!match) throw new Error('AI 분류 응답을 파싱할 수 없습니다');

    let profile;
    try { profile = JSON.parse(match[1]); }
    catch { throw new Error('AI 응답 JSON 파싱 실패'); }

    profile.guid   = profile.guid   || _guid;
    profile.handle = profile.handle || _handle;

    setAIStatus('서버에 저장 중...', '잠시만 기다려 주세요');

    if (IS_EDIT) {
      await patchProfile(profile);
    } else {
      await postProfile(profile);
    }

  } catch(e) {
    hideAIOverlay();
    showToast('오류: ' + e.message);
    console.error('[RegisterProfile]', e);
  }
}

// ── 프로필 서명 부착 (2026-07-13 신설) ──────────────────────
// handleProfilePost(POST /profile)는 pubkey/signature 없이는 항상
// 400(MISSING_FIELD)으로 거부한다 — 지금까지 이 페이지 어디서도
// 서명을 붙이지 않고 있었다(발견된 버그, gopang-wallet.js 미로드가 원인).
async function _signAndAttachProfile(profile) {
  const wallet = window.gopangWallet;
  if (!wallet?.signPayload) {
    throw new Error('지갑을 사용할 수 없습니다 — 앱에서 다시 시도해 주세요.');
  }
  const pubkey = wallet.publicKeyB64u || wallet.publicKeyB64 || '';
  if (!pubkey) throw new Error('지갑 공개키를 찾을 수 없습니다.');
  const ts = Date.now().toString();
  // handleProfilePost가 검증하는 서명 대상 문자열과 정확히 일치해야 한다.
  const sigMsg = `${profile.guid}:${pubkey}:${ts}`;
  const signature = await wallet.signPayload(sigMsg);
  return { ...profile, pubkey, signature, ts };
}

// ── POST (신규 등록) ──────────────────────────────────────
async function postProfile(profile) {
  profile = await _signAndAttachProfile(profile);
  const res  = await fetch(`${PROXY}/profile`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(profile),
  });
  const data = await res.json();
  if (!res.ok || !data.ok) throw new Error(data.detail || data.error || '등록 실패');

  localStorage.setItem('hondi_profile_done', '1');
  localStorage.removeItem('hondi_profile_step');

  if (data.agent?.ok && data.agent?.guid && _guid) {
    _triggerDelegation(data.agent.guid, _guid).catch(() => {});
  }

  setProgress(100);
  hideAIOverlay();
  showToast('✅ 프로필이 등록됐습니다');
  setTimeout(() => { location.href = '/webapp.html'; }, 1200);
}

// ── 수정 (2026-07-13 수정 — PATCH /profile/@handle은 서버 라우팅이
//    아예 없어 항상 실패했다. handleProfilePost가 이미 guid 존재
//    여부로 upsert를 수행하므로, 수정도 같은 POST 엔드포인트를
//    그대로 쓴다 — 새 서버 핸들러를 만들 필요가 없다) ──────────
async function patchProfile(profile) {
  profile = await _signAndAttachProfile(profile);
  const res  = await fetch(`${PROXY}/profile`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(profile),
  });
  const data = await res.json();
  if (!res.ok || !data.ok) throw new Error(data.detail || data.error || '수정 실패');

  hideAIOverlay();
  showToast('✅ 프로필이 수정됐습니다');
  setTimeout(() => {
    location.href = _handle
      ? `/profile.html?handle=${encodeURIComponent(_handle)}`
      : '/webapp.html';
  }, 1200);
}

// ── 위임 서명 ─────────────────────────────────────────────
async function _triggerDelegation(agentGuid, principalGuid) {
  const wallet = window.gopangWallet;
  if (!wallet?.signPayload) return;
  const sig    = await wallet.signPayload(`delegate:${agentGuid}:${principalGuid}`);
  const pubkey = wallet.publicKeyB64u || wallet.publicKeyB64 || '';
  await fetch(`${PROXY}/profile/delegate`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ principal_guid: principalGuid, agent_guid: agentGuid, pubkey, signature: sig }),
  });
}

// ── QR / 공유 ─────────────────────────────────────────────
async function showQR() {
  if (!_guid) { showToast('먼저 등록을 완료해 주세요'); return; }
  try {
    const { guidToShortId, generateHondiCodeDataURL } = await import('./src/gopang/ai/hondi-code.js');
    const shortId = guidToShortId(_guid, 'v1');
    const dataURL = await generateHondiCodeDataURL(shortId, 'v1');
    const m = document.createElement('div');
    m.style.cssText = 'position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center';
    m.onclick = () => m.remove();
    m.innerHTML = `<div style="background:#fff;border-radius:16px;padding:24px;text-align:center;max-width:280px">
      <img src="${dataURL}" style="width:100%;border-radius:8px;border:1px solid #f3f4f6">
      <button onclick="this.closest('div').parentElement.remove()"
        style="margin-top:14px;padding:10px 24px;border:none;border-radius:99px;background:#1A73E8;color:#fff;font-weight:600;cursor:pointer">닫기</button>
    </div>`;
    document.body.appendChild(m);
  } catch(e) { showToast('QR 생성 실패: ' + e.message); }
}

async function shareProfile() {
  const name = document.getElementById('nameInput').value.trim() || '혼디 프로필';
  const url  = _handle ? `https://hondi.net/profile.html?handle=${_handle}` : location.href;
  if (navigator.share) await navigator.share({ title: name, url }).catch(() => {});
  else { await navigator.clipboard.writeText(url).catch(() => {}); showToast('링크가 복사됐습니다'); }
}

// ── UI 헬퍼 ──────────────────────────────────────────────
function showAIOverlay(msg, sub) {
  document.getElementById('aiStatusMsg').textContent = msg;
  document.getElementById('aiStatusSub').textContent = sub;
  document.getElementById('aiOverlay').classList.add('show');
  document.getElementById('submitBtn').disabled = true;
}
function setAIStatus(msg, sub) {
  document.getElementById('aiStatusMsg').textContent = msg;
  document.getElementById('aiStatusSub').textContent = sub;
}
function hideAIOverlay() {
  document.getElementById('aiOverlay').classList.remove('show');
  document.getElementById('submitBtn').disabled = false;
}

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
