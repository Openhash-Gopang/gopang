<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>프로필 등록 — 고팡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: #f9fafb; color: #111827;
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.header {
  background: #fff; border-bottom: 1px solid #e5e7eb;
  padding: 14px 16px; display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 10;
}
.header button { background: none; border: none; cursor: pointer; padding: 4px; color: #374151; display: flex; align-items: center; }
.header-title { font-size: 17px; font-weight: 700; }
.step-bar { display: flex; gap: 6px; padding: 16px 16px 0; }
.step-dot { height: 4px; flex: 1; border-radius: 2px; background: #e5e7eb; transition: background .3s; }
.step-dot.active { background: #16a34a; }
.step-label { font-size: 12px; color: #9ca3af; padding: 8px 16px 16px; }
.step-label span { color: #16a34a; font-weight: 600; }
.card { background: #fff; border-radius: 14px; margin: 0 16px 16px; overflow: hidden; }
.card-title { font-size: 13px; font-weight: 600; color: #6b7280; padding: 14px 16px 8px; text-transform: uppercase; letter-spacing: .05em; }
.field { padding: 0 16px 14px; display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 13px; font-weight: 600; color: #374151; display: flex; align-items: center; justify-content: space-between; }
.field label .req { color: #ef4444; margin-left: 2px; }
.field input, .field select, .field textarea {
  width: 100%; border: 1.5px solid #e5e7eb; border-radius: 10px;
  padding: 10px 12px; font-size: 15px; font-family: inherit; outline: none;
  transition: border-color .2s; background: #fff;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: #16a34a; }
.field textarea { resize: vertical; min-height: 80px; }
.field .hint { font-size: 11px; color: #9ca3af; }
.field .err { font-size: 11px; color: #ef4444; display: none; }
/* 공개 체크박스 행 */
.pub-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px; border-top: 1px solid #f3f4f6;
}
.pub-row label { font-size: 12px; color: #6b7280; display: flex; align-items: center; gap: 6px; cursor: pointer; }
.pub-row input[type=checkbox] { accent-color: #16a34a; width: 14px; height: 14px; }
/* 토글 */
.toggle-row { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #f3f4f6; }
.toggle-row .tl { font-size: 14px; color: #111827; }
.toggle { position: relative; width: 44px; height: 26px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #d1d5db; border-radius: 13px; cursor: pointer; transition: background .2s; }
.toggle-slider::before { content:''; position:absolute; width:20px; height:20px; border-radius:50%; background:#fff; left:3px; top:3px; transition:transform .2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
.toggle input:checked + .toggle-slider { background: #16a34a; }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }
/* entity grid */
.entity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; }
.entity-btn {
  border: 2px solid #e5e7eb; border-radius: 14px; background: #fff;
  padding: 20px 12px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  transition: border-color .15s, background .15s;
}
.entity-btn:active { background: #f0fdf4; border-color: #16a34a; }
.entity-btn svg { color: #374151; }
.entity-btn .name { font-size: 14px; font-weight: 700; color: #111827; }
.entity-btn .desc { font-size: 11px; color: #9ca3af; text-align: center; }
/* 하단 바 */
.bottom-bar {
  position: sticky; bottom: 0; background: #fff; border-top: 1px solid #e5e7eb;
  padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  display: flex; gap: 10px;
}
.btn-back { flex: 0 0 72px; padding: 13px; border: 1.5px solid #e5e7eb; border-radius: 12px; background: #fff; font-size: 15px; font-weight: 600; color: #374151; cursor: pointer; }
.btn-next { flex: 1; padding: 13px; border: none; border-radius: 12px; background: #16a34a; font-size: 15px; font-weight: 700; color: #fff; cursor: pointer; transition: opacity .2s; }
.btn-next:disabled { opacity: .45; cursor: not-allowed; }
.hidden { display: none !important; }
/* 완료 화면 */
.success-wrap { display: none; flex-direction: column; align-items: center; padding: 60px 32px; text-align: center; gap: 16px; }
.success-icon { width: 72px; height: 72px; border-radius: 50%; background: #f0fdf4; display: flex; align-items: center; justify-content: center; }
/* 주소 행 */
.addr-row { display: flex; gap: 8px; }
.addr-row input { flex: 1; }
.addr-btn { padding: 10px 14px; border: 1.5px solid #16a34a; border-radius: 10px; background: #f0fdf4; color: #16a34a; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap; }
/* 웹사이트 패치 뱃지 */
.site-badge { font-size: 11px; color: #16a34a; margin-top: 4px; display: none; }
</style>
</head>
<body>

<div class="header">
  <button onclick="history.back()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="header-title">프로필 등록</span>
</div>

<div class="step-bar">
  <div class="step-dot active" id="dot-1"></div>
  <div class="step-dot" id="dot-2"></div>
  <div class="step-dot" id="dot-3"></div>
</div>
<div class="step-label" id="step-label"><span>1단계</span> · 유형 선택</div>

<!-- ── Step 1: entity_type ── -->
<div id="step1">
  <div class="card" style="margin-top:8px">
    <div class="card-title">어떤 유형으로 등록하시나요?</div>
    <div class="entity-grid">

      <button class="entity-btn" onclick="selectType('person')">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <span class="name">개인</span>
        <span class="desc">일반 사용자</span>
      </button>

      <button class="entity-btn" onclick="selectType('business')">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
        <span class="name">사업자</span>
        <span class="desc">법인·개인사업자</span>
      </button>

      <button class="entity-btn" onclick="selectType('institution')">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 2 7 22 7"/>
        </svg>
        <span class="name">공공기관</span>
        <span class="desc">정부·공기업</span>
      </button>

      <button class="entity-btn" onclick="selectType('org')">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span class="name">협회/단체</span>
        <span class="desc">비영리·협회</span>
      </button>

      <button class="entity-btn" onclick="selectType('platform')" style="grid-column:1/-1;max-width:200px;margin:0 auto">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <span class="name">플랫폼</span>
        <span class="desc">서비스·SaaS</span>
      </button>

    </div>
  </div>
</div>

<!-- ── Step 2: 기본정보 ── -->
<div id="step2" class="hidden">
  <div class="card" style="margin-top:8px">
    <div class="card-title">기본 정보</div>
    <div class="field">
      <label>이름 / 상호명 <span class="req">*</span>
        <label style="font-size:11px;font-weight:400;color:#9ca3af;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="pub-name"> 공개
        </label>
      </label>
      <input type="text" id="f-name" placeholder="홍길동 / 고팡 카페">
      <span class="err" id="err-name">이름을 입력해 주세요.</span>
    </div>
    <div class="field">
      <label>소개
        <label style="font-size:11px;font-weight:400;color:#9ca3af;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="pub-desc"> 공개
        </label>
      </label>
      <textarea id="f-desc" placeholder="간단한 소개를 입력하세요."></textarea>
    </div>
    <div class="field">
      <label>
        태그 <span class="hint" style="font-weight:400;font-size:11px">(쉼표 구분, 최대 5개 — 검색에 활용됩니다)</span>
        <label style="font-size:11px;font-weight:400;color:#9ca3af;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="pub-tags"> 공개
        </label>
      </label>
      <input type="text" id="f-tags" placeholder="카페, 제주, 핸드드립">
    </div>
  </div>

  <!-- business 전용 -->
  <div class="card hidden" id="biz-fields">
    <div class="card-title">사업자 정보</div>
    <div class="field">
      <label>사업자등록번호
        <label style="font-size:11px;font-weight:400;color:#9ca3af;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="pub-bizno"> 공개
        </label>
      </label>
      <input type="text" id="f-biz-reg" placeholder="000-00-00000" maxlength="12" oninput="fmtBiz(this)">
      <span class="err" id="err-biz">올바른 사업자등록번호를 입력하세요.</span>
    </div>
    <div class="field">
      <label>대표자명
        <label style="font-size:11px;font-weight:400;color:#9ca3af;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="pub-ceo"> 공개
        </label>
      </label>
      <input type="text" id="f-ceo" placeholder="홍길동">
    </div>
    <div class="field">
      <label>업종 대분류</label>
      <select id="f-ksic-major">
        <option value="">선택하세요</option>
        <option value="I">I — 숙박 및 음식점업</option>
        <option value="J">J — 정보통신업</option>
        <option value="G">G — 도매 및 소매업</option>
        <option value="Q">Q — 보건업 및 사회복지</option>
        <option value="P">P — 교육 서비스업</option>
        <option value="M">M — 전문·과학·기술 서비스업</option>
        <option value="K">K — 금융 및 보험업</option>
        <option value="F">F — 건설업</option>
        <option value="C">C — 제조업</option>
        <option value="R">R — 예술·스포츠·여가</option>
        <option value="S">S — 협회·단체·기타 서비스</option>
        <option value="H">H — 운수 및 창고업</option>
        <option value="A">A — 농업·임업·어업</option>
        <option value="ETC">기타</option>
      </select>
    </div>
    <div class="field">
      <label>KSIC 업종코드 <span class="hint">(5자리)</span></label>
      <input type="text" id="f-ksic-code" placeholder="56111" maxlength="6">
    </div>
    <div class="field">
      <label>법인/개인 구분</label>
      <select id="f-biz-type">
        <option value="individual">개인사업자</option>
        <option value="corporate">법인사업자</option>
      </select>
    </div>
    <div class="toggle-row">
      <span class="tl">GDC 결제 수락</span>
      <label class="toggle"><input type="checkbox" id="f-gdc" checked><span class="toggle-slider"></span></label>
    </div>
  </div>

  <!-- institution 전용 -->
  <div class="card hidden" id="inst-fields">
    <div class="card-title">공공기관 정보</div>
    <div class="field">
      <label>기관 유형</label>
      <select id="f-inst-type">
        <option value="central">중앙행정기관</option>
        <option value="local">지방자치단체</option>
        <option value="public_corp">공기업</option>
        <option value="quasi_gov">준정부기관</option>
        <option value="other">기타 공공기관</option>
      </select>
    </div>
    <div class="field">
      <label>소관부처</label>
      <input type="text" id="f-ministry" placeholder="행정안전부">
    </div>
    <div class="field">
      <label>기관코드</label>
      <input type="text" id="f-inst-code" placeholder="B000000">
    </div>
  </div>

  <!-- org 전용 -->
  <div class="card hidden" id="org-fields">
    <div class="card-title">단체 정보</div>
    <div class="field">
      <label>설립목적</label>
      <textarea id="f-purpose" placeholder="단체의 설립 목적을 입력하세요."></textarea>
    </div>
    <div class="field">
      <label>단체등록번호 <span class="hint">(선택)</span></label>
      <input type="text" id="f-org-reg" placeholder="000000-0000000">
    </div>
    <div class="field">
      <label>회원 수 <span class="hint">(선택)</span></label>
      <input type="number" id="f-member-count" placeholder="100">
    </div>
  </div>

  <!-- platform 전용 -->
  <div class="card hidden" id="platform-fields">
    <div class="card-title">플랫폼 정보</div>
    <div class="field">
      <label>플랫폼 유형</label>
      <select id="f-platform-type">
        <option value="marketplace">마켓플레이스</option>
        <option value="community">커뮤니티</option>
        <option value="saas">SaaS</option>
        <option value="other">기타</option>
      </select>
    </div>
    <div class="field">
      <label>API 엔드포인트 <span class="hint">(선택)</span></label>
      <input type="url" id="f-api-endpoint" placeholder="https://api.example.com">
    </div>
  </div>
</div>

<!-- ── Step 3: 위치·연락처·공개설정 ── -->
<div id="step3" class="hidden">
  <div class="card" style="margin-top:8px">
    <div class="card-title">위치 정보</div>
    <div class="field">
      <label>주소
        <label style="font-size:11px;font-weight:400;color:#9ca3af;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="pub-addr"> 공개
        </label>
      </label>
      <div class="addr-row">
        <input type="text" id="f-address" placeholder="위치 버튼을 눌러 주소를 가져오세요">
        <button class="addr-btn" onclick="getAddr(this)">내 위치</button>
      </div>
      <input type="hidden" id="f-lat">
      <input type="hidden" id="f-lng">
    </div>
  </div>

  <div class="card">
    <div class="card-title">연락처</div>
    <div class="field">
      <label>전화번호
        <label style="font-size:11px;font-weight:400;color:#9ca3af;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="pub-phone"> 공개
        </label>
      </label>
      <input type="tel" id="f-phone" placeholder="010-0000-0000">
    </div>
    <div class="field">
      <label>웹사이트
        <label style="font-size:11px;font-weight:400;color:#9ca3af;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="pub-web"> 공개
        </label>
      </label>
      <input type="text" id="f-website" placeholder="gopang.net" onblur="fetchSiteMeta(this.value)">
      <div class="site-badge" id="site-badge">✅ 사이트 정보 수집 완료</div>
    </div>
  </div>

  <div class="card hidden" id="hours-card">
    <div class="card-title">영업시간</div>
    <div class="field">
      <input type="text" id="f-hours" placeholder="평일 09:00~18:00, 토 09:00~13:00">
    </div>
  </div>

  <div class="card">
    <div class="card-title">공개 설정</div>
    <div class="toggle-row">
      <span class="tl">프로필 전체 공개</span>
      <label class="toggle"><input type="checkbox" id="f-public"><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span class="tl">주요 언어</span>
      <select id="f-lang" style="border:none;font-size:14px;color:#374151;outline:none;background:transparent">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
      </select>
    </div>
  </div>
</div>

<!-- 완료 화면 -->
<div class="success-wrap" id="success-screen">
  <div class="success-icon">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div style="font-size:20px;font-weight:700">프로필 등록 완료!</div>
  <div style="font-size:14px;color:#6b7280;line-height:1.6" id="success-msg"></div>
  <button class="btn-next" style="max-width:240px;margin-top:8px" onclick="location.href='/webapp.html'">고팡으로 돌아가기</button>
</div>

<div class="bottom-bar" id="bottom-bar">
  <button class="btn-back hidden" id="btn-back" onclick="prevStep()">이전</button>
  <button class="btn-next" id="btn-next" onclick="nextStep()">등록 완료</button>
</div>

<script>
const PROXY   = 'https://gopang-proxy.tensor-city.workers.dev';
const KAKAO   = '66648ca49f126d8752b33d542789ac56'; // Kakao REST API Key

let step = 2; // entity 선택 즉시 step2로 이동하므로 시작은 1
let selectedType = null;
let _siteMeta = {};

// ── 초기화 ───────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  step = 1;
  showStep(1);

  // handle에서 전화번호 자동 추출
  try {
    const stored = JSON.parse(localStorage.getItem('gopang_user_v4') || '{}');
    const handle = stored.handle || '';
    const digits = handle.replace(/[^0-9]/g, '');
    if (digits.length === 8) {
      // 8자리 → 한국 010-XXXX-XXXX
      document.getElementById('f-phone').value = `010-${digits.slice(0,4)}-${digits.slice(4)}`;
    } else if (digits.length === 10) {
      document.getElementById('f-phone').value = `0${digits.slice(0,2)}-${digits.slice(2,6)}-${digits.slice(6)}`;
    } else if (digits.length === 11) {
      document.getElementById('f-phone').value = `${digits.slice(0,3)}-${digits.slice(3,7)}-${digits.slice(7)}`;
    }
    if (stored.nickname) document.getElementById('f-name').value = stored.nickname;
  } catch(_) {}
});

// ── entity_type 선택 → 즉시 step2 이동 ─────────────────
function selectType(type) {
  selectedType = type;
  ['biz-fields','inst-fields','org-fields','platform-fields'].forEach(id =>
    document.getElementById(id).classList.add('hidden'));
  const map = { business:'biz-fields', institution:'inst-fields', org:'org-fields', platform:'platform-fields' };
  if (map[type]) document.getElementById(map[type]).classList.remove('hidden');
  if (type === 'business') document.getElementById('hours-card')?.classList.remove('hidden');
  showStep(2);
}

// ── 스텝 표시 ────────────────────────────────────────────
function showStep(n) {
  step = n;
  ['step1','step2','step3'].forEach((id,i) =>
    document.getElementById(id).classList.toggle('hidden', i+1 !== n));
  [1,2,3].forEach(i =>
    document.getElementById(`dot-${i}`).classList.toggle('active', i <= n));
  const labels = ['유형 선택','기본 정보','위치 · 연락처'];
  document.getElementById('step-label').innerHTML = `<span>${n}단계</span> · ${labels[n-1]}`;
  const backBtn = document.getElementById('btn-back');
  const nextBtn = document.getElementById('btn-next');
  // step1은 bottom-bar 숨김
  document.getElementById('bottom-bar').classList.toggle('hidden', n === 1);
  if (n > 1) {
    backBtn.classList.toggle('hidden', n === 2);
    nextBtn.textContent = n === 3 ? '등록 완료' : '다음';
  }
  window.scrollTo(0, 0);
}

function nextStep() {
  if (step === 2) {
    if (!validate2()) return;
    showStep(3);
  } else if (step === 3) {
    submitProfile();
  }
}
function prevStep() {
  if (step === 3) showStep(2);
  else if (step === 2) showStep(1);
}

// ── 2단계 유효성 검사 ────────────────────────────────────
function validate2() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) {
    document.getElementById('err-name').style.display = 'block';
    document.getElementById('f-name').focus();
    return false;
  }
  document.getElementById('err-name').style.display = 'none';
  if (selectedType === 'business') {
    const biz = document.getElementById('f-biz-reg').value;
    if (biz && !validBiz(biz)) {
      document.getElementById('err-biz').style.display = 'block';
      return false;
    }
    document.getElementById('err-biz').style.display = 'none';
  }
  return true;
}

// ── 사업자번호 포맷/검증 ─────────────────────────────────
function fmtBiz(el) {
  let v = el.value.replace(/[^0-9]/g,'').slice(0,10);
  if (v.length > 5) v = v.slice(0,3)+'-'+v.slice(3,5)+'-'+v.slice(5);
  else if (v.length > 3) v = v.slice(0,3)+'-'+v.slice(3);
  el.value = v;
}
function validBiz(num) {
  const d = num.replace(/[^0-9]/g,'');
  if (d.length !== 10) return false;
  const w = [1,3,7,1,3,7,1,3,5];
  let s = 0;
  for (let i=0;i<9;i++) s += parseInt(d[i])*w[i];
  s += Math.floor(parseInt(d[8])*5/10);
  return (10-(s%10))%10 === parseInt(d[9]);
}

// ── 주소: GPS → Kakao 역지오코딩 → 행정주소 ─────────────
async function getAddr(btn) {
  if (!navigator.geolocation) { alert('위치 정보를 사용할 수 없습니다.'); return; }
  btn.textContent = '위치 확인 중…'; btn.disabled = true;
  navigator.geolocation.getCurrentPosition(async pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    document.getElementById('f-lat').value = lat;
    document.getElementById('f-lng').value = lng;
    try {
      // Kakao 역지오코딩 — Worker /geocode 경유
      const res  = await fetch(`${PROXY}/geocode?x=${lng}&y=${lat}`);
      const data = await res.json();
      const doc  = data?.documents?.[0];
      // road_address 우선, 없으면 address
      const addr = doc?.road_address?.address_name
                || doc?.address?.address_name
                || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      const addrEl = document.getElementById('f-address');
      addrEl.value   = addr;
      addrEl.readOnly = false; // 사용자 수정 허용
    } catch {
      document.getElementById('f-address').value = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    }
    btn.textContent = '재검색'; btn.disabled = false;
  }, () => { alert('위치 권한을 허용해 주세요.'); btn.textContent = '내 위치'; btn.disabled = false; });
}

// ── 웹사이트 메타데이터 수집 ─────────────────────────────
async function fetchSiteMeta(rawUrl) {
  if (!rawUrl) return;
  const url = rawUrl.startsWith('http') ? rawUrl : 'https://' + rawUrl;
  try {
    const res  = await fetch(`${PROXY}/fetch-meta?url=${encodeURIComponent(url)}`);
    if (!res.ok) return;
    const data = await res.json();
    _siteMeta = data;
    // 소개란 자동 채움 (비어있는 경우)
    const descEl = document.getElementById('f-desc');
    if (!descEl.value && data.description) descEl.value = data.description;
    // 태그 자동 채움
    const tagsEl = document.getElementById('f-tags');
    if (!tagsEl.value && data.keywords) tagsEl.value = data.keywords.slice(0,5).join(', ');
    document.getElementById('site-badge').style.display = 'block';
  } catch(_) {}
}

// ── 최종 제출 ────────────────────────────────────────────
async function submitProfile() {
  const btn = document.getElementById('btn-next');
  btn.textContent = '등록 중…'; btn.disabled = true;
  try {
    const stored = JSON.parse(localStorage.getItem('gopang_user_v4') || 'null');
    if (!stored?.ipv6) throw new Error('로그인이 필요합니다.');
    const wallet = window.gopangWallet;

    // 공개 여부 맵
    const pubMap = {
      name:    document.getElementById('pub-name')?.checked  || false,
      desc:    document.getElementById('pub-desc')?.checked  || false,
      tags:    document.getElementById('pub-tags')?.checked  || false,
      address: document.getElementById('pub-addr')?.checked  || false,
      phone:   document.getElementById('pub-phone')?.checked || false,
      website: document.getElementById('pub-web')?.checked   || false,
      bizno:   document.getElementById('pub-bizno')?.checked || false,
      ceo:     document.getElementById('pub-ceo')?.checked   || false,
    };

    const tags = document.getElementById('f-tags').value
      .split(',').map(t=>t.trim()).filter(Boolean).slice(0,5);

    const payload = {
      guid:        stored.ipv6,
      pubkey:      wallet?.publicKeyB64u || stored.pubkey || '',
      entity_type: selectedType,
      name:        document.getElementById('f-name').value.trim(),
      description: document.getElementById('f-desc').value.trim(),
      tags,
      address:     document.getElementById('f-address').value,
      lat:         parseFloat(document.getElementById('f-lat').value) || null,
      lng:         parseFloat(document.getElementById('f-lng').value) || null,
      phone:       document.getElementById('f-phone').value.trim(),
      website:     document.getElementById('f-website').value.trim(),
      is_public:   document.getElementById('f-public').checked,
      native_lang: document.getElementById('f-lang').value,
      visibility:  pubMap,   // 항목별 공개 여부
      site_meta:   Object.keys(_siteMeta).length ? _siteMeta : undefined,
    };

    if (selectedType === 'business') {
      Object.assign(payload, {
        biz_reg_no: document.getElementById('f-biz-reg').value.replace(/[^0-9]/g,''),
        ceo_name:   document.getElementById('f-ceo').value.trim(),
        ksic_code:  document.getElementById('f-ksic-code').value.trim(),
        ksic_name:  document.getElementById('f-ksic-major').options[document.getElementById('f-ksic-major').selectedIndex]?.text||'',
        biz_type:   document.getElementById('f-biz-type').value,
        hours:      document.getElementById('f-hours').value.trim(),
        gdc_accepted: document.getElementById('f-gdc').checked,
      });
    } else if (selectedType === 'institution') {
      Object.assign(payload, {
        inst_type: document.getElementById('f-inst-type').value,
        ministry:  document.getElementById('f-ministry').value.trim(),
        inst_code: document.getElementById('f-inst-code').value.trim(),
      });
    } else if (selectedType === 'org') {
      Object.assign(payload, {
        purpose:      document.getElementById('f-purpose').value.trim(),
        org_reg_no:   document.getElementById('f-org-reg').value.trim(),
        member_count: parseInt(document.getElementById('f-member-count').value)||null,
      });
    } else if (selectedType === 'platform') {
      Object.assign(payload, {
        platform_type: document.getElementById('f-platform-type').value,
        api_endpoint:  document.getElementById('f-api-endpoint').value.trim(),
      });
    }

    // Ed25519 서명
    if (wallet?.sign) {
      payload.signature = await wallet.sign(JSON.stringify(payload));
    } else {
      payload.signature = stored.ipv6;
    }

    const profRes = await fetch(`${PROXY}/profile`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    if (!profRes.ok) {
      const e = await profRes.json().catch(()=>({}));
      throw new Error(e.detail || `등록 실패 (${profRes.status})`);
    }

    // p2p/register 동시 업데이트 (검색 인덱스)
    fetch(`${PROXY}/p2p/register`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        guid: stored.ipv6, handle: stored.handle,
        nickname: payload.name, country_code: stored.country_code||'KR',
        region: payload.address||'', current_l1:'https://l1-hanlim.gopang.net',
        tags,
      }),
    }).catch(()=>{});

    // 완료 화면
    ['step1','step2','step3'].forEach(id=>document.getElementById(id).classList.add('hidden'));
    document.getElementById('bottom-bar').classList.add('hidden');
    const sc = document.getElementById('success-screen');
    sc.style.display = 'flex';
    document.getElementById('success-msg').innerHTML =
      `<b>${payload.name}</b> 프로필이 등록됐습니다.<br>` +
      `태그 <b>${tags.join(', ')||'없음'}</b>으로 검색됩니다.`;
  } catch(e) {
    alert(`등록 실패: ${e.message}`);
    btn.textContent = '등록 완료'; btn.disabled = false;
  }
}
</script>
