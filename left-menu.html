<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>메뉴 — 혼디</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#fff;color:#111;
  font-family:'Pretendard',-apple-system,'Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;overflow-y:auto;-webkit-overflow-scrolling:touch;
  /* 닫기 스와이프(오른쪽→왼쪽)가 화면 절대 왼쪽 가장자리에 가까워질 때
     안드로이드 시스템 뒤로가기 제스처가 가로채 드래그가 중간에 끊기는
     문제 방지 — webapp.html에 이미 적용한 것과 동일 */
  overscroll-behavior-x:none;touch-action:pan-y}

:root{
  --green:#16a34a;--green-lt:#dcfce7;--green-dk:#15803d;
  --border:#e5e7eb;--txt2:#6b7280;--txt3:#9ca3af;
  --chip-bg:#f9fafb;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}

/* ── 헤더 ── */
.menu-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-t) + 18px) 18px 14px;
  position:sticky;top:0;background:#fff;z-index:1;
  border-bottom:1px solid var(--border);
}
.menu-title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.menu-close{
  width:30px;height:30px;border-radius:50%;border:none;background:var(--chip-bg);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt2);
}
.menu-close svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.4;
  stroke-linecap:round;stroke-linejoin:round}

/* ── 사용자 칩 ── */
.menu-user{
  display:flex;align-items:center;gap:10px;padding:16px 18px;
  border-bottom:1px solid var(--border);
}
.menu-user-avatar{
  width:40px;height:40px;border-radius:50%;background:var(--green-lt);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
}
.menu-user-name{font-size:14px;font-weight:600;color:#111}
.menu-user-handle{font-size:11px;color:var(--txt3);margin-top:2px}

/* ── 섹션 ── */
.menu-section{padding:18px 0 4px}
.menu-section-title{
  font-size:11px;font-weight:700;color:var(--txt3);letter-spacing:.4px;
  padding:0 18px 8px;text-transform:uppercase;
}

/* 최근 대화 상대 — 가로 스크롤 칩 목록 */
.recent-row{display:flex;gap:14px;padding:2px 18px 14px;overflow-x:auto}
.recent-item{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;width:54px}
.recent-avatar{
  width:48px;height:48px;border-radius:50%;background:var(--chip-bg);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;
}
.recent-name{font-size:11px;color:var(--txt2);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:54px}

.menu-empty{
  margin:0 18px 14px;padding:18px 14px;border-radius:12px;background:var(--chip-bg);
  font-size:13px;color:var(--txt3);text-align:center;line-height:1.6;
}

/* 메뉴 항목 (서비스 목록) */
.menu-item{
  display:flex;align-items:center;gap:12px;width:100%;
  padding:13px 18px;background:none;border:none;cursor:pointer;text-align:left;
  font-family:inherit;color:#111;
}
.menu-item:active{background:var(--chip-bg)}
.menu-item.is-disabled{cursor:default;color:var(--txt3)}
.menu-item-icon{
  width:34px;height:34px;border-radius:10px;background:var(--green-lt);color:var(--green-dk);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.menu-item.is-disabled .menu-item-icon{background:var(--chip-bg);color:var(--txt3)}
.menu-item-icon svg{width:17px;height:17px;stroke:currentColor;stroke-width:2.1;
  fill:none;stroke-linecap:round;stroke-linejoin:round}
.menu-item-label{flex:1;font-size:14.5px;font-weight:500}
.menu-item-badge{
  font-size:10.5px;font-weight:700;color:var(--txt3);background:var(--chip-bg);
  border:1px solid var(--border);border-radius:20px;padding:3px 9px;flex-shrink:0;
}
.menu-item-arrow{color:var(--txt3);font-size:16px;flex-shrink:0}

.menu-footer{
  padding:18px 18px calc(var(--safe-b) + 18px);
  font-size:11px;color:var(--txt3);text-align:center;
}
/* ── 롱프레스 설명 툴팁 ── */
.hondi-explain-tip{
  position:fixed;z-index:5000;max-width:min(86vw,320px);
  background:#1A2B4C;color:#fff;border-radius:14px;
  padding:14px 16px;font-size:16px;line-height:1.55;font-family:'Pretendard',-apple-system,sans-serif;
  box-shadow:0 8px 28px rgba(0,0,0,.28);
  opacity:0;transform:translateY(6px);
  transition:opacity .18s,transform .18s;pointer-events:none;
}
.hondi-explain-tip.show{opacity:1;transform:translateY(0);pointer-events:auto}
.hondi-explain-tip .tip-close{
  display:block;margin-top:10px;text-align:right;font-size:14px;
  color:#9FC2FF;font-weight:600;cursor:pointer;
}
</style>
<script>
/* ── 스킨 색상 적용 ──────────────────────────────────────
   webapp.html 설정 패널(스킨 선택)에서 localStorage에 기록한
   색상을 읽어 --green-lt / --green-dk를 덮어쓴다. 동일 출처
   iframe이므로 부모 창이 값을 바꾸면 storage 이벤트가 이쪽
   window에도 자동으로 도착한다(같은 문서에서는 안 옴 — 그래서
   부모가 바꿔도 여기서는 정상적으로 수신됨). 선택값이 없으면
   원래 그린 테마를 그대로 둔다. */
(function () {
  const SKIN_COLORS = {
    blue:   { lt: '#dbeafe', dk: '#1d4ed8' },
    teal:   { lt: '#ccfbf1', dk: '#0f766e' },
    amber:  { lt: '#fef3c7', dk: '#b45309' },
    violet: { lt: '#ede9fe', dk: '#6d28d9' },
    slate:  { lt: '#f1f5f9', dk: '#334155' }
  };
  function applyStoredSkinColor() {
    const c = SKIN_COLORS[localStorage.getItem('hondi_menu_color')];
    if (!c) return;
    const root = document.documentElement.style;
    root.setProperty('--green-lt', c.lt);
    root.setProperty('--green-dk', c.dk);
  }
  applyStoredSkinColor();
  window.addEventListener('storage', function (e) {
    if (e.key === 'hondi_menu_color') applyStoredSkinColor();
  });
})();
</script>
</head>
<body>

<div class="menu-header">
  <div class="menu-title">메뉴</div>
  <button class="menu-close" id="mi-close" onclick="parent.closeLeftMenu && parent.closeLeftMenu()" title="닫기">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<!-- ── 최근 대화 상대 ── -->
<!-- TODO: P2P 대화 기록(localStorage 또는 PDV)과 연동하여 실제 목록으로 교체 -->
<div class="menu-section">
  <div class="menu-section-title">최근 대화 상대</div>
  <div class="menu-empty" id="recent-empty">아직 대화한 상대가 없습니다.<br>상단 검색(🔍)으로 상대를 찾아보세요.</div>
  <div class="recent-row" id="recent-row" data-noswipe style="display:none"></div>
</div>

<!-- ── 서비스 ── -->
<div class="menu-section" style="border-top:1px solid var(--border);padding-top:6px">
  <div class="menu-section-title">서비스</div>

  <button class="menu-item" id="mi-gdc-wallet" onclick="parent.openGopangWallet && parent.openGopangWallet()">
    <span class="menu-item-icon">
      <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="16" cy="15" r="1.5"/></svg>
    </span>
    <span class="menu-item-label">GDC 지갑</span>
    <span class="menu-item-arrow">›</span>
  </button>

  <button class="menu-item is-disabled" id="mi-notify" aria-disabled="true">
    <span class="menu-item-icon">
      <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </span>
    <span class="menu-item-label">알림</span>
    <span class="menu-item-badge">준비중</span>
  </button>

  <button class="menu-item is-disabled" id="mi-inbox" aria-disabled="true">
    <span class="menu-item-icon">
      <svg viewBox="0 0 24 24"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
    </span>
    <span class="menu-item-label">메시지 수신함</span>
    <span class="menu-item-badge">준비중</span>
  </button>
</div>

<div class="menu-footer">혼디 · Gopang Platform</div>

<!-- ── 오른쪽→왼쪽 스와이프로 메뉴 밀어넣기(닫기) ──
     left-menu.html은 webapp.html과 같은 origin의 iframe이므로
     parent.document에 직접 접근해 드로어를 손가락에 맞춰 드래그하듯
     움직이고, 일정 거리 이상이면 parent.closeLeftMenu()를 호출한다.
     [data-noswipe] 영역(예: 가로 스크롤 목록)에서 시작한 터치는 제외. -->
<script>
(function () {
  const THRESH      = 70; // 닫기로 확정하는 최소 이동 거리(px)
  const MOVE_DECIDE  = 10; // 가로/세로 판정을 위한 최소 이동 거리(px)

  let startX = 0, startY = 0;
  let tracking = false, decided = false, valid = false;
  let drawerEl = null;

  function getDrawer() {
    try { return parent.document.querySelector('#left-menu-overlay .left-menu-drawer'); }
    catch (e) { return null; }
  }

  function onStart(e) {
    if (e.touches.length !== 1) return;
    if (e.target.closest && e.target.closest('[data-noswipe]')) return;
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    tracking = true; decided = false; valid = false;
  }

  function onMove(e) {
    if (!tracking) return;
    const t  = e.touches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;

    if (!decided) {
      if (Math.abs(dx) < MOVE_DECIDE && Math.abs(dy) < MOVE_DECIDE) return;
      decided = true;
      // 세로 스크롤이거나, 닫는 방향(왼쪽)이 아니면 우리 제스처가 아님
      if (Math.abs(dy) >= Math.abs(dx) || dx >= 0) { tracking = false; return; }
      valid = true;
      drawerEl = getDrawer();
      if (drawerEl) drawerEl.style.transition = 'none';
    }

    if (valid) {
      e.preventDefault();
      if (drawerEl) drawerEl.style.transform = `translateX(${dx}px)`; // dx는 음수
    }
  }

  function onEnd(e) {
    if (!tracking) return;
    tracking = false;
    if (!valid) { drawerEl = null; return; }

    const t  = e.changedTouches[0];
    const dx = t.clientX - startX;
    if (drawerEl) drawerEl.style.transition = '';

    if (dx < -THRESH) {
      if (drawerEl) drawerEl.style.transform = '';
      if (typeof parent.closeLeftMenu === 'function') parent.closeLeftMenu();
    } else if (drawerEl) {
      drawerEl.style.transform = ''; // 임계값 미달 — 원래 위치로 스냅백
    }
    drawerEl = null;
  }

  function onCancel() {
    if (tracking && valid && drawerEl) {
      drawerEl.style.transition = '';
      drawerEl.style.transform  = '';
    }
    tracking = false; valid = false; drawerEl = null;
  }

  document.addEventListener('touchstart',  onStart,  { passive: true });
  document.addEventListener('touchmove',   onMove,   { passive: false });
  document.addEventListener('touchend',    onEnd,    { passive: true });
  document.addEventListener('touchcancel', onCancel, { passive: true });
})();
</script>

<!-- ── 롱프레스 설명 툴팁 (2026-07-01) ──────────────────────
     짧게 터치하면 기존 동작 그대로, 길게 누르고 있으면(약 0.5초)
     이 항목이 뭘 하는 버튼인지 설명 풍선이 뜬다. webapp.html의
     동일 기능과 독립적으로 동작(다른 origin/iframe 문서라 공유 불가). -->
<script>
(function () {
  const EXPLAIN_TEXT = {
    'mi-close':       '여기를 누르면 이 메뉴를 닫아요. 손잡이를 오른쪽으로 밀어도 똑같이 닫혀요.',
    'mi-gdc-wallet':  '여기를 누르면 내 GDC 지갑을 열어 잔액과 결제 내역을 볼 수 있어요.',
    'mi-notify':      '알림 기능이에요. 아직 준비 중이라 지금은 눌러도 반응하지 않아요.',
    'mi-inbox':       '다른 사람이 보낸 메시지를 모아 보는 곳이에요. 아직 준비 중이에요.',
  };

  let tipEl = null;
  function showTip(text, anchorEl) {
    if (!tipEl) {
      tipEl = document.createElement('div');
      tipEl.className = 'hondi-explain-tip';
      document.body.appendChild(tipEl);
    }
    tipEl.innerHTML = '';
    const txt = document.createElement('div');
    txt.textContent = text;
    const close = document.createElement('span');
    close.className = 'tip-close';
    close.textContent = '알았어요';
    close.onclick = hideTip;
    tipEl.appendChild(txt);
    tipEl.appendChild(close);

    const r = anchorEl.getBoundingClientRect();
    const vh = window.innerHeight;
    tipEl.style.left = '12px';
    tipEl.style.right = '12px';
    tipEl.style.top = '';
    tipEl.style.bottom = '';
    if (r.top > vh * 0.55) tipEl.style.bottom = (vh - r.top + 10) + 'px';
    else tipEl.style.top = (r.bottom + 10) + 'px';

    requestAnimationFrame(() => tipEl.classList.add('show'));
    clearTimeout(tipEl._autoHide);
    tipEl._autoHide = setTimeout(hideTip, 6000);
  }
  function hideTip() { if (tipEl) tipEl.classList.remove('show'); }
  document.addEventListener('touchstart', (e) => {
    if (tipEl && tipEl.classList.contains('show') && !tipEl.contains(e.target)) hideTip();
  }, { passive: true });

  function bindLongPress(el, onPress, ms) {
    ms = ms || 500;
    let timer = null, longPressed = false, startX = 0, startY = 0;
    function start(x, y) {
      longPressed = false; startX = x; startY = y;
      timer = setTimeout(() => { timer = null; longPressed = true; onPress(); }, ms);
    }
    function move(x, y) {
      if (timer && (Math.abs(x - startX) > 10 || Math.abs(y - startY) > 10)) {
        clearTimeout(timer); timer = null;
      }
    }
    function cancel() { if (timer) { clearTimeout(timer); timer = null; } }
    el.addEventListener('touchstart', e => start(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    el.addEventListener('touchmove',  e => move(e.touches[0].clientX, e.touches[0].clientY),  { passive: true });
    el.addEventListener('touchend', cancel, { passive: true });
    el.addEventListener('touchcancel', cancel, { passive: true });
    el.addEventListener('mousedown', e => start(e.clientX, e.clientY));
    el.addEventListener('mousemove', e => move(e.clientX, e.clientY));
    el.addEventListener('mouseup', cancel);
    el.addEventListener('mouseleave', cancel);
    el.addEventListener('click', e => {
      if (longPressed) { e.preventDefault(); e.stopPropagation(); longPressed = false; }
    }, { capture: true });
  }

  Object.keys(EXPLAIN_TEXT).forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    bindLongPress(el, () => showTip(EXPLAIN_TEXT[id], el));
  });
})();
</script>

</body>
</html>
