<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --blue:#1A73E8;--blue-lt:#EEF4FF;
  --border:#DADCE0;--txt2:#5F6368;--txt3:#9AA0A6;
  --font:'Pretendard',-apple-system,'Helvetica Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);color:#111;background:#fff;-webkit-font-smoothing:antialiased}
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.header h1{font-size:19px;font-weight:700}
.close-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--blue-lt);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:18px}
.section-label{padding:14px 16px 6px;font-size:12px;color:var(--txt3);font-weight:600}
.recent-empty{margin:0 16px 8px;padding:14px;border-radius:10px;background:#f9fafb;color:var(--txt3);font-size:13px;line-height:1.6;text-align:center}
.menu-list{border-top:1px solid var(--border)}
.menu-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);background:none;border-left:none;border-right:none;width:100%;text-align:left;font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
.menu-row:active{background:#f9fafb}
.menu-icon{width:34px;height:34px;border-radius:50%;background:var(--blue-lt);color:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.menu-icon i{font-size:17px}
.menu-label{flex:1;font-size:14.5px;color:#111}
.menu-row.disabled .menu-label{color:var(--txt3)}
.chip{font-size:11px;padding:3px 9px;border-radius:10px;background:#f3f4f6;color:var(--txt3)}
.chevron{font-size:16px;color:var(--txt3)}
.footer{text-align:center;padding:18px;font-size:11px;color:var(--txt3)}
</style>
</head>
<body>

<div class="header">
  <h1>메뉴</h1>
  <button class="close-btn" onclick="parent.closeLeftMenu()" aria-label="메뉴 닫기"><i class="ti ti-x"></i></button>
</div>

<div class="section-label">최근 대화 상대</div>
<div class="recent-empty" id="recent-empty">
  아직 대화한 상대가 없습니다.<br>상단 검색(🔍)으로 상대를 찾아보세요.
</div>
<div id="recent-list"></div>

<div class="section-label">서비스</div>
<div class="menu-list">
  <button class="menu-row" onclick="parent.openPDV && parent.openPDV()">
    <span class="menu-icon"><i class="ti ti-archive"></i></span>
    <span class="menu-label">PDV</span>
    <i class="ti ti-chevron-right chevron"></i>
  </button>
  <button class="menu-row" onclick="parent.openGopangWallet ? parent.openGopangWallet() : alert('GDC 지갑 준비 중입니다.')">
    <span class="menu-icon"><i class="ti ti-credit-card"></i></span>
    <span class="menu-label">GDC 지갑</span>
    <i class="ti ti-chevron-right chevron"></i>
  </button>
  <button class="menu-row" onclick="parent.openUserManual && parent.openUserManual()">
    <span class="menu-icon"><i class="ti ti-book-2"></i></span>
    <span class="menu-label">사용자 매뉴얼</span>
    <i class="ti ti-chevron-right chevron"></i>
  </button>
  <button class="menu-row disabled" disabled>
    <span class="menu-icon"><i class="ti ti-bell"></i></span>
    <span class="menu-label">알림</span>
    <span class="chip">준비중</span>
  </button>
  <button class="menu-row disabled" disabled>
    <span class="menu-icon"><i class="ti ti-mail"></i></span>
    <span class="menu-label">메시지 수신함</span>
    <span class="chip">준비중</span>
  </button>
</div>

<div class="footer">혼디 · Gopang Platform</div>

<script>
// TODO: 최근 대화 상대 목록은 로컬 PDV(IndexedDB) 최신 레코드 N건을 읽어와
// #recent-list에 렌더링하고, #recent-empty를 숨긴다. 이 파일은 레이아웃/네비게이션
// 골격만 담당하며, 실제 PDV 조회 로직은 gopang-app.js의 PDV 모듈에 위임한다.
</script>

</body>
</html>
