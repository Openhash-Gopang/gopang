<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혼디 가이드박스 정렬 방식 숫자 인식</title>
<style>
  body{margin:0;font-family:-apple-system,'Pretendard',sans-serif;background:#111;
       color:#fff;padding:0;box-sizing:border-box;overflow:hidden}
  .wrap{position:relative;width:100vw;height:100vh}
  #srcVideo{position:fixed;top:0;left:0;width:2px;height:2px;opacity:0;pointer-events:none}
  canvas#view{width:100%;height:100%;object-fit:cover;display:block}
  #resultBox{
    position:absolute;top:0;left:0;width:100%;
    display:flex;flex-direction:column;align-items:center;padding-top:24px;
    pointer-events:none;
  }
  #bigResult{
    font-size:52px;font-weight:900;line-height:1;letter-spacing:2px;color:#7CFC8A;
    text-shadow:0 0 12px #000,0 0 24px #000;
  }
  #label{font-size:14px;margin-top:8px;background:rgba(0,0,0,0.6);padding:6px 16px;border-radius:20px}
  #debug{
    position:absolute;bottom:0;left:0;right:0;
    background:rgba(0,0,0,0.75);color:#7CFC8A;font:11px/1.5 monospace;
    padding:10px 14px;white-space:pre-wrap;max-height:34vh;overflow:auto;
  }
  #startBtn{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    padding:16px 32px;font-size:18px;font-weight:700;border:none;border-radius:12px;
    background:#1A73E8;color:#fff;cursor:pointer;z-index:10;
  }
  #err{position:absolute;top:20px;left:20px;right:20px;color:#ff6b6b;font-size:14px;
       background:rgba(0,0,0,0.7);padding:10px;border-radius:8px;display:none}
  #refStrip{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);border-radius:8px;padding:6px}
  #refStrip canvas{width:24px;height:40px;image-rendering:pixelated;border:1px solid #444;margin:1px}
  #correctedWrap{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.7);border-radius:8px;
    padding:6px;display:flex;flex-direction:column;align-items:center}
  #correctedWrap .cw-label{font-size:10px;color:#7CFC8A;margin-bottom:4px}
  #correctedPreview{image-rendering:pixelated;border:1px solid #555;max-width:70px;max-height:200px}
</style>
</head>
<body>
<div class="wrap">
  <video id="srcVideo" playsinline autoplay muted></video>
  <canvas id="view"></canvas>
  <div id="resultBox">
    <div id="bigResult">?</div>
    <div id="label">카메라 시작 대기 중</div>
  </div>
  <div id="refStrip"></div>
  <div id="correctedWrap">
    <div class="cw-label">보정 미리보기</div>
    <canvas id="correctedPreview"></canvas>
  </div>
  <div id="err"></div>
  <button id="startBtn">카메라 시작</button>
  <div id="debug"></div>
</div>

<script>
// ── 세로 숫자열 + "혼ㄷ" 기준점(앵커) 방식 ──────────────────────
// 기존 가로 버전은 숫자 10개만 단독으로 찍는 것을 전제로, 가이드박스
// 안의 잉크 전체를 시작~끝으로 보고 10등분했다. 이번 레이아웃은
// 카메라에 로고("혼")+검정 ㄷ자 브래킷+세로 숫자열이 함께 잡히므로,
// 잉크 범위를 그대로 10등분하면 로고까지 포함돼 등분이 깨진다.
//
// 해결: 가이드박스 안에서 컬럼(세로줄) 단위로 "내용이 있는 블록"을
// 찾는다. 로고/ㄷ브래킷/숫자열은 서로 흰 여백으로 떨어져 있으므로
// 컬럼 프로파일(각 x열의 어두운 픽셀 수)만 봐도 블록 경계가 나온다.
//   - 가장 오른쪽 블록 = 숫자열 (실제 인식 대상)
//   - 그 바로 왼쪽 블록 = "ㄷ" 기준점(앵커) — 존재 확인만으로
//     "숫자열을 제대로 찾았다"는 검증 신호로 쓴다. 로고까지 포함해서
//     통째로 잉크 범위를 잡던 이전 방식보다 훨씬 안정적이고,
//     숫자열 폭만 골라내므로 이후 단계(행 단위 스캔)도 그만큼 좁은
//     영역만 처리해 더 빠르다.
// 숫자열 내부에서는 세로로 10등분(위→아래 순서가 첫째~열째 자리)한다.
const SHRINK = { x1: 0.111, x2: 0.889, y1: 0.071, y2: 0.929 };
const IMAGE_ASPECT = 340/247; // 참조 레이아웃(로고+ㄷ+숫자열 전체) 폭:높이
const DIGIT_COUNT_GUIDE = 10;
const MIN_BLOB_WIDTH_RATIO = 0.03;   // 가이드박스 폭 대비, 블록으로 인정할 최소 폭
const MIN_COL_DARK_RATIO = 0.02;     // 해당 컬럼이 "내용 있음"으로 인정될 최소 어두운 픽셀 비율(세로 기준)

// ── "ㄷ" 기준점(앵커) 자동 회전 보정 ──────────────────────────
// 폰을 가로로 눕히거나 스티커가 돌아간 채로 찍히면, 로고/ㄷ브래킷/
// 숫자열 전체가 화면 안에서 90°/180°/270° 돌아간 채로 잡힌다.
// "ㄷ"은 정확히 한쪽 면만 뚫린 모양이라, 뚫린 방향만 알아내면
// 전체가 몇 도 돌아갔는지 바로 알 수 있다 — QR코드의 파인더 패턴과
// 같은 역할. 뚫린 방향을 찾은 뒤, 그 방향이 "오른쪽"이 되도록 이미지
// 전체를 되돌려 회전시키면, 그 다음부터는 기존 세로 인식 로직을
// 그대로 재사용할 수 있다(숫자열은 항상 ㄷ의 열린 방향 쪽에 있다).
const BRACKET_ASPECT_MIN = 0.8, BRACKET_ASPECT_MAX = 2.6; // ㄷ 블록의 가로:세로(긴변/짧은변) 허용 범위
const BRACKET_FILL_MIN = 0.40, BRACKET_FILL_MAX = 0.82;   // ㄷ 블록 내부 어두운 픽셀 비율 허용 범위
const BRACKET_SOLID_EDGE_MIN = 0.75; // 막힌 3면은 이 이상 어두워야 함
const BRACKET_OPEN_EDGE_MAX = 0.55;  // 뚫린 1면은 이 이하로 밝아야 함
const EDGE_STRIP_RATIO = 0.18;       // 네 변 각각을 판정할 때 볼 테두리 두께 비율
const OPEN_SIDE_CORRECTION = { right: 0, bottom: 90, top: -90, left: 180 }; // 열린방향→보정회전각(도, CCW+)

// 화면 중앙에 실제 이미지 비율과 같은 가이드박스를 비디오 픽셀 좌표계로
// 계산 — vctx에 비디오와 같이 그리므로 object-fit:cover 변환도 자동으로
// 같이 적용돼 화면 표시 위치가 항상 정확하다(따로 좌표 변환 불필요).
// 박스는 "숫자를 여유 있게 담는 안내선" 용도일 뿐 — 실제 위치 계산은
// 그 안에서 잉크 범위를 다시 찾아서 하므로, 정렬이 좀 헐거워도 된다.
function computeGuideBox(W, H) {
  let gw = W*0.85, gh = gw/IMAGE_ASPECT;
  if (gh > H*0.5) { gh = H*0.5; gw = gh*IMAGE_ASPECT; }
  return { x1:(W-gw)/2, y1:(H-gh)/2, x2:(W+gw)/2, y2:(H+gh)/2 };
}

function findInkBBox(gray, w, h) {
  const threshold = otsuThreshold(gray);
  let minX=w,minY=h,maxX=-1,maxY=-1,count=0;
  for (let y=0;y<h;y++) for (let x=0;x<w;x++) {
    if (gray[y*w+x] <= threshold) {
      count++;
      if (x<minX)minX=x; if(x>maxX)maxX=x;
      if (y<minY)minY=y; if(y>maxY)maxY=y;
    }
  }
  if (count < 10 || maxX<0) return null;
  return { x1:minX, y1:minY, x2:maxX+1, y2:maxY+1 };
}
// 가이드박스 내부를 컬럼(세로줄) 단위로 스캔해서 "내용 블록"들을 찾는다.
// 로고 / ㄷ브래킷 / 숫자열이 서로 흰 여백으로 떨어져 있다는 전제.
function findColumnBlobs(gray, w, h) {
  const threshold = otsuThreshold(gray);
  const colDark = new Uint32Array(w);
  for (let y=0; y<h; y++) {
    const row = y*w;
    for (let x=0; x<w; x++) if (gray[row+x] <= threshold) colDark[x]++;
  }
  const minDark = Math.max(1, Math.round(h*MIN_COL_DARK_RATIO));
  const minWidth = Math.max(1, Math.round(w*MIN_BLOB_WIDTH_RATIO));
  const blobs = [];
  let x = 0;
  while (x < w) {
    if (colDark[x] >= minDark) {
      let x2 = x;
      while (x2 < w && colDark[x2] >= minDark) x2++;
      if (x2 - x >= minWidth) blobs.push({ x1: x, x2 });
      x = x2;
    } else {
      x++;
    }
  }
  return { blobs, threshold };
}

// 특정 컬럼 구간(x1~x2) 안에서만 위/아래 잉크 범위를 찾는다 —
// 숫자열 블록 폭만큼만 훑으므로 가이드박스 전체를 훑는 것보다 가볍다.
function findRowExtentInColumns(gray, w, h, x1, x2, threshold) {
  let minY = h, maxY = -1;
  for (let y = 0; y < h; y++) {
    const row = y*w;
    let dark = false;
    for (let x = x1; x < x2; x++) {
      if (gray[row+x] <= threshold) { dark = true; break; }
    }
    if (dark) { if (y < minY) minY = y; if (y > maxY) maxY = y; }
  }
  if (maxY < 0) return null;
  return { y1: minY, y2: maxY+1 };
}

// 방향을 모르는 상태에서 블록을 찾기 위해 x축(컬럼) 또는 y축(행)
// 어느 쪽으로든 투영해서 블록을 찾을 수 있게 일반화한 버전.
function findAxisBlobs(gray, w, h, axis, threshold) {
  const primaryLen = axis === 'x' ? w : h;
  const otherLen = axis === 'x' ? h : w;
  const darkCount = new Uint32Array(primaryLen);
  if (axis === 'x') {
    for (let y=0; y<h; y++) { const row=y*w; for (let x=0; x<w; x++) if (gray[row+x] <= threshold) darkCount[x]++; }
  } else {
    for (let y=0; y<h; y++) { const row=y*w; let c=0; for (let x=0; x<w; x++) if (gray[row+x] <= threshold) c++; darkCount[y]=c; }
  }
  const minDark = Math.max(1, Math.round(otherLen*MIN_COL_DARK_RATIO));
  const minSize = Math.max(1, Math.round(primaryLen*MIN_BLOB_WIDTH_RATIO));
  const blobs = [];
  let i = 0;
  while (i < primaryLen) {
    if (darkCount[i] >= minDark) {
      let j = i;
      while (j < primaryLen && darkCount[j] >= minDark) j++;
      if (j - i >= minSize) blobs.push({ p1: i, p2: j });
      i = j;
    } else { i++; }
  }
  return blobs;
}

// 찾은 블록의 1차원 범위(p1~p2) 안에서, 수직 방향의 실제 범위를 찾는다.
function perpExtent(gray, w, h, axis, p1, p2, threshold) {
  let min = Infinity, max = -1;
  if (axis === 'x') {
    for (let y=0; y<h; y++) {
      const row=y*w; let dark=false;
      for (let x=p1; x<p2; x++) if (gray[row+x] <= threshold) { dark=true; break; }
      if (dark) { if (y<min) min=y; if (y>max) max=y; }
    }
  } else {
    for (let x=0; x<w; x++) {
      let dark=false;
      for (let y=p1; y<p2; y++) if (gray[y*w+x] <= threshold) { dark=true; break; }
      if (dark) { if (x<min) min=x; if (x>max) max=x; }
    }
  }
  if (max < 0) return null;
  return { min, max: max+1 };
}

// bbox의 위/아래/왼/오 네 변 각각의 어두운 픽셀 비율 — "ㄷ"처럼 한
// 면만 뚫린 도형은 뚫린 쪽만 확연히 밝게(낮은 비율로) 나온다.
function edgeRatios(gray, w, h, bbox, threshold) {
  const { x1, x2, y1, y2 } = bbox;
  const bw = x2-x1, bh = y2-y1;
  const ts = Math.max(1, Math.round(bh*EDGE_STRIP_RATIO));
  const ls = Math.max(1, Math.round(bw*EDGE_STRIP_RATIO));
  function darkRatio(xa,xb,ya,yb) {
    let d=0, n=0;
    for (let y=ya; y<yb; y++) { const row=y*w; for (let x=xa; x<xb; x++) { n++; if (gray[row+x] <= threshold) d++; } }
    return n ? d/n : 0;
  }
  return {
    top: darkRatio(x1,x2,y1,y1+ts),
    bottom: darkRatio(x1,x2,y2-ts,y2),
    left: darkRatio(x1,x1+ls,y1,y2),
    right: darkRatio(x2-ls,x2,y1,y2),
  };
}

// 가이드박스 안에서 "ㄷ" 기준점을 찾는다. x축/y축 두 방향 모두
// 시도해서(로고+ㄷ+숫자열이 어느 방향으로 늘어서 있든 상관없이),
// 정사각형에 가깝고 + 내부 채움비율이 중간이고 + 정확히 한 면만
// 뚫린 블록을 찾으면 그것이 ㄷ이다.
function tryFindBracket(gray, w, h, threshold) {
  for (const axis of ['x','y']) {
    const blobs = findAxisBlobs(gray, w, h, axis, threshold);
    if (blobs.length < 2) continue; // 이 축으로는 블록이 안 갈라짐 -> 다른 축 시도
    for (const b of blobs) {
      const ext = perpExtent(gray, w, h, axis, b.p1, b.p2, threshold);
      if (!ext) continue;
      const bbox = axis === 'x'
        ? { x1:b.p1, x2:b.p2, y1:ext.min, y2:ext.max }
        : { x1:ext.min, x2:ext.max, y1:b.p1, y2:b.p2 };
      const bw = bbox.x2-bbox.x1, bh = bbox.y2-bbox.y1;
      if (bw<=0 || bh<=0) continue;
      const aspect = Math.max(bw,bh)/Math.min(bw,bh);
      if (aspect < BRACKET_ASPECT_MIN || aspect > BRACKET_ASPECT_MAX) continue;
      let dark=0, n=0;
      for (let y=bbox.y1; y<bbox.y2; y++) { const row=y*w; for (let x=bbox.x1; x<bbox.x2; x++) { n++; if (gray[row+x] <= threshold) dark++; } }
      const fill = n ? dark/n : 0;
      if (fill < BRACKET_FILL_MIN || fill > BRACKET_FILL_MAX) continue;
      const edges = edgeRatios(gray, w, h, bbox, threshold);
      const entries = Object.entries(edges).sort((a,c) => a[1]-c[1]);
      const [openSide, openVal] = entries[0];
      const minOther = Math.min(entries[1][1], entries[2][1], entries[3][1]);
      if (openVal <= BRACKET_OPEN_EDGE_MAX && minOther >= BRACKET_SOLID_EDGE_MIN) {
        return { bbox, openSide };
      }
    }
  }
  return null;
}

// 그레이스케일 배열(Uint8Array) 90/180도 회전 — PIL Image.rotate()와
// 동일한 규약(양수 각도 = 반시계, 이미지 좌표계 y축 아래방향 기준).
// 실측 검증: rotate(90)->반시계, rotate(-90)->시계, rotate(180) 모두
// Python PIL 결과와 픽셀 단위로 일치 확인.
function rotateGrayCCW90(gray, w, h) {
  const newW = h, newH = w;
  const out = new Uint8Array(newW*newH);
  for (let ny=0; ny<newH; ny++) for (let nx=0; nx<newW; nx++) out[ny*newW+nx] = gray[nx*w + (w-1-ny)];
  return { gray: out, w: newW, h: newH };
}
function rotateGrayCW90(gray, w, h) {
  const newW = h, newH = w;
  const out = new Uint8Array(newW*newH);
  for (let ny=0; ny<newH; ny++) for (let nx=0; nx<newW; nx++) out[ny*newW+nx] = gray[(h-1-nx)*w + ny];
  return { gray: out, w: newW, h: newH };
}
function rotateGray180(gray, w, h) {
  const out = new Uint8Array(w*h);
  for (let y=0; y<h; y++) for (let x=0; x<w; x++) out[y*w+x] = gray[(h-1-y)*w + (w-1-x)];
  return { gray: out, w, h };
}

// 실제 화면에 보이는 캔버스(픽셀 이미지)를 같은 각도로 회전시켜
// 세그먼트 판독용 작업 캔버스를 만든다 — 그레이스케일 배열 회전과
// 항상 같은 결과가 되도록 표준 캔버스 회전 공식을 그대로 사용.
function buildRotatedCanvas(srcCanvas, angle) {
  const W = srcCanvas.width, H = srcCanvas.height;
  const out = document.createElement('canvas');
  const octx = out.getContext('2d', { willReadFrequently: true });
  if (angle === 180) {
    out.width = W; out.height = H;
    octx.translate(W, H); octx.rotate(Math.PI);
    octx.drawImage(srcCanvas, 0, 0);
  } else if (angle === 90) { // 반시계
    out.width = H; out.height = W;
    octx.translate(0, W); octx.rotate(-Math.PI/2);
    octx.drawImage(srcCanvas, 0, 0);
  } else if (angle === -90) { // 시계
    out.width = H; out.height = W;
    octx.translate(H, 0); octx.rotate(Math.PI/2);
    octx.drawImage(srcCanvas, 0, 0);
  } else {
    out.width = W; out.height = H;
    octx.drawImage(srcCanvas, 0, 0);
  }
  return out;
}

const SEGMENT_PATTERNS = {
  0:'abcdef', 1:'bc', 2:'abged', 3:'abgcd', 4:'fgbc',
  5:'afgcd', 6:'afgecd', 7:'abc', 8:'abcdefg', 9:'abcdfg',
};
const SEG_ORDER = ['a','b','c','d','e','f','g'];
const DIGIT_BITS = {};
for (const [d, segs] of Object.entries(SEGMENT_PATTERNS)) {
  DIGIT_BITS[d] = SEG_ORDER.map(s => segs.includes(s) ? 1 : 0);
}

function otsuThreshold(grayArray) {
  const hist = new Array(256).fill(0);
  for (let i = 0; i < grayArray.length; i++) hist[grayArray[i]]++;
  const total = grayArray.length;
  let sum = 0;
  for (let t = 0; t < 256; t++) sum += t * hist[t];
  let sumB = 0, wB = 0, varMax = -1, threshold = 127;
  for (let t = 0; t < 256; t++) {
    wB += hist[t];
    if (wB === 0) continue;
    const wF = total - wB;
    if (wF === 0) break;
    sumB += t * hist[t];
    const mB = sumB / wB, mF = (sum - sumB) / wF;
    const between = wB * wF * (mB - mF) * (mB - mF);
    if (between > varMax) { varMax = between; threshold = t; }
  }
  return threshold;
}

function findDarkBBox(ctx, W, H, scale) {
  const tW = Math.round(W*scale), tH = Math.round(H*scale);
  const tmp = document.createElement('canvas');
  tmp.width = tW; tmp.height = tH;
  const tctx = tmp.getContext('2d', { willReadFrequently: true });
  tctx.drawImage(ctx.canvas, 0, 0, W, H, 0, 0, tW, tH);
  const data = tctx.getImageData(0, 0, tW, tH).data;

  const gray = new Uint8Array(tW*tH);
  for (let p = 0; p < tW*tH; p++) gray[p] = Math.round((data[p*4]+data[p*4+1]+data[p*4+2])/3);
  const threshold = otsuThreshold(gray);

  let minX=tW, minY=tH, maxX=-1, maxY=-1, count=0;
  for (let y = 0; y < tH; y++) {
    for (let x = 0; x < tW; x++) {
      if (gray[y*tW+x] <= threshold) {
        count++;
        if (x<minX)minX=x; if (x>maxX)maxX=x;
        if (y<minY)minY=y; if (y>maxY)maxY=y;
      }
    }
  }
  const MIN_PX = Math.round(tW*tH*0.005);
  if (count < MIN_PX || maxX < 0) return null;

  return {
    x1: minX/scale, y1: minY/scale, x2: (maxX+1)/scale, y2: (maxY+1)/scale,
    darkCount: count, threshold,
  };
}

// 세그먼트 좌표 비율 — digits_7seg.png를 그린 비율과 동일하게 맞춤
const SEG_BOXES = {
  a: { x1:0.20, x2:0.80, y1:0.00, y2:0.10 },
  g: { x1:0.20, x2:0.80, y1:0.45, y2:0.55 },
  d: { x1:0.20, x2:0.80, y1:0.90, y2:1.00 },
  f: { x1:0.00, x2:0.22, y1:0.08, y2:0.44 },
  b: { x1:0.78, x2:1.00, y1:0.08, y2:0.44 },
  e: { x1:0.00, x2:0.22, y1:0.56, y2:0.92 },
  c: { x1:0.78, x2:1.00, y1:0.56, y2:0.92 },
};
const SEG_ON_RATIO = 0.35; // 그 구역의 35% 이상이 어두우면 "켜짐"

function readSegments(ctx, bbox) {
  const w = bbox.x2 - bbox.x1, h = bbox.y2 - bbox.y1;
  const crop = document.createElement('canvas');
  crop.width = 100; crop.height = 100;
  const cctx = crop.getContext('2d', { willReadFrequently: true });
  cctx.drawImage(ctx.canvas, bbox.x1, bbox.y1, w, h, 0, 0, 100, 100);
  const data = cctx.getImageData(0, 0, 100, 100).data;
  const gray = new Uint8Array(100*100);
  for (let i=0;i<100*100;i++) gray[i] = Math.round((data[i*4]+data[i*4+1]+data[i*4+2])/3);
  const threshold = otsuThreshold(gray);

  const bits = [];
  const ratios = {};
  for (const s of SEG_ORDER) {
    const box = SEG_BOXES[s];
    const x1 = Math.round(box.x1*100), x2 = Math.round(box.x2*100);
    const y1 = Math.round(box.y1*100), y2 = Math.round(box.y2*100);
    let dark=0, n=0;
    for (let y=y1; y<y2; y++) for (let x=x1; x<x2; x++) {
      n++; if (gray[y*100+x] <= threshold) dark++;
    }
    const ratio = n ? dark/n : 0;
    ratios[s] = ratio;
    bits.push(ratio >= SEG_ON_RATIO ? 1 : 0);
  }
  return { bits, ratios, threshold };
}

function matchDigit(bits) {
  const scores = Object.entries(DIGIT_BITS).map(([d, pattern]) => {
    let diff = 0;
    for (let i=0;i<7;i++) if (bits[i] !== pattern[i]) diff++;
    return { digit: d, diff };
  });
  scores.sort((a,b) => a.diff - b.diff);
  return scores;
}

function drawRefPreview() {
  const strip = document.getElementById('refStrip');
  for (let d=0; d<=9; d++) {
    const c = document.createElement('canvas');
    c.width=24; c.height=40;
    const dc = c.getContext('2d');
    dc.fillStyle='#fff'; dc.fillRect(0,0,24,40);
    dc.fillStyle='#000';
    const segs = SEGMENT_PATTERNS[d];
    const t=3;
    if (segs.includes('a')) dc.fillRect(4,0,16,t);
    if (segs.includes('g')) dc.fillRect(4,18,16,t);
    if (segs.includes('d')) dc.fillRect(4,37,16,t);
    if (segs.includes('f')) dc.fillRect(0,2,t,17);
    if (segs.includes('b')) dc.fillRect(21,2,t,17);
    if (segs.includes('e')) dc.fillRect(0,21,t,17);
    if (segs.includes('c')) dc.fillRect(21,21,t,17);
    strip.appendChild(c);
  }
}

const video = document.getElementById('srcVideo');
const view = document.getElementById('view');
const vctx = view.getContext('2d', { willReadFrequently: true });
const correctedPreview = document.getElementById('correctedPreview');
const cpCtx = correctedPreview.getContext('2d', { willReadFrequently: true });
const bigResult = document.getElementById('bigResult');
const label = document.getElementById('label');
const debugEl = document.getElementById('debug');
const errEl = document.getElementById('err');
const startBtn = document.getElementById('startBtn');
let frameCount = 0;

function analyze() {
  const W = video.videoWidth, H = video.videoHeight;
  if (!W || !H) { requestAnimationFrame(analyze); return; }
  view.width = W; view.height = H;
  vctx.drawImage(video, 0, 0, W, H);

  frameCount++;

  try {

  // 가이드박스를 비디오 픽셀 좌표로 계산해 화면에 표시 (정렬 안내선)
  const guide = computeGuideBox(W, H);
  vctx.strokeStyle = 'rgba(255,220,0,0.95)'; vctx.lineWidth = 3;
  vctx.setLineDash([10,6]);
  vctx.strokeRect(guide.x1, guide.y1, guide.x2-guide.x1, guide.y2-guide.y1);
  vctx.setLineDash([]);

  const gw = Math.round(guide.x2-guide.x1), gh = Math.round(guide.y2-guide.y1);
  if (gw < 20 || gh < 10) { requestAnimationFrame(analyze); return; }

  // 가이드박스 안만 잘라서 그레이스케일로 변환
  const crop = document.createElement('canvas');
  crop.width = gw; crop.height = gh;
  const cctx = crop.getContext('2d', { willReadFrequently: true });
  cctx.drawImage(vctx.canvas, guide.x1, guide.y1, gw, gh, 0, 0, gw, gh);
  const cdata = cctx.getImageData(0,0,gw,gh).data;
  const gray = new Uint8Array(gw*gh);
  for (let i=0;i<gw*gh;i++) gray[i] = Math.round((cdata[i*4]+cdata[i*4+1]+cdata[i*4+2])/3);

  // ── 1단계: ㄷ 기준점을 찾아서 전체가 몇 도 돌아갔는지 판단 ──────
  const threshold0 = otsuThreshold(gray);
  const bracketInfo = tryFindBracket(gray, gw, gh, threshold0);
  const correctionAngle = bracketInfo ? (OPEN_SIDE_CORRECTION[bracketInfo.openSide] ?? 0) : 0;

  // 보정이 필요하면(90/180/270도) 가이드박스 크롭 자체를 돌려서
  // "작업 캔버스"를 만든다 — 이후 모든 처리는 이 작업 캔버스 기준으로
  // 하므로, 기존 세로 인식 로직을 그대로 재사용할 수 있다.
  let workCanvas = crop, workCtx = cctx, workGray = gray, workW = gw, workH = gh;
  if (correctionAngle !== 0) {
    workCanvas = buildRotatedCanvas(crop, correctionAngle);
    workCtx = workCanvas.getContext('2d', { willReadFrequently: true });
    const wdata = workCtx.getImageData(0,0,workCanvas.width, workCanvas.height).data;
    workW = workCanvas.width; workH = workCanvas.height;
    workGray = new Uint8Array(workW*workH);
    for (let i=0;i<workW*workH;i++) workGray[i] = Math.round((wdata[i*4]+wdata[i*4+1]+wdata[i*4+2])/3);
  }

  // ── 2단계: 작업 캔버스 위에서 컬럼 블록 탐지(로고/ㄷ/숫자열 분리) ──
  // 보정이 제대로 됐다면 ㄷ의 열린 방향은 항상 "오른쪽"이 되고,
  // 숫자열은 항상 가장 오른쪽 블록으로 잡힌다.
  const { blobs, threshold } = findColumnBlobs(workGray, workW, workH);
  if (blobs.length === 0) {
    bigResult.textContent = '?';
    label.textContent = '숫자열을 가이드박스 안에 비춰주세요';
    debugEl.textContent = `frame #${frameCount}\nvideo: ${W}x${H}\n가이드박스 안에 내용 블록 없음`;
    requestAnimationFrame(analyze);
    return;
  }

  const digitBlob = blobs[blobs.length-1];
  const anchorBlob = blobs.length >= 2 ? blobs[blobs.length-2] : null;

  const yExtent = findRowExtentInColumns(workGray, workW, workH, digitBlob.x1, digitBlob.x2, threshold);
  if (!yExtent) {
    bigResult.textContent = '?';
    label.textContent = '숫자열을 가이드박스 안에 비춰주세요';
    debugEl.textContent = `frame #${frameCount}\nvideo: ${W}x${H}\n숫자열 블록은 찾았지만 세로 범위 없음`;
    requestAnimationFrame(analyze);
    return;
  }

  // 작업 캔버스 좌표계 그대로 사용 (더 이상 비디오 절대좌표 아님)
  const inkAbs = { x1: digitBlob.x1, x2: digitBlob.x2, y1: yExtent.y1, y2: yExtent.y2 };
  workCtx.strokeStyle = 'rgba(0,255,255,0.9)'; workCtx.lineWidth = 2;
  workCtx.strokeRect(inkAbs.x1, inkAbs.y1, inkAbs.x2-inkAbs.x1, inkAbs.y2-inkAbs.y1);

  if (anchorBlob) {
    workCtx.strokeStyle = 'rgba(255,140,0,0.9)'; workCtx.lineWidth = 2;
    workCtx.strokeRect(anchorBlob.x1, inkAbs.y1, anchorBlob.x2-anchorBlob.x1, inkAbs.y2-inkAbs.y1);
  }

  // 숫자열 내부는 세로로 10등분 — 위에서부터 첫째자리~열째자리 순서.
  const totalH = inkAbs.y2-inkAbs.y1;
  const cellH = totalH/DIGIT_COUNT_GUIDE;
  const colW = inkAbs.x2-inkAbs.x1;

  const results = [];
  for (let i=0; i<DIGIT_COUNT_GUIDE; i++) {
    const cy1 = inkAbs.y1+i*cellH, cy2 = inkAbs.y1+(i+1)*cellH;
    const ch = cy2-cy1;
    const interior = {
      x1: inkAbs.x1+SHRINK.x1*colW, x2: inkAbs.x1+SHRINK.x2*colW,
      y1: cy1+SHRINK.y1*ch, y2: cy1+SHRINK.y2*ch,
    };
    const { bits } = readSegments(workCtx, interior);
    const scores = matchDigit(bits);
    results.push({ interior, best: scores[0], second: scores[1] });

    workCtx.strokeStyle = '#00ff88'; workCtx.lineWidth = 1.5;
    workCtx.strokeRect(interior.x1, interior.y1, interior.x2-interior.x1, interior.y2-interior.y1);
    workCtx.fillStyle = '#00ff88';
    workCtx.font = `bold ${Math.max(10, ch*0.4)}px monospace`;
    workCtx.textAlign = 'left';
    workCtx.fillText(scores[0].digit, inkAbs.x2+4, cy1+ch/2+4);
  }

  // 보정된 작업 캔버스를 화면 좌상단 "보정 미리보기"에 그대로 표시
  correctedPreview.width = workW; correctedPreview.height = workH;
  cpCtx.drawImage(workCanvas, 0, 0);

  const numberStr = results.map(r => r.best.digit).join('');
  bigResult.textContent = numberStr;
  const avgMargin = results.reduce((s,r)=>s+(r.second.diff-r.best.diff),0)/DIGIT_COUNT_GUIDE;
  const bracketMsg = bracketInfo ? `[ㄷ 인식, 열림=${bracketInfo.openSide}, 보정=${correctionAngle}°]` : '[ㄷ 미인식]';
  label.textContent = `숫자열이 박스 안에 여유 있게 들어오게 — 인식: ${numberStr}  (확신도 격차 ${avgMargin.toFixed(1)}) ${bracketMsg}`;

  const perCellLine = results.map((r,i) => `[${i}]${r.best.digit}(불일치${r.best.diff},격차${r.second.diff-r.best.diff})`).join(' ');
  debugEl.textContent = [
    `frame #${frameCount}`,
    `video(카메라 프레임)=${W}x${H}`,
    `window(화면 뷰포트)=${window.innerWidth}x${window.innerHeight}`,
    `screen.orientation=${screen.orientation ? screen.orientation.type : '(미지원)'}  window.orientation=${window.orientation ?? '(미지원)'}`,
    `가이드박스=(${guide.x1.toFixed(0)},${guide.y1.toFixed(0)})~(${guide.x2.toFixed(0)},${guide.y2.toFixed(0)})`,
    `ㄷ기준점=${bracketInfo ? `열림=${bracketInfo.openSide} bbox=(${bracketInfo.bbox.x1},${bracketInfo.bbox.y1})~(${bracketInfo.bbox.x2},${bracketInfo.bbox.y2})` : '미인식(기본방향 가정)'}  보정회전=${correctionAngle}°`,
    `작업캔버스=${workW}x${workH}  컬럼블록 수=${blobs.length}  숫자열블록=(${digitBlob.x1},${digitBlob.x2})`,
    `숫자열 세로범위(작업캔버스 기준)=(${yExtent.y1},${yExtent.y2})`,
    `칸별: ${perCellLine}`,
  ].join('\n');

  } catch (e) {
    // 어떤 예외든 여기서 잡아서 화면에 보여주고, 다음 프레임은 계속 돈다.
    // (예전엔 여기서 예외가 나면 requestAnimationFrame 재귀가 끊겨서
    //  스캔이 그 자리에서 완전히 멈췄다 — "카메라 멈춤" 증상의 원인)
    label.textContent = '처리 중 오류 (계속 시도 중)';
    debugEl.textContent = `frame #${frameCount}\nERROR: ${e.message}\n${e.stack || ''}`;
  }

  requestAnimationFrame(analyze);
}

startBtn.onclick = async () => {
  errEl.style.display = 'none';
  try {
    drawRefPreview();
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    video.srcObject = stream;
    await video.play();
    startBtn.style.display = 'none';
    label.textContent = '스캔 중...';
    requestAnimationFrame(analyze);
  } catch (e) {
    errEl.style.display = 'block';
    errEl.textContent = `카메라 오류: ${e.name} — ${e.message}`;
    label.textContent = '카메라 시작 실패';
  }
};
</script>
