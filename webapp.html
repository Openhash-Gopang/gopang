<!DOCTYPE html>
<html lang="ko">
<head>
<script src="/gopang-wallet.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>K-Law — AI 판결 상담</title>
<meta name="description" content="K-Law 전문 AI와 대화를 통해 사건 개요를 파악하고 가상 판결문을 작성합니다.">

<!-- ── 고팡 공통 인증 (subsystem-auth) ── -->
<script type="module" src="https://hondi.net/auth/subsystem-auth.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root {
  --gov:     #001845;
  --nav:     #002D72;
  --pri:     #0057A8;
  --pri-lt:  #006CC3;
  --pri-bg:  #EBF3FC;
  --pri-bd:  #B8D4F0;
  --sur:     #FFFFFF;
  --bg:      #F2F5FA;
  --bdr:     #D1D9E6;
  --txt:     #1A202C;
  --sub:     #4A5568;
  --hint:    #718096;
  --grn:     #1B6B3A; --gbg:#E6F4EC; --gbd:#A3D9B8;
  --red:     #C01C28; --rbg:#FEE2E2;
  --org:     #C05621; --obg:#FEF3E2;
  --pur:     #5B2D8E; --pbg:#F0EAF8;
  --gld:     #96760A; --ybg:#FEF3CD;
  --font:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif;
  --r:10px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-size:15px;color:var(--txt);background:var(--bg);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
button{font-family:var(--font)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:14px;height:14px;border:2px solid rgba(0,87,168,.2);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* ── 상단바 ── */
#top-bar{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));
  background:var(--gov);color:#fff;box-shadow:var(--sh);z-index:20;
}
.tb-brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px}
.tb-icon{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:14px}
.tb-sub{font-size:11px;font-weight:400;opacity:.75;margin-left:2px}
.tb-gear{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
.tb-gear:active{background:rgba(255,255,255,.22)}

/* ── 대화 스레드 ── */
#chat-thread{
  flex:1;overflow-y:auto;padding:18px 14px 10px;display:flex;flex-direction:column;gap:10px;
  -webkit-overflow-scrolling:touch;
}
.bubble{max-width:88%;padding:12px 14px;border-radius:14px;font-size:14.5px;line-height:1.65;white-space:normal;word-break:break-word;animation:pop .18s ease}
@keyframes pop{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.bubble-ai{align-self:flex-start;background:var(--sur);border:1px solid var(--bdr);border-top-left-radius:4px;color:var(--txt);box-shadow:var(--sh)}
.bubble-user{align-self:flex-end;background:var(--pri);color:#fff;border-top-right-radius:4px}
.bubble-typing{align-self:flex-start;display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--sur);border:1px solid var(--bdr);border-radius:14px;border-top-left-radius:4px;font-size:12.5px;color:var(--hint)}

/* ── 분석 카드 / 판결 요약 카드 ── */
.analysis-card{display:flex;flex-direction:column;gap:8px}
.ac-type{display:inline-block;align-self:flex-start;color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px}
.ac-row b{display:block;font-size:11.5px;color:var(--hint);font-weight:700;margin-bottom:2px}
.verdict-card{display:flex;flex-direction:column;gap:10px}
.vc-badge{font-size:11.5px;font-weight:700;color:var(--pri);background:var(--pri-bg);border:1px solid var(--pri-bd);border-radius:6px;padding:4px 8px;align-self:flex-start}
.vc-summary{font-size:14px;font-weight:600;line-height:1.7}
.vc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12.5px}
.vc-grid > div{background:var(--bg);border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
.vc-grid span{color:var(--hint);font-size:11px}
.vc-grid b{color:var(--pri);font-size:15px}
.vc-caution{font-size:11.5px;color:var(--hint);line-height:1.6;border-top:1px dashed var(--bdr);padding-top:8px}

/* ── 진행률 ── */
.progress-wrap{display:flex;flex-direction:column;gap:6px;min-width:220px}
.progress-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--pri);transition:width .3s}
.progress-label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--hint)}

/* ── 입력바 ── */
#input-bar{
  flex-shrink:0;display:flex;align-items:flex-end;gap:8px;padding:10px 12px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  background:var(--sur);border-top:1px solid var(--bdr);
}
.mic-btn{
  width:40px;height:40px;flex-shrink:0;border-radius:50%;border:1.5px solid var(--bdr);background:var(--bg);
  color:var(--pri);display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.mic-btn.recording{background:var(--rbg);border-color:#fca5a5;color:var(--red);animation:pulse 1s infinite}
.mic-btn svg{width:18px;height:18px}
#chat-input{
  flex:1;resize:none;max-height:120px;min-height:40px;padding:10px 14px;border-radius:20px;
  border:1.5px solid var(--bdr);font-family:var(--font);font-size:14.5px;line-height:1.5;background:var(--bg);color:var(--txt);
}
#chat-input:focus{outline:none;border-color:var(--pri);background:var(--sur)}
.send-btn{
  width:40px;height:40px;flex-shrink:0;border-radius:50%;border:none;background:var(--bdr);color:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;
}
.send-btn.active{background:var(--pri)}
.send-btn svg{width:17px;height:17px}
#mic-msg{margin:0 12px 8px;padding:9px 12px;border-radius:8px;font-size:11.5px;line-height:1.6}

/* ── 설정 시트 ── */
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .2s;z-index:30}
.sheet-backdrop.open{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;background:var(--sur);border-radius:16px 16px 0 0;
  padding:18px 18px calc(18px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .25s ease;z-index:31;
  box-shadow:0 -4px 20px rgba(0,0,0,.15);max-height:80vh;overflow-y:auto;
}
.sheet.open{transform:translateY(0)}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sheet-hd h3{font-size:15.5px;font-weight:800}
.sheet-close{width:30px;height:30px;border-radius:50%;background:var(--bg);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--sub)}
.provider-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.provider-btn{padding:10px 4px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--bg);font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;text-align:center}
.provider-btn.selected{border-color:var(--pri);background:var(--pri-bg);color:var(--pri)}
.sheet label{font-size:12px;font-weight:700;color:var(--hint);display:block;margin-bottom:6px}
.sheet input[type=text],.sheet input[type=password]{
  width:100%;padding:11px 12px;border-radius:8px;border:1.5px solid var(--bdr);font-size:13.5px;font-family:var(--font);margin-bottom:6px;
}
.sheet-hint{font-size:11px;color:var(--hint);line-height:1.6;margin-bottom:14px}
.sheet-save{width:100%;padding:12px;border-radius:8px;border:none;background:var(--pri);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.sheet-save:active{background:var(--pri-lt)}
</style>
</head>
<body>

<header id="top-bar">
  <div class="tb-brand">
    <div class="tb-icon">⚖</div>
    <div>K-Law <span class="tb-sub" id="klaw-ver-badge">로딩 중…</span></div>
  </div>
  <button class="tb-gear" onclick="openSettings()" title="LLM / API Key 설정">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09A1.65 1.65 0 0015 4.6a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
    </svg>
  </button>
</header>

<main id="chat-thread"></main>

<footer id="input-bar">
  <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="음성 입력">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0014 0"/><line x1="12" y1="22" x2="12" y2="18"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
  </button>
  <textarea id="chat-input" rows="1" placeholder="메시지를 입력하세요…"></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMessage()" title="전송">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</footer>

<div class="sheet-backdrop" id="sheet-backdrop" onclick="closeSettings()"></div>
<div class="sheet" id="settings-sheet">
  <div class="sheet-hd">
    <h3>LLM · API Key 설정</h3>
    <button class="sheet-close" onclick="closeSettings()">✕</button>
  </div>
  <div class="provider-grid" id="provider-grid">
    <button class="provider-btn" id="pv-deepseek" onclick="selectProvider('deepseek')">DeepSeek</button>
    <button class="provider-btn" id="pv-claude" onclick="selectProvider('claude')">Claude</button>
    <button class="provider-btn" id="pv-gemini" onclick="selectProvider('gemini')">Gemini</button>
    <button class="provider-btn" id="pv-groq" onclick="selectProvider('groq')">Groq</button>
  </div>
  <label>API Key</label>
  <input type="password" id="settings-key-input" placeholder="API Key 입력">
  <div class="sheet-hint">이 기기의 브라우저에만 저장되며, K-Law 서버로는 전송되지 않습니다. 데스크탑 시뮬레이터와 키를 공유합니다.</div>
  <button class="sheet-save" onclick="saveSettingsKey()">저장</button>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// GWP 파라미터 파싱 (gopang → 새 탭 호출 시 전달)
// ══════════════════════════════════════════════════════════════
const _qs        = new URLSearchParams(location.search);
const GWP_MODE    = _qs.get('gwp') === '1';
const GWP_TOKEN   = _qs.get('token')  || '';
const GWP_ORIGIN  = _qs.get('origin') || '';
let   GWP_CTX     = '';
if (_qs.get('ctx')) {
  try {
    GWP_CTX = (_qs.get('ctx_enc') === 'b64')
      ? decodeURIComponent(escape(atob(_qs.get('ctx'))))
      : decodeURIComponent(_qs.get('ctx'));
  } catch(e) { GWP_CTX = ''; }
}
let _gwpSeedUsed = false;

// ══════════════════════════════════════════════════════════════
// 상수 (desktop.html 판결 파이프라인과 동일 — 재사용)
// ══════════════════════════════════════════════════════════════
const L1_URL               = 'https://l1-hanlim.gopang.net/api/collections/profiles/records';
const DEEPSEEK_ENDPOINT    = 'https://api.deepseek.com/v1/chat/completions';
const KLAW_REPO_API        = 'https://api.github.com/repos/Openhash-Gopang/klaw/contents/';
const KLAW_RAW_BASE        = 'https://raw.githubusercontent.com/Openhash-Gopang/klaw/main/';
const API_KEY_STORAGE_PREFIX = 'klaw_api_key_';
const PROXY                = 'https://gopang-proxy.tensor-city.workers.dev';

const HDR_MODELS = {
  'deepseek': [ {value:'deepseek-v4-pro', label:'deepseek-v4-pro'}, {value:'deepseek-v4-flash', label:'deepseek-v4-flash'}, {value:'deepseek-r2', label:'deepseek-r2'} ],
  'claude':   [ {value:'claude-sonnet-4-20250514', label:'Claude Sonnet 4'}, {value:'claude-opus-4-5', label:'Claude Opus 4.5'}, {value:'claude-opus-4-20250514', label:'Claude Opus 4'} ],
  'gemini':   [ {value:'gemini-2.5-pro', label:'Gemini 2.5 Pro'}, {value:'gemini-2.5-flash', label:'Gemini 2.5 Flash'}, {value:'gemini-2.0-flash', label:'Gemini 2.0 Flash'}, {value:'gemini-1.5-pro', label:'Gemini 1.5 Pro'} ],
  'groq':     [ {value:'llama-3.3-70b-versatile', label:'Llama 3.3 70B'}, {value:'llama-3.1-8b-instant', label:'Llama 3.1 8B'} ],
};

let klawVersion    = '로딩 중…';
let klawMethodText = '';
const _KLAW_CACHE_KEY = 'klaw_method_cache';
const _KLAW_CACHE_TTL = 24 * 60 * 60 * 1000;

async function loadKlawVersion() {
  try {
    const cached = JSON.parse(sessionStorage.getItem(_KLAW_CACHE_KEY) || 'null');
    if (cached?.version && cached?.text && cached?.ts && (Date.now() - cached.ts) < _KLAW_CACHE_TTL) {
      klawVersion = cached.version; klawMethodText = cached.text;
      document.getElementById('klaw-ver-badge').textContent = klawVersion;
      return;
    }
  } catch(e) {}
  try {
    const res = await fetch(KLAW_REPO_API, {cache:'no-cache'});
    const files = await res.json();
    const vFiles = (Array.isArray(files)?files:[]).map(f=>f.name).filter(n=>/^klaw_v[\d_]+\.md$/i.test(n));
    function parseVer(name){ const m=name.match(/klaw_v([\d]+)_?([\d]*)\.md/i); return m?parseFloat(m[1]+'.'+(m[2]||'0')):0; }
    vFiles.sort((a,b)=>parseVer(b)-parseVer(a));
    const latestFile = vFiles[0] || 'klaw_v15_0.md';
    const verMatch = latestFile.match(/klaw_v([\d]+_?[\d]*)\.md/i);
    klawVersion = verMatch ? 'v'+verMatch[1].replace('_','.') : 'v15.1';
    const raw = await fetch(KLAW_RAW_BASE+latestFile, {cache:'no-cache'});
    klawMethodText = await raw.text();
    try { sessionStorage.setItem(_KLAW_CACHE_KEY, JSON.stringify({version:klawVersion,text:klawMethodText,ts:Date.now()})); } catch(e) {}
  } catch(e) {
    console.warn('[K-Law] GitHub 로드 실패:', e.message);
    klawVersion = 'v15.1'; klawMethodText = '';
  }
  document.getElementById('klaw-ver-badge').textContent = klawVersion;
}
loadKlawVersion();

const KLAW_ANALYZE_PROMPT = `당신은 K-Law AI 판결 분석 시스템입니다.
사용자가 제출한 사건의 개요를 분석하여 아래 형식으로 정확히 응답하세요.

【심급】1심 / 2심 / 3심 / 헌법재판 중 하나
【사건분류】민사(본안) / 형사 / 행정 / 가사 / 소액사건 / 노동 중 하나
【사건종류_상세】사건의 구체적 유형
【사건의 개요】입력된 내용을 바탕으로 명확하게 정리
【원고의 주장】원고(신청인) 측 주장 정리 (없으면 "정보 부족"으로 표기)
【피고의 주장】피고(상대방) 측 주장 정리 (없으면 "정보 부족"으로 표기)
【다툼이 없는 사실】양측이 동의하는 사실관계 (없으면 "추가 확인 필요"로 표기)
【다툼의 요지】핵심 법적 쟁점 2~3가지
【추가질문】판결 시뮬레이션에 필요한 정보가 부족한 경우 구체적인 질문 1~3개. 충분하면 "없음".

응답은 반드시 위 형식만 사용하세요.`;

function calcMatchRate(complexity) {
  const c = Math.max(1, Math.min(10, parseFloat(complexity) || 5));
  const rate = 99.99 - (c - 1) * (9.99 / 9);
  if (rate >= 99.9) return rate.toFixed(2) + '%';
  if (rate >= 99)   return rate.toFixed(1) + '%';
  return rate.toFixed(0) + '%';
}

function buildKlawSimPrompt(caseNo, level) {
  const methodBody = klawMethodText
    ? '[K-Law 방법론 원문]\n' + klawMethodText + '\n\n---\n\n'
    : '[⚠️ K-Law 방법론 원문 로드 실패 — 페이지를 새로고침하거나 GitHub 연결을 확인하세요]\n\n';
  return `당신은 K-Law 판결 방법론 ${klawVersion}을 적용하는 대한민국 법원 판결 AI입니다.
${methodBody}아래 가상판결 출력형식 v13.3을 준수하여 판결문을 작성하세요.

[K-Law ${klawVersion} 적용 | 사건번호: ${caseNo} | 심급: ${level}]

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
본 시뮬레이션은 법률 정보 제공 목적이며 법률 자문이 아닙니다.
가상판결 출력형식 v13.3 | K-Law ${klawVersion} 적용
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
}

const STEP_DEFS = [
  { id:'step0', tag:'STEP 0', title:'STEP 0 — 사건 기본 분석 · 명제 설정',
    prompt: ctx => `${ctx}\n\nK-Law 판결 방법론의 STEP 0만 작성하세요.\n[0-α 직관] [0-β 격리] [명제] [STEP-0-COMPLETE] 포함.` },
  { id:'stepA', tag:'STEP A', title:'STEP A — 판례 법리·법률관계 분석',
    prompt: ctx => `${ctx}\n\nSTEP 0이 완료되었습니다. STEP A만 작성하세요.\nA-0~A-5 소항목과 각 완료 태그 포함. 허위 판례 번호 인용 금지.` },
  { id:'stepB', tag:'STEP B', title:'STEP B — 법률관계 확정 · 최종 판결문',
    prompt: ctx => `${ctx}\n\nSTEP A가 완료되었습니다. STEP B만 작성하세요.\nB-1~B-7 소항목, 주문+이유 완성, [STEP-B-COMPLETE] 포함.` },
  { id:'stepC', tag:'STEP C', title:'STEP C — 완결 게이트웨이 · 확신도 · 자기 검증',
    prompt: ctx => `${ctx}\n\nSTEP B가 완료되었습니다. STEP C를 작성하고 아래 형식으로 마무리하세요.\n[법리 확신도: X/10] [사실 확신도: Y/10] [종합 확신도: Z/10]\n[사건 복잡도: X/10] [K-Law 대법원 판결 일치도 예상: XX%]\n[결론 유형: 확정적/조건부/판단유보]\n판결 요약: [핵심 2~3문장]\n[STEP-C-COMPLETE]` }
];

function parseAnalysis(text) {
  const get = tag => { const m = text.match(new RegExp('【' + tag + '】\\s*([\\s\\S]*?)(?=【|$)')); return m ? m[1].trim() : ''; };
  return {
    level: get('심급'), type: get('사건분류'), typeDetail: get('사건종류_상세'),
    overview: get('사건의 개요'), plaintiff: get('원고의 주장'), defendant: get('피고의 주장'),
    agreed: get('다툼이 없는 사실'), dispute: get('다툼의 요지'), extraQ: get('추가질문')
  };
}
function caseTypeColor(type) {
  const map = {'민사':'#0057A8','민사(본안)':'#0057A8','형사':'#C01C28','행정':'#1B6B3A','가사':'#7B3FA0','소액사건':'#C05621','노동':'#B8952A','헌법재판':'#003C82'};
  for (const [k,v] of Object.entries(map)) { if (type && type.includes(k)) return v; }
  return '#0057A8';
}
function escHtml(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function saveApiKey(model, key) {

// LLM 호출 (desktop.html과 동일 — 스트리밍/논스트리밍)
// ══════════════════════════════════════════════════════════════
async function callLLM(messages, maxTokens = 2000) {
  const model  = conversationState.llmModel || 'deepseek';
  const apiKey = conversationState.apiKey;

  if (model === 'claude') {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01' },
      body: JSON.stringify({ model: conversationState.selectedModel || 'claude-sonnet-4-20250514', max_tokens:maxTokens, messages:messages.filter(m=>m.role!=='system'), system:messages.find(m=>m.role==='system')?.content||'' })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    return data.content?.[0]?.text || '';
  }
  if (model === 'gemini') {
    const gmsg = messages.filter(m=>m.role!=='system').map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
    const sys  = messages.find(m=>m.role==='system')?.content || '';
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${conversationState.selectedModel||'gemini-2.5-pro'}:generateContent?key=${apiKey}`,
      {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_instruction:sys?{parts:[{text:sys}]}:undefined,contents:gmsg,generationConfig:{maxOutputTokens:maxTokens}})});
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }
  if (model === 'groq') {
    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
      body: JSON.stringify({ model: conversationState.selectedModel || 'llama-3.3-70b-versatile', messages, max_tokens:maxTokens, temperature:0.2 })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    return data.choices?.[0]?.message?.content || '';
  }
  const resp = await fetch(DEEPSEEK_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
    body: JSON.stringify({ model: conversationState.selectedModel || 'deepseek-v4-pro', messages, max_tokens:maxTokens, temperature:0.2 })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  return data.choices?.[0]?.message?.content || '';
}

async function _pumpSSE(response, handleJson) {
  if (!response.ok) {
    let errMsg = `HTTP ${response.status}`;
    try { const errBody = await response.json(); errMsg = errBody.error?.message || errBody.message || errMsg; } catch(e) {}
    throw new Error(errMsg);
  }
  const reader = response.body.getReader();
  const decoder = new TextDecoder('utf-8');
  let buf = '';
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      const t = line.trim();
      if (!t.startsWith('data:')) continue;
      const payload = t.slice(5).trim();
      if (payload === '[DONE]') continue;
      let json;
      try { json = JSON.parse(payload); } catch(e) { continue; }
      handleJson(json);
    }
  }
}

async function callLLMStream(messages, maxTokens = 3000, onChunk) {
  const model  = conversationState.llmModel || 'deepseek';
  const apiKey = conversationState.apiKey;
  let fullText = '';
  const emit = (delta) => { if (delta) { fullText += delta; onChunk && onChunk(delta, fullText); } };

  if (model === 'claude') {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01' },
      body: JSON.stringify({ model: conversationState.selectedModel || 'claude-sonnet-4-20250514', max_tokens:maxTokens, stream:true, messages:messages.filter(m=>m.role!=='system'), system:messages.find(m=>m.role==='system')?.content||'' })
    });
    await _pumpSSE(resp, (json) => {
      if (json.type === 'error') throw new Error(json.error?.message || 'Claude 스트리밍 오류');
      if (json.type === 'content_block_delta' && json.delta?.type === 'text_delta') emit(json.delta.text);
    });
    return fullText;
  }
  if (model === 'gemini') {
    const gmsg = messages.filter(m=>m.role!=='system').map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
    const sys  = messages.find(m=>m.role==='system')?.content || '';
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${conversationState.selectedModel||'gemini-2.5-pro'}:streamGenerateContent?alt=sse&key=${apiKey}`,
      {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_instruction:sys?{parts:[{text:sys}]}:undefined,contents:gmsg,generationConfig:{maxOutputTokens:maxTokens}})});
    await _pumpSSE(resp, (json) => {
      if (json.error) throw new Error(json.error.message || 'Gemini 스트리밍 오류');
      emit(json.candidates?.[0]?.content?.parts?.[0]?.text || '');
    });
    return fullText;
  }
  if (model === 'groq') {
    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
      body: JSON.stringify({ model: conversationState.selectedModel || 'llama-3.3-70b-versatile', messages, max_tokens:maxTokens, temperature:0.2, stream:true })
    });
    await _pumpSSE(resp, (json) => {
      if (json.error) throw new Error(json.error.message || JSON.stringify(json.error));
      emit(json.choices?.[0]?.delta?.content || '');
    });
    return fullText;
  }
  const resp = await fetch(DEEPSEEK_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
    body: JSON.stringify({ model: conversationState.selectedModel || 'deepseek-v4-pro', messages, max_tokens:maxTokens, temperature:0.2, stream:true })
  });
  await _pumpSSE(resp, (json) => {
    if (json.error) throw new Error(json.error.message || JSON.stringify(json.error));
    emit(json.choices?.[0]?.delta?.content || '');
  });
  return fullText;
}

function appendBubble(role, html) {

function appendTyping() {

function _progressHtml(done, total, label) {
  const pct = Math.round(done / total * 100);
  return `<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-label"><div class="spinner"></div>${escHtml(label)} (${done}/${total})</div></div>`;
}

window._onGopangAuth = async function(user) {
  klawUser = user;

  klawNickname = await _resolveNickname(user.ipv6 || GWP_TOKEN);

async function _resolveNickname(ipv6) {
  if (!ipv6) return '회원';
  try {
    const filter = encodeURIComponent(`guid='${ipv6}'`);
    const r = await fetch(`${L1_URL}?filter=${filter}&perPage=1`);
    const d = await r.json();
    return d.items?.[0]?.nickname || '회원';
  } catch(e) { console.warn('[K-Law] 닉네임 조회 실패:', e.message); return '회원'; }
};

function startGreeting() {
  if (conversationState.phase !== 'boot') return;
  const name = klawNickname || '회원';
  appendBubble('ai', `
    안녕하세요. <b>${escHtml(name)}</b>님, 저는 K-Law 전문 AI입니다.<br>
    지금부터 대화를 통해 사건의 개요를 파악하고, 정확한 대법원 판결문 작성을 위해 필요한 데이터를 정리하겠습니다.<br>
    대화가 끝나면, 가상 판결문을 작성하여 새 탭에 저장합니다. 상당한 분량의 문서이므로 <b>PC에서 열어보실 것을 권합니다.</b><br><br>
    먼저, 사건 개요를 간략히 말씀해주세요. 마이크를 활성화하여 입력하는 것이 문자 입력보다 편하실 거예요.<br>
    자, 시작하시죠.
  `);
  conversationState.phase = 'collecting';
  _checkApiKeyReady();
}

// 인증 콜백이 지연되거나(예: 이미 로그인된 세션) 오지 않는 예외 상황 대비 폴백
setTimeout(() => { if (conversationState.phase === 'boot') { klawNickname = '회원'; startGreeting(); } }, 4000);

function _checkApiKeyReady() {
  let found = false;
  for (const m of ['deepseek','claude','gemini','groq']) {
    const k = loadApiKey(m);
    if (k) { conversationState.llmModel = m; conversationState.apiKey = k; conversationState.selectedModel = HDR_MODELS[m][0].value; found = true; break; }
  }
  if (!found) {
    setTimeout(() => appendBubble('ai', `⚙️ 시작 전에 오른쪽 위 <b>설정</b> 아이콘에서 사용하실 LLM의 API Key를 먼저 등록해 주세요. (이 기기에만 저장되며 K-Law 서버로 전송되지 않습니다)`), 500);
  }
  updateProviderButtons();
}

// 메시지 전송 · 대화 분기
// ══════════════════════════════════════════════════════════════
async function sendMessage() {
  const ta = document.getElementById('chat-input');
  const text = ta.value.trim();
  if (!text) return;
  appendBubble('user', escHtml(text).replace(/\n/g,'<br>'));
  ta.value = ''; _micAutoResize(ta); _updateSendBtn();

  if (!conversationState.apiKey) {
    appendBubble('ai', '⚠️ 먼저 오른쪽 위 설정에서 API Key를 등록해 주세요.');
    return;
  }

  switch (conversationState.phase) {
    case 'collecting': await _handleCaseInput(text); break;
    case 'chatting':   await _handleChatReply(text); break;
    case 'generating':
      appendBubble('ai', '판결문을 작성하는 중입니다. 잠시만 기다려 주세요.');
      break;
    default: await _handleFreeQuestion(text); break;
  }
}

async function _handleCaseInput(text) {
  let seed = '';
  if (GWP_CTX && !_gwpSeedUsed) { seed = GWP_CTX + '\n'; _gwpSeedUsed = true; }
  conversationState.caseText = (conversationState.caseText ? conversationState.caseText + '\n' : '') + seed + text;

  if (conversationState.caseText.replace(/\s/g,'').length < 20) {
    appendBubble('ai', '조금 더 구체적으로 말씀해 주시겠어요? (날짜·금액·당사자 관계 등이 들어가면 좋습니다)');
    return;
  }

  conversationState.phase = 'analyzing';
  const typing = appendTyping();
  conversationState.messages = [
    { role:'system', content: KLAW_ANALYZE_PROMPT },
    { role:'user',   content: '사건의 개요:\n' + conversationState.caseText }
  ];
  try {
    const result = await callLLM(conversationState.messages, 1400);
    conversationState.messages.push({ role:'assistant', content: result });
    conversationState.caseData = parseAnalysis(result);
    typing.remove();
    renderAnalysisBubble(conversationState.caseData);

    const addQ = conversationState.caseData.extraQ;
    if (addQ && addQ !== '없음' && addQ.trim().length > 2) {
      conversationState.phase = 'chatting';
      appendBubble('ai', addQ.replace(/\n/g,'<br>') + '<br><br><span style="font-size:11.5px;color:var(--hint)">답변을 마치셨으면 "판결 진행"이라고 입력해 주세요.</span>');
    } else {
      conversationState.phase = 'generating';
      appendBubble('ai', '판결문 작성을 시작합니다.');
      setTimeout(runJudgementSim, 300);
    }
  } catch(e) {
    typing.remove();
    appendBubble('ai', `⚠ 분석 중 오류가 발생했습니다: ${escHtml(e.message)}`);
    conversationState.phase = 'collecting';
  }
}

function renderAnalysisBubble(d) {
  appendBubble('ai', `
    <div class="analysis-card">
      <div class="ac-type" style="background:${caseTypeColor(d.type)}">${escHtml(d.type||'—')} · ${escHtml(d.level||'—')}</div>
      ${d.overview  ? `<div class="ac-row"><b>사건 개요</b>${escHtml(d.overview)}</div>`   : ''}
      ${d.dispute   ? `<div class="ac-row"><b>다툼의 요지</b>${escHtml(d.dispute)}</div>`   : ''}
    </div>
  `);
}

async function _handleChatReply(text) {
  if (/판결\s*진행|시뮬레이션\s*진행|그만|생략|충분/.test(text)) {
    conversationState.phase = 'generating';
    appendBubble('ai', '판결문 작성을 시작합니다.');
    setTimeout(runJudgementSim, 300);
    return;
  }
  conversationState.messages.push({ role:'user', content: text });
  const typing = appendTyping();
  const checkPrompt = [...conversationState.messages, { role:'user', content:'위 추가 답변을 반영하여, 판결 시뮬레이션에 충분한 정보가 갖춰졌는지 판단하세요. 추가 질문이 필요하면 【추가질문】 형식으로, 충분하면 "시뮬레이션_진행"이라고만 답하세요.' }];
  try {
    const resp = await callLLM(checkPrompt, 500);
    typing.remove();
    if (resp.includes('시뮬레이션_진행') || resp.includes('시뮬레이션 진행')) {
      conversationState.phase = 'generating';
      appendBubble('ai', '판결문 작성을 시작합니다.');
      setTimeout(runJudgementSim, 300);
    } else {
      const qM = resp.match(/【추가질문】\s*([\s\S]*?)(?=【|$)/);
      appendBubble('ai', (qM ? qM[1].trim() : resp.trim()).replace(/\n/g,'<br>'));
      conversationState.messages.push({ role:'assistant', content: resp });
    }
  } catch(e) {
    typing.remove();
    appendBubble('ai', `⚠ 오류: ${escHtml(e.message)}`);
  }
}

// ══════════════════════════════════════════════════════════════
// STEP 0~C 판결 시뮬레이션 (desktop.html 파이프라인 재사용)
// ══════════════════════════════════════════════════════════════
async function runJudgementSim() {
  const caseNo = 'SIM-' + new Date().getFullYear() + '-' + String(++simCount).padStart(4,'0');
  const level  = conversationState.caseData?.level || '3심';
  window._verdictParts  = {};
  window._verdictCaseNo = caseNo;

  const progress = appendBubble('ai', _progressHtml(0, STEP_DEFS.length, 'STEP 0 준비 중…'));
  const d = conversationState.caseData || {};
  const baseCtx = `사건번호: ${caseNo}\n심급: ${level}\n사건분류: ${d.type||''}\n사건개요: ${d.overview||conversationState.caseText}\n원고 주장: ${d.plaintiff||''}\n피고 주장: ${d.defendant||''}\n다툼 없는 사실: ${d.agreed||''}\n다툼의 요지: ${d.dispute||''}`;

  for (let i = 0; i < STEP_DEFS.length; i++) {
    const stepDef = STEP_DEFS[i];
    progress.innerHTML = _progressHtml(i, STEP_DEFS.length, stepDef.tag + ' 작성 중…');
    const prevParts = Object.values(window._verdictParts).join('\n\n');
    const contextWithPrev = prevParts ? `[이전 STEP 출력]\n${prevParts}\n\n[사건 정보]\n${baseCtx}` : `[사건 정보]\n${baseCtx}`;
    const prompt = stepDef.prompt(contextWithPrev);
    const msgs = [{ role:'system', content: buildKlawSimPrompt(caseNo, level) }, { role:'user', content: prompt }];
    try {
      const result = await callLLMStream(msgs, 3000);
      window._verdictParts[stepDef.id] = result;
    } catch(e) {
      progress.innerHTML = `⚠ ${stepDef.tag} 생성 중 오류: ${escHtml(e.message)}`;
      conversationState.phase = 'chatting';
      return;
    }
  }
  progress.remove();

  const fullText = Object.values(window._verdictParts).join('\n\n');
  window._verdictText = fullText;
  appendBubble('ai', buildVerdictSummaryBubble(fullText, caseNo));
  openVerdictTab(fullText, caseNo);
  appendBubble('ai', `📄 가상 판결문을 새 탭(마크다운)에 저장했습니다. 상당한 분량이니 <b>PC에서 열람하시는 것을 권장</b>합니다.<br>궁금한 문구나 표현이 있으면 여기서 바로 물어보세요.`);
  conversationState.phase = 'done';
  _sendPdvReport({ summary: 'K-Law 모바일 대화 판결 시뮬레이션 완료: ' + caseNo, goal: '가상 판결문 생성' });
}

function buildVerdictSummaryBubble(fullText, caseNo) {
  const confM    = fullText.match(/\[법리 확신도:\s*([\d.]+)\/10\]/);
  const factM    = fullText.match(/\[사실 확신도:\s*([\d.]+)\/10\]/);
  const totalM   = fullText.match(/\[종합 확신도:\s*([\d.]+)\/10\]/);
  const complexM = fullText.match(/\[사건 복잡도:\s*([\d.]+)\/10\]/);
  const matchLLM = fullText.match(/\[K-Law 대법원 판결 일치도 예상:\s*([\d.]+%[^\]]*?)\]/);
  const typeM    = fullText.match(/\[결론 유형:\s*([^\]]+)\]/);
  const summM    = fullText.match(/판결 요약:\s*([\s\S]{1,200}?)(?:\n\n|\[━|$)/);
  const totalConf = totalM ? totalM[1] : '—';
  const complexity = complexM ? complexM[1] : null;
  const vType = typeM ? typeM[1].trim() : '—';
  const summary = summM ? summM[1].trim() : '';
  const matchRate = matchLLM ? matchLLM[1].trim() : (complexity ? calcMatchRate(complexity) : '90~99.99%');
  return `
    <div class="verdict-card">
      <div class="vc-badge">사건번호 ${escHtml(caseNo)} · K-Law ${escHtml(klawVersion)}</div>
      ${summary ? `<div class="vc-summary">${escHtml(summary)}</div>` : ''}
      <div class="vc-grid">
        <div><span>종합 확신도</span><b>${escHtml(totalConf)}/10</b></div>
        <div><span>사건 복잡도</span><b>${complexity ? escHtml(complexity)+'/10' : '—'}</b></div>
        <div><span>대법원 일치도 예상</span><b>${escHtml(matchRate)}</b></div>
        <div><span>결론 유형</span><b>${escHtml(vType)}</b></div>
      </div>
      <div class="vc-caution">본 판결문은 K-Law AI 시뮬레이션 결과이며 법률 자문이 아닙니다. 실제 소송에서는 반드시 자격 있는 법률 전문가와 상담하십시오.</div>
    </div>`;
}

  const html = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<title>K-Law 가상판결문 — ${caseNo}</title>

async function _handleFreeQuestion(text) {
  conversationState.messages.push({ role:'user', content: text });
  const typing = appendTyping();
  try {
    const sys = { role:'system', content: `당신은 K-Law 전문 AI입니다. 방금 작성한 아래 가상판결문 내용에 대한 사용자의 질문에 친절하고 정확하게 답하세요. 판결문에 없는 내용은 추측하지 말고 정보 부족을 명시하세요.\n\n[판결문]\n${window._verdictText || '(아직 작성되지 않음)'}` };
    const resp = await callLLM([sys, { role:'user', content: text }], 800);
    typing.remove();
    appendBubble('ai', escHtml(resp).replace(/\n/g,'<br>'));
    conversationState.messages.push({ role:'assistant', content: resp });
  } catch(e) {
    typing.remove();
    appendBubble('ai', `⚠ 오류: ${escHtml(e.message)}`);
  }
}

async function _sendPdvReport(action) {
  try {
    const user_guid = klawUser?.ipv6 || GWP_TOKEN || 'anonymous';
    await fetch(`${PROXY}/pdv_log`, {
      method: 'POST', headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ user_guid, source:'klaw-mobile', report:{ pdv_6w:{
        who: user_guid, when: new Date().toISOString(), where: location.href,
        what: action.summary, how: 'subsystem-auth Lv.'+(klawUser?.level||1), why: action.goal
      }}})
    });
  } catch(e) { console.warn('[K-Law] PDV 전송 실패:', e.message); }
}

// 설정 시트

function updateProviderButtons() {
  ['deepseek','claude','gemini','groq'].forEach(m => {
    document.getElementById('pv-' + m)?.classList.toggle('selected', conversationState.llmModel === m);
  });
}
function openSettings() {
  if (!conversationState.llmModel) conversationState.llmModel = 'deepseek';
  document.getElementById('settings-key-input').value = loadApiKey(conversationState.llmModel);
  updateProviderButtons();
  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('settings-sheet').classList.add('open');
}
function closeSettings() {
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('settings-sheet').classList.remove('open');
}
function selectProvider(m) {
  conversationState.llmModel = m;
  conversationState.selectedModel = HDR_MODELS[m][0].value;
  document.getElementById('settings-key-input').value = loadApiKey(m);
  updateProviderButtons();
}
function saveSettingsKey() {
  const key = document.getElementById('settings-key-input').value.trim();
  saveApiKey(conversationState.llmModel, key);
  conversationState.apiKey = key;
  closeSettings();
  if (key) appendBubble('ai', `✅ ${conversationState.llmModel} API Key가 저장되었습니다. 계속 진행해 주세요.`);
}

// ══════════════════════════════════════════════════════════════
// 음성 입력 (Web Speech API — v3.6 패턴 재사용, 단일 입력창용)
// ══════════════════════════════════════════════════════════════
let isRecording = false;
let recognition = null;

function _detectMicEnv() {
  const inIframe   = window.self !== window.top;
  const isSecure   = window.isSecureContext;
  const isArtifact = location.hostname.includes('claude') || location.hostname.includes('artifact');
  return { inIframe, isSecure, isArtifact };
}
async function _checkMicPermission() {
  if (!navigator.permissions) return 'unknown';
  try { const r = await navigator.permissions.query({ name:'microphone' }); return r.state; } catch(e) { return 'unknown'; }
}
function _micShowMsg(html, type = 'warn') {
  document.getElementById('mic-msg')?.remove();
  const colors = { warn:{bg:'#FFF3CD',bd:'#FDE68A',tx:'#78350F'}, error:{bg:'#FEE2E2',bd:'#FCA5A5',tx:'#7F1D1D'}, info:{bg:'#EFF6FF',bd:'#BFDBFE',tx:'#1E3A5F'} }[type] || {};
  const div = document.createElement('div');
  div.id = 'mic-msg';
  div.style.cssText = `background:${colors.bg};border:1px solid ${colors.bd};color:${colors.tx};`;
  div.innerHTML = html;
  document.getElementById('input-bar').insertAdjacentElement('beforebegin', div);
  setTimeout(() => div.remove(), 12000);
}
function _micSetIdle(btn) {
  isRecording = false; btn.classList.remove('recording');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0014 0"/><line x1="12" y1="22" x2="12" y2="18"/><line x1="8" y1="22" x2="16" y2="22"/></svg>';
  recognition = null;
}
function _micSetActive(btn) {
  isRecording = true; btn.classList.add('recording');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
}
function _micAutoResize(ta) { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 120) + 'px'; }
function _updateSendBtn() {
  const ta = document.getElementById('chat-input');
  document.getElementById('send-btn').classList.toggle('active', ta.value.trim().length > 0);
}

async function toggleMic() {
  const btn = document.getElementById('mic-btn');
  const ta  = document.getElementById('chat-input');
  if (isRecording) { recognition && recognition.stop(); return; }

  const env = _detectMicEnv();
  if (env.isArtifact || env.inIframe) { _micShowMsg('<strong>🎙️ 미리보기 환경에서는 마이크를 사용할 수 없습니다.</strong><br>실제 배포 URL에서 사용하세요.', 'info'); return; }
  if (!env.isSecure) { _micShowMsg('<strong>🎙️ HTTPS가 아닌 환경에서는 마이크를 사용할 수 없습니다.</strong>', 'error'); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { _micShowMsg('⚠️ 이 브라우저는 음성-텍스트 변환을 지원하지 않습니다.<br>Chrome 또는 Edge를 사용해 주세요.', 'warn'); return; }
  const perm = await _checkMicPermission();
  if (perm === 'denied') { _micShowMsg('<strong>🎙️ 마이크 권한이 차단되어 있습니다.</strong><br>주소창 왼쪽 🔒 → 사이트 설정 → 마이크 → 허용 후 새로고침하세요.', 'error'); return; }

  recognition = new SR();
  recognition.lang = 'ko-KR'; recognition.continuous = true; recognition.interimResults = true; recognition.maxAlternatives = 1;
  let finalText = ta.value; let interim = '';

  recognition.onstart = () => { _micSetActive(btn); document.getElementById('mic-msg')?.remove(); };
  recognition.onresult = (e) => {
    interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    ta.value = finalText + interim; _micAutoResize(ta);
  };
  recognition.onend = () => { _micSetIdle(btn); ta.value = finalText; _micAutoResize(ta); _updateSendBtn(); };
  recognition.onerror = (e) => {
    _micSetIdle(btn);
    const msgs = {
      'not-allowed': ['마이크 권한이 거부되었습니다.<br>주소창 🔒 → 사이트 설정 → 마이크 → 허용 후 새로고침하세요.', 'error'],
      'service-not-allowed': ['음성 인식 서비스가 허용되지 않았습니다.', 'error'],
      'network': ['네트워크 오류로 음성 인식에 실패했습니다.', 'warn'],
      'no-speech': ['음성이 감지되지 않았습니다. 마이크에 가까이 대고 다시 시도하세요.', 'warn'],
      'audio-capture': ['마이크를 찾을 수 없습니다.', 'error'],
    };
    if (e.error !== 'aborted' && msgs[e.error]) _micShowMsg('🎙️ ' + msgs[e.error][0], msgs[e.error][1]);
  };
  recognition.start();
}

// ══════════════════════════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const ta = document.getElementById('chat-input');
  ta.addEventListener('input', () => { _micAutoResize(ta); _updateSendBtn(); });
  ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
});
</script>
