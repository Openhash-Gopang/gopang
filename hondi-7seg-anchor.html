<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혼디 앵커 기반 10자리 숫자 인식</title>
<style>
  body{margin:0;font-family:-apple-system,'Pretendard',sans-serif;background:#111;
       color:#fff;padding:0;box-sizing:border-box;overflow:hidden}
  .wrap{position:relative;width:100vw;height:100vh}
  #srcVideo{position:fixed;top:0;left:0;width:2px;height:2px;opacity:0;pointer-events:none}
  canvas#view{width:100%;height:100%;object-fit:cover;display:block}
  #resultBox{
    position:absolute;top:0;left:0;width:100%;
    display:flex;flex-direction:column;align-items:center;padding-top:24px;
    pointer-events:none;
  }
  #bigResult{
    font-size:52px;font-weight:900;line-height:1;letter-spacing:2px;color:#7CFC8A;
    text-shadow:0 0 12px #000,0 0 24px #000;
  }
  #label{font-size:14px;margin-top:8px;background:rgba(0,0,0,0.6);padding:6px 16px;border-radius:20px}
  #debug{
    position:absolute;bottom:0;left:0;right:0;
    background:rgba(0,0,0,0.75);color:#7CFC8A;font:11px/1.5 monospace;
    padding:10px 14px;white-space:pre-wrap;max-height:34vh;overflow:auto;
  }
  #startBtn{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    padding:16px 32px;font-size:18px;font-weight:700;border:none;border-radius:12px;
    background:#1A73E8;color:#fff;cursor:pointer;z-index:10;
  }
  #err{position:absolute;top:20px;left:20px;right:20px;color:#ff6b6b;font-size:14px;
       background:rgba(0,0,0,0.7);padding:10px;border-radius:8px;display:none}
  #refStrip{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);border-radius:8px;padding:6px}
  #refStrip canvas{width:24px;height:40px;image-rendering:pixelated;border:1px solid #444;margin:1px}
</style>
</head>
<body>
<div class="wrap">
  <video id="srcVideo" playsinline autoplay muted></video>
  <canvas id="view"></canvas>
  <div id="resultBox">
    <div id="bigResult">?</div>
    <div id="label">카메라 시작 대기 중</div>
  </div>
  <div id="refStrip"></div>
  <div id="err"></div>
  <button id="startBtn">카메라 시작</button>
  <div id="debug"></div>
</div>

<script>
// ── 앵커(혼디 로고) 기준 위치 특정 + 10자리 숫자 인식 ────────────
// 화면 전체에서 "제일 큰 어두운 덩어리"를 찾던 이전 방식은, 카메라
// 프레임에 다른 어두운 물체가 같이 잡히면 엉뚱한 곳을 bbox로 잡을
// 위험이 있었다("세로 줄만 뜨고 인식 안 됨" 증상의 유력한 원인).
//
// 이번엔 "혼디" 로고의 파랑(ㅎ)·빨강(점)을 먼저 찾아 위치·크기 기준
// (anchor)을 잡고, 그 기준에서 "숫자열은 항상 이 상대 위치에 있다"는
// 실측 비율로 예상 영역을 역산한다. 숫자 자체엔 색이 전혀 없어서
// (검정 세그먼트만 사용) 앵커 색과 데이터가 겹칠 걱정도 없다.
// 예상 영역을 한 번 더 좁혀서(Otsu) 카메라 각도 오차를 보정한 뒤,
// 그 안에서만 10등분 + 세그먼트 판정을 한다(기존 로직 그대로 재사용).
//
// 비율은 실제 참조 이미지를 실측해서 얻었다(파랑-빨강 중심거리를
// unit으로 삼음): 숫자열 = 빨강 중심에서 x:[-0.52,+3.25]·unit,
// y:[+1.50,+2.07]·unit 위치.
const ANCHOR_MIN_PX = 20; // 썸네일 기준 최소 픽셀 수(파랑/빨강 각각)
const DIGIT_REGION_RATIO = { x1: -0.515, x2: 3.249, y1: 1.498, y2: 2.066 };

function findAnchor(ctx, W, H, scale) {
  const tW = Math.round(W*scale), tH = Math.round(H*scale);
  const tmp = document.createElement('canvas');
  tmp.width = tW; tmp.height = tH;
  const tctx = tmp.getContext('2d', { willReadFrequently: true });
  tctx.drawImage(ctx.canvas, 0, 0, W, H, 0, 0, tW, tH);
  const data = tctx.getImageData(0, 0, tW, tH).data;

  // 숫자는 검정/흰색뿐이라 파랑·빨강과 겹칠 일이 없다 — 클러스터링 없이
  // 전체 평균 중심(centroid)만으로 충분하다.
  let bn=0,bx=0,by=0, rn=0,rx=0,ry=0;
  for (let y=0;y<tH;y++) for (let x=0;x<tW;x++) {
    const i=(y*tW+x)*4;
    const r=data[i],g=data[i+1],b=data[i+2];
    if (b>100 && b-Math.max(r,g)>50) { bn++; bx+=x; by+=y; }
    else if (r>100 && r-Math.max(g,b)>50) { rn++; rx+=x; ry+=y; }
  }
  if (bn < ANCHOR_MIN_PX || rn < ANCHOR_MIN_PX) return null;

  const blue = { x:(bx/bn)/scale, y:(by/bn)/scale };
  const red  = { x:(rx/rn)/scale, y:(ry/rn)/scale };
  const unit = Math.hypot(blue.x-red.x, blue.y-red.y);
  if (unit < 4) return null;

  return { blue, red, unit };
}

function expectedDigitRegion(anchor, W, H) {
  const r = DIGIT_REGION_RATIO;
  const x1 = anchor.red.x + r.x1*anchor.unit;
  const x2 = anchor.red.x + r.x2*anchor.unit;
  const y1 = anchor.red.y + r.y1*anchor.unit;
  const y2 = anchor.red.y + r.y2*anchor.unit;
  return {
    x1: Math.max(0,x1), x2: Math.min(W,x2),
    y1: Math.max(0,y1), y2: Math.min(H,y2),
  };
}

// 예상 영역 안에서만 Otsu로 실제 어두운 bbox를 다시 좁힌다
// (카메라 각도·거리 오차를 보정 — 완전히 새로 탐색하지 않고 이
// 좁은 영역 안에서만 하므로 다른 물체에 낚일 위험이 없다)
function refineDigitBBox(ctx, region) {
  const rw = region.x2-region.x1, rh = region.y2-region.y1;
  if (rw <= 0 || rh <= 0) return null;
  const crop = document.createElement('canvas');
  crop.width = Math.round(rw); crop.height = Math.round(rh);
  const cctx = crop.getContext('2d', { willReadFrequently: true });
  cctx.drawImage(ctx.canvas, region.x1, region.y1, rw, rh, 0, 0, crop.width, crop.height);
  const data = cctx.getImageData(0,0,crop.width,crop.height).data;
  const gray = new Uint8Array(crop.width*crop.height);
  for (let p=0;p<gray.length;p++) gray[p]=Math.round((data[p*4]+data[p*4+1]+data[p*4+2])/3);
  const threshold = otsuThreshold(gray);

  let minX=crop.width,minY=crop.height,maxX=-1,maxY=-1,count=0;
  for (let y=0;y<crop.height;y++) for (let x=0;x<crop.width;x++) {
    if (gray[y*crop.width+x] <= threshold) {
      count++;
      if (x<minX)minX=x; if(x>maxX)maxX=x;
      if (y<minY)minY=y; if(y>maxY)maxY=y;
    }
  }
  if (count < 10 || maxX<0) return null;
  return {
    x1: region.x1+minX, x2: region.x1+maxX+1,
    y1: region.y1+minY, y2: region.y1+maxY+1,
  };
}

// a=위, b=우상, c=우하, d=아래, e=좌하, f=좌상, g=중간
const SEGMENT_PATTERNS = {
  0:'abcdef', 1:'bc', 2:'abged', 3:'abgcd', 4:'fgbc',
  5:'afgcd', 6:'afgecd', 7:'abc', 8:'abcdefg', 9:'abcdfg',
};
const SEG_ORDER = ['a','b','c','d','e','f','g'];
const DIGIT_BITS = {};
for (const [d, segs] of Object.entries(SEGMENT_PATTERNS)) {
  DIGIT_BITS[d] = SEG_ORDER.map(s => segs.includes(s) ? 1 : 0);
}

function otsuThreshold(grayArray) {
  const hist = new Array(256).fill(0);
  for (let i = 0; i < grayArray.length; i++) hist[grayArray[i]]++;
  const total = grayArray.length;
  let sum = 0;
  for (let t = 0; t < 256; t++) sum += t * hist[t];
  let sumB = 0, wB = 0, varMax = -1, threshold = 127;
  for (let t = 0; t < 256; t++) {
    wB += hist[t];
    if (wB === 0) continue;
    const wF = total - wB;
    if (wF === 0) break;
    sumB += t * hist[t];
    const mB = sumB / wB, mF = (sum - sumB) / wF;
    const between = wB * wF * (mB - mF) * (mB - mF);
    if (between > varMax) { varMax = between; threshold = t; }
  }
  return threshold;
}

function findDarkBBox(ctx, W, H, scale) {
  const tW = Math.round(W*scale), tH = Math.round(H*scale);
  const tmp = document.createElement('canvas');
  tmp.width = tW; tmp.height = tH;
  const tctx = tmp.getContext('2d', { willReadFrequently: true });
  tctx.drawImage(ctx.canvas, 0, 0, W, H, 0, 0, tW, tH);
  const data = tctx.getImageData(0, 0, tW, tH).data;

  const gray = new Uint8Array(tW*tH);
  for (let p = 0; p < tW*tH; p++) gray[p] = Math.round((data[p*4]+data[p*4+1]+data[p*4+2])/3);
  const threshold = otsuThreshold(gray);

  let minX=tW, minY=tH, maxX=-1, maxY=-1, count=0;
  for (let y = 0; y < tH; y++) {
    for (let x = 0; x < tW; x++) {
      if (gray[y*tW+x] <= threshold) {
        count++;
        if (x<minX)minX=x; if (x>maxX)maxX=x;
        if (y<minY)minY=y; if (y>maxY)maxY=y;
      }
    }
  }
  const MIN_PX = Math.round(tW*tH*0.005);
  if (count < MIN_PX || maxX < 0) return null;

  return {
    x1: minX/scale, y1: minY/scale, x2: (maxX+1)/scale, y2: (maxY+1)/scale,
    darkCount: count, threshold,
  };
}

// 세그먼트 좌표 비율 — digits_7seg.png를 그린 비율과 동일하게 맞춤
const SEG_BOXES = {
  a: { x1:0.20, x2:0.80, y1:0.00, y2:0.10 },
  g: { x1:0.20, x2:0.80, y1:0.45, y2:0.55 },
  d: { x1:0.20, x2:0.80, y1:0.90, y2:1.00 },
  f: { x1:0.00, x2:0.22, y1:0.08, y2:0.44 },
  b: { x1:0.78, x2:1.00, y1:0.08, y2:0.44 },
  e: { x1:0.00, x2:0.22, y1:0.56, y2:0.92 },
  c: { x1:0.78, x2:1.00, y1:0.56, y2:0.92 },
};
const SEG_ON_RATIO = 0.35; // 그 구역의 35% 이상이 어두우면 "켜짐"

function readSegments(ctx, bbox) {
  const w = bbox.x2 - bbox.x1, h = bbox.y2 - bbox.y1;
  const crop = document.createElement('canvas');
  crop.width = 100; crop.height = 100;
  const cctx = crop.getContext('2d', { willReadFrequently: true });
  cctx.drawImage(ctx.canvas, bbox.x1, bbox.y1, w, h, 0, 0, 100, 100);
  const data = cctx.getImageData(0, 0, 100, 100).data;
  const gray = new Uint8Array(100*100);
  for (let i=0;i<100*100;i++) gray[i] = Math.round((data[i*4]+data[i*4+1]+data[i*4+2])/3);
  const threshold = otsuThreshold(gray);

  const bits = [];
  const ratios = {};
  for (const s of SEG_ORDER) {
    const box = SEG_BOXES[s];
    const x1 = Math.round(box.x1*100), x2 = Math.round(box.x2*100);
    const y1 = Math.round(box.y1*100), y2 = Math.round(box.y2*100);
    let dark=0, n=0;
    for (let y=y1; y<y2; y++) for (let x=x1; x<x2; x++) {
      n++; if (gray[y*100+x] <= threshold) dark++;
    }
    const ratio = n ? dark/n : 0;
    ratios[s] = ratio;
    bits.push(ratio >= SEG_ON_RATIO ? 1 : 0);
  }
  return { bits, ratios, threshold };
}

function matchDigit(bits) {
  const scores = Object.entries(DIGIT_BITS).map(([d, pattern]) => {
    let diff = 0;
    for (let i=0;i<7;i++) if (bits[i] !== pattern[i]) diff++;
    return { digit: d, diff };
  });
  scores.sort((a,b) => a.diff - b.diff);
  return scores;
}

function drawRefPreview() {
  const strip = document.getElementById('refStrip');
  for (let d=0; d<=9; d++) {
    const c = document.createElement('canvas');
    c.width=24; c.height=40;
    const dc = c.getContext('2d');
    dc.fillStyle='#fff'; dc.fillRect(0,0,24,40);
    dc.fillStyle='#000';
    const segs = SEGMENT_PATTERNS[d];
    const t=3;
    if (segs.includes('a')) dc.fillRect(4,0,16,t);
    if (segs.includes('g')) dc.fillRect(4,18,16,t);
    if (segs.includes('d')) dc.fillRect(4,37,16,t);
    if (segs.includes('f')) dc.fillRect(0,2,t,17);
    if (segs.includes('b')) dc.fillRect(21,2,t,17);
    if (segs.includes('e')) dc.fillRect(0,21,t,17);
    if (segs.includes('c')) dc.fillRect(21,21,t,17);
    strip.appendChild(c);
  }
}

const video = document.getElementById('srcVideo');
const view = document.getElementById('view');
const vctx = view.getContext('2d', { willReadFrequently: true });
const bigResult = document.getElementById('bigResult');
const label = document.getElementById('label');
const debugEl = document.getElementById('debug');
const errEl = document.getElementById('err');
const startBtn = document.getElementById('startBtn');
let frameCount = 0;

const DIGIT_COUNT = 10; // 항상 정확히 10자리가 가로로 나열된다고 명시

function analyze() {
  const W = video.videoWidth, H = video.videoHeight;
  if (!W || !H) { requestAnimationFrame(analyze); return; }
  view.width = W; view.height = H;
  vctx.drawImage(video, 0, 0, W, H);

  frameCount++;

  // 1) 앵커(혼디 로고의 파랑·빨강) 찾기
  const anchor = findAnchor(vctx, W, H, 0.25);
  if (!anchor) {
    bigResult.textContent = '?';
    label.textContent = '혼디 로고(파랑·빨강)가 안 보입니다 — 로고까지 같이 비춰주세요';
    debugEl.textContent = `frame #${frameCount}\nvideo: ${W}x${H}\n앵커(파랑/빨강) 탐지 안 됨`;
    requestAnimationFrame(analyze);
    return;
  }
  // 앵커 표시 (파랑/빨강 중심점 + 연결선)
  vctx.strokeStyle = '#00aaff'; vctx.lineWidth = 3;
  vctx.beginPath(); vctx.arc(anchor.blue.x, anchor.blue.y, 8, 0, Math.PI*2); vctx.stroke();
  vctx.strokeStyle = '#ff3333';
  vctx.beginPath(); vctx.arc(anchor.red.x, anchor.red.y, 8, 0, Math.PI*2); vctx.stroke();
  vctx.strokeStyle = 'rgba(255,255,255,0.6)'; vctx.lineWidth = 1.5;
  vctx.beginPath(); vctx.moveTo(anchor.blue.x,anchor.blue.y); vctx.lineTo(anchor.red.x,anchor.red.y); vctx.stroke();

  // 2) 앵커 기준 실측 비율로 숫자열 예상 영역 역산
  const region = expectedDigitRegion(anchor, W, H);
  vctx.strokeStyle = 'rgba(0,170,255,0.5)'; vctx.lineWidth = 1.5;
  vctx.strokeRect(region.x1, region.y1, region.x2-region.x1, region.y2-region.y1);

  // 3) 예상 영역 안에서만 실제 어두운 bbox로 정밀화 (카메라 각도 오차 보정)
  const bbox = refineDigitBBox(vctx, region);

  if (!bbox) {
    bigResult.textContent = '?';
    label.textContent = '숫자열을 예상 위치(로고 아래)에서 못 찾았습니다';
    debugEl.textContent = `frame #${frameCount}\nvideo: ${W}x${H}\nanchor unit=${anchor.unit.toFixed(1)}\n예상영역=(${region.x1.toFixed(0)},${region.y1.toFixed(0)})~(${region.x2.toFixed(0)},${region.y2.toFixed(0)}) 안에 어두운 픽셀 없음`;
    requestAnimationFrame(analyze);
    return;
  }

  // 전체 범위(시작~끝)만 표시 — 노란 테두리
  vctx.strokeStyle = 'rgba(255,220,0,0.9)'; vctx.lineWidth = 2;
  vctx.strokeRect(bbox.x1, bbox.y1, bbox.x2-bbox.x1, bbox.y2-bbox.y1);

  // 그 폭을 정확히 10등분 — 연결요소 분석 없이 위치만으로 자른다
  const totalW = bbox.x2 - bbox.x1;
  const cellW = totalW / DIGIT_COUNT;

  const results = [];
  for (let i = 0; i < DIGIT_COUNT; i++) {
    const cellBbox = {
      x1: bbox.x1 + i*cellW, x2: bbox.x1 + (i+1)*cellW,
      y1: bbox.y1, y2: bbox.y2,
    };
    const { bits, ratios } = readSegments(vctx, cellBbox);
    const scores = matchDigit(bits);
    results.push({ cellBbox, best: scores[0], second: scores[1], bits });

    // 칸마다 사각형 경계 표시 + 인식된 숫자
    vctx.strokeStyle = '#00ff88'; vctx.lineWidth = 2;
    vctx.strokeRect(cellBbox.x1, cellBbox.y1, cellW, cellBbox.y2-cellBbox.y1);
    vctx.fillStyle = '#00ff88';
    vctx.font = `bold ${Math.max(14, cellW*0.35)}px monospace`;
    vctx.textAlign = 'center';
    vctx.fillText(scores[0].digit, cellBbox.x1+cellW/2, cellBbox.y2+Math.max(18,cellW*0.4));
  }

  const numberStr = results.map(r => r.best.digit).join('');
  bigResult.textContent = numberStr;
  const avgMargin = results.reduce((s,r)=>s+(r.second.diff-r.best.diff),0)/DIGIT_COUNT;
  label.textContent = `10자리 인식: ${numberStr}  (평균 확신도 격차 ${avgMargin.toFixed(1)})`;

  const perCellLine = results.map((r,i) => `[${i}]${r.best.digit}(불일치${r.best.diff},격차${r.second.diff-r.best.diff})`).join(' ');
  debugEl.textContent = [
    `frame #${frameCount}`,
    `video: ${W}x${H}  전체bbox=(${bbox.x1.toFixed(0)},${bbox.y1.toFixed(0)})~(${bbox.x2.toFixed(0)},${bbox.y2.toFixed(0)})`,
    `칸별: ${perCellLine}`,
    `순위: ${top3}`,
  ].join('\n');

  requestAnimationFrame(analyze);
}

startBtn.onclick = async () => {
  errEl.style.display = 'none';
  try {
    drawRefPreview();
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    video.srcObject = stream;
    await video.play();
    startBtn.style.display = 'none';
    label.textContent = '스캔 중...';
    requestAnimationFrame(analyze);
  } catch (e) {
    errEl.style.display = 'block';
    errEl.textContent = `카메라 오류: ${e.name} — ${e.message}`;
    label.textContent = '카메라 시작 실패';
  }
};
</script>
</body>
</html>
