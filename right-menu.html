<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>전문 분야 AI 에이전트 — 혼디</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#fff;color:#111;
  font-family:'Pretendard',-apple-system,'Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;overflow-y:auto;-webkit-overflow-scrolling:touch;
  /* 닫기 스와이프(왼쪽→오른쪽)가 화면 절대 오른쪽 가장자리에 가까워질 때
     안드로이드 시스템 뒤로가기 제스처가 가로채 드래그가 중간에 끊기는
     문제 방지 — webapp.html에 이미 적용한 것과 동일 */
  overscroll-behavior-x:none;touch-action:pan-y}

:root{
  --green:#16a34a;--green-lt:#dcfce7;--green-dk:#15803d;
  --border:#e5e7eb;--txt2:#6b7280;--txt3:#9ca3af;
  --chip-bg:#f9fafb;--gray-tile:#eceff1;--gray-tile-bd:#d8dcdf;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}

/* ── 헤더 ── */
.menu-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-t) + 18px) 18px 14px;
  position:sticky;top:0;background:#fff;z-index:1;
  border-bottom:1px solid var(--border);
}
.menu-title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.menu-close{
  width:30px;height:30px;border-radius:50%;border:none;background:var(--chip-bg);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt2);
  flex-shrink:0;
}
.menu-close svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.4;
  stroke-linecap:round;stroke-linejoin:round}

/* ── 검색 ── */
.menu-search{
  display:flex;align-items:center;gap:8px;
  margin:14px 16px 4px;padding:9px 12px;
  border:1px solid var(--border);border-radius:14px;background:var(--chip-bg);
}
.menu-search svg{width:16px;height:16px;stroke:var(--txt3);stroke-width:2.2;fill:none;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.menu-search input{
  flex:1;border:none;background:none;outline:none;font-family:inherit;
  font-size:13.5px;color:#111;min-width:0;
}
.menu-search input::placeholder{color:var(--txt3)}
.search-clear{
  border:none;background:var(--border);color:#fff;width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  font-size:12px;line-height:1;
}
.search-clear[hidden]{display:none}

.menu-section{padding:10px 0 4px}
.menu-section-title{
  font-size:11px;font-weight:700;color:var(--txt3);letter-spacing:.4px;
  padding:10px 18px 8px;text-transform:uppercase;
}
.search-empty{
  padding:18px 16px;text-align:center;color:var(--txt3);font-size:12.5px;
}

/* 카테고리 항목 — 아코디언(터치하면 하위 항목이 아래로 펼쳐짐) */
.acc-list{padding:2px 16px 10px;display:flex;flex-direction:column;gap:8px}
.acc-item{
  border:1px solid var(--border);border-radius:14px;background:var(--chip-bg);
  overflow:hidden;
}
.acc-item.open{border-color:var(--green-bd,#86efac);background:#fff}
.acc-header{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:12px 12px;background:none;border:none;cursor:pointer;text-align:left;
  font-family:inherit;color:#111;
}
.acc-header:active{background:var(--green-lt)}
.sys-icon{
  width:34px;height:34px;border-radius:10px;background:#fff;color:var(--green-dk);
  display:flex;align-items:center;justify-content:center;border:1px solid var(--border);
  flex-shrink:0;
}
.sys-icon svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;
  fill:none;stroke-linecap:round;stroke-linejoin:round}
.acc-header-text{flex:1;min-width:0}
.sys-name{font-size:13.5px;font-weight:700;letter-spacing:-0.2px;display:block}
.sys-desc{font-size:11px;color:var(--txt3);line-height:1.4;display:block;margin-top:1px}
.acc-chevron{
  width:16px;height:16px;stroke:var(--txt3);stroke-width:2.3;fill:none;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;
  transition:transform .2s;
}
.acc-item.open .acc-chevron{transform:rotate(180deg);stroke:var(--green-dk)}

/* K-Law — 하위 항목 없이 곧바로 이동하는 특별 메뉴. 연한 회색 배경으로 구분 */
.acc-item.klaw-special{background:var(--gray-tile);border-color:var(--gray-tile-bd)}
.acc-item.klaw-special .acc-header:active{background:#e2e5e8}
.acc-item.klaw-special .sys-icon{background:#fff;color:var(--txt2)}

.acc-panel{
  max-height:0;overflow:hidden;
  transition:max-height .25s ease;
}
.acc-panel-inner{padding:0 12px 12px 12px}

/* 하위 항목(전문직/기관/소셜 펼쳤을 때의 개별 항목) */
.leaf-list{display:flex;flex-direction:column;gap:6px}
.leaf-item{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:#fff;
  font-family:inherit;color:#111;cursor:pointer;text-align:left;
}
.leaf-item:active{background:var(--green-lt);border-color:var(--green-bd,#86efac)}
.leaf-text{flex:1;min-width:0}
.leaf-name{font-size:13px;font-weight:600;display:block}
.leaf-desc{font-size:11px;color:var(--txt3);line-height:1.4;display:block;margin-top:1px}
.leaf-cat-badge{font-style:normal;color:var(--green-dk);font-weight:600}
.leaf-arrow{width:14px;height:14px;stroke:var(--txt3);stroke-width:2.3;fill:none;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

.menu-footer{
  padding:14px 18px calc(var(--safe-b) + 18px);
  font-size:11px;color:var(--txt3);text-align:center;line-height:1.6;
}
</style>
<script>
/* ── 스킨 색상 적용 ── left-menu.html과 동일한 메커니즘.
   이 파일은 --green(베이스)과 --green-bd(아코디언 열림 테두리)도
   쓰므로 두 값까지 함께 덮어쓴다. */
(function () {
  const SKIN_COLORS = {
    blue:   { base: '#2563eb', lt: '#dbeafe', dk: '#1d4ed8', bd: '#93c5fd' },
    teal:   { base: '#0d9488', lt: '#ccfbf1', dk: '#0f766e', bd: '#5eead4' },
    amber:  { base: '#d97706', lt: '#fef3c7', dk: '#b45309', bd: '#fcd34d' },
    violet: { base: '#7c3aed', lt: '#ede9fe', dk: '#6d28d9', bd: '#c4b5fd' },
    slate:  { base: '#475569', lt: '#f1f5f9', dk: '#334155', bd: '#cbd5e1' }
  };
  function applyStoredSkinColor() {
    const c = SKIN_COLORS[localStorage.getItem('hondi_menu_color')];
    if (!c) return;
    const root = document.documentElement.style;
    root.setProperty('--green', c.base);
    root.setProperty('--green-lt', c.lt);
    root.setProperty('--green-dk', c.dk);
    root.setProperty('--green-bd', c.bd);
  }
  applyStoredSkinColor();
  window.addEventListener('storage', function (e) {
    if (e.key === 'hondi_menu_color') applyStoredSkinColor();
  });
})();
</script>
</head>
<body>

<div class="menu-header">
  <div>
    <div class="menu-title">전문 분야 AI 에이전트</div>
  </div>
  <button class="menu-close" onclick="parent.closeRightMenu && parent.closeRightMenu()" title="닫기">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<div class="menu-search">
  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.2" y2="16.2"/></svg>
  <input id="search-input" type="text" inputmode="search" placeholder="기관·전문직 검색 (예: 제주도청, 변호사)" autocomplete="off">
  <button class="search-clear" id="search-clear" hidden title="지우기">×</button>
</div>

<div class="menu-section" id="category-section">
  <div class="menu-section-title">분야 선택</div>
  <div class="acc-list" id="acc-list"></div>
</div>

<div class="menu-section" id="search-section" hidden>
  <div class="menu-section-title">검색 결과</div>
  <div class="acc-list leaf-list" id="search-list" style="padding:2px 16px 10px"></div>
</div>

<div class="menu-footer">
  카테고리를 누르면 하위 항목이 펼쳐집니다.<br>
  항목을 선택하면 해당 페이지로 곧바로 이동합니다.
</div>

<script>
// ────────────────────────────────────────────────────────────
// 주소 패턴: 서브도메인.gopang.net/webapp.html (확인됨)
// 단, 각 서브도메인 이름은 GitHub 저장소명(github.com/Openhash-Gopang/<id>)을
// 그대로 사용한다고 가정한 것 — 실제 이름이 다른 시스템이 있으면
// 아래 url 값만 수정하면 됩니다.
//
// 주의: patent / realty / customs / games / sns / community 서브도메인은
// 기존 SUBSYSTEMS 목록에 없던 신규 항목으로, 아직 실제 서비스가 없을 수
// 있습니다. 실제 도메인이 정해지면 url 값만 교체하면 됩니다.
// ────────────────────────────────────────────────────────────

// K-Law — 하위 항목 없이 단독으로 곧바로 이동하는 특별 메뉴 (연한 회색 타일)
const KLAW = {
  id:'klaw', name:'K-Law', desc:'법률 상담·소송',
  url:'https://klaw.gopang.net/webapp.html', icon:'scale'
};

// 전문직 — 직업(역할) 기준 AI 에이전트. 변호사는 K-Law와 동일한 목적지로 연결됩니다.
const CATEGORIES = [
  {
    id:'pro', name:'전문직', desc:'직업별 전문가 AI 에이전트', icon:'briefcase',
    items:[
      { id:'lawyer',      name:'변호사',     desc:'법률 상담·소송',        url:'https://klaw.gopang.net/webapp.html' },
      { id:'tax-pro',     name:'세무사',     desc:'세금 신고·절세 상담',     url:'https://tax.gopang.net/webapp.html' },
      { id:'accountant',  name:'회계사',     desc:'재무제표·회계 자문',      url:'https://tax.gopang.net/webapp.html?mode=accounting' },
      { id:'doctor',      name:'의사',       desc:'증상 상담·진료 안내',     url:'https://health.gopang.net/webapp.html' },
      { id:'pharmacist',  name:'약사',       desc:'복약 안내·의약품 상담',   url:'https://health.gopang.net/webapp.html?mode=pharmacy' },
      { id:'patent-atty', name:'변리사',     desc:'특허·상표·디자인 출원',   url:'https://patent.gopang.net/webapp.html' },
      { id:'ins-agent',   name:'보험설계사', desc:'보험 비교·청구 상담',     url:'https://insurance.gopang.net/webapp.html' },
      { id:'broker',      name:'증권전문가', desc:'투자 자문·시장 분석',     url:'https://stock.gopang.net/webapp.html' },
      { id:'realtor',     name:'공인중개사', desc:'부동산 중개·시세 상담',   url:'https://realty.gopang.net/webapp.html' },
    ]
  },
  {
    id:'org', name:'기관', desc:'정부·공공기관 AI 에이전트', icon:'building',
    items:[
      { id:'nts',          name:'국세청',         desc:'국세·세무 행정',         url:'https://tax.gopang.net/webapp.html' },
      { id:'kipo',         name:'특허청',         desc:'특허·상표·디자인 행정',   url:'https://patent.gopang.net/webapp.html' },
      { id:'hospital',     name:'병원',           desc:'진료 예약·의료 상담',     url:'https://health.gopang.net/webapp.html' },
      { id:'police-stn',   name:'경찰서',         desc:'민원·신고 접수',         url:'https://police.gopang.net/webapp.html' },
      { id:'fire-stn',     name:'소방서',         desc:'화재 신고·구급 요청',     url:'https://911.gopang.net/webapp.html' },
      { id:'school-org',   name:'학교·교육청',     desc:'학사·교육 행정',         url:'https://school.gopang.net/webapp.html' },
      { id:'jeju-city',    name:'제주도청',       desc:'행정·민원 처리',         url:'https://public.gopang.net/webapp.html' },
      { id:'nec',          name:'선거관리위원회', desc:'청원·투표',             url:'https://democracy.gopang.net/webapp.html' },
      { id:'customs',      name:'관세청',         desc:'통관·수출입 신고',       url:'https://customs.gopang.net/webapp.html' },
    ]
  },
  {
    id:'social', name:'소셜', desc:'게임·SNS', icon:'users',
    items:[
      { id:'game-zone',  name:'게임존',     desc:'미니게임·이벤트',     url:'https://games.gopang.net/webapp.html' },
      { id:'sns-feed',   name:'고팡 SNS',  desc:'소셜 피드·친구',      url:'https://sns.gopang.net/webapp.html' },
      { id:'community',  name:'커뮤니티',   desc:'게시판·동네 소식',    url:'https://community.gopang.net/webapp.html' },
    ]
  }
];

const ICONS = {
  scale:     '<path d="M12 3v18"/><path d="M5 7h14"/><path d="M5 7 3 13a3 3 0 0 0 4 0z"/><path d="M19 7l-2 6a3 3 0 0 0 4 0z"/>',
  briefcase: '<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="2" y1="13" x2="22" y2="13"/>',
  building: '<rect x="4" y="9" width="16" height="12" rx="1"/><path d="M2 9l10-6 10 6"/><line x1="9" y1="13" x2="9" y2="17"/><line x1="15" y1="13" x2="15" y2="17"/>',
  users:     '<circle cx="9" cy="8" r="3.5"/><path d="M2.5 20a6.5 6.5 0 0 1 13 0"/><circle cx="17.5" cy="9" r="3"/><path d="M15.5 13.2A6.5 6.5 0 0 1 21.5 20"/>',
};

const accList     = document.getElementById('acc-list');
const searchList  = document.getElementById('search-list');
const categorySec = document.getElementById('category-section');
const searchSec   = document.getElementById('search-section');
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');

// 검색 대상 — K-Law + 모든 카테고리의 하위 항목을 한 줄로 펼친 목록
const SEARCHABLE = [
  { ...KLAW, catLabel:'K-Law' },
  ...CATEGORIES.flatMap(cat => cat.items.map(it => ({ ...it, catLabel: cat.name })))
];

function leafRowHtml(it, showCatBadge) {
  const desc = showCatBadge
    ? `${it.desc} · <span class="leaf-cat-badge">${it.catLabel}</span>`
    : it.desc;
  return `
    <button class="leaf-item" data-goto="${it.url}">
      <span class="leaf-text">
        <span class="leaf-name">${it.name}</span>
        <span class="leaf-desc">${desc}</span>
      </span>
      <svg class="leaf-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>`;
}

function renderCategories() {
  const klawTile = `
    <div class="acc-item klaw-special" data-id="klaw">
      <button class="acc-header" data-goto="${KLAW.url}">
        <span class="sys-icon"><svg viewBox="0 0 24 24">${ICONS[KLAW.icon] || ''}</svg></span>
        <span class="acc-header-text">
          <span class="sys-name">${KLAW.name}</span>
          <span class="sys-desc">${KLAW.desc}</span>
        </span>
        <svg class="leaf-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>`;

  const catTiles = CATEGORIES.map(cat => `
    <div class="acc-item" data-id="${cat.id}">
      <button class="acc-header" onclick="toggleAcc('${cat.id}')">
        <span class="sys-icon"><svg viewBox="0 0 24 24">${ICONS[cat.icon] || ''}</svg></span>
        <span class="acc-header-text">
          <span class="sys-name">${cat.name}</span>
          <span class="sys-desc">${cat.desc}</span>
        </span>
        <svg class="acc-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="acc-panel">
        <div class="acc-panel-inner leaf-list">
          ${cat.items.map(it => leafRowHtml(it, false)).join('')}
        </div>
      </div>
    </div>`).join('');

  accList.innerHTML = klawTile + catTiles;
}
renderCategories();

// 카테고리 항목을 누르면 하위 목록이 아래로 펼쳐짐(아코디언). 여러 항목을 동시에 펼쳐둘 수 있음.
function toggleAcc(id) {
  const item  = accList.querySelector(`.acc-item[data-id="${id}"]`);
  if (!item) return;
  const panel = item.querySelector('.acc-panel');
  if (!panel) return; // K-Law는 펼칠 패널이 없음
  const open  = item.classList.contains('open');

  if (open) {
    item.classList.remove('open');
    panel.style.maxHeight = '0px';
  } else {
    item.classList.add('open');
    panel.style.maxHeight = panel.scrollHeight + 'px';
  }
}
window.toggleAcc = toggleAcc;

// '하위 항목' 또는 K-Law 타일 클릭 → 외부 시스템 사이트로 전체 페이지 이동 (최상위 프레임 이동)
function navigateTo(url) {
  if (!url) return;
  try { window.top.location.href = url; }
  catch (err) { window.location.href = url; }
}
function bindGotoDelegation(container) {
  container.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-goto]');
    if (!btn) return;
    e.stopPropagation(); // 아코디언 토글과 겹치지 않도록
    navigateTo(btn.dataset.goto);
  });
}
bindGotoDelegation(accList);
bindGotoDelegation(searchList);

// ── 검색 ── 입력하면 카테고리 아코디언 대신 평탄화된 검색 결과를 보여준다.
function runSearch() {
  const q = searchInput.value.trim().toLowerCase();
  searchClear.hidden = !q;

  if (!q) {
    categorySec.hidden = false;
    searchSec.hidden   = true;
    return;
  }

  const matches = SEARCHABLE.filter(it =>
    it.name.toLowerCase().includes(q) || (it.desc || '').toLowerCase().includes(q)
  );

  categorySec.hidden = true;
  searchSec.hidden   = false;
  searchList.innerHTML = matches.length
    ? matches.map(it => leafRowHtml(it, true)).join('')
    : `<div class="search-empty">'${searchInput.value}'와 일치하는 항목이 없습니다.</div>`;
}
searchInput.addEventListener('input', runSearch);
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  runSearch();
  searchInput.focus();
});
</script>

<!-- ── 왼쪽→오른쪽 스와이프로 메뉴 밀어넣기(닫기) ──
     right-menu.html은 webapp.html과 같은 origin의 iframe이므로
     parent.document에 직접 접근해 드로어를 손가락에 맞춰 드래그하듯
     움직이고, 일정 거리 이상이면 parent.closeRightMenu()를 호출한다.
     left-menu.html의 닫기 스크립트와 대칭(방향만 반대). -->
<script>
(function () {
  const THRESH      = 70; // 닫기로 확정하는 최소 이동 거리(px)
  const MOVE_DECIDE  = 10; // 가로/세로 판정을 위한 최소 이동 거리(px)

  let startX = 0, startY = 0;
  let tracking = false, decided = false, valid = false;
  let drawerEl = null;

  function getDrawer() {
    try { return parent.document.querySelector('#right-menu-overlay .right-menu-drawer'); }
    catch (e) { return null; }
  }

  function onStart(e) {
    if (e.touches.length !== 1) return;
    if (e.target.closest && e.target.closest('[data-noswipe]')) return;
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    tracking = true; decided = false; valid = false;
  }

  function onMove(e) {
    if (!tracking) return;
    const t  = e.touches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;

    if (!decided) {
      if (Math.abs(dx) < MOVE_DECIDE && Math.abs(dy) < MOVE_DECIDE) return;
      decided = true;
      // 세로 스크롤이거나, 닫는 방향(오른쪽)이 아니면 우리 제스처가 아님
      if (Math.abs(dy) >= Math.abs(dx) || dx <= 0) { tracking = false; return; }
      valid = true;
      drawerEl = getDrawer();
      if (drawerEl) drawerEl.style.transition = 'none';
    }

    if (valid) {
      e.preventDefault();
      if (drawerEl) drawerEl.style.transform = `translateX(${dx}px)`; // dx는 양수
    }
  }

  function onEnd(e) {
    if (!tracking) return;
    tracking = false;
    if (!valid) { drawerEl = null; return; }

    const t  = e.changedTouches[0];
    const dx = t.clientX - startX;
    if (drawerEl) drawerEl.style.transition = '';

    if (dx > THRESH) {
      if (drawerEl) drawerEl.style.transform = '';
      if (typeof parent.closeRightMenu === 'function') parent.closeRightMenu();
    } else if (drawerEl) {
      drawerEl.style.transform = ''; // 임계값 미달 — 원래 위치로 스냅백
    }
    drawerEl = null;
  }

  function onCancel() {
    if (tracking && valid && drawerEl) {
      drawerEl.style.transition = '';
      drawerEl.style.transform  = '';
    }
    tracking = false; valid = false; drawerEl = null;
  }

  document.addEventListener('touchstart',  onStart,  { passive: true });
  document.addEventListener('touchmove',   onMove,   { passive: false });
  document.addEventListener('touchend',    onEnd,    { passive: true });
  document.addEventListener('touchcancel', onCancel, { passive: true });
})();
</script>

</body>
</html>
