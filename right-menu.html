<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>하위 시스템 — 혼디</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#fff;color:#111;
  font-family:'Pretendard',-apple-system,'Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;overflow-y:auto;-webkit-overflow-scrolling:touch;
  /* 닫기 스와이프(왼쪽→오른쪽)가 화면 절대 오른쪽 가장자리에 가까워질 때
     안드로이드 시스템 뒤로가기 제스처가 가로채 드래그가 중간에 끊기는
     문제 방지 — webapp.html에 이미 적용한 것과 동일 */
  overscroll-behavior-x:none;touch-action:pan-y}

:root{
  --green:#16a34a;--green-lt:#dcfce7;--green-dk:#15803d;
  --border:#e5e7eb;--txt2:#6b7280;--txt3:#9ca3af;
  --chip-bg:#f9fafb;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}

/* ── 헤더 ── */
.menu-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-t) + 18px) 18px 14px;
  position:sticky;top:0;background:#fff;z-index:1;
  border-bottom:1px solid var(--border);
}
.menu-title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.menu-subtitle{font-size:11px;color:var(--txt3);margin-top:2px}
.menu-close{
  width:30px;height:30px;border-radius:50%;border:none;background:var(--chip-bg);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt2);
  flex-shrink:0;
}
.menu-close svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.4;
  stroke-linecap:round;stroke-linejoin:round}

.menu-section{padding:10px 0 4px}
.menu-section-title{
  font-size:11px;font-weight:700;color:var(--txt3);letter-spacing:.4px;
  padding:10px 18px 8px;text-transform:uppercase;
}

/* 시스템 항목 — 아코디언(터치하면 안내가 아래로 펼쳐짐) */
.acc-list{padding:2px 16px 10px;display:flex;flex-direction:column;gap:8px}
.acc-item{
  border:1px solid var(--border);border-radius:14px;background:var(--chip-bg);
  overflow:hidden;
}
.acc-item.open{border-color:var(--green-bd,#86efac);background:#fff}
.acc-header{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:12px 12px;background:none;border:none;cursor:pointer;text-align:left;
  font-family:inherit;color:#111;
}
.acc-header:active{background:var(--green-lt)}
.sys-icon{
  width:34px;height:34px;border-radius:10px;background:#fff;color:var(--green-dk);
  display:flex;align-items:center;justify-content:center;border:1px solid var(--border);
  flex-shrink:0;
}
.sys-icon svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;
  fill:none;stroke-linecap:round;stroke-linejoin:round}
.acc-header-text{flex:1;min-width:0}
.sys-name{font-size:13.5px;font-weight:700;letter-spacing:-0.2px;display:block}
.sys-desc{font-size:11px;color:var(--txt3);line-height:1.4;display:block;margin-top:1px}
.acc-chevron{
  width:16px;height:16px;stroke:var(--txt3);stroke-width:2.3;fill:none;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;
  transition:transform .2s;
}
.acc-item.open .acc-chevron{transform:rotate(180deg);stroke:var(--green-dk)}

.acc-panel{
  max-height:0;overflow:hidden;
  transition:max-height .25s ease;
}
.acc-panel-inner{padding:0 14px 14px 56px}
.acc-guide{font-size:12.5px;color:#374151;line-height:1.65;margin-bottom:10px}
.acc-goto{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 14px;border-radius:20px;border:none;
  background:var(--green);color:#fff;font-size:12.5px;font-weight:700;
  cursor:pointer;font-family:inherit;
}
.acc-goto:active{background:var(--green-dk)}
.acc-goto svg{width:13px;height:13px;stroke:#fff;stroke-width:2.4;fill:none;
  stroke-linecap:round;stroke-linejoin:round}

.menu-footer{
  padding:14px 18px calc(var(--safe-b) + 18px);
  font-size:11px;color:var(--txt3);text-align:center;line-height:1.6;
}
</style>
<script>
/* ── 스킨 색상 적용 ── left-menu.html과 동일한 메커니즘.
   이 파일은 --green(베이스)과 --green-bd(아코디언 열림 테두리)도
   쓰므로 두 값까지 함께 덮어쓴다. */
(function () {
  const SKIN_COLORS = {
    blue:   { base: '#2563eb', lt: '#dbeafe', dk: '#1d4ed8', bd: '#93c5fd' },
    teal:   { base: '#0d9488', lt: '#ccfbf1', dk: '#0f766e', bd: '#5eead4' },
    amber:  { base: '#d97706', lt: '#fef3c7', dk: '#b45309', bd: '#fcd34d' },
    violet: { base: '#7c3aed', lt: '#ede9fe', dk: '#6d28d9', bd: '#c4b5fd' },
    slate:  { base: '#475569', lt: '#f1f5f9', dk: '#334155', bd: '#cbd5e1' }
  };
  function applyStoredSkinColor() {
    const c = SKIN_COLORS[localStorage.getItem('hondi_menu_color')];
    if (!c) return;
    const root = document.documentElement.style;
    root.setProperty('--green', c.base);
    root.setProperty('--green-lt', c.lt);
    root.setProperty('--green-dk', c.dk);
    root.setProperty('--green-bd', c.bd);
  }
  applyStoredSkinColor();
  window.addEventListener('storage', function (e) {
    if (e.key === 'hondi_menu_color') applyStoredSkinColor();
  });
})();
</script>
</head>
<body>

<div class="menu-header">
  <div>
    <div class="menu-title">하위 시스템</div>
    <div class="menu-subtitle">정부·공공 서비스 바로가기</div>
  </div>
  <button class="menu-close" onclick="parent.closeRightMenu && parent.closeRightMenu()" title="닫기">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<div class="menu-section">
  <div class="menu-section-title">시스템 선택</div>
  <div class="acc-list" id="acc-list"></div>
</div>

<div class="menu-footer">
  항목을 누르면 간단한 안내가 펼쳐집니다.<br>
  안내 안의 '바로가기' 버튼을 누르면 해당 시스템으로 이동합니다.
</div>

<script>

const list = document.getElementById('acc-list');
list.innerHTML = SUBSYSTEMS.map(s => `
  <div class="acc-item" data-id="${s.id}">
    <button class="acc-header" onclick="toggleAcc('${s.id}')">
      <span class="sys-icon"><svg viewBox="0 0 24 24">${ICONS[s.icon] || ''}</svg></span>
      <span class="acc-header-text">
        <span class="sys-name">${s.name}</span>
        <span class="sys-desc">${s.desc}</span>
      </span>
      <svg class="acc-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="acc-panel">
      <div class="acc-panel-inner">
        <p class="acc-guide">${s.guide || ''}</p>
        <button class="acc-goto" data-url="${s.url}">
          바로가기
          <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M13 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
`).join('');

// 항목을 누르면 안내가 아래로 펼쳐짐(아코디언). 여러 항목을 동시에 펼쳐둘 수 있음.
function toggleAcc(id) {
  const item  = list.querySelector(`.acc-item[data-id="${id}"]`);
  if (!item) return;
  const panel = item.querySelector('.acc-panel');
  const open  = item.classList.contains('open');

  if (open) {
    item.classList.remove('open');
    panel.style.maxHeight = '0px';
  } else {
    item.classList.add('open');
    panel.style.maxHeight = panel.scrollHeight + 'px';
  }
}
window.toggleAcc = toggleAcc;

// '바로가기' 버튼 — 외부 시스템 사이트로 전체 페이지 이동 (현재 탭의 최상위 프레임 이동)
list.addEventListener('click', (e) => {
  const btn = e.target.closest('.acc-goto');
  if (!btn) return;
  e.stopPropagation(); // 아코디언 토글과 겹치지 않도록
  const url = btn.dataset.url;
  if (!url) return;
  try { window.top.location.href = url; }
  catch (err) { window.location.href = url; }
});
</script>

<!-- ── 왼쪽→오른쪽 스와이프로 메뉴 밀어넣기(닫기) ──
     right-menu.html은 webapp.html과 같은 origin의 iframe이므로
     parent.document에 직접 접근해 드로어를 손가락에 맞춰 드래그하듯
     움직이고, 일정 거리 이상이면 parent.closeRightMenu()를 호출한다.
     left-menu.html의 닫기 스크립트와 대칭(방향만 반대). -->
<script>
(function () {
  const THRESH      = 70; // 닫기로 확정하는 최소 이동 거리(px)
  const MOVE_DECIDE  = 10; // 가로/세로 판정을 위한 최소 이동 거리(px)

  let startX = 0, startY = 0;
  let tracking = false, decided = false, valid = false;
  let drawerEl = null;

  function getDrawer() {
    try { return parent.document.querySelector('#right-menu-overlay .right-menu-drawer'); }
    catch (e) { return null; }
  }

  function onStart(e) {
    if (e.touches.length !== 1) return;
    if (e.target.closest && e.target.closest('[data-noswipe]')) return;
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    tracking = true; decided = false; valid = false;
  }

  function onMove(e) {
    if (!tracking) return;
    const t  = e.touches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;

    if (!decided) {
      if (Math.abs(dx) < MOVE_DECIDE && Math.abs(dy) < MOVE_DECIDE) return;
      decided = true;
      // 세로 스크롤이거나, 닫는 방향(오른쪽)이 아니면 우리 제스처가 아님
      if (Math.abs(dy) >= Math.abs(dx) || dx <= 0) { tracking = false; return; }
      valid = true;
      drawerEl = getDrawer();
      if (drawerEl) drawerEl.style.transition = 'none';
    }

    if (valid) {
      e.preventDefault();
      if (drawerEl) drawerEl.style.transform = `translateX(${dx}px)`; // dx는 양수
    }
  }

  function onEnd(e) {
    if (!tracking) return;
    tracking = false;
    if (!valid) { drawerEl = null; return; }

    const t  = e.changedTouches[0];
    const dx = t.clientX - startX;
    if (drawerEl) drawerEl.style.transition = '';

    if (dx > THRESH) {
      if (drawerEl) drawerEl.style.transform = '';
      if (typeof parent.closeRightMenu === 'function') parent.closeRightMenu();
    } else if (drawerEl) {
      drawerEl.style.transform = ''; // 임계값 미달 — 원래 위치로 스냅백
    }
    drawerEl = null;
  }

  function onCancel() {
    if (tracking && valid && drawerEl) {
      drawerEl.style.transition = '';
      drawerEl.style.transform  = '';
    }
    tracking = false; valid = false; drawerEl = null;
  }

  document.addEventListener('touchstart',  onStart,  { passive: true });
  document.addEventListener('touchmove',   onMove,   { passive: false });
  document.addEventListener('touchend',    onEnd,    { passive: true });
  document.addEventListener('touchcancel', onCancel, { passive: true });
})();
</script>

</body>
</html>
