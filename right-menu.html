<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>하위 시스템 — 혼디</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#fff;color:#111;
  font-family:'Pretendard',-apple-system,'Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;overflow-y:auto;-webkit-overflow-scrolling:touch}

:root{
  --green:#16a34a;--green-lt:#dcfce7;--green-dk:#15803d;
  --border:#e5e7eb;--txt2:#6b7280;--txt3:#9ca3af;
  --chip-bg:#f9fafb;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}

/* ── 헤더 ── */
.menu-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-t) + 18px) 18px 14px;
  position:sticky;top:0;background:#fff;z-index:1;
  border-bottom:1px solid var(--border);
}
.menu-title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.menu-subtitle{font-size:11px;color:var(--txt3);margin-top:2px}
.menu-close{
  width:30px;height:30px;border-radius:50%;border:none;background:var(--chip-bg);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt2);
  flex-shrink:0;
}
.menu-close svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.4;
  stroke-linecap:round;stroke-linejoin:round}

.menu-section{padding:10px 0 4px}
.menu-section-title{
  font-size:11px;font-weight:700;color:var(--txt3);letter-spacing:.4px;
  padding:10px 18px 8px;text-transform:uppercase;
}

/* 시스템 항목 — 2열 그리드 카드 */
.sys-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:2px 16px 10px;
}
.sys-item{
  display:flex;flex-direction:column;align-items:flex-start;gap:8px;
  padding:14px 12px;border-radius:14px;background:var(--chip-bg);
  border:1px solid var(--border);cursor:pointer;text-align:left;
  font-family:inherit;color:#111;
}
.sys-item:active{background:var(--green-lt);border-color:var(--green)}
.sys-icon{
  width:36px;height:36px;border-radius:10px;background:#fff;color:var(--green-dk);
  display:flex;align-items:center;justify-content:center;border:1px solid var(--border);
}
.sys-icon svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;
  fill:none;stroke-linecap:round;stroke-linejoin:round}
.sys-name{font-size:13.5px;font-weight:700;letter-spacing:-0.2px}
.sys-desc{font-size:11px;color:var(--txt3);line-height:1.4;margin-top:-4px}

.menu-footer{
  padding:14px 18px calc(var(--safe-b) + 18px);
  font-size:11px;color:var(--txt3);text-align:center;line-height:1.6;
}
</style>
</head>
<body>

<div class="menu-header">
  <div>
    <div class="menu-title">하위 시스템</div>
    <div class="menu-subtitle">정부·공공 서비스 바로가기</div>
  </div>
  <button class="menu-close" onclick="parent.closeRightMenu && parent.closeRightMenu()" title="닫기">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<div class="menu-section">
  <div class="menu-section-title">시스템 선택</div>
  <div class="sys-grid" id="sys-grid"></div>
</div>

<div class="menu-footer">
  항목을 누르면 해당 시스템 앱으로 이동합니다.<br>
  더 많은 시스템이 계속 추가될 예정입니다.
</div>

<script>
// ────────────────────────────────────────────────────────────
// 주소 패턴: 서브도메인.gopang.net/webapp.html (확인됨)
// 단, 각 서브도메인 이름은 GitHub 저장소명(github.com/Openhash-Gopang/<id>)을
// 그대로 사용한다고 가정한 것 — 실제 이름이 다른 시스템이 있으면
// 아래 url 값만 수정하면 됩니다. (예: '911' 저장소가 실제로는
// k119.gopang.net 등 다른 이름을 쓸 수도 있음)
// ────────────────────────────────────────────────────────────
const SUBSYSTEMS = [
  { id:'klaw',       name:'K-Law',       desc:'법률 상담·소송',   url:'https://klaw.gopang.net/webapp.html',       icon:'scale' },
  { id:'tax',        name:'K-Tax',       desc:'국세·세무',        url:'https://tax.gopang.net/webapp.html',        icon:'receipt' },
  { id:'school',     name:'K-School',    desc:'교육·학사',        url:'https://school.gopang.net/webapp.html',     icon:'cap' },
  { id:'health',     name:'K-Health',    desc:'의료·건강',        url:'https://health.gopang.net/webapp.html',     icon:'heart' },
  { id:'police',     name:'K-Police',    desc:'민원·신고',        url:'https://police.gopang.net/webapp.html',     icon:'shield' },
  { id:'911',        name:'K-119',       desc:'소방·구급',        url:'https://911.gopang.net/webapp.html',        icon:'siren' },
  { id:'traffic',    name:'K-Traffic',   desc:'교통·단속',        url:'https://traffic.gopang.net/webapp.html',    icon:'car' },
  { id:'public',     name:'K-Public',    desc:'행정·민원',        url:'https://public.gopang.net/webapp.html',     icon:'building' },
  { id:'democracy',  name:'K-Democracy', desc:'청원·투표',        url:'https://democracy.gopang.net/webapp.html',  icon:'vote' },
  { id:'logistics',  name:'K-Logistics', desc:'물류·배송',        url:'https://logistics.gopang.net/webapp.html',  icon:'truck' },
  { id:'insurance',  name:'K-Insurance', desc:'보험',             url:'https://insurance.gopang.net/webapp.html',  icon:'umbrella' },
  { id:'stock',      name:'K-Stock',     desc:'증권·투자',        url:'https://stock.gopang.net/webapp.html',      icon:'trend' },
  { id:'market',     name:'혼디 마켓',     desc:'커머스',           url:'https://market.gopang.net/webapp.html',     icon:'bag' },
  { id:'security',   name:'K-Security',  desc:'보안',             url:'https://security.gopang.net/webapp.html',   icon:'lock' },
  { id:'gdc',        name:'GDC',         desc:'디지털 화폐',       url:'https://gdc.gopang.net/webapp.html',        icon:'coin' },
  { id:'qna',        name:'Q&A',         desc:'고객 지원',         url:'https://qna.gopang.net/webapp.html',        icon:'chat' },
];

const ICONS = {
  scale:    '<path d="M12 3v18"/><path d="M5 7h14"/><path d="M5 7 3 13a3 3 0 0 0 4 0z"/><path d="M19 7l-2 6a3 3 0 0 0 4 0z"/>',
  receipt:  '<path d="M5 2v20l3-2 3 2 3-2 3 2 3-2V2l-3 2-3-2-3 2-3-2-3 2z"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/>',
  cap:      '<path d="M22 10 12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1 3 3 6 3s6-2 6-3v-5"/>',
  heart:    '<path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/>',
  shield:   '<path d="M12 2 4 5v6c0 5 3.5 9 8 11 4.5-2 8-6 8-11V5z"/>',
  siren:    '<path d="M12 2a5 5 0 0 0-5 5v6h10V7a5 5 0 0 0-5-5z"/><line x1="12" y1="2" x2="12" y2="0.5"/><line x1="3" y1="21" x2="21" y2="21"/><path d="M5 21v-3a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v3"/>',
  car:      '<path d="M3 13l1.5-5A2 2 0 0 1 6.4 6.5h11.2A2 2 0 0 1 19.5 8l1.5 5"/><rect x="2.5" y="13" width="19" height="5" rx="1.5"/><circle cx="7" cy="18.5" r="1.5"/><circle cx="17" cy="18.5" r="1.5"/>',
  building: '<rect x="4" y="9" width="16" height="12" rx="1"/><path d="M2 9l10-6 10 6"/><line x1="9" y1="13" x2="9" y2="17"/><line x1="15" y1="13" x2="15" y2="17"/>',
  vote:     '<path d="M3 10v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-9"/><path d="M2 10l10-7 10 7"/><path d="M12 12v5"/>',
  truck:    '<rect x="1" y="7" width="14" height="10" rx="1"/><path d="M15 11h4l3 3v3h-7z"/><circle cx="6" cy="19" r="1.6"/><circle cx="17.5" cy="19" r="1.6"/>',
  umbrella: '<path d="M2 11a10 10 0 0 1 20 0z"/><line x1="12" y1="11" x2="12" y2="19"/><path d="M12 19a2 2 0 0 1-4 0"/>',
  trend:    '<polyline points="3 17 9 11 13 15 21 6"/><polyline points="14 6 21 6 21 13"/>',
  bag:      '<path d="M6 8h12l1.5 13h-15z"/><path d="M9 8a3 3 0 0 1 6 0"/>',
  lock:     '<rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>',
  coin:     '<circle cx="12" cy="12" r="9"/><path d="M9.5 9.2a2.5 2.5 0 0 1 5 0c0 1.4-1.1 1.9-2.5 2.4S9.5 12.6 9.5 14a2.5 2.5 0 0 0 5 0"/><line x1="12" y1="6.5" x2="12" y2="17.5"/>',
  chat:     '<path d="M21 11.5a8.5 8.5 0 1 1-3.6-6.9"/><path d="M21 4v6h-6"/><path d="M8 10a4 4 0 1 1 5.5 3.7"/><circle cx="8" cy="15.5" r=".6" fill="currentColor"/>',
};

const grid = document.getElementById('sys-grid');
grid.innerHTML = SUBSYSTEMS.map(s => `
  <button class="sys-item" data-url="${s.url}">
    <span class="sys-icon"><svg viewBox="0 0 24 24">${ICONS[s.icon] || ''}</svg></span>
    <span class="sys-name">${s.name}</span>
    <span class="sys-desc">${s.desc}</span>
  </button>
`).join('');

grid.addEventListener('click', (e) => {
  const btn = e.target.closest('.sys-item');
  if (!btn) return;
  const url = btn.dataset.url;
  if (!url) return;
  // 외부 시스템 사이트로 전체 페이지 이동 (현재 탭의 최상위 프레임 이동)
  try { window.top.location.href = url; }
  catch (e) { window.location.href = url; }
});
</script>

<!-- ── 왼쪽→오른쪽 스와이프로 메뉴 밀어넣기(닫기) ──
     right-menu.html은 webapp.html과 같은 origin의 iframe이므로
     parent.document에 직접 접근해 드로어를 손가락에 맞춰 드래그하듯
     움직이고, 일정 거리 이상이면 parent.closeRightMenu()를 호출한다.
     left-menu.html의 닫기 스크립트와 대칭(방향만 반대). -->
<script>
(function () {
  const THRESH      = 70; // 닫기로 확정하는 최소 이동 거리(px)
  const MOVE_DECIDE  = 10; // 가로/세로 판정을 위한 최소 이동 거리(px)

  let startX = 0, startY = 0;
  let tracking = false, decided = false, valid = false;
  let drawerEl = null;

  function getDrawer() {
    try { return parent.document.querySelector('#right-menu-overlay .right-menu-drawer'); }
    catch (e) { return null; }
  }

  function onStart(e) {
    if (e.touches.length !== 1) return;
    if (e.target.closest && e.target.closest('[data-noswipe]')) return;
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    tracking = true; decided = false; valid = false;
  }

  function onMove(e) {
    if (!tracking) return;
    const t  = e.touches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;

    if (!decided) {
      if (Math.abs(dx) < MOVE_DECIDE && Math.abs(dy) < MOVE_DECIDE) return;
      decided = true;
      // 세로 스크롤이거나, 닫는 방향(오른쪽)이 아니면 우리 제스처가 아님
      if (Math.abs(dy) >= Math.abs(dx) || dx <= 0) { tracking = false; return; }
      valid = true;
      drawerEl = getDrawer();
      if (drawerEl) drawerEl.style.transition = 'none';
    }

    if (valid) {
      e.preventDefault();
      if (drawerEl) drawerEl.style.transform = `translateX(${dx}px)`; // dx는 양수
    }
  }

  function onEnd(e) {
    if (!tracking) return;
    tracking = false;
    if (!valid) { drawerEl = null; return; }

    const t  = e.changedTouches[0];
    const dx = t.clientX - startX;
    if (drawerEl) drawerEl.style.transition = '';

    if (dx > THRESH) {
      if (drawerEl) drawerEl.style.transform = '';
      if (typeof parent.closeRightMenu === 'function') parent.closeRightMenu();
    } else if (drawerEl) {
      drawerEl.style.transform = ''; // 임계값 미달 — 원래 위치로 스냅백
    }
    drawerEl = null;
  }

  function onCancel() {
    if (tracking && valid && drawerEl) {
      drawerEl.style.transition = '';
      drawerEl.style.transform  = '';
    }
    tracking = false; valid = false; drawerEl = null;
  }

  document.addEventListener('touchstart',  onStart,  { passive: true });
  document.addEventListener('touchmove',   onMove,   { passive: false });
  document.addEventListener('touchend',    onEnd,    { passive: true });
  document.addEventListener('touchcancel', onCancel, { passive: true });
})();
</script>

</body>
</html>
