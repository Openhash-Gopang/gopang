<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ── SEO / OpenGraph (JS로 동적 교체) ── -->
<title>고팡 프로필</title>
<meta name="description" content="">
<meta property="og:type"        content="profile">
<meta property="og:title"       content="">
<meta property="og:description" content="">
<meta property="og:image"       content="https://hondi.net/icons/icon-512.png">
<meta property="og:url"         content="">
<meta name="twitter:card"       content="summary">

<!-- JSON-LD Schema.org (JS로 삽입) -->
<script id="jsonld" type="application/ld+json">{}</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#f9fafb;color:#111827;min-height:100dvh}

/* ── 헤더 ── */
.top-bar{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 16px;
  display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.top-back{background:none;border:none;cursor:pointer;padding:4px;color:#374151;display:flex;align-items:center}
.top-title{font-size:16px;font-weight:700;flex:1}
.top-share{background:none;border:none;cursor:pointer;padding:4px;color:#374151;display:flex;align-items:center}

/* ── 프로필 배너 + 헤더 (Google Maps 장소 카드 스타일) ── */
.profile-banner{height:92px;background:linear-gradient(180deg,#456bb0 0%,#5b8be3 18%,#5b8be3 78%,#3569d7 100%);
  position:relative;overflow:hidden}
.profile-banner svg{position:absolute;bottom:-8px;left:0;width:100%;opacity:.32}
.profile-hero{background:#fff;padding:0 20px 16px;margin-top:-34px;position:relative}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#007b8b,#3569d7);
  display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;
  color:#fff;flex-shrink:0;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* ── 신뢰도 온도 배지 — 우측 상단, 당근마켓 매너온도 스타일 차용 (2026-07-13) ── */
.hero-top-row{display:flex;justify-content:space-between;align-items:flex-start}
.temp-badge{display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-top:10px}
.temp-value{font-size:16px;font-weight:700;color:#212529;line-height:1;letter-spacing:-.2px}
.temp-track{width:66px;height:7px;border-radius:999px;background:#f1f3f5;overflow:hidden}
.temp-fill{height:100%;border-radius:999px;
  background:linear-gradient(90deg,#ffd8a8 0%,#ffa94d 45%,#ff8c3d 75%,#fa5252 100%)}

/* ── Claim this business (claim_status='unclaimed' 전용) ── */
.claim-row{padding:9px 20px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;
  background:none;border:none;width:100%;text-align:left;font-family:inherit}
.claim-row .info-icon{color:#0f6e56}
.claim-row .info-text{color:#0f6e56;font-weight:600}
.claim-sub{font-size:12.5px;color:#9ca3af;font-weight:400;margin-top:2px}
.badge-unclaimed{background:#fef3c7;color:#92400e;border:1px solid #fde68a}

/* ── 예약하기 (2026-07-13 신설) ── */
.resv-field{padding:9px 20px}
.resv-label{font-size:12.5px;color:#6b7280;font-weight:600;margin-bottom:6px}
.resv-input{width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:9px 12px;
  font-size:14px;font-family:inherit;outline:none}
.resv-input:focus{border-color:#007b8b}
.resv-deposit-notice{margin:0 20px 10px;padding:10px 12px;background:#fef3c7;
  border:1px solid #fde68a;border-radius:10px;font-size:12.5px;color:#92400e;display:none}
.resv-status{padding:9px 20px;font-size:13px;color:#6b7280}

/* ── Suggest an edit / 신고 (비소유자 전용) ── */
.btn-pill-ghost{display:inline-flex;align-items:center;gap:6px;padding:11px 20px;
  border:1px solid #e5e7eb;border-radius:999px;background:#fff;color:#374151;
  font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer}
.profile-name-block{padding-top:42px}
.profile-name{font-size:21px;font-weight:700;color:#111827;margin-bottom:2px}
.profile-type-sub{font-size:13.5px;color:#6b7280;margin-bottom:6px}
.profile-handle{font-size:12.5px;color:#9ca3af;font-weight:500}
.profile-handle b{color:#007b8b;font-weight:600}
.profile-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-type{background:#eafcff;color:#014f5a;border:1px solid #b9eaf2}
.badge-gdc{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.profile-desc{font-size:14px;color:#374151;line-height:1.6;margin-top:12px}
.profile-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.tag{padding:4px 10px;background:#f3f4f6;border-radius:20px;font-size:12px;color:#374151}

/* ── 퀵 액션 (원형 아이콘 행) ── */
.quick-actions{display:flex;justify-content:space-around;padding:4px 10px 16px;gap:2px}
.qa-item{display:flex;flex-direction:column;align-items:center;gap:7px;background:none;
  border:none;cursor:pointer;font-family:inherit;flex:1;min-width:0;padding:0}
.qa-circle{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;background:#d3f7ff;color:#007b8b;flex-shrink:0;transition:transform .12s}
.qa-item:active .qa-circle{transform:scale(.92)}
.qa-circle.primary{background:#007b8b;color:#fff}
.qa-label{font-size:11.5px;color:#374151;text-align:center;line-height:1.3;
  max-width:64px;font-weight:500}

/* ── 섹션 (플랫 리스트 — 박스 제거) ── */
.card{background:#fff;margin:0;padding:6px 0 12px}
.card + .card{border-top:1px solid #f1f3f5;margin-top:2px}
.card-title{font-size:11.5px;font-weight:600;color:#9ca3af;padding:10px 20px 6px;
  text-transform:uppercase;letter-spacing:.06em}
.info-row{padding:9px 20px;display:flex;align-items:flex-start;gap:14px}
.info-icon{width:18px;flex-shrink:0;color:#007b8b;margin-top:2px}
.info-text{font-size:14.5px;color:#374151;line-height:1.5;flex:1}
.info-text a{color:#007b8b;text-decoration:none}

/* ── 영업시간 ── */
.hours-table{width:100%;border-collapse:collapse}
.hours-table td{padding:6px 20px;font-size:13px}
.hours-table td:first-child{color:#6b7280;font-weight:600;width:32px}
.hours-table td:last-child{color:#374151}
.hours-closed{color:#9ca3af!important}
.hours-today{background:#eafcff}
.hours-today td{color:#014f5a!important;font-weight:600}

/* ── 상품 목록 ── */
.product-grid{display:flex;flex-direction:column;gap:1px;background:#f1f3f5}
.product-item{background:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px}
.product-img{width:56px;height:56px;border-radius:10px;object-fit:cover;background:#f3f4f6;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.product-img img{width:100%;height:100%;object-fit:cover}
.product-info{flex:1;min-width:0}
.product-name{font-size:15px;font-weight:600;color:#111827;margin-bottom:2px}
.product-price{font-size:14px;color:#007b8b;font-weight:700}
.product-detail-btn{background:none;border:none;cursor:pointer;color:#9ca3af;padding:4px}
.product-detail-text{font-size:13px;color:#6b7280;line-height:1.5;
  padding:0 20px 14px;display:none}
.product-detail-text.open{display:block}

/* ── 커스텀 필드 ── */
.custom-field-row{padding:9px 20px;
  display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.cf-key{font-size:13px;color:#9ca3af;flex-shrink:0}
.cf-val{font-size:14px;color:#374151;text-align:right}

/* ── 업종 정보 (industry_fields) ── */
.ifield-row{padding:9px 20px;
  display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.ifield-key{font-size:13px;color:#9ca3af;flex-shrink:0}
.ifield-val{font-size:14px;color:#374151;text-align:right;word-break:break-all}

/* ── 필 버튼 (아웃라인 / 옅은 채움) ── */
.pill-wrap{padding:14px 20px;text-align:center;border-top:1px solid #f1f3f5}
.btn-pill-outline{display:inline-flex;align-items:center;gap:6px;padding:11px 22px;
  border:none;border-radius:999px;background:#d3f7ff;color:#014f5a;
  font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-pill-filled{display:inline-flex;align-items:center;gap:6px;padding:11px 22px;
  border:none;border-radius:999px;background:#d3f7ff;color:#014f5a;
  font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer}

/* ── 누락된 정보 추가 (본인 프로필 전용) ── */
.missing-info-head{display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 8px}
.missing-info-title{font-size:15px;font-weight:700;color:#111827}
.missing-info-hint{color:#c7c7cc;display:flex;align-items:center}
.missing-row{display:flex;align-items:center;gap:14px;padding:10px 20px;
  color:#111827;font-weight:500;font-size:14.5px;cursor:pointer;background:none;
  border:none;width:100%;text-align:left;font-family:inherit}
.missing-row-icon{color:#007b8b;display:flex;flex-shrink:0}

/* ── AI 비서 채팅 ── */
.ai-section{margin:12px 16px 0}
.ai-toggle-btn{width:100%;padding:14px 20px;border:2px solid #007b8b;border-radius:16px;
  background:linear-gradient(135deg,#eafcff,#d3f7ff);
  display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.ai-toggle-left{display:flex;align-items:center;gap:10px}
.ai-toggle-name{font-size:15px;font-weight:700;color:#014f5a}
.ai-toggle-sub{font-size:12px;color:#5fb8c4;margin-top:2px}
.ai-toggle-arrow{color:#007b8b;transition:transform .2s}
.ai-toggle-arrow.open{transform:rotate(180deg)}

.ai-chat-box{border:1.5px solid #e5e7eb;border-top:none;border-radius:0 0 16px 16px;
  background:#fff;display:none;flex-direction:column;max-height:420px}
.ai-chat-box.open{display:flex}
.ai-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.ai-msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55}
.ai-msg-ai{background:#f3f4f6;color:#111827;align-self:flex-start;border-radius:4px 14px 14px 14px}
.ai-msg-user{background:#007b8b;color:#fff;align-self:flex-end;border-radius:14px 14px 4px 14px}
.ai-msg-typing{display:flex;gap:4px;align-items:center;padding:10px 14px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:#9ca3af;
  animation:bounce .8s infinite alternate}
.ai-dot:nth-child(2){animation-delay:.2s}
.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-5px)}}
.ai-input-row{padding:10px 12px;border-top:1px solid #f3f4f6;display:flex;gap:8px}
.ai-input{flex:1;border:1.5px solid #e5e7eb;border-radius:20px;padding:8px 14px;
  font-size:14px;font-family:inherit;outline:none;resize:none;max-height:80px}
.ai-input:focus{border-color:#007b8b}
.ai-send{width:36px;height:36px;border:none;border-radius:50%;background:#007b8b;
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity .2s}
.ai-send:disabled{opacity:.4;cursor:not-allowed}

/* ── 로딩 / 에러 ── */
.skeleton{background:linear-gradient(90deg,#f3f4f6 25%,#e5e7eb 50%,#f3f4f6 75%);
  background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.error-box{margin:40px 20px;text-align:center;color:#9ca3af}

/* ── 반응형 ── */
@media(min-width:480px){
  .card,.ai-section{max-width:480px;margin-left:auto;margin-right:auto}
  .profile-hero,.profile-banner,.quick-actions,.pill-wrap{max-width:480px;margin-left:auto;margin-right:auto}
}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- 상단 바 -->
<div class="top-bar">
  <button class="top-back" onclick="history.back()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="top-title" id="top-title">프로필</span>
  <button class="top-share" onclick="shareProfile()" title="공유">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
  </button>
</div>

<!-- 로딩 스켈레톤 -->
<div id="skeleton" style="padding:20px 16px;display:flex;flex-direction:column;gap:12px">
  <div class="skeleton" style="height:72px;width:72px;border-radius:50%"></div>
  <div class="skeleton" style="height:24px;width:60%"></div>
  <div class="skeleton" style="height:16px;width:40%"></div>
  <div class="skeleton" style="height:60px;width:100%"></div>
</div>

<!-- 에러 -->
<div class="error-box hidden" id="error-box">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 12px;display:block"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  <div style="font-size:16px;font-weight:600;color:#374151;margin-bottom:6px">프로필을 찾을 수 없습니다</div>
  <div style="font-size:13px">존재하지 않거나 비공개 프로필입니다.</div>
</div>

<!-- 기본 프로필 (본인 보기 — 아직 사업자 등록 등 상세 프로필을 작성하지 않은 경우의 대체 화면) -->
<div id="basic-main" class="hidden">
  <div class="profile-banner">
    <svg viewBox="0 0 400 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="20" y="14" width="22" height="26" fill="#fff"/><rect x="48" y="6" width="16" height="34" fill="#fff"/>
      <rect x="70" y="18" width="20" height="22" fill="#fff"/><rect x="300" y="10" width="18" height="30" fill="#fff"/>
      <rect x="324" y="20" width="14" height="20" fill="#fff"/><polygon points="360,40 380,8 400,40" fill="#fff"/>
    </svg>
  </div>
  <div class="profile-hero">
    <div class="profile-avatar" id="bp-avatar"></div>
    <div class="profile-name-block">
      <div class="profile-name" id="bp-name"></div>
      <div class="profile-handle" id="bp-handle"></div>
    </div>
    <div style="margin-top:10px;font-size:12.5px;color:#9ca3af;line-height:1.6">
      아직 사업자·기관 등 상세 프로필을 작성하지 않았습니다. 본인에게만 보이는 기본 정보입니다.
    </div>
  </div>

  <div class="pill-wrap" style="border-top:none">
    <button class="btn-pill-outline" onclick="location.href='/register-profile.html'">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      프로필 등록 시작하기
    </button>
  </div>

  <!-- 위치 -->
  <div class="card hidden" id="bp-card-location">
    <div class="card-title">현재 위치</div>
    <div class="info-row">
      <span class="info-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span>
      <span class="info-text" id="bp-region"></span>
    </div>
  </div>

  <!-- 혼디 색상 코드 -->
  <div class="card hidden" id="bp-card-code">
    <div class="card-title">내 혼디 코드</div>
    <div style="padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px">
      <img id="bp-code-img" alt="내 혼디 색상 코드" style="max-width:100%;width:280px;border:1px solid #f3f4f6;border-radius:10px;background:#fff">
      <div style="font-size:11.5px;color:#9ca3af;text-align:center;line-height:1.6">
        이 코드를 출입문이나 명함에 인쇄하면, 다른 사람이 카메라로 비추기만 해도<br>바로 이 프로필로 연결됩니다.
      </div>
      <button id="bp-code-download" style="padding:10px 20px;border:1px solid #e5e7eb;border-radius:99px;
              background:#fff;color:#007b8b;font-weight:600;font-size:13px;cursor:pointer">
        이미지로 저장
      </button>
    </div>
  </div>
</div>

<!-- 메인 콘텐츠 (로드 후 표시) -->
<div id="main" class="hidden">

  <!-- 프로필 헤더 -->
  <!-- 프로필 배너 + 헤더 -->
  <div class="profile-banner">
    <svg viewBox="0 0 400 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="20" y="14" width="22" height="26" fill="#fff"/><rect x="48" y="6" width="16" height="34" fill="#fff"/>
      <rect x="70" y="18" width="20" height="22" fill="#fff"/><rect x="300" y="10" width="18" height="30" fill="#fff"/>
      <rect x="324" y="20" width="14" height="20" fill="#fff"/><polygon points="360,40 380,8 400,40" fill="#fff"/>
    </svg>
  </div>
  <div class="profile-hero">
    <div class="hero-top-row">
      <div class="profile-avatar" id="p-avatar"></div>
      <div class="temp-badge hidden" id="temp-badge">
        <span class="temp-value" id="temp-value">36.5°</span>
        <div class="temp-track"><div class="temp-fill" id="temp-fill" style="width:37%"></div></div>
      </div>
    </div>
    <div class="profile-name-block">
      <div class="profile-name" id="p-name"></div>
      <div class="profile-type-sub" id="p-type-sub"></div>
      <div class="profile-handle" id="p-handle"></div>
      <div class="profile-badges" id="p-badges"></div>
    </div>
    <div class="profile-desc hidden" id="p-desc"></div>
    <div class="profile-tags hidden" id="p-tags"></div>
  </div>

  <!-- Claim this business (claim_status='unclaimed' 전용, 2026-07-13 신설) -->
  <div class="card hidden" id="card-claim">
    <button class="claim-row" onclick="_startClaimFlow()">
      <span class="info-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4.5 8-11V5l-8-3-8 3v6c0 6.5 8 11 8 11z"/><path d="m9 12 2 2 4-4"/></svg></span>
      <div>
        <div class="info-text">이 업체를 인증하시겠어요?</div>
        <div class="claim-sub">K-Search가 자동으로 만든 미청구 프로필입니다 — 실제 운영자가 인증하면 정보를 직접 관리할 수 있어요</div>
      </div>
    </button>
  </div>

  <!-- 퀵 액션 (메시지/P2P/공유/혼디코드/저장) -->

<script>
const PROXY = 'https://hondi-proxy.tensor-city.workers.dev';

// handle: URL 경로에서 추출 (/profile/@handle) 또는 쿼리스트링(?handle=@handle)
// 주의: GitHub Pages는 서버 라우팅이 없어 /profile/@handle은 항상 404 →
// 404.html이 /profile.html?handle=@handle로 리다이렉트한다. 즉 실제 접속은
// 거의 항상 쿼리스트링 경로다. 이전엔 "/profile.html".replace(/\/profile\/?/,'')가
// ".html"이라는 값을 남겨 쿼리스트링을 가려버리는 버그가 있었다 — 경로 전체가
// 정확히 /profile/... 형태일 때만 path 값을 인정하도록 수정.
const _handle = (() => {
  const m = location.pathname.match(/^\/profile\/(.+)$/);
  const p = m ? decodeURIComponent(m[1]) : '';
  const q = new URLSearchParams(location.search).get('handle');
  return (p || q || '').replace(/^@/, '');
})();

// buyer_request: K-Market Agent가 [OPEN_SELLER_AI] 태그로 전달하는 구매 요청
// 예: ?buyer_request={"item":"고기국수","qty":2,"delivery":"포장"}&buyer_guid=fe80::...
const _buyerRequest = (() => {
  const q = new URLSearchParams(location.search);
  const raw = q.get('buyer_request');
  if (!raw) return null;
  try { return JSON.parse(decodeURIComponent(raw)); } catch { return null; }
})();
const _buyerGuid   = new URLSearchParams(location.search).get('buyer_guid') || '';
const _gwpMode     = new URLSearchParams(location.search).get('gwp') === '1';
const _openerOrigin = new URLSearchParams(location.search).get('opener_origin') || 'https://market.hondi.net';

let _profile    = null;
let _aiHistory  = [];   // AI 채팅 대화 이력 (프록시 AI용)
let _aiSystem   = '';   // 사업체 AI 비서 system prompt

const DAYS_KO = {mon:'월',tue:'화',wed:'수',thu:'목',fri:'금',sat:'토',sun:'일'};
const TYPE_KO = {person:'개인',business:'사업자',institution:'공공기관',org:'협회/단체',platform:'플랫폼'};

// ── 로드 ─────────────────────────────────────────────────
// inline 모드 (settings 패널 내 iframe): 최상단 스크롤 제거
const _inlineMode = new URLSearchParams(location.search).get('inline') === '1';

window.addEventListener('DOMContentLoaded', () => {
  if (_inlineMode) {
    document.documentElement.style.overflow = 'auto';
    document.documentElement.style.height   = 'auto';
    document.body.style.height   = 'auto';
    document.body.style.overflow = 'auto';
  }
  loadProfile();
});

async function loadProfile() {
  if (!_handle) { showError(); return; }
  try {
    const res  = await fetch(`${PROXY}/profile/@${_handle}`);
    const data = await res.json();
    if (!res.ok || !data.ok) { await renderBasicOrError(); return; }
    _profile = data.profile;
    render(_profile);
    // 2026-07-07 신설: 구조화된 실제 판매 카탈로그(가격 검증 가능한 숫자)는
    // /biz/catalog가 원본이다 — card-products(자유 텍스트)와 별개로 로드한다.
    if (_profile.entity_type && _profile.entity_type !== 'person') {
      _loadCatalog(_profile.guid).catch(e => console.warn('[Buy] 카탈로그 로드 실패:', e.message));
    }
  } catch(e) {
    await renderBasicOrError();
  }
}

// ── 상세 프로필(사업자 등록 등)이 아직 없을 때의 대체 화면 ──────
// 조회 중인 handle이 "나 자신"의 계정일 때만 기본 정보(이름·핸들·위치·
// 혼디 색상 코드)를 보여준다. 남의 미작성/비공개 프로필은 그대로 에러 표시.
async function renderBasicOrError() {
  let stored = null;
  try {
    stored = JSON.parse(localStorage.getItem('gopang_user_v4') || 'null');
  } catch { stored = null; }

  const myHandle = (stored?.handle || '').replace(/^@/, '');
  if (!stored || !myHandle || myHandle !== _handle) { showError(); return; }

  document.getElementById('skeleton').style.display = 'none';
  document.getElementById('basic-main').classList.remove('hidden');

  const nickname = stored.nickname || stored.name || '회원';
  document.getElementById('top-title').textContent = nickname;
  document.getElementById('bp-name').textContent   = nickname;
  document.getElementById('bp-handle').textContent = stored.handle || '@' + _handle;
  document.getElementById('bp-avatar').textContent = nickname[0] || '?';

  if (stored.region) {
    document.getElementById('bp-region').textContent = stored.region;
    document.getElementById('bp-card-location').classList.remove('hidden');
  }

  // ── 혼디 색상 코드 — 캐시 우선, 없으면 guid로 즉시 재생성 ──
  try {
    let codeImg = localStorage.getItem('hondi_code_image_v1');
    if (!codeImg && stored.ipv6) {
      const { guidToShortId, generateHondiCodeDataURL } = await import('./src/gopang/ai/hondi-code.js');
      const version = stored.hondi_code_version || 'v1';
      const shortId = guidToShortId(stored.ipv6, version);
      codeImg = await generateHondiCodeDataURL(shortId, version);
    }
    if (codeImg) {
      const img = document.getElementById('bp-code-img');
      img.src = codeImg;
      document.getElementById('bp-card-code').classList.remove('hidden');
      document.getElementById('bp-code-download').onclick = () => {
        const a = document.createElement('a');
        a.href = codeImg;
        a.download = `hondi-code-${myHandle}.png`;
        a.click();
      };
    }
  } catch (e) {
    console.warn('[프로필] 색상 코드 표시 실패:', e.message);
  }
}

// ── 렌더링 ───────────────────────────────────────────────
function render(p) {
  document.getElementById('skeleton').style.display = 'none';
  document.getElementById('main').classList.remove('hidden');

  const pub   = p.extra?.public || {};
  const ident = pub.identity || {};
  const loc   = pub.location || {};
  const fin   = pub.finance  || {};
  const hrs   = pub.activity?.hours || {};
  const cont  = pub.contact  || {};
  const aiCfg = pub.ai_assistant || p.ai_assistant || null;

  // ── 본인 프로필 여부 ──
  let stored = null;
  try { stored = JSON.parse(localStorage.getItem('gopang_user_v4') || 'null'); } catch { stored = null; }
  const myHandle = (stored?.handle || '').replace(/^@/, '');
  const _isOwner = !!myHandle && myHandle === (p.handle || '').replace(/^@/, '');

  // ── 헤더 ──
  document.getElementById('top-title').textContent = p.name || '프로필';
  document.getElementById('p-name').textContent    = p.name || '';
  document.getElementById('p-handle').textContent  = p.handle || '';
  document.getElementById('p-type-sub').textContent = TYPE_KO[p.entity_type] || '';

  // 아바타: 이름 첫 글자
  const av = document.getElementById('p-avatar');
  av.textContent = (p.name || '?')[0];

  // 뱃지 (유형은 위에서 서브텍스트로 표시 — 뱃지에는 결제 등 특수 표시만)
  const badges = document.getElementById('p-badges');
  badges.innerHTML = '';
  if (fin.gdc_accepted) {
    badges.innerHTML += `<span class="badge badge-gdc">💰 GDC 결제</span>`;
  }

  // ── 퀵 액션 / 수정 버튼 노출 제어 ──
  document.getElementById('btn-edit-profile-wrap').classList.toggle('hidden', !_isOwner);
  document.getElementById('qa-msg')?.classList.toggle('hidden', _isOwner);
  document.getElementById('qa-p2p')?.classList.toggle('hidden', _isOwner);
  document.getElementById('qa-save')?.classList.toggle('hidden', _isOwner);
  if (!_isOwner) _initSaveButtonState(p.handle);
  document.getElementById('btn-inquiry-wrap').classList.toggle('hidden', !(aiCfg?.system_prompt && !_isOwner));

  // ── Claim this business / Suggest an edit 노출 제어 (2026-07-13 신설) ──
  const claimStatus = p.claim_status ?? p.extra?.claim_status ?? null;
  document.getElementById('card-claim').classList.toggle('hidden', claimStatus !== 'unclaimed');
  document.getElementById('btn-suggest-edit-wrap').classList.toggle('hidden', _isOwner);

  // ── 신뢰도 온도 배지 (2026-07-13 신설) ──
  _renderTempBadge(p.guid);

  // ── 예약하기 노출 제어 (2026-07-13 신설) ──
  const rc = pub.industry_fields?.reservation_config || null;
  document.getElementById('card-reservation').classList.toggle('hidden', !(rc && rc.enabled) || _isOwner);
  if (rc && rc.enabled) {
    document.getElementById('resv-slot-field').classList.toggle('hidden', rc.mode === 'range');
    document.getElementById('resv-range-field').classList.toggle('hidden', rc.mode !== 'range' && rc.mode !== 'both');
    _checkDepositNotice(p.guid, rc);
  }

  // 소개
  const desc = ident.description || p.description || '';
  if (desc) {
    const el = document.getElementById('p-desc');
    el.textContent = desc;
    el.classList.remove('hidden');
  }

  // 태그
  const tags = ident.tags || p.search_tags || p.tags || [];
  if (tags.length) {
    const el = document.getElementById('p-tags');
    el.innerHTML = tags.map(t => `<span class="tag">#${t}</span>`).join('');
    el.classList.remove('hidden');
  }

  // ── 연락처 / 위치 ──
  const contactRows = [];
  const phone = cont.phone_display || p.phone;

    text: `<a href="tel:${phone}">${phone}</a>`
  });
  const website = cont.website || p.website;
  if (website) contactRows.push({
    icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
    text: `<a href="${website.startsWith('http')?website:'https://'+website}" target="_blank">${website}</a>`

  const address = loc.address_short || p.address;

    const SKIP_KEYS = new Set(['schema_id','schema_version','envelope_version']);
    const LABEL_MAP = {
      address:'주소', hours:'영업시간', delivery:'배달', biz_reg_no:'사업자번호',
      commission_rate:'수수료율', matching_categories:'중개 업종',
      search_radius_km:'검색 반경(km)', settlement_currency:'정산 통화',
      activity_type:'활동 유형', capacity:'수용 인원', max_participants:'최대 인원',
      price:'요금', location:'위치 유형', service_types:'서비스 유형',
      service_area:'서비스 지역', service_scope:'서비스 범위',
      rental_items:'대여 품목', deposit_required:'보증금 필요',
      license_required:'면허 필요', vehicle_type:'차량 유형',
      cuisine_type:'요리 유형', seating_capacity:'좌석 수',
      accom_type:'숙박 유형', room_types:'객실 유형', amenities:'편의시설',
      fish_type:'어종', farming_method:'양식 방법', crop_type:'작물',
      farming_type:'영농 유형', certification:'인증', genre:'장르',
      format:'형식', tools:'사용 도구', dev_type:'개발 유형',
    };
    function _fmtVal(v) {
      if (v === null || v === undefined) return null;
      if (typeof v === 'boolean') return v ? '예' : '아니오';
      if (Array.isArray(v)) return v.length ? v.join(', ') : null;
      if (typeof v === 'object') {
        if ('open' in v && 'close' in v) return `${v.open} ~ ${v.close}`;
        if ('available' in v) {
          if (!v.available) return '미제공';
          return [v.zone && `지역: ${v.zone}`, v.min_order && `최소: ${v.min_order}`]
            .filter(Boolean).join(' / ') || '제공';
        }
        return JSON.stringify(v);
      }
      return String(v);
    }
    const rows = [];
    for (const [k, v] of Object.entries(iFields)) {
      if (SKIP_KEYS.has(k)) continue;
      const label = LABEL_MAP[k] || k;
      const val   = _fmtVal(v);
      if (val === null || val === '') continue;
      rows.push(`<div class="ifield-row">
        <span class="ifield-key">${label}</span>
        <span class="ifield-val">${val}</span>
      </div>`);

    if (rows.length) {
      document.getElementById('industry-rows').innerHTML = rows.join('');

  // ── 커스텀 필드 (공개 항목만) ──

  // ── AI 비서 ──
  if (aiCfg?.system_prompt) {

    const sec = document.getElementById('ai-section');
    sec.classList.remove('hidden');
    // AI 비서 이름 표시
    if (p.name) document.getElementById('ai-name').textContent = `${p.name} AI 비서`;

    if (_buyerRequest) {
      // K-Market Agent가 buyer_request를 전달한 경우 → 채팅창 자동 열기 + 요청 주입
      toggleAIChat();
      const reqMsg = `[BUYER_REQUEST] ${_buyerGuid ? 'buyer_guid: ' + _buyerGuid + ' | ' : ''}` +

      // 판매자 AI 비서에게 자동 주입 (600ms 딜레이 — 채팅창 렌더 후)
      setTimeout(() => {

      }, 600);
    } else {
      // 일반 방문자 → 인사말만 표시

    }
  }

  // ── 누락된 정보 추가 (본인 프로필만) ──
  renderMissingInfo(p, ident, pub, cont, loc, tags, _isOwner);

  // ── SEO ──
  injectSEO(p, ident, tags);
}

  document.querySelector('#qa-save .qa-circle')?.classList.toggle('primary', saved);
  const label = document.getElementById('qa-save-label');

function toggleSaveProfile() {
  if (!_profile?.handle) return;
  const saved = _getSavedProfiles();
  const idx   = saved.indexOf(_profile.handle);
  const circle = document.querySelector('#qa-save .qa-circle');
  const label  = document.getElementById('qa-save-label');

// 실제 LLM 호출 — buyer_request 자동 주입과 일반 대화 양쪽에서 사용
async function _callSellerAI(userText) {
  document.getElementById('ai-send').disabled = true;

  const typingEl = document.createElement('div');
  typingEl.className = 'ai-msg ai-msg-ai ai-msg-typing';
  typingEl.innerHTML = '<div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>';
  document.getElementById('ai-messages').appendChild(typingEl);
  typingEl.scrollIntoView({ behavior: 'smooth', block: 'end' });

  try {
    const res = await fetch(`${PROXY}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model:      'deepseek-v4-flash',
        max_tokens: 400,
        temperature: 0.7,
        stream:     false,
        messages: [
          { role: 'system', content: _aiSystem },
          ..._aiHistory.slice(-10),
        ],
      }),
    });
    const data  = await res.json();
    const reply = data?.choices?.[0]?.message?.content
               || data?.content
               || '죄송합니다, 잠시 후 다시 시도해주세요.';

    typingEl.remove();
    addAIMsg('ai', reply);
    _aiHistory.push({ role: 'assistant', content: reply });

    // ── SELLER_RESPONSE 감지 → Market/Gopang 탭에 포워딩 ──
    if (reply.includes('[SELLER_RESPONSE:') || reply.includes('[SELLER_RESPONSE:{')) {
      const srMatch = reply.match(/\[SELLER_RESPONSE:(\{[\s\S]*?\})\]/);
      if (srMatch) {
        const srData = JSON.parse(srMatch[1]);
        // opener(market webapp)에 결과 전달
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({
            type:           'GWP_SELLER_RESPONSE',
            seller_response: srData,
          }, _openerOrigin);
          console.log('[Profile] SELLER_RESPONSE → market 탭 포워딩:', srData);
        }
      }
    }

    // ── SELLER_PDV 감지 → 판매자 측 IndexedDB 기록 ──
    if (reply.includes('[SELLER_PDV:') || reply.includes('[SELLER_PDV:{')) {
      const pdvMatch = reply.match(/\[SELLER_PDV:(\{[\s\S]*?\})\]/);
      if (pdvMatch) {
        try {
          const pdvData = JSON.parse(pdvMatch[1]);
          await _writeSellerPDV(pdvData);
        } catch (e) {
          console.warn('[Profile] SELLER_PDV 파싱 오류:', e.message);
        }
      }
    }

  } catch(e) {
    typingEl.remove();
    addAIMsg('ai', '일시적인 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  } finally {
    document.getElementById('ai-send').disabled = false;
    document.getElementById('ai-input')?.focus();
  }
}

// 판매자 PDV IndexedDB 기록
async function _writeSellerPDV(data) {
  const DB_NAME = 'hondi-pdv';
  const req = indexedDB.open(DB_NAME, 1);
  req.onupgradeneeded = (e) => {
    const db = e.target.result;
    if (!db.objectStoreNames.contains('records')) {
      const s = db.createObjectStore('records', { keyPath: 'id', autoIncrement: true });
      s.createIndex('ts',   'ts',   { unique: false });
      s.createIndex('type', 'type', { unique: false });
    }
  };
  const db = await new Promise((res, rej) => {
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
  const tx = db.transaction('records', 'readwrite');
  tx.objectStore('records').add({
    ts:      data.ts || new Date().toISOString(),
    type:    data.type || 'sale',
    summary: `판매: ${data.item} × ${data.qty} ₮${data.revenue}`,
    content: data,
  });
  await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  console.info('[Profile] SELLER_PDV 기록 완료:', data.item, data.revenue);
}

// 구현돼 있었음) — profile.html이 그 빠진 송신 지점이다.
//
// 흐름: 카탈로그 로드 → 장바구니 구성 → GWP_SIGN_REQUEST(→market→gopang
// 릴레이, 이미 구현됨) → GWP_SIGN_RESPONSE 수신(서명된 tx) →
// POST /biz/order(여기서 profile.html이 직접 호출) → GWP_DONE 전송
// (→market→gopang 릴레이, 이미 구현됨) → gopang 탭의 redeemClaim() 트리거
// ══════════════════════════════════════════════════════════════

let _catalog       = [];   // /biz/catalog에서 받은 실제 구조화 상품(숫자 가격)
let _cart          = {};   // { productId: qty }
// 2026-07-07: 플랫폼 수수료율. 서버(worker.js)가 아직 이 비율을 강제하지
// 않는다(클라이언트가 보낸 seller_net/fee를 그대로 신뢰) — 이건 알려진
// 별도 결함(사고실험 G)이고 다음 단계에서 서버 검증을 추가해야 한다.
// 여기서는 향후 서버 검증과 맞출 기준값으로 3%를 쓴다(ledger.js 초안과
// 동일 값 — 다만 그 파일 자체는 죽은 코드이므로 정본은 아니다).
const _PLATFORM_FEE_RATE = 0.03;

async function _loadCatalog(sellerGuid) {
  const res  = await fetch(`${PROXY}/biz/catalog?guid=${encodeURIComponent(sellerGuid)}`);
  const data = await res.json().catch(() => null);
  if (!data?.ok || !Array.isArray(data.products)) return;
  _catalog = data.products.filter(p => p.is_public !== false);
  if (!_catalog.length) return;
  _renderBuyGrid();
  document.getElementById('card-buy').classList.remove('hidden');
}

function _renderBuyGrid() {
  const grid = document.getElementById('buy-grid');
  grid.innerHTML = _catalog.map(p => {
    const qty = _cart[p.id] || 0;
    const priceLabel = typeof p.price === 'number' ? `₮${p.price.toLocaleString()}` : '가격 문의';
    return `
    <div class="product-item" style="justify-content:space-between;">
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-price">${priceLabel}${p.unit ? ' / ' + p.unit : ''}</div>
      </div>
      ${typeof p.price === 'number' ? `
      <div style="display:flex;align-items:center;gap:8px;">
        <button onclick="_cartChange('${p.id}',-1)" style="width:28px;height:28px;border-radius:8px;
          border:1px solid #e5e7eb;background:#fff;font-size:16px;cursor:pointer;">−</button>
        <span style="min-width:18px;text-align:center;font-size:14px;">${qty}</span>
        <button onclick="_cartChange('${p.id}',1)" style="width:28px;height:28px;border-radius:8px;
          border:1px solid #e5e7eb;background:#fff;font-size:16px;cursor:pointer;">+</button>
      </div>` : ''}
    </div>`;
  }).join('');
  _renderCartSummary();
}

function _cartChange(productId, delta) {
  const next = (_cart[productId] || 0) + delta;
  if (next <= 0) delete _cart[productId];
  else _cart[productId] = next;
  _renderBuyGrid();
}

function _renderCartSummary() {
  const items = Object.entries(_cart).map(([id, qty]) => {
    const p = _catalog.find(c => c.id === id);
    return p ? { ...p, qty } : null;
  }).filter(Boolean);
  const total = items.reduce((s, i) => s + (i.price || 0) * i.qty, 0);
  const summaryEl = document.getElementById('cart-summary');
  if (!items.length) { summaryEl.classList.add('hidden'); return; }
  summaryEl.classList.remove('hidden');
  document.getElementById('cart-total').textContent = `₮${total.toLocaleString()}`;
}

// ── 결제 시작: GWP_SIGN_REQUEST 조립·전송 ────────────────────
// ── 신뢰도 온도 배지 렌더 (2026-07-13 신설) ──────────────────
// GET /biz/temperature는 평가 5건 미만이면 temp_score를 null로 감춘다
// (소수 평가로 온도가 왜곡되는 걸 막기 위한 백엔드 설계, worker.js
// handleTemperatureQuery 참조). 다만 화면 표시 규칙은 당근마켓과 동일하게
// null이어도 DEFAULT_TEMP(36.5)를 그대로 보여준다 — 신규 사용자도 항상
// 36.5°에서 출발한다는 사실 자체가 신뢰의 기준점이므로 감출 필요가 없다.
const _DEFAULT_TEMP = 36.5;
const _TEMP_MAX     = 99;
async function _renderTempBadge(guid) {
  const badge = document.getElementById('temp-badge');
  const valEl = document.getElementById('temp-value');
  const fillEl = document.getElementById('temp-fill');
  if (!guid) { badge.classList.add('hidden'); return; }
  let temp = _DEFAULT_TEMP;
  try {
    const res = await fetch(`${PROXY}/biz/temperature?guid=${encodeURIComponent(guid)}`);
    const data = await res.json().catch(() => ({}));
    if (res.ok && data.ok && typeof data.temp_score === 'number') {
      temp = data.temp_score;
    }
  } catch (e) {
    console.warn('[Temp] 온도 조회 실패 (기본값 표시):', e.message);
  }
  valEl.textContent = `${temp.toFixed(1)}°`;
  fillEl.style.width = `${Math.max(0, Math.min(100, (temp / _TEMP_MAX) * 100))}%`;
  badge.classList.remove('hidden');
}

// ── Claim this business (2026-07-13 신설) ──────────────────
// 실제 서명(POST /profile/claim)은 guid:pubkey:ts 서명 검증이 필요해
// 별도 프로토콜 설계가 필요하다 — 여기서는 우선 AI 비서 대화로 안내해
// 안전하게 흐름을 시작한다(추후 서명 릴레이 연동은 별도 패치).
function _startClaimFlow() {
  const input = document.getElementById('ai-input');
  if (!input) return;
  input.value = `이 업체(${_profile?.name || ''})가 제 소유예요. 인증하고 싶어요.`;
  if (!document.getElementById('ai-chat-box')?.classList.contains('open')) toggleAIChat();
  document.getElementById('ai-section')?.scrollIntoView({ behavior: 'smooth' });
  sendAIMsg();
}

// ── Suggest an edit (2026-07-13 신설) ──────────────────────
function _suggestEdit() {
  const input = document.getElementById('ai-input');
  if (!input) return;
  input.value = `이 프로필(${_profile?.name || ''})의 정보 중 잘못된 부분이 있어서 알려드리고 싶어요.`;
  if (!document.getElementById('ai-chat-box')?.classList.contains('open')) toggleAIChat();
  document.getElementById('ai-section')?.scrollIntoView({ behavior: 'smooth' });
  input.focus();
}

// ── 신고 (2026-07-13 신설) ──────────────────────────────────
function _reportProfile() {
  const input = document.getElementById('ai-input');
  if (!input) return;
  input.value = `이 프로필(${_profile?.name || ''})을 신고하고 싶어요.`;
  if (!document.getElementById('ai-chat-box')?.classList.contains('open')) toggleAIChat();
  document.getElementById('ai-section')?.scrollIntoView({ behavior: 'smooth' });

}

// ── 예약 보증금 필요 여부 사전 안내 (2026-07-13 신설) ──────
async function _checkDepositNotice(myGuid, rc) {
  const notice = document.getElementById('resv-deposit-notice');
  if (!myGuid) { notice.style.display = 'none'; return; }
  try {
    const res = await fetch(`${PROXY}/biz/temperature?guid=${encodeURIComponent(myGuid)}`);
    const data = await res.json().catch(() => ({}));
    const temp = (data.ok && typeof data.temp_score === 'number') ? data.temp_score : _DEFAULT_TEMP;
    const threshold = typeof rc.deposit_temp_threshold === 'number' ? rc.deposit_temp_threshold : _DEFAULT_TEMP;
    notice.style.display = temp < threshold ? 'block' : 'none';
  } catch (e) {
    notice.style.display = 'none';
  }
}

// ── 예약 요청 제출 (2026-07-13 신설) ────────────────────────
// 보증금이 필요한 경우, v1에서는 별도 결제 UI를 새로 만들지 않고
// AI 비서 대화로 안내한다(Claim this business와 동일한 이유 — 서명이
// 필요한 흐름은 대화 경로로 먼저 열고, 전용 UI는 후속 패치에서 붙인다).
async function _submitReservation() {
  const statusEl = document.getElementById('resv-status');
  const startEl  = document.getElementById('resv-start');
  const endEl    = document.getElementById('resv-end');
  const noteEl   = document.getElementById('resv-note');
  let stored = null;
  try { stored = JSON.parse(localStorage.getItem('gopang_user_v4') || 'null'); } catch { stored = null; }
  const myGuid = stored?.ipv6 || stored?.guid || null;
  if (!myGuid) { statusEl.textContent = '⚠️ 로그인이 필요합니다.'; statusEl.classList.remove('hidden'); return; }
  if (!startEl.value) { statusEl.textContent = '⚠️ 방문 일시를 선택해 주세요.'; statusEl.classList.remove('hidden'); return; }

  const rc = _profile?.extra?.public?.industry_fields?.reservation_config || {};
  const reservationType = rc.mode === 'range' ? 'range' : 'slot';

  document.getElementById('resv-submit-btn').disabled = true;
  statusEl.textContent = '⏳ 예약 요청 중…';
  statusEl.classList.remove('hidden');

  try {
    const res = await fetch(`${PROXY}/biz/reservation`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        guid: myGuid, seller_guid: _profile.guid, reservation_type: reservationType,
        start_at: new Date(startEl.value).toISOString(),
        end_at: reservationType === 'range' && endEl.value ? new Date(endEl.value).toISOString() : null,
        note: noteEl.value || '',
      }),
    });
    const data = await res.json().catch(() => ({}));
    if (res.status === 402 && data.error === 'DEPOSIT_REQUIRED') {
      statusEl.textContent = '';
      const input = document.getElementById('ai-input');
      if (input) {
        input.value = `${_profile?.name || ''}에 예약하고 싶은데 보증금이 필요하다고 해요. 도와주세요.`;
        if (!document.getElementById('ai-chat-box')?.classList.contains('open')) toggleAIChat();
        document.getElementById('ai-section')?.scrollIntoView({ behavior: 'smooth' });
        sendAIMsg();
      }
      return;
    }
    if (!res.ok || !data.ok) {
      statusEl.textContent = `⚠️ 예약 실패: ${data.detail || data.error || res.status}`;
      document.getElementById('resv-submit-btn').disabled = false;
      return;
    }
    statusEl.textContent = data.status === 'confirmed'
      ? '✅ 예약이 확정됐어요!'
      : '✅ 예약 요청 완료 — 사업자 승인을 기다리고 있어요.';
    document.getElementById('resv-submit-btn').disabled = false;
  } catch (e) {
    statusEl.textContent = `⚠️ 오류: ${e.message}`;
    document.getElementById('resv-submit-btn').disabled = false;
  }
}

function _startCheckout() {
  const statusEl = document.getElementById('checkout-status');
  // window.opener가 없으면(=market 팝업이 아니라 profile.html에 직접
  // 접속한 경우) 3-탭 릴레이(profile→market→gopang) 자체가 성립하지
  // 않는다 — 결제를 시도하지 말고 안내만 한다.
  if (!window.opener || window.opener.closed) {
    statusEl.textContent = '⚠️ market.hondi.net을 통해 접속해야 결제할 수 있습니다.';
    return;
  }
  const items = Object.entries(_cart).map(([id, qty]) => {
    const p = _catalog.find(c => c.id === id);
    return p ? { id: p.id, name: p.name, price: p.price, quantity: qty } : null;
  }).filter(Boolean);
  if (!items.length) return;

  const total      = items.reduce((s, i) => s + i.price * i.quantity, 0);
  const fee        = Math.round(total * _PLATFORM_FEE_RATE);
  const sellerNet  = total - fee;
  const sessionId  = crypto.randomUUID();

  _pendingCheckout = { items, total, fee, sellerNet, sessionId };

  const rawTx = {
    seller_guid: _profile.guid,
    total,
    items,
    outputs: [
      { recipient_guid: _profile.guid,       amount: sellerNet },
      { recipient_guid: 'gopang-platform',   amount: fee },
    ],
  };

  document.getElementById('checkout-btn').disabled = true;
  statusEl.textContent = '🔏 서명 대기 중… gopang 탭을 확인해 주세요.';

  window.opener.postMessage({
    type:        'GWP_SIGN_REQUEST',
    tx:          rawTx,
    session_id:  sessionId,
    seller_name: _profile.name || _profile.nickname || '판매자',
  }, _openerOrigin);
}

let _pendingCheckout = null;

// ── GWP_SIGN_RESPONSE 수신 (market이 relay) ──────────────────
window.addEventListener('message', async (e) => {
  if (e.origin !== _openerOrigin) return;
  if (e.data?.type !== 'GWP_SIGN_RESPONSE') return;
  if (!_pendingCheckout || e.data.session_id !== _pendingCheckout.sessionId) return;

  const statusEl = document.getElementById('checkout-status');
  if (!e.data.success) {
    statusEl.textContent = e.data.error === 'USER_CANCELLED'
      ? '결제를 취소했습니다.'
      : `⚠️ 서명 실패: ${e.data.error || '알 수 없는 오류'}`;
    document.getElementById('checkout-btn').disabled = false;
    return;
  }

  statusEl.textContent = '⏳ 거래 처리 중…';
  await _submitOrder(e.data.signedTx);
});

// ── 서명된 tx를 실제로 정산(POST /biz/order) ─────────────────
async function _submitOrder(signedTx) {
  const statusEl = document.getElementById('checkout-btn') && document.getElementById('checkout-status');
  const { items, sellerNet, fee, sessionId } = _pendingCheckout;
  const firstItem   = items[0];
  const itemName    = items.length === 1 ? firstItem.name : `${firstItem.name} 외 ${items.length - 1}건`;
  const itemId      = items.length === 1 ? firstItem.id   : null;
  const quantity    = items.reduce((s, i) => s + i.quantity, 0);

  try {
    const res = await fetch(`${PROXY}/biz/order`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tx:               signedTx.tx,
        tx_hash:          signedTx.tx_hash,
        buyer_sig:        signedTx.buyer_sig,
        buyer_public_key: signedTx.buyer_public_key,
        prev_settle_hash: signedTx.prev_settle_hash,
        from_guid:        signedTx.tx?.input?.owner_guid,
        seller_guid:      _profile.guid,
        item_name:        itemName,
        item_id:          itemId,
        quantity,
        seller_net:       sellerNet,
        fee,
        memo:             JSON.stringify(items),
        session_id:       sessionId,
      }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) {
      statusEl.textContent = `⚠️ 결제 실패: ${data.detail || data.error || res.status}`;
      document.getElementById('checkout-btn').disabled = false;
      return;
    }

    statusEl.textContent = '✅ 결제 완료!';
    _cart = {};
    _renderBuyGrid();

    // GWP_DONE → market(relay) → gopang 탭(redeemClaim 트리거)
    // 이미 구현된 릴레이 경로를 그대로 재사용(신규 코드 아님).
    window.opener?.postMessage({
      type:         'GWP_DONE',
      summary:      `${itemName} 구매 완료 (₮${(sellerNet + fee).toLocaleString()})`,
      session_id:   sessionId,
      tx_hash:      data.tx_hash,
      block_hash:   data.block_hash,
      block_id:     data.block_id,
      claims:       [data.buyer_claim, data.seller_claim].filter(Boolean),
      reporter_svc: 'kmarket',
    }, _openerOrigin);

  } catch (e) {
    statusEl.textContent = `⚠️ 네트워크 오류: ${e.message}`;
    document.getElementById('checkout-btn').disabled = false;
  } finally {
    _pendingCheckout = null;
  }
}

// ── 액션 ─────────────────────────────────────────────────
function contactOwner() {
  if (!_profile?.guid) return;
  // gopang P2P 채팅 열기
  window.opener?.openP2PSearch?.(_profile.handle);
  location.href = `/webapp.html?connect=${encodeURIComponent(_profile.guid)}`;
}
function startP2P() {
  if (!_profile?.guid) return;
  location.href = `/webapp.html?p2p=${encodeURIComponent(_profile.guid)}`;
}

// ── 공유 ─────────────────────────────────────────────────
async function shareProfile() {
  const url   = location.href;
  const title = _profile?.name || '고팡 프로필';
  if (navigator.share) {
    await navigator.share({ title, url }).catch(()=>{});
  } else {
    await navigator.clipboard.writeText(url).catch(()=>{});
    alert('링크가 복사됐습니다.');
  }
}

// ── SEO: OpenGraph + JSON-LD ─────────────────────────────
function injectSEO(p, ident, tags) {
  const title = `${p.name||'프로필'} — 고팡`;
  const desc  = (ident.description || p.description || tags.join(', ')).slice(0, 160);
  const url   = location.href;

  document.title = title;
  setMeta('description', desc);
  setMeta('og:title',       title);
  setMeta('og:description', desc);
  setMeta('og:url',         url);
  setMeta('twitter:title',  title);

  // JSON-LD Schema.org
  const schema = {
    '@context': 'https://schema.org',
    '@type':    p.entity_type === 'person' ? 'Person' :
                p.entity_type === 'business' ? 'LocalBusiness' :
                p.entity_type === 'institution' ? 'GovernmentOrganization' : 'Organization',
    name:       p.name,
    url,
    description: ident.description || p.description || '',
    identifier:  p.handle,
  };
  if (p.address) schema.address = { '@type': 'PostalAddress', streetAddress: p.address };
  if (p.phone)   schema.telephone = p.phone;
  if (tags.length) schema.keywords = tags.join(', ');
  if (p.entity_type === 'business' && p.products?.length) {
    schema.hasOfferCatalog = {
      '@type': 'OfferCatalog',
      itemListElement: p.products.map(prod => ({
        '@type': 'Offer',
        name:    prod.name,
        price:   prod.price?.replace(/[^0-9]/g,'') || '',
        priceCurrency: 'KRW',
      }))
    };
  }
  document.getElementById('jsonld').textContent = JSON.stringify(schema, null, 2);
  document.getElementById('top-title').textContent = p.name || '프로필';
}

function setMeta(name, content) {
  const sel = name.startsWith('og:') || name.startsWith('twitter:')
    ? `meta[property="${name}"]`
    : `meta[name="${name}"]`;
  const el = document.querySelector(sel);
  if (el) el.setAttribute('content', content);
}

function showError() {
  document.getElementById('skeleton').style.display = 'none';
  document.getElementById('error-box').classList.remove('hidden');
}
