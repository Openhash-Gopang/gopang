<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#f9fafb;color:#111827;min-height:100dvh}

/* ── 헤더 ── */
.top-bar{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 16px;
  display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.top-back{background:none;border:none;cursor:pointer;padding:4px;color:#374151;display:flex;align-items:center}
.top-title{font-size:16px;font-weight:700;flex:1}
.top-share{background:none;border:none;cursor:pointer;padding:4px;color:#374151;display:flex;align-items:center}

/* ── 프로필 헤더 카드 ── */
.profile-hero{background:#fff;padding:24px 20px 20px;border-bottom:1px solid #f3f4f6}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#16a34a,#4ade80);
  display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;
  color:#fff;margin-bottom:14px;flex-shrink:0}
.profile-name{font-size:22px;font-weight:700;color:#111827;margin-bottom:4px}
.profile-handle{font-size:14px;color:#16a34a;font-weight:600;margin-bottom:8px}
.profile-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-type{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.badge-gdc{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.profile-desc{font-size:14px;color:#6b7280;line-height:1.6;margin-bottom:12px}
.profile-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{padding:4px 10px;background:#f3f4f6;border-radius:20px;font-size:12px;color:#374151}

/* ── 섹션 카드 ── */
.card{background:#fff;border-radius:14px;margin:12px 16px;overflow:hidden}
.card-title{font-size:12px;font-weight:600;color:#9ca3af;padding:14px 16px 8px;
  text-transform:uppercase;letter-spacing:.06em}
.info-row{padding:10px 16px;display:flex;align-items:flex-start;gap:12px;border-top:1px solid #f9fafb}
.info-icon{width:18px;flex-shrink:0;color:#9ca3af;margin-top:2px}
.info-text{font-size:14px;color:#374151;line-height:1.5;flex:1}
.info-text a{color:#16a34a;text-decoration:none}

/* ── 영업시간 ── */
.hours-table{width:100%;border-collapse:collapse}
.hours-table td{padding:6px 16px;font-size:13px}
.hours-table td:first-child{color:#6b7280;font-weight:600;width:32px}
.hours-table td:last-child{color:#374151}
.hours-closed{color:#9ca3af!important}
.hours-today{background:#f0fdf4}
.hours-today td{color:#15803d!important;font-weight:600}

/* ── 상품 목록 ── */
.product-grid{display:flex;flex-direction:column;gap:1px;background:#f3f4f6}
.product-item{background:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px}
.product-img{width:56px;height:56px;border-radius:10px;object-fit:cover;background:#f3f4f6;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.product-img img{width:100%;height:100%;object-fit:cover}
.product-info{flex:1;min-width:0}
.product-name{font-size:15px;font-weight:600;color:#111827;margin-bottom:2px}
.product-price{font-size:14px;color:#16a34a;font-weight:700}
.product-detail-btn{background:none;border:none;cursor:pointer;color:#9ca3af;padding:4px}
.product-detail-text{font-size:13px;color:#6b7280;line-height:1.5;
  padding:0 16px 14px;display:none}
.product-detail-text.open{display:block}

/* ── 커스텀 필드 ── */
.custom-field-row{padding:10px 16px;border-top:1px solid #f9fafb;
  display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.cf-key{font-size:13px;color:#9ca3af;flex-shrink:0}
.cf-val{font-size:14px;color:#374151;text-align:right}

/* ── 업종 정보 (industry_fields) ── */
.ifield-row{padding:10px 16px;border-top:1px solid #f9fafb;
  display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.ifield-key{font-size:13px;color:#9ca3af;flex-shrink:0}
.ifield-val{font-size:14px;color:#374151;text-align:right;word-break:break-all}

/* ── AI 비서 채팅 ── */
.ai-section{margin:12px 16px 0}
.ai-toggle-btn{width:100%;padding:14px 20px;border:2px solid #16a34a;border-radius:16px;
  background:linear-gradient(135deg,#f0fdf4,#dcfce7);
  display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.ai-toggle-left{display:flex;align-items:center;gap:10px}
.ai-toggle-name{font-size:15px;font-weight:700;color:#15803d}
.ai-toggle-sub{font-size:12px;color:#86efac;margin-top:2px}
.ai-toggle-arrow{color:#16a34a;transition:transform .2s}
.ai-toggle-arrow.open{transform:rotate(180deg)}

.ai-chat-box{border:1.5px solid #e5e7eb;border-top:none;border-radius:0 0 16px 16px;
  background:#fff;display:none;flex-direction:column;max-height:420px}
.ai-chat-box.open{display:flex}
.ai-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.ai-msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55}
.ai-msg-ai{background:#f3f4f6;color:#111827;align-self:flex-start;border-radius:4px 14px 14px 14px}
.ai-msg-user{background:#16a34a;color:#fff;align-self:flex-end;border-radius:14px 14px 4px 14px}
.ai-msg-typing{display:flex;gap:4px;align-items:center;padding:10px 14px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:#9ca3af;
  animation:bounce .8s infinite alternate}
.ai-dot:nth-child(2){animation-delay:.2s}
.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-5px)}}
.ai-input-row{padding:10px 12px;border-top:1px solid #f3f4f6;display:flex;gap:8px}
.ai-input{flex:1;border:1.5px solid #e5e7eb;border-radius:20px;padding:8px 14px;
  font-size:14px;font-family:inherit;outline:none;resize:none;max-height:80px}
.ai-input:focus{border-color:#16a34a}
.ai-send{width:36px;height:36px;border:none;border-radius:50%;background:#16a34a;
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity .2s}
.ai-send:disabled{opacity:.4;cursor:not-allowed}

/* ── 액션 버튼 ── */
.action-bar{padding:16px;display:flex;gap:10px}
.btn-contact{flex:1;padding:13px;border:1.5px solid #16a34a;border-radius:12px;
  background:#fff;color:#16a34a;font-size:14px;font-weight:700;cursor:pointer}
.btn-p2p{flex:1;padding:13px;border:none;border-radius:12px;
  background:#16a34a;color:#fff;font-size:14px;font-weight:700;cursor:pointer}

/* ── 로딩 / 에러 ── */
.skeleton{background:linear-gradient(90deg,#f3f4f6 25%,#e5e7eb 50%,#f3f4f6 75%);
  background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.error-box{margin:40px 20px;text-align:center;color:#9ca3af}

/* ── 반응형 ── */
@media(min-width:480px){
  .card,.ai-section,.action-bar{max-width:480px;margin-left:auto;margin-right:auto}
  .profile-hero{max-width:480px;margin:0 auto}
}
.hidden{display:none!important}
</style>

<script>
const PROXY = 'https://gopang-proxy.tensor-city.workers.dev';

// handle: URL 경로에서 추출 (/profile/@handle) 또는 쿼리스트링(?handle=@handle)
// 주의: GitHub Pages는 서버 라우팅이 없어 /profile/@handle은 항상 404 →
// 404.html이 /profile.html?handle=@handle로 리다이렉트한다. 즉 실제 접속은
// 거의 항상 쿼리스트링 경로다. 이전엔 "/profile.html".replace(/\/profile\/?/,'')가
// ".html"이라는 값을 남겨 쿼리스트링을 가려버리는 버그가 있었다 — 경로 전체가
// 정확히 /profile/... 형태일 때만 path 값을 인정하도록 수정.
const _handle = (() => {
  const m = location.pathname.match(/^\/profile\/(.+)$/);
  const p = m ? decodeURIComponent(m[1]) : '';
  const q = new URLSearchParams(location.search).get('handle');
  return (p || q || '').replace(/^@/, '');
})();

// buyer_request: K-Market Agent가 [OPEN_SELLER_AI] 태그로 전달하는 구매 요청
// 예: ?buyer_request={"item":"고기국수","qty":2,"delivery":"포장"}&buyer_guid=fe80::...
const _buyerRequest = (() => {
  const q = new URLSearchParams(location.search);
  const raw = q.get('buyer_request');
  if (!raw) return null;
  try { return JSON.parse(decodeURIComponent(raw)); } catch { return null; }
})();
const _buyerGuid   = new URLSearchParams(location.search).get('buyer_guid') || '';
const _gwpMode     = new URLSearchParams(location.search).get('gwp') === '1';
const _openerOrigin = new URLSearchParams(location.search).get('opener_origin') || 'https://market.gopang.net';

let _profile    = null;
let _aiHistory  = [];   // AI 채팅 대화 이력 (프록시 AI용)
let _aiSystem   = '';   // 사업체 AI 비서 system prompt

const DAYS_KO = {mon:'월',tue:'화',wed:'수',thu:'목',fri:'금',sat:'토',sun:'일'};
const TYPE_KO = {person:'개인',business:'사업자',institution:'공공기관',org:'협회/단체',platform:'플랫폼'};

// ── 로드 ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', loadProfile);

async function loadProfile() {
  if (!_handle) { showError(); return; }
  try {
    const res  = await fetch(`${PROXY}/profile/@${_handle}`);
    const data = await res.json();
    if (!res.ok || !data.ok) { await renderBasicOrError(); return; }
    _profile = data.profile;
    render(_profile);
  } catch(e) {
    await renderBasicOrError();
  }
}

// ── 상세 프로필(사업자 등록 등)이 아직 없을 때의 대체 화면 ──────
// 조회 중인 handle이 "나 자신"의 계정일 때만 기본 정보(이름·핸들·위치·
// 혼디 색상 코드)를 보여준다. 남의 미작성/비공개 프로필은 그대로 에러 표시.
async function renderBasicOrError() {
  let stored = null;
  try {
    stored = JSON.parse(localStorage.getItem('gopang_user_v4') || 'null');
  } catch { stored = null; }

  const myHandle = (stored?.handle || '').replace(/^@/, '');
  if (!stored || !myHandle || myHandle !== _handle) { showError(); return; }

  document.getElementById('skeleton').style.display = 'none';
  document.getElementById('basic-main').classList.remove('hidden');

  const nickname = stored.nickname || stored.name || '회원';
  document.getElementById('top-title').textContent = nickname;
  document.getElementById('bp-name').textContent   = nickname;
  document.getElementById('bp-handle').textContent = stored.handle || '@' + _handle;
  document.getElementById('bp-avatar').textContent = nickname[0] || '?';

  if (stored.region) {
    document.getElementById('bp-region').textContent = stored.region;
    document.getElementById('bp-card-location').classList.remove('hidden');
  }

  // ── 혼디 색상 코드 — 캐시 우선, 없으면 guid로 즉시 재생성 ──
  try {
    let codeImg = localStorage.getItem('hondi_code_image_v1');
    if (!codeImg && stored.ipv6) {
      const { guidToShortId, generateHondiCodeDataURL } = await import('./src/gopang/ai/hondi-code.js');
      const version = stored.hondi_code_version || 'v1';
      const shortId = guidToShortId(stored.ipv6, version);
      codeImg = await generateHondiCodeDataURL(shortId, version);
    }
    if (codeImg) {
      const img = document.getElementById('bp-code-img');
      img.src = codeImg;
      document.getElementById('bp-card-code').classList.remove('hidden');
      document.getElementById('bp-code-download').onclick = () => {
        const a = document.createElement('a');
        a.href = codeImg;
        a.download = `hondi-code-${myHandle}.png`;
        a.click();
      };
    }
  } catch (e) {
    console.warn('[프로필] 색상 코드 표시 실패:', e.message);
  }
}

// ── 렌더링 ───────────────────────────────────────────────
function render(p) {
  document.getElementById('skeleton').style.display = 'none';
  document.getElementById('main').classList.remove('hidden');

  const pub   = p.extra?.public || {};
  const ident = pub.identity || {};
  const loc   = pub.location || {};
  const fin   = pub.finance  || {};
  const hrs   = pub.activity?.hours || {};
  const cont  = pub.contact  || {};
  const aiCfg = pub.ai_assistant || p.ai_assistant || null;

  // ── 헤더 ──
  document.getElementById('top-title').textContent = p.name || '프로필';
  document.getElementById('p-name').textContent    = p.name || '';
  document.getElementById('p-handle').textContent  = p.handle || '';

  // 아바타: 이름 첫 글자
  const av = document.getElementById('p-avatar');
  av.textContent = (p.name || '?')[0];

  // 뱃지
  const badges = document.getElementById('p-badges');
  if (p.entity_type) {
    badges.innerHTML = `<span class="badge badge-type">${TYPE_KO[p.entity_type]||p.entity_type}</span>`;
  }
  if (fin.gdc_accepted) {
    badges.innerHTML += `<span class="badge badge-gdc">💰 GDC 결제</span>`;
  }

  // 소개
  const desc = ident.description || p.description || '';
  if (desc) {
    const el = document.getElementById('p-desc');
    el.textContent = desc;
    el.classList.remove('hidden');
  }

  // 태그
  const tags = ident.tags || p.search_tags || p.tags || [];
  if (tags.length) {
    const el = document.getElementById('p-tags');
    el.innerHTML = tags.map(t => `<span class="tag">#${t}</span>`).join('');
    el.classList.remove('hidden');
  }

  // ── 연락처 / 위치 ──
  const contactRows = [];
  const phone = cont.phone_display || p.phone;
  if (phone) contactRows.push({
    icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 14a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 3.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`,
    text: `<a href="tel:${phone}">${phone}</a>`
  });
  const website = cont.website || p.website;
  if (website) contactRows.push({
    icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
    text: `<a href="${website.startsWith('http')?website:'https://'+website}" target="_blank">${website}</a>`
  });
  const address = loc.address_short || p.address;
  if (address) contactRows.push({
    icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
    text: address
  });
  if (contactRows.length) {
    const card = document.getElementById('card-contact');
    const rows = document.getElementById('contact-rows');
    rows.innerHTML = contactRows.map(r =>
      `<div class="info-row"><span class="info-icon">${r.icon}</span><span class="info-text">${r.text}</span></div>`
    ).join('');
    card.classList.remove('hidden');
  }

  // ── 영업시간 ──
  const hrsKeys = Object.keys(hrs);
  if (hrsKeys.length) {
    const today = ['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];
    const tbl = document.getElementById('hours-table');
    tbl.innerHTML = Object.entries(hrs).map(([k,v]) => {
      const isToday = k === today;
      const val = v ? `${v.open||''} ~ ${v.close||''}` : '<span class="hours-closed">휴무</span>';
      return `<tr class="${isToday?'hours-today':''}">
        <td>${DAYS_KO[k]||k}</td>
        <td>${val}</td>
      </tr>`;
    }).join('');
    document.getElementById('card-hours').classList.remove('hidden');
  }

  // ── 판매 상품 ──
  const products = p.products || pub.products || [];
  if (products.length) {
    const grid = document.getElementById('product-grid');
    grid.innerHTML = products.map((prod, i) => `
      <div class="product-item">
        <div class="product-img">
          ${prod.image
            ? `<img src="${prod.image}" alt="${prod.name}" loading="lazy">`
            : `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`}
        </div>
        <div class="product-info">
          <div class="product-name">${prod.name}</div>
          <div class="product-price">${prod.price||''}</div>
        </div>
        ${prod.detail ? `<button class="product-detail-btn" onclick="toggleProductDetail(${i})" title="상세보기">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>` : ''}
      </div>
      ${prod.detail ? `<div class="product-detail-text" id="pd-${i}">${prod.detail}</div>` : ''}
    `).join('');
    document.getElementById('card-products').classList.remove('hidden');
  }

  // ── 업종 정보 (industry_fields 범용 렌더러) ──
  const iFields = pub.industry_fields;
  if (iFields && p.entity_type === 'business') {
    const SKIP_KEYS = new Set(['schema_id','schema_version','envelope_version']);
    const LABEL_MAP = {
      address:'주소', hours:'영업시간', delivery:'배달', biz_reg_no:'사업자번호',
      commission_rate:'수수료율', matching_categories:'중개 업종',
      search_radius_km:'검색 반경(km)', settlement_currency:'정산 통화',
      activity_type:'활동 유형', capacity:'수용 인원', max_participants:'최대 인원',
      price:'요금', location:'위치 유형', service_types:'서비스 유형',
      service_area:'서비스 지역', service_scope:'서비스 범위',
      rental_items:'대여 품목', deposit_required:'보증금 필요',
      license_required:'면허 필요', vehicle_type:'차량 유형',
      cuisine_type:'요리 유형', seating_capacity:'좌석 수',
      accom_type:'숙박 유형', room_types:'객실 유형', amenities:'편의시설',
      fish_type:'어종', farming_method:'양식 방법', crop_type:'작물',
      farming_type:'영농 유형', certification:'인증', genre:'장르',
      format:'형식', tools:'사용 도구', dev_type:'개발 유형',
    };
    function _fmtVal(v) {
      if (v === null || v === undefined) return null;
      if (typeof v === 'boolean') return v ? '예' : '아니오';
      if (Array.isArray(v)) return v.length ? v.join(', ') : null;
      if (typeof v === 'object') {
        if ('open' in v && 'close' in v) return `${v.open} ~ ${v.close}`;
        if ('available' in v) {
          if (!v.available) return '미제공';
          return [v.zone && `지역: ${v.zone}`, v.min_order && `최소: ${v.min_order}`]
            .filter(Boolean).join(' / ') || '제공';
        }
        return JSON.stringify(v);
      }
      return String(v);
    }
    const rows = [];
    for (const [k, v] of Object.entries(iFields)) {
      if (SKIP_KEYS.has(k)) continue;
      const label = LABEL_MAP[k] || k;
      const val   = _fmtVal(v);
      if (val === null || val === '') continue;
      rows.push(`<div class="ifield-row">
        <span class="ifield-key">${label}</span>
        <span class="ifield-val">${val}</span>
      </div>`);
    }
    if (rows.length) {
      document.getElementById('industry-rows').innerHTML = rows.join('');
      document.getElementById('card-industry').classList.remove('hidden');
    }
  }

  // ── 커스텀 필드 (공개 항목만) ──
  const cf = (p.custom_fields || []).filter(f => f.public);
  if (cf.length) {
    const rows = document.getElementById('custom-rows');
    rows.innerHTML = cf.map(f =>
      `<div class="custom-field-row">
        <span class="cf-key">${f.key}</span>
        <span class="cf-val">${f.value}</span>
      </div>`
    ).join('');
    document.getElementById('card-custom').classList.remove('hidden');
  }

  // ── AI 비서 ──
  if (aiCfg?.system_prompt) {
    _aiSystem = aiCfg.system_prompt;
    const sec = document.getElementById('ai-section');
    sec.classList.remove('hidden');
    // AI 비서 이름 표시
    if (p.name) document.getElementById('ai-name').textContent = `${p.name} AI 비서`;

    if (_buyerRequest) {
      // K-Market Agent가 buyer_request를 전달한 경우 → 채팅창 자동 열기 + 요청 주입
      toggleAIChat();
      const reqMsg = `[BUYER_REQUEST] ${_buyerGuid ? 'buyer_guid: ' + _buyerGuid + ' | ' : ''}` +
        `품목: ${_buyerRequest.item}, 수량: ${_buyerRequest.qty}` +
        (_buyerRequest.delivery ? `, 배달: ${_buyerRequest.delivery}` : '') +
        (_buyerRequest.budget   ? `, 예산: ${_buyerRequest.budget}` : '');
      // 판매자 AI 비서에게 자동 주입 (600ms 딜레이 — 채팅창 렌더 후)
      setTimeout(() => {
        _aiHistory.push({ role: 'user', content: reqMsg });
        _callSellerAI('');  // 빈 user 메시지로 AI 응답만 유도
      }, 600);
    } else {
      // 일반 방문자 → 인사말만 표시
      addAIMsg('ai', aiCfg.greeting || `안녕하세요! ${p.name||'저희'}에 대해 궁금한 것이 있으시면 무엇이든 물어보세요. 😊`);
    }
  }

  // ── SEO ──
  injectSEO(p, ident, tags);
}

// ── AI 비서 채팅 ─────────────────────────────────────────
function toggleAIChat() {
  const box   = document.getElementById('ai-chat-box');
  const arrow = document.getElementById('ai-arrow');
  const open  = box.classList.toggle('open');
  arrow.classList.toggle('open', open);
  if (open) document.getElementById('ai-input').focus();
}

function addAIMsg(role, text) {
  const el = document.createElement('div');
  el.className = `ai-msg ai-msg-${role}`;
  el.textContent = text;
  document.getElementById('ai-messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return el;
}

function handleAIKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAIMsg(); }
}
function autoResizeAI(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

async function sendAIMsg() {
  const input = document.getElementById('ai-input');
  const text  = input.value.trim();
  if (!text || !_aiSystem) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('ai-send').disabled = true;

  addAIMsg('user', text);
  _aiHistory.push({ role: 'user', content: text });
  await _callSellerAI(text);
}

// 실제 LLM 호출 — buyer_request 자동 주입과 일반 대화 양쪽에서 사용
async function _callSellerAI(userText) {
  document.getElementById('ai-send').disabled = true;

  const typingEl = document.createElement('div');
  typingEl.className = 'ai-msg ai-msg-ai ai-msg-typing';
  typingEl.innerHTML = '<div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>';
  document.getElementById('ai-messages').appendChild(typingEl);
  typingEl.scrollIntoView({ behavior: 'smooth', block: 'end' });

  try {
    const res = await fetch(`${PROXY}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model:      'deepseek-v4-flash',
        max_tokens: 400,
        temperature: 0.7,
        stream:     false,
        messages: [
          { role: 'system', content: _aiSystem },
          ..._aiHistory.slice(-10),
        ],
      }),
    });
    const data  = await res.json();
    const reply = data?.choices?.[0]?.message?.content
               || data?.content
               || '죄송합니다, 잠시 후 다시 시도해주세요.';

    typingEl.remove();
    addAIMsg('ai', reply);
    _aiHistory.push({ role: 'assistant', content: reply });

    // ── SELLER_RESPONSE 감지 → Market/Gopang 탭에 포워딩 ──
    if (reply.includes('[SELLER_RESPONSE:') || reply.includes('[SELLER_RESPONSE:{')) {
      const srMatch = reply.match(/\[SELLER_RESPONSE:(\{[\s\S]*?\})\]/);
      if (srMatch) {
        const srData = JSON.parse(srMatch[1]);
        // opener(market webapp)에 결과 전달
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({
            type:           'GWP_SELLER_RESPONSE',
            seller_response: srData,
          }, _openerOrigin);
          console.log('[Profile] SELLER_RESPONSE → market 탭 포워딩:', srData);
        }
      }
    }

    // ── SELLER_PDV 감지 → 판매자 측 IndexedDB 기록 ──
    if (reply.includes('[SELLER_PDV:') || reply.includes('[SELLER_PDV:{')) {
      const pdvMatch = reply.match(/\[SELLER_PDV:(\{[\s\S]*?\})\]/);
      if (pdvMatch) {
        try {
          const pdvData = JSON.parse(pdvMatch[1]);
          await _writeSellerPDV(pdvData);
        } catch (e) {
          console.warn('[Profile] SELLER_PDV 파싱 오류:', e.message);
        }
      }
    }

  } catch(e) {
    typingEl.remove();
    addAIMsg('ai', '일시적인 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  } finally {
    document.getElementById('ai-send').disabled = false;
    document.getElementById('ai-input')?.focus();
  }
}

// 판매자 PDV IndexedDB 기록
async function _writeSellerPDV(data) {
  const DB_NAME = 'hondi-pdv';
  const req = indexedDB.open(DB_NAME, 1);
  req.onupgradeneeded = (e) => {
    const db = e.target.result;
    if (!db.objectStoreNames.contains('records')) {
      const s = db.createObjectStore('records', { keyPath: 'id', autoIncrement: true });
      s.createIndex('ts',   'ts',   { unique: false });
      s.createIndex('type', 'type', { unique: false });
    }
  };
  const db = await new Promise((res, rej) => {
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
  const tx = db.transaction('records', 'readwrite');
  tx.objectStore('records').add({
    ts:      data.ts || new Date().toISOString(),
    type:    data.type || 'sale',
    summary: `판매: ${data.item} × ${data.qty} ₮${data.revenue}`,
    content: data,
  });
  await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  console.info('[Profile] SELLER_PDV 기록 완료:', data.item, data.revenue);
}

// ── 공유 ─────────────────────────────────────────────────
async function shareProfile() {
  const url   = location.href;
  const title = _profile?.name || '고팡 프로필';
  if (navigator.share) {
    await navigator.share({ title, url }).catch(()=>{});
  } else {
    await navigator.clipboard.writeText(url).catch(()=>{});
    alert('링크가 복사됐습니다.');
  }
}

// ── SEO: OpenGraph + JSON-LD ─────────────────────────────
function injectSEO(p, ident, tags) {
  const title = `${p.name||'프로필'} — 고팡`;
  const desc  = (ident.description || p.description || tags.join(', ')).slice(0, 160);
  const url   = location.href;

  document.title = title;
  setMeta('description', desc);
  setMeta('og:title',       title);
  setMeta('og:description', desc);
  setMeta('og:url',         url);
  setMeta('twitter:title',  title);

  // JSON-LD Schema.org
  const schema = {
    '@context': 'https://schema.org',
    '@type':    p.entity_type === 'person' ? 'Person' :
                p.entity_type === 'business' ? 'LocalBusiness' :
                p.entity_type === 'institution' ? 'GovernmentOrganization' : 'Organization',
    name:       p.name,
    url,
    description: ident.description || p.description || '',
    identifier:  p.handle,
  };
  if (p.address) schema.address = { '@type': 'PostalAddress', streetAddress: p.address };
  if (p.phone)   schema.telephone = p.phone;
  if (tags.length) schema.keywords = tags.join(', ');
  if (p.entity_type === 'business' && p.products?.length) {
    schema.hasOfferCatalog = {
      '@type': 'OfferCatalog',
      itemListElement: p.products.map(prod => ({
        '@type': 'Offer',
        name:    prod.name,
        price:   prod.price?.replace(/[^0-9]/g,'') || '',
        priceCurrency: 'KRW',
      }))
    };
  }
  document.getElementById('jsonld').textContent = JSON.stringify(schema, null, 2);
  document.getElementById('top-title').textContent = p.name || '프로필';
}

function setMeta(name, content) {
  const sel = name.startsWith('og:') || name.startsWith('twitter:')
    ? `meta[property="${name}"]`
    : `meta[name="${name}"]`;
  const el = document.querySelector(sel);
  if (el) el.setAttribute('content', content);
}

function showError() {
  document.getElementById('skeleton').style.display = 'none';
  document.getElementById('error-box').classList.remove('hidden');
}
