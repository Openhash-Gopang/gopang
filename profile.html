<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혼디 프로필</title>
<meta name="description" content="">
<meta property="og:type"        content="profile">
<meta property="og:title"       content="">
<meta property="og:description" content="">
<meta property="og:image"       content="https://hondi.net/icons/icon-512.png">
<meta property="og:url"         content="">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Pretendard',-apple-system,sans-serif;background:#fff;color:#111;
  height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── 히어로 ── */
.hero-wrap{
  flex-shrink:0;height:200px;background:#4B7BE5;
  position:relative;overflow:hidden;transition:height .18s;
}
.hero-city{position:absolute;bottom:0;left:0;right:0;height:160px;opacity:.25;pointer-events:none}
.hero-city svg{width:100%;height:100%}
.hero-edit-btn{
  position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.22);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:#fff;
  z-index:2;transition:opacity .15s;
}
.hero-edit-btn svg{width:15px;height:15px;stroke:#fff;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.hero-avatar{
  position:absolute;bottom:-38px;left:20px;
  width:76px;height:76px;border-radius:50%;
  border:3px solid #fff;background:#1A73E8;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:600;color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.18);z-index:2;overflow:hidden;transition:all .18s;
}
.hero-avatar img{width:100%;height:100%;object-fit:cover}
.hero-chips{
  position:absolute;bottom:14px;right:16px;
  display:flex;gap:10px;z-index:2;transition:opacity .18s;
}
.hero-chip{display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;background:none;border:none;font-family:inherit;padding:0}
.hero-chip-icon{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.45);
  display:flex;align-items:center;justify-content:center;color:#fff;
}
.hero-chip-icon svg{width:17px;height:17px;stroke:#fff;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.hero-chip-label{font-size:10px;color:rgba(255,255,255,.9);font-weight:500}

/* ── 스크롤 본문 ── */
.scroll-body{flex:1;overflow-y:auto;background:#fff;scrollbar-width:none}
.scroll-body::-webkit-scrollbar{display:none}
.body-inner{padding:52px 20px 20px}

/* ── 텍스트 ── */
.profile-name{font-size:17px;font-weight:700;color:#111;margin-bottom:2px}
.profile-desc{font-size:14px;color:#374151;line-height:1.6;margin-top:10px}
.profile-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{padding:4px 10px;background:#f3f4f6;border-radius:20px;font-size:12px;color:#374151}
.badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-gdc{background:#fef3c7;color:#92400e;border:1px solid #fde68a}

/* ── 섹션 타이틀 ── */
.card-title{font-size:11px;font-weight:600;color:#9ca3af;
  text-transform:uppercase;letter-spacing:.06em;margin:20px 0 8px}

/* ── 정보 행 ── */
.info-row{display:flex;align-items:center;gap:12px;padding:10px 0;
  border-bottom:.5px solid #f0f0f0}
.info-row:last-of-type{border-bottom:none}
.info-icon{flex-shrink:0;color:#1A73E8;display:flex}
.info-icon svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.info-text{font-size:15px;color:#374151;flex:1;line-height:1.5}
.info-text a{color:#1A73E8;text-decoration:none}

/* ── 필드 추가 ── */
.add-field-btn{
  display:flex;align-items:center;gap:8px;padding:10px 0;
  cursor:pointer;color:#1A73E8;background:none;border:none;
  font-family:inherit;width:100%;
}
.add-field-btn svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.add-field-btn span{font-size:14px;font-weight:500}

/* ── 미디어 ── */
.media-row{display:flex;gap:10px;margin-top:10px}
.media-card{
  flex:1;aspect-ratio:1;border-radius:12px;border:1px dashed #d1d5db;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;cursor:pointer;background:#fafafa;overflow:hidden;
}
.media-card svg{width:22px;height:22px;stroke:#9ca3af;stroke-width:1.8;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.media-card span{font-size:11px;color:#9ca3af;font-weight:500}
.media-card-sound{
  flex:1;border-radius:12px;border:1px dashed #d1d5db;
  display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer;background:#fafafa;
}
.media-card-sound svg{width:20px;height:20px;stroke:#9ca3af;stroke-width:1.8;fill:none;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.media-card-sound span{font-size:12px;color:#9ca3af;font-weight:500}

/* ── 누락 정보 ── */
.missing-section{margin-top:20px;padding:14px 16px;background:#f9fafb;
  border-radius:12px;border:.5px solid #e5e7eb}
.missing-row{
  display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:.5px solid #f0f0f0;cursor:pointer;
  background:none;border-top:none;border-left:none;border-right:none;
  width:100%;font-family:inherit;text-align:left;
}
.missing-row:last-child{border-bottom:none}
.missing-row-icon svg{width:16px;height:16px;stroke:#9ca3af;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.missing-row span{font-size:13px;color:#6b7280}

/* ── 퀵 액션 ── */
.quick-actions{
  display:flex;justify-content:space-around;
  padding:12px 10px 16px;gap:2px;border-top:.5px solid #f3f4f6;
}
.qa-item{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  background:none;border:none;cursor:pointer;font-family:inherit;flex:1;min-width:0;padding:0;
}
.qa-circle{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:#EEF4FF;color:#1A73E8;flex-shrink:0;transition:transform .12s;
}
.qa-circle svg{width:20px;height:20px;stroke:currentColor;stroke-width:2.2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.qa-item:active .qa-circle{transform:scale(.92)}
.qa-circle.primary{background:#1A73E8;color:#fff}
.qa-label{font-size:11.5px;color:#374151;text-align:center;line-height:1.3;max-width:60px;font-weight:500}

/* ── 상품/시간/커스텀 ── */
.product-grid{display:flex;flex-direction:column;gap:1px;background:#f1f3f5}
.product-item{background:#fff;padding:12px 0;display:flex;align-items:center;gap:12px}
.product-img{width:56px;height:56px;border-radius:10px;background:#f3f4f6;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.product-img img{width:100%;height:100%;object-fit:cover}
.product-info{flex:1;min-width:0}
.product-name{font-size:15px;font-weight:600;color:#111;margin-bottom:2px}
.product-price{font-size:14px;color:#1A73E8;font-weight:700}
.product-detail-btn{background:none;border:none;cursor:pointer;color:#9ca3af;padding:4px}
.product-detail-text{font-size:13px;color:#6b7280;line-height:1.5;padding:0 0 12px;display:none}
.product-detail-text.open{display:block}
.cf-row{padding:8px 0;display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.cf-key{font-size:13px;color:#9ca3af;flex-shrink:0}
.cf-val{font-size:14px;color:#374151;text-align:right}
.hours-table{width:100%;border-collapse:collapse}
.hours-table td{padding:6px 0;font-size:13px}
.hours-table td:first-child{color:#6b7280;font-weight:600;width:32px}
.hours-closed{color:#9ca3af!important}
.hours-today{background:#EEF4FF;border-radius:6px}
.hours-today td{color:#1557B0!important;font-weight:600}

/* ── AI 채팅 독 ── */
.chat-dock{
  background:#fff;border-top:.5px solid #e5e7eb;
  padding:8px 12px 14px;flex-shrink:0;
}
.chat-input-row{
  display:flex;align-items:flex-end;
  background:#f3f4f6;border-radius:20px;
  padding:7px 8px 7px 14px;
  border:1.5px solid transparent;
  transition:border-color .15s,background .15s;
}
.chat-input-row:focus-within{border-color:#1A73E8;background:#fff}
.chat-textarea{
  flex:1;border:none;background:transparent;
  font-size:15px;color:#111;outline:none;resize:none;
  line-height:1.5;min-height:22px;max-height:120px;
  overflow-y:auto;font-family:inherit;padding:0;min-width:0;
}
.chat-textarea::placeholder{color:#9ca3af}
.chat-right{display:flex;align-items:flex-end;flex-shrink:0}
.chat-actions{
  display:flex;align-items:center;
  overflow:hidden;max-width:90px;opacity:1;
  transition:max-width .2s ease,opacity .18s ease;
}
.chat-actions.hidden{max-width:0;opacity:0;pointer-events:none}
.chat-action-btn{
  width:28px;height:28px;border-radius:50%;
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:#9ca3af;flex-shrink:0;
}
.chat-action-btn svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.send-btn-inner{
  width:26px;height:26px;border-radius:50%;
  background:#1A73E8;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-left:4px;
  transition:opacity .15s,transform .15s;
}
.send-btn-inner svg{width:13px;height:13px;stroke:#fff;stroke-width:2.5;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.send-btn-inner:disabled{opacity:0;transform:scale(.6);pointer-events:none}
.send-btn-inner:not(:disabled){opacity:1;transform:scale(1)}

/* ── AI 응답 버블 ── */
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ai-reply{
  position:fixed;bottom:80px;left:12px;right:12px;
  background:#fff;border:.5px solid #e5e7eb;border-radius:16px;
  padding:12px 36px 12px 16px;font-size:14px;color:#374151;line-height:1.6;
  box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:100;
  animation:slideUp .2s ease;
}
.ai-reply-close{
  position:absolute;top:8px;right:10px;
  background:none;border:none;cursor:pointer;color:#9ca3af;font-size:18px;line-height:1;
}
.ai-reply-from{font-size:11px;color:#9ca3af;margin-bottom:5px;font-weight:500}

/* ── 기타 ── */
.skeleton{background:linear-gradient(90deg,#f3f4f6 25%,#e5e7eb 50%,#f3f4f6 75%);
  background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.error-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#9ca3af;padding:40px 20px;text-align:center}
.hidden{display:none!important}
@media(min-width:480px){
  .hero-wrap,.scroll-body,.chat-dock{max-width:480px;margin-left:auto;margin-right:auto}
}
</style>
</head>
<body>

<!-- 스켈레톤 -->
<div id="skeleton" style="display:flex;flex-direction:column;flex:1">
  <div style="height:200px;background:#4B7BE5;flex-shrink:0"></div>
  <div style="padding:52px 20px 20px;display:flex;flex-direction:column;gap:14px">
    <div class="skeleton" style="height:22px;width:45%"></div>
    <div class="skeleton" style="height:15px;width:65%"></div>
    <div class="skeleton" style="height:15px;width:50%"></div>

</div>

<!-- 에러 -->
<div class="error-box hidden" id="error-box">

</div>

<!-- 메인 -->
<div id="main" class="hidden" style="display:flex;flex-direction:column;height:100dvh">

  <!-- 히어로 -->
  <div class="hero-wrap" id="heroWrap">

        <div class="hero-chip-icon">
          <svg viewBox="0 0 24 24">

  <!-- 스크롤 본문 -->

    <div class="body-inner">

      <div class="profile-desc hidden" id="p-desc"></div>

      <div id="p-badges" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px"></div>

      <!-- 연락처 -->

          <label class="media-card">

          </label>
          <label class="media-card">
            <input type="file" accept="image/*" style="display:none" onchange="handleMediaImg(this)">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
              <line x1="12" y1="3" x2="12" y2="9"/>
              <line x1="9" y1="6" x2="15" y2="6"/>
            </svg>
            <span>이미지 추가</span>
          </label>
          <label class="media-card">
            <input type="file" accept="image/*" style="display:none" onchange="handleMediaImg(this)">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="3" width="18" height="18" rx="2"/>

<script>
const PROXY = 'https://hondi-proxy.tensor-city.workers.dev';

const _handle = (() => {
  const m = location.pathname.match(/^\/profile\/(.+)$/);
  const p = m ? decodeURIComponent(m[1]) : '';
  const q = new URLSearchParams(location.search).get('handle');
  return (p || q || '').replace(/^@/, '');
})();

const _buyerRequest = (() => {
  const q = new URLSearchParams(location.search);
  const raw = q.get('buyer_request');
  if (!raw) return null;
  try { return JSON.parse(decodeURIComponent(raw)); } catch { return null; }
})();
const _buyerGuid    = new URLSearchParams(location.search).get('buyer_guid') || '';
const _openerOrigin = new URLSearchParams(location.search).get('opener_origin') || 'https://hondi.net';

let _profile   = null;
let _aiHistory = [];
let _aiSystem  = '';
let _isOwner   = false;

const DAYS_KO = {mon:'월',tue:'화',wed:'수',thu:'목',fri:'금',sat:'토',sun:'일'};

window.addEventListener('DOMContentLoaded', () => {
  loadProfile();
  _initInputDock();
  _initAddField();
});

// ── 프로필 로드 ──────────────────────────────────────────
async function loadProfile() {
  if (!_handle) { showError(); return; }
  try {
    const res  = await fetch(`${PROXY}/profile/@${_handle}`);
    const data = await res.json();
    if (!res.ok || !data.ok) { showError(); return; }
    _profile = data.profile;
    render(_profile);
  } catch { showError(); }
}

// ── 렌더 ─────────────────────────────────────────────────
function render(p) {
  document.getElementById('skeleton').style.display = 'none';
  const main = document.getElementById('main');
  main.classList.remove('hidden');
  main.style.display = 'flex';

  const pub   = p.extra?.public || {};
  const ident = pub.identity  || {};
  const loc   = pub.location  || {};
  const cont  = pub.contact   || {};
  const hrs   = pub.activity?.hours || {};
  const fin   = pub.finance   || {};
  const aiCfg = pub.ai_assistant || p.ai_assistant || null;
  const tags  = ident.tags || p.search_tags || p.tags || [];

  let stored = null;
  try { stored = JSON.parse(localStorage.getItem('gopang_user_v4') || 'null'); } catch {}
  const myHandle = (stored?.handle || '').replace(/^@/, '');
  _isOwner = !!myHandle && myHandle === (p.handle || '').replace(/^@/, '');

  document.title = (p.name || '프로필') + ' — 혼디';

  // 아바타
  document.getElementById('heroAvatarLetter').textContent = (p.name || '?')[0];

  // 수정 버튼
  if (_isOwner) document.getElementById('heroEditBtn').classList.remove('hidden');

  // 이름
  document.getElementById('p-name').textContent = p.name || '';

  // 소개
  const desc = ident.description || p.description || '';
  if (desc) {
    const el = document.getElementById('p-desc');
    el.textContent = desc;
    el.classList.remove('hidden');
  }

  // 태그
  if (tags.length) {
    const el = document.getElementById('p-tags');
    el.innerHTML = tags.map(t => `<span class="tag">#${t}</span>`).join('');
    el.classList.remove('hidden');
  }

  // 뱃지
  if (fin.gdc_accepted)
    document.getElementById('p-badges').innerHTML += '<span class="badge badge-gdc">GDC 결제</span>';

  // 연락처
  const cRows = [];
  const phone = cont.phone_display || p.phone;
  if (phone) cRows.push({
    svg: '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 14a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 3.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>',
    text: `<a href="tel:${phone}">${phone}</a>`
  });
  const website = cont.website || p.website;
  if (website) cRows.push({
    svg: '<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',
    text: `<a href="${website.startsWith('http') ? website : 'https://'+website}" target="_blank">${website}</a>`
  });
  const address = loc.address_short || p.address;
  if (address) cRows.push({
    svg: '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>',
    text: address
  });

  if (cRows.length || _isOwner) {
    document.getElementById('contact-rows').innerHTML = cRows.map(r =>
      `<div class="info-row">
        <span class="info-icon"><svg viewBox="0 0 24 24">${r.svg}</svg></span>
        <span class="info-text">${r.text}</span>
      </div>`
    ).join('');
    document.getElementById('card-contact').classList.remove('hidden');
    if (_isOwner) document.getElementById('addFieldBtn').classList.remove('hidden');
  }

  // 미디어 (본인만)
  if (_isOwner) document.getElementById('card-media').classList.remove('hidden');

  // 영업시간
  if (Object.keys(hrs).length) {
    const today = ['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];
    document.getElementById('hours-table').innerHTML = Object.entries(hrs).map(([k,v]) => {
      const val = v ? `${v.open||''} ~ ${v.close||''}` : '<span class="hours-closed">휴무</span>';
      return `<tr class="${k===today?'hours-today':''}"><td>${DAYS_KO[k]||k}</td><td>${val}</td></tr>`;
    }).join('');
    document.getElementById('card-hours').classList.remove('hidden');
  }

  // 상품
  const products = p.products || pub.products || [];
  if (products.length) {
    document.getElementById('product-grid').innerHTML = products.map((prod, i) => `
      <div class="product-item">
        <div class="product-img">${prod.image
          ? `<img src="${prod.image}" alt="${prod.name}" loading="lazy">`
          : '<svg viewBox="0 0 24 24" width="24" height="24" stroke="#d1d5db" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'}</div>
        <div class="product-info">
          <div class="product-name">${prod.name}</div>
          <div class="product-price">${prod.price||''}</div>
        </div>
        ${prod.detail ? `<button class="product-detail-btn" onclick="toggleProductDetail(${i})">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>` : ''}
      </div>
      ${prod.detail ? `<div class="product-detail-text" id="pd-${i}">${prod.detail}</div>` : ''}
    `).join('');
    document.getElementById('card-products').classList.remove('hidden');
  }

  // 업종 정보
  const iFields = pub.industry_fields;
  if (iFields && p.entity_type === 'business') {
    const SKIP  = new Set(['schema_id','schema_version','envelope_version']);
    const LABEL = {address:'주소',hours:'영업시간',delivery:'배달',biz_reg_no:'사업자번호',
      price:'요금',location:'위치 유형',service_types:'서비스 유형',
      cuisine_type:'요리 유형',seating_capacity:'좌석 수',
      accom_type:'숙박 유형',amenities:'편의시설',genre:'장르',tools:'사용 도구'};
    function fmtV(v) {
      if (v===null||v===undefined) return null;
      if (typeof v==='boolean') return v?'예':'아니오';
      if (Array.isArray(v)) return v.length?v.join(', '):null;
      if (typeof v==='object') return JSON.stringify(v);
      return String(v);
    }
    const rows = [];
    for (const [k,v] of Object.entries(iFields)) {
      if (SKIP.has(k)) continue;
      const val = fmtV(v);
      if (!val) continue;
      rows.push(`<div class="cf-row"><span class="cf-key">${LABEL[k]||k}</span><span class="cf-val">${val}</span></div>`);
    }
    if (rows.length) {
      document.getElementById('industry-rows').innerHTML = rows.join('');
      document.getElementById('card-industry').classList.remove('hidden');
    }
  }

  // 커스텀 필드
  const cf = (p.custom_fields||[]).filter(f=>f.public);
  if (cf.length) {
    document.getElementById('custom-rows').innerHTML = cf.map(f=>
      `<div class="cf-row"><span class="cf-key">${f.key}</span><span class="cf-val">${f.value}</span></div>`
    ).join('');
    document.getElementById('card-custom').classList.remove('hidden');
  }

  // 퀵 액션 (타인)
  if (!_isOwner) {
    document.getElementById('quick-actions').classList.remove('hidden');
    _initSaveState(p.handle);
  }

  // AI
  if (aiCfg?.system_prompt) {
    _aiSystem = aiCfg.system_prompt;
    if (_buyerRequest) {
      setTimeout(() => {
        _aiHistory.push({role:'user', content:`[BUYER_REQUEST] 품목:${_buyerRequest.item},수량:${_buyerRequest.qty}`});
        _callAI('');
      }, 400);
    }
  }

  // 누락 정보
  _renderMissing(p, ident, pub, cont, loc, tags);

  // SEO
  _injectSEO(p, ident, tags);

  // 스크롤 히어로
  _initScroll();
}

// ── 히어로 스크롤 패럴랙스 ──────────────────────────────
function _initScroll() {
  const heroWrap = document.getElementById('heroWrap');
  const avatar   = document.getElementById('heroAvatar');
  const chips    = document.getElementById('heroChips');
  const editBtn  = document.getElementById('heroEditBtn');
  const body     = document.getElementById('scrollBody');
  const FULL=200, MIN=64;

  body.addEventListener('scroll', () => {
    const p = Math.min(body.scrollTop / (FULL-MIN), 1);
    heroWrap.style.height = (FULL - (FULL-MIN)*p) + 'px';
    const s = 76 - 24*p;
    avatar.style.width = avatar.style.height = s+'px';
    avatar.style.bottom = (-38+48*p)+'px';
    avatar.style.left   = (20-4*p)+'px';
    document.getElementById('heroAvatarLetter').style.fontSize = (28-10*p)+'px';
    chips.style.opacity = Math.max(0, 1-p*2);
    chips.style.pointerEvents = p>.5 ? 'none':'auto';
    editBtn.style.opacity = Math.max(.3, 1-p*1.5);
  }, {passive:true});
}

// ── 입력 독 ─────────────────────────────────────────────
function _initInputDock() {
  const ta      = document.getElementById('chatInput');
  const sb      = document.getElementById('sendBtn');
  const actions = document.getElementById('chatActions');

  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    const has = !!ta.value.trim();
    sb.disabled = !has;
    if (has) actions.classList.add('hidden');
    else     actions.classList.remove('hidden');
  });
  ta.addEventListener('blur', () => {
    if (!ta.value.trim()) actions.classList.remove('hidden');
  });
  ta.addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendChatMsg(); }
  });
}

// ── 필드 추가 ────────────────────────────────────────────
function _initAddField() {
  const btn = document.getElementById('addFieldBtn');
  if (!btn) return;
  const FIELDS = [
    {svg:'<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>', ph:'이메일'},
    {svg:'<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>', ph:'직장'},
    {svg:'<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>', ph:'링크'},
    {svg:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>', ph:'생년월일'},
  ];
  btn.addEventListener('click', () => {
    const f = FIELDS[document.querySelectorAll('.added-field').length % FIELDS.length];
    const row = document.createElement('div');
    row.className = 'info-row added-field';
    row.innerHTML = `<span class="info-icon" style="color:#1A73E8"><svg viewBox="0 0 24 24">${f.svg}</svg></span>
      <span class="info-text" style="color:#9ca3af">${f.ph} 입력...</span>`;
    btn.before(row);
  });
}

// ── AI 채팅 ──────────────────────────────────────────────
async function sendChatMsg() {
  const ta = document.getElementById('chatInput');
  const text = ta.value.trim();
  if (!text) return;
  ta.value = ''; ta.style.height='auto';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('chatActions').classList.remove('hidden');
  _aiHistory.push({role:'user', content:text});
  await _callAI(text);
}

async function _callAI(userText) {
  const systemPrompt = _aiSystem ||
    `당신은 ${_profile?.name||'이 프로필'}의 AI 비서입니다. 방문자의 질문에 친절하고 정확하게 답변해 주세요. 답변은 간결하게 해주세요.`;

  try {
    const res = await fetch(`${PROXY}/chat/completions`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'deepseek-v4-flash',
        max_tokens: 400,
        temperature: .7,
        stream: false,
        messages: [
          {role:'system', content: systemPrompt},
          ..._aiHistory.slice(-10),
        ],
      }),
    });
    const data  = await res.json();
    const reply = data?.choices?.[0]?.message?.content || '잠시 후 다시 시도해주세요.';
    _aiHistory.push({role:'assistant', content:reply});
    _showReply(reply);

    // SELLER_RESPONSE 포워딩
    const srM = reply.match(/\[SELLER_RESPONSE:(\{[\s\S]*?\})\]/);
    if (srM && window.opener && !window.opener.closed) {
      try { window.opener.postMessage({type:'GWP_SELLER_RESPONSE', seller_response:JSON.parse(srM[1])}, _openerOrigin); } catch {}
    }
  } catch {
    _showReply('일시적 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
  } finally {
    document.getElementById('sendBtn').disabled = true;
  }
}

function _showReply(text) {
  document.getElementById('aiReplyBubble')?.remove();
  const el = document.createElement('div');
  el.id = 'aiReplyBubble';
  el.className = 'ai-reply';
  el.innerHTML = `<div class="ai-reply-from">AI 비서</div>${text.replace(/\n/g,'<br>')}
    <button class="ai-reply-close" onclick="document.getElementById('aiReplyBubble').remove()">×</button>`;
  document.body.appendChild(el);
  setTimeout(() => el?.remove(), 14000);
}

// ── 마이크 ───────────────────────────────────────────────
let _recog = null;
function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  const btn = document.getElementById('micBtn');
  if (_recog) { _recog.stop(); _recog=null; btn.style.color=''; return; }
  _recog = new SR();
  _recog.lang = 'ko-KR'; _recog.continuous=false; _recog.interimResults=false;
  _recog.onresult = e => {
    const ta = document.getElementById('chatInput');
    ta.value += e.results[0][0].transcript;
    ta.dispatchEvent(new Event('input'));
  };
  _recog.onend = () => { _recog=null; btn.style.color=''; };
  btn.style.color = '#1A73E8';
  _recog.start();
}

// ── 파일/미디어 ──────────────────────────────────────────
function handleChatFile(input) {
  const file = input.files[0];
  if (!file) return;
  const ta = document.getElementById('chatInput');
  if (!ta.value.trim()) ta.value = file.name;
  ta.dispatchEvent(new Event('input'));
  input.value = '';
}
function handleMediaImg(input) {
  const file = input.files[0];
  if (!file) return;
  const card = input.closest('.media-card');
  const url  = URL.createObjectURL(file);
  card.style.backgroundImage    = `url(${url})`;
  card.style.backgroundSize     = 'cover';
  card.style.backgroundPosition = 'center';
  card.querySelector('svg').style.display  = 'none';
  card.querySelector('span').style.display = 'none';
  input.value = '';
}
function handleMediaSound(input) {
  const file = input.files[0];
  if (!file) return;
  input.closest('.media-card-sound').querySelector('span').textContent = file.name;
  input.value = '';
}

// ── 저장 ─────────────────────────────────────────────────
const _SAVED_KEY = 'hondi_saved_profiles';
function _getSaved() { try { return JSON.parse(localStorage.getItem(_SAVED_KEY)||'[]'); } catch { return []; } }
function _initSaveState(handle) {
  if (!handle) return;
  const saved = _getSaved().includes(handle);
  document.querySelector('#qa-save .qa-circle')?.classList.toggle('primary', saved);
  const lbl = document.getElementById('qa-save-label');
  if (lbl) lbl.textContent = saved ? '저장됨':'저장';
}
function toggleSaveProfile() {
  if (!_profile?.handle) return;
  const saved = _getSaved();
  const idx   = saved.indexOf(_profile.handle);
  const circ  = document.querySelector('#qa-save .qa-circle');
  const lbl   = document.getElementById('qa-save-label');
  if (idx>=0) { saved.splice(idx,1); circ?.classList.remove('primary'); if(lbl)lbl.textContent='저장'; }
  else        { saved.push(_profile.handle); circ?.classList.add('primary'); if(lbl)lbl.textContent='저장됨'; }
  try { localStorage.setItem(_SAVED_KEY, JSON.stringify(saved)); } catch {}
}

// ── 혼디코드 ─────────────────────────────────────────────
async function openMyHondiCode() {
  const guid = _profile?.guid;
  if (!guid) return;
  try {
    const { guidToShortId, generateHondiCodeDataURL } = await import('./src/gopang/ai/hondi-code.js');
    const ver   = _profile.hondi_code_version || 'v1';
    const short = guidToShortId(guid, ver);
    const url   = await generateHondiCodeDataURL(short, ver);
    _showCodeModal(url);
  } catch(e) { console.warn('[HondiCode]', e.message); }
}
function _showCodeModal(dataURL) {
  let m = document.getElementById('hondi-code-modal');
  if (!m) {
    m = document.createElement('div');
    m.id = 'hondi-code-modal';
    m.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center';
    m.onclick = e => { if(e.target===m) m.remove(); };
    m.innerHTML = `<div style="background:#fff;border-radius:16px;padding:24px;max-width:300px;width:90%;text-align:center">
      <img id="hondi-code-img" style="width:100%;border-radius:8px;border:1px solid #f3f4f6">
      <button onclick="document.getElementById('hondi-code-modal').remove()"
        style="margin-top:14px;padding:10px 22px;border:none;border-radius:999px;
               background:#1A73E8;color:#fff;font-weight:600;font-size:13.5px;cursor:pointer">닫기</button>
    </div>`;
    document.body.appendChild(m);
  }
  document.getElementById('hondi-code-img').src = dataURL;
}

// ── 액션 ─────────────────────────────────────────────────
function contactOwner() {
  if (!_profile?.guid) return;
  location.href = `/webapp.html?connect=${encodeURIComponent(_profile.guid)}`;
}
function startP2P() {
  if (!_profile?.guid) return;
  location.href = `/webapp.html?p2p=${encodeURIComponent(_profile.guid)}`;
}
async function shareProfile() {
  const url = location.href, title = _profile?.name || '혼디 프로필';
  if (navigator.share) await navigator.share({title, url}).catch(()=>{});
  else { await navigator.clipboard.writeText(url).catch(()=>{}); alert('링크가 복사됐습니다.'); }
}

// ── 누락 정보 ────────────────────────────────────────────
function _renderMissing(p, ident, pub, cont, loc, tags) {
  const card = document.getElementById('card-missing-info');
  if (!_isOwner) { card.classList.add('hidden'); return; }
  const mk = (svg, label) =>
    `<button class="missing-row" onclick="location.href='/register-profile.html'">
      <span class="missing-row-icon"><svg viewBox="0 0 24 24">${svg}</svg></span>
      <span>${label}</span>
    </button>`;
  const rows = [];
  if (!(ident.description||p.description))
    rows.push(mk('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>', '소개 추가'));
  if (!tags.length)
    rows.push(mk('<path d="M20.59 13.41 11 23 1 13l9.59-9.59A2 2 0 0 1 12 3h7a2 2 0 0 1 2 2v7a2 2 0 0 1-.41 1.41z"/><circle cx="16.5" cy="7.5" r="1.5"/>', '태그 추가'));
  if (!(cont.website||p.website))
    rows.push(mk('<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>', '웹사이트 추가'));
  if (!(cont.phone_display||p.phone))
    rows.push(mk('<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 14a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 3.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>', '전화번호 추가'));
  if (!(loc.address_short||p.address))
    rows.push(mk('<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>', '주소 추가'));
  if (!rows.length) { card.classList.add('hidden'); return; }
  document.getElementById('missing-info-rows').innerHTML = rows.join('');
  card.classList.remove('hidden');
}

// ── SEO ──────────────────────────────────────────────────
function _injectSEO(p, ident, tags) {
  const title = `${p.name||'프로필'} — 혼디`;
  const desc  = (ident.description||p.description||tags.join(', ')).slice(0,160);
  document.title = title;
  const sm = (n,v) => {
    const el = document.querySelector(`meta[property="${n}"],meta[name="${n}"]`);
    if (el) el.setAttribute('content', v);
  };
  sm('description',desc); sm('og:title',title); sm('og:description',desc); sm('og:url',location.href);
  const schema = {
    '@context': 'https://schema.org',
    '@type': p.entity_type==='person'?'Person':p.entity_type==='business'?'LocalBusiness':'Organization',
    name: p.name, url: location.href,
    description: ident.description||p.description||'',
  };
  const ld = document.getElementById('jsonld');
  if (ld) ld.textContent = JSON.stringify(schema);
}

  document.getElementById('skeleton').style.display = 'none';
