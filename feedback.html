<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제안 현황 — 고팡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

:root {
  --bg:        #f8f9fa;
  --surface:   #ffffff;
  --border:    #e5e7eb;
  --brand:     #3ecf8e;
  --brand-dk:  #1a9e6a;
  --text:      #111827;
  --text-sub:  #6b7280;
  --text-mute: #9ca3af;
  --font:      'Inter','Noto Sans KR',sans-serif;
  --mono:      'DM Mono',monospace;
  --radius:    10px;
}

body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

/* ── Header ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-logo { font-size: 15px; font-weight: 600; color: var(--text); text-decoration: none; }
.header-divider { width: 1px; height: 16px; background: var(--border); }
.header-title { font-size: 14px; color: var(--text-sub); }
.back-btn {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text-sub);
  text-decoration: none; padding: 6px 10px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface);
  transition: border-color .15s;
}
.back-btn:hover { border-color: #9ca3af; }

/* ── Main ── */
.main { max-width: 800px; margin: 0 auto; padding: 32px 20px; }

/* ── Stats ── */
.stats { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  flex: 1; min-width: 120px;
}
.stat-num { font-size: 24px; font-weight: 700; color: var(--text); }
.stat-label { font-size: 12px; color: var(--text-mute); margin-top: 2px; }

/* ── Filter ── */
.filter-bar {
  display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); font-size: 13px; color: var(--text-sub);
  cursor: pointer; font-family: var(--font); transition: all .15s;
}
.filter-btn.active {
  background: var(--text); color: #fff; border-color: var(--text);
}

/* ── Table ── */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.table-header {
  display: grid;
  grid-template-columns: 80px 1fr 90px 100px 90px;
  gap: 0; padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 600; color: var(--text-mute);
  text-transform: uppercase; letter-spacing: .5px;
}
.feedback-row {
  display: grid;
  grid-template-columns: 80px 1fr 90px 100px 90px;
  gap: 0; padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  align-items: start;
  transition: background .1s;
}
.feedback-row:last-child { border-bottom: none; }
.feedback-row:hover { background: var(--bg); }

.cell-handle { font-size: 12px; color: var(--text-sub); font-family: var(--mono); }
.cell-content { font-size: 13px; color: var(--text); line-height: 1.5; }
.cell-content .admin-note { font-size: 11px; color: var(--text-mute); margin-top: 4px; }
.cell-category { font-size: 12px; }
.cell-date { font-size: 11px; color: var(--text-mute); font-family: var(--mono); }
.cell-status { }

/* ── Category badge ── */
.cat-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; padding: 3px 8px; border-radius: 4px;
  font-weight: 500;
}
.cat-bug     { background: #fef2f2; color: #dc2626; }
.cat-feature { background: #eff6ff; color: #2563eb; }
.cat-ui      { background: #f5f3ff; color: #7c3aed; }
.cat-etc     { background: #f9fafb; color: #6b7280; }
.cat-pending { background: #f9fafb; color: #9ca3af; }

/* ── Status badge ── */
.status-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; padding: 3px 8px; border-radius: 4px;
  font-weight: 500; cursor: default;
}
.status-pending   { background: #fef9c3; color: #854d0e; }
.status-reviewing { background: #dbeafe; color: #1d4ed8; }
.status-accepted  { background: #dcfce7; color: #15803d; }
.status-rejected  { background: #f1f5f9; color: #64748b; }

/* ── Admin controls ── */
.admin-controls { display: none; margin-top: 8px; }
.admin-controls.visible { display: flex; gap: 6px; flex-wrap: wrap; }
.admin-btn {
  font-size: 11px; padding: 3px 8px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; font-family: var(--font); color: var(--text-sub);
  transition: all .15s;
}
.admin-btn:hover { background: var(--text); color: #fff; border-color: var(--text); }

/* ── Empty ── */
.empty { text-align: center; padding: 60px 20px; color: var(--text-mute); }
.empty svg { margin-bottom: 12px; opacity: .3; }

/* ── Loading ── */
.loading { text-align: center; padding: 40px; color: var(--text-mute); font-size: 13px; }

@media (max-width: 600px) {
  .table-header, .feedback-row {
    grid-template-columns: 1fr;
  }
  .table-header { display: none; }
  .feedback-row { gap: 6px; }
  .cell-handle::before { content: '@'; }
  .stats { gap: 8px; }
  .stat-card { min-width: 80px; padding: 12px; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <a href="/desktop.html" class="header-logo">고팡</a>
    <div class="header-divider"></div>
    <span class="header-title">제안 현황</span>
  </div>
  <a href="/desktop.html" class="back-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    돌아가기
  </a>
</header>

<!-- Main -->
<main class="main">

  <!-- Stats -->
  <div class="stats" id="stats-area">
    <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">전체 제안</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-pending">—</div><div class="stat-label">검토 대기</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-accepted">—</div><div class="stat-label">반영 확정</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-reviewing">—</div><div class="stat-label">검토중</div></div>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('')" data-filter="">전체</button>
    <button class="filter-btn" onclick="setFilter('pending')" data-filter="pending">검토 대기</button>
    <button class="filter-btn" onclick="setFilter('reviewing')" data-filter="reviewing">검토중</button>
    <button class="filter-btn" onclick="setFilter('accepted')" data-filter="accepted">반영 확정</button>
    <button class="filter-btn" onclick="setFilter('rejected')" data-filter="rejected">보류</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-header">
      <div>제안자</div>
      <div>내용</div>
      <div>카테고리</div>
      <div>일자</div>
      <div>상태</div>
    </div>
    <div id="feedback-list">
      <div class="loading">불러오는 중…</div>
    </div>
  </div>

</main>

<script>
const PROXY = 'https://hondi-proxy.tensor-city.workers.dev';
const ADMIN_HANDLE = '@96627170';

const CAT_MAP = {
  bug:     { label: '버그 신고',  cls: 'cat-bug' },
  feature: { label: '기능 추가',  cls: 'cat-feature' },
  ui:      { label: 'UI 개선',    cls: 'cat-ui' },
  etc:     { label: '기타',       cls: 'cat-etc' },
  pending: { label: '분류 중',    cls: 'cat-pending' },
};
const STATUS_MAP = {
  pending:   { label: '검토 대기', cls: 'status-pending' },
  reviewing: { label: '검토중',    cls: 'status-reviewing' },
  accepted:  { label: '반영 확정', cls: 'status-accepted' },
  rejected:  { label: '보류',      cls: 'status-rejected' },
};

let allItems   = [];
let curFilter  = '';
let isAdmin    = false;
let adminGuid  = null;

// ── 관리자 확인 ──────────────────────────────────────────
function checkAdmin() {
  try {
    const user = JSON.parse(localStorage.getItem('gopang_user_v4') || 'null');
    if (user?.handle === ADMIN_HANDLE) {
      isAdmin   = true;
      adminGuid = user.ipv6;
    }
  } catch {}
}

// ── 데이터 로드 ──────────────────────────────────────────
async function loadFeedback() {
  try {
    const res  = await fetch(`${PROXY}/feedback?limit=100`);
    const data = await res.json();
    allItems = data.items || [];
    updateStats();
    render();
  } catch(e) {
    document.getElementById('feedback-list').innerHTML =
      '<div class="empty"><p>불러오기 실패. 새로고침해 주세요.</p></div>';
  }
}

// ── 통계 ────────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-total').textContent    = allItems.length;
  document.getElementById('stat-pending').textContent  = allItems.filter(i => i.status === 'pending').length;
  document.getElementById('stat-accepted').textContent = allItems.filter(i => i.status === 'accepted').length;
  document.getElementById('stat-reviewing').textContent= allItems.filter(i => i.status === 'reviewing').length;
}

// ── 필터 ────────────────────────────────────────────────
function setFilter(val) {
  curFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === val);
  });
  render();
}

// ── 렌더링 ───────────────────────────────────────────────
function render() {
  const list = document.getElementById('feedback-list');
  const items = curFilter ? allItems.filter(i => i.status === curFilter) : allItems;

  if (!items.length) {
    list.innerHTML = `<div class="empty">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>제안이 없습니다</p>
    </div>`;
    return;
  }

  list.innerHTML = items.map(item => {
    const cat    = CAT_MAP[item.category]    || CAT_MAP.etc;
    const status = STATUS_MAP[item.status]   || STATUS_MAP.pending;
    const date   = new Date(item.created_at).toLocaleDateString('ko-KR', { month:'2-digit', day:'2-digit' });
    const adminCtrl = isAdmin ? `
      <div class="admin-controls visible" id="ctrl-${item.id}">
        ${['reviewing','accepted','rejected'].map(s =>
          s !== item.status
            ? `<button class="admin-btn" onclick="changeStatus('${item.id}','${s}')">${STATUS_MAP[s].label}</button>`
            : ''
        ).join('')}
      </div>` : '';

    return `<div class="feedback-row" id="row-${item.id}">
      <div class="cell-handle">${item.handle || '—'}</div>
      <div class="cell-content">
        ${escHtml(item.content)}
        ${item.admin_note ? `<div class="admin-note">💬 ${escHtml(item.admin_note)}</div>` : ''}
        ${adminCtrl}
      </div>
      <div class="cell-category">
        <span class="cat-badge ${cat.cls}">${cat.label}</span>
      </div>
      <div class="cell-date">${date}</div>
      <div class="cell-status">
        <span class="status-badge ${status.cls}">${status.label}</span>
      </div>
    </div>`;
  }).join('');
}

// ── 상태 변경 (관리자) ──────────────────────────────────
async function changeStatus(id, status) {
  if (!isAdmin) return;
  const note = status === 'rejected'
    ? prompt('보류 사유를 입력하세요 (선택사항):') || null
    : null;

  try {
    const res = await fetch(`${PROXY}/feedback/${id}`, {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status, admin_note: note, admin_guid: adminGuid }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.detail);

    // 로컬 업데이트
    const idx = allItems.findIndex(i => i.id === id);
    if (idx !== -1) { allItems[idx].status = status; if (note) allItems[idx].admin_note = note; }
    updateStats();
    render();
  } catch(e) {
    alert('상태 변경 실패: ' + e.message);
  }
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 초기화 ───────────────────────────────────────────────
checkAdmin();
loadFeedback();
</script>
</body>
</html>
