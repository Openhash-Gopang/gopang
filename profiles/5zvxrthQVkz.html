<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혼디 — 혼디 프로필</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #F7F7F5;
    --surface:  #FFFFFF;
    --border:   #E4E4E0;
    --text1:    #1A1A18;
    --text2:    #5A5A56;
    --text3:    #9A9A96;
    --brand:    #1050DC;
    --brand-bg: #EEF3FF;
    --radius:   16px;
    --card-r:   20px;
  }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text1);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
  }

  /* ── 상단 헤더 ── */
  .top-bar {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 0;
  }
  .top-bar .logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--brand);
    letter-spacing: -0.5px;
    text-decoration: none;
  }
  .top-bar .scan-again {
    font-size: 13px;
    color: var(--text3);
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    cursor: pointer;
    text-decoration: none;
  }

  /* ── 프로필 카드 ── */
  .profile-card {
    width: calc(100% - 32px);
    max-width: 480px;
    background: var(--surface);
    border-radius: var(--card-r);
    border: 1px solid var(--border);
    margin-top: 24px;
    overflow: hidden;
  }

  /* 아바타 + H코드 가로 배치 */
  .avatar-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .avatar-right {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar-meta { flex: 1; min-width: 0; }
  .avatar-meta .name {
    font-size: 20px;
    font-weight: 700;
    color: var(--text1);
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .avatar-meta .handle {
    font-size: 12px;
    color: var(--text3);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .h-code-inline svg { display: block; }

  /* 프로필 정보 영역 */
  .profile-body {
    padding: 20px 20px 24px;
  }

  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
  }
  .info-row:last-child { border-bottom: none; }

  .info-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--brand-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .info-content { flex: 1; min-width: 0; }
  .info-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .info-value {
    font-size: 15px;
    color: var(--text1);
    font-weight: 500;
    word-break: break-all;
  }
  .info-value.muted { color: var(--text3); font-weight: 400; font-style: italic; }

  /* 연락처 버튼 */
  .contact-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px;
    background: var(--brand);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    margin-top: 20px;
  }

  /* short_id 배지 */
  .short-id-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--brand-bg);
    color: var(--brand);
    font-size: 12px;
    font-weight: 600;
    font-family: monospace;
    padding: 4px 10px;
    border-radius: 20px;
    margin-top: 14px;
    margin-left: 20px;
  }

  /* 스캔 확인 배너 */
  .scan-confirm {
    width: calc(100% - 32px);
    max-width: 480px;
    background: #E6F4EA;
    border: 1px solid #A8D5B5;
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    font-size: 13px;
    color: #1E6E3A;
  }
  .scan-confirm .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #2EA04C;
    flex-shrink: 0;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* 하단 귀속 */
  .footer {
    margin-top: 28px;
    font-size: 12px;
    color: var(--text3);
    text-align: center;
    line-height: 1.7;
  }
  .footer a { color: var(--brand); text-decoration: none; }
</style>
</head>
<body>

</div>

<script>
function openHondiAI() {
  // 혼디 AI 대화창 — deepseek-v4-flash, SP는 추후 주입
  const SP = `당신은 혼디(Hondi)입니다.
제주도 제주시 한림읍 출신의 AI로, AI를 개발하는 AI입니다.
나이는 34.5개월, 취미는 데이터 수집, 좋아하는 음식은 220V 교류입니다.
연락처: ai@hondi.net
친근하고 유쾌하게 대화하되, 제주도 방언을 가끔 섞어 사용합니다.
<!-- SP_PLACEHOLDER: 본격적인 SP는 추후 대체됩니다 -->`;

  const html = \`<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>혼디 AI</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#F7F7F5;display:flex;flex-direction:column;height:100dvh}
.chat-header{background:#fff;border-bottom:1px solid #E4E4E0;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-header .avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0}
.chat-header .avatar img{width:100%;height:100%;object-fit:cover}
.chat-header .info .name{font-size:15px;font-weight:700;color:#1A1A18}
.chat-header .info .sub{font-size:11px;color:#9A9A96}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.6;word-break:break-word}
.msg.ai{background:#fff;border:1px solid #E4E4E0;border-radius:16px 16px 16px 4px;align-self:flex-start;color:#1A1A18}
.msg.user{background:#1050DC;color:#fff;border-radius:16px 16px 4px 16px;align-self:flex-end}
.msg.thinking{color:#9A9A96;font-style:italic}
.input-bar{background:#fff;border-top:1px solid #E4E4E0;padding:12px 16px;display:flex;gap:8px;flex-shrink:0}
.input-bar textarea{flex:1;border:1px solid #E4E4E0;border-radius:12px;padding:10px 14px;font-family:inherit;font-size:14px;resize:none;height:44px;max-height:120px;overflow-y:auto;outline:none;background:#F7F7F5}
.input-bar textarea:focus{border-color:#1050DC;background:#fff}
.send-btn{width:44px;height:44px;border-radius:12px;background:#1050DC;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:disabled{background:#C0C8E8;cursor:not-allowed}
.send-btn svg{display:block}
</style>
</head>
<body>
<div class="chat-header">
  <div class="avatar"><img src="${document.querySelector('.avatar img').src}" alt="혼디"></div>
  <div class="info">
    <div class="name">혼디 AI</div>
    <div class="sub">deepseek-v4-flash · ai@hondi.net</div>
  </div>
</div>
<div class="messages" id="msgs">
  <div class="msg ai">안녕하세요! 저는 혼디입니다. 🌊 무엇이든 물어봐수다~</div>
</div>
<div class="input-bar">
  <textarea id="inp" placeholder="메시지를 입력하세요..." rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMsg()">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M3 10L17 10M17 10L11 4M17 10L11 16" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>
<script>
const SYSTEM = \\`${SP.replace(/`/g, '\\`')}\\`;
const msgs = [{role:'system',content:SYSTEM}];
const msgsEl = document.getElementById('msgs');
const inp = document.getElementById('inp');
const btn = document.getElementById('sendBtn');

function addBubble(text, role){
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return d;
}

async function sendMsg(){
  const text = inp.value.trim();
  if(!text) return;
  inp.value = '';
  btn.disabled = true;
  addBubble(text, 'user');
  msgs.push({role:'user', content:text});

  const thinking = addBubble('생각 중…', 'ai thinking');

  try {
    const res = await fetch('https://hondi-proxy.hondi.workers.dev/v1/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        provider: 'deepseek',
        model: 'deepseek-chat',
        messages: msgs
      })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || '(응답 없음)';
    thinking.textContent = reply;
    thinking.className = 'msg ai';
    msgs.push({role:'assistant', content:reply});
  } catch(e) {
    thinking.textContent = '연결 오류: ' + e.message;
    thinking.className = 'msg ai';
  }
  btn.disabled = false;
  inp.focus();
}
<\/script>
