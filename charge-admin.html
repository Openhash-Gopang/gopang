<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDC 충전 관리자 — 혼디</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Pretendard',sans-serif;background:#f5f5f5;color:#111;
  min-height:100dvh;padding:20px}
.wrap{max-width:720px;margin:0 auto}
h1{font-size:18px;margin-bottom:4px}
.sub{font-size:12.5px;color:#6b7280;margin-bottom:20px;line-height:1.6}
.gate{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px;margin-bottom:16px}
.gate input{width:100%;padding:11px 13px;border:1px solid #e5e7eb;border-radius:10px;
  font-size:14px;margin-bottom:10px;font-family:inherit}
.gate button, .card button, .refresh-btn{padding:10px 16px;border:none;border-radius:10px;
  background:#111;color:#fff;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit}
.list{display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px}
.card-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;
  border-bottom:1px dashed #f0f0f0}
.card-row:last-of-type{border-bottom:none}
.card-row .k{color:#6b7280}
.card-row .v{font-weight:600;word-break:break-all;text-align:right;margin-left:12px}
.card-code{font-size:18px;font-weight:700;color:#1A73E8;text-align:center;
  padding:8px 0;letter-spacing:.5px}
.card input{width:100%;padding:9px 11px;border:1px solid #e5e7eb;border-radius:8px;
  font-size:13.5px;margin-top:8px;font-family:inherit}
.card-actions{display:flex;gap:8px;margin-top:10px}
.card-actions button{flex:1}
.confirm-btn{background:#0F9D58!important}
.empty{text-align:center;color:#9ca3af;padding:40px 0;font-size:13.5px}
.refresh-btn{margin-bottom:14px;background:#1A73E8}
</style>
</head>
<body>
<div class="wrap">
  <h1>GDC 충전 관리자</h1>
  <div class="sub">
    은행 앱에서 입금 내역을 직접 확인한 뒤, 아래 목록에서 일치하는 신청을 찾아
    확정해 주세요. 확정 즉시 GDC가 발행됩니다 — 되돌릴 수 없으니 금액·코드를
    다시 한번 확인해 주세요.
  </div>

  <div class="gate" id="gate">
    <input type="password" id="admin-secret" placeholder="관리자 시크릿(ADMIN_ACTION_SECRET)">
    <button onclick="loadList()">불러오기</button>
  </div>

  <button class="refresh-btn" id="refresh-btn" style="display:none" onclick="loadList()">새로고침</button>
  <div class="list" id="list"></div>
</div>

<script>
const WORKER_URL = 'https://hondi-proxy.tensor-city.workers.dev';

function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }
function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = String(s ?? '');
  return div.innerHTML;
}
function getSecret() { return document.getElementById('admin-secret').value.trim(); }

async function loadList() {
  const secret = getSecret();
  if (!secret) { alert('관리자 시크릿을 입력해 주세요.'); return; }
  sessionStorage.setItem('hondi_admin_secret', secret); // 새로고침 편의(민감정보이므로 세션 한정)

  const listEl = document.getElementById('list');
  listEl.innerHTML = '<div class="empty">불러오는 중...</div>';
  try {
    const res = await fetch(`${WORKER_URL}/biz/charge-list?secret=${encodeURIComponent(secret)}&status=pending`);
    const data = await res.json();
    if (!res.ok || !data.ok) {
      listEl.innerHTML = `<div class="empty">불러오기 실패: ${escapeHtml(data.message || data.error || res.status)}</div>`;
      return;
    }
    document.getElementById('refresh-btn').style.display = 'block';
    renderList(data.requests || []);
  } catch (e) {
    listEl.innerHTML = `<div class="empty">오류: ${escapeHtml(e.message)}</div>`;
  }
}

function renderList(requests) {
  const listEl = document.getElementById('list');
  if (requests.length === 0) {
    listEl.innerHTML = '<div class="empty">대기 중인 충전 신청이 없습니다.</div>';
    return;
  }
  listEl.innerHTML = requests.map(r => `
    <div class="card" id="card-${r.id}">
      <div class="card-code">${escapeHtml(r.match_code)}</div>
      <div class="card-row"><span class="k">신청 guid</span><span class="v">${escapeHtml(r.guid)}</span></div>
      <div class="card-row"><span class="k">신청 금액</span><span class="v">${fmt(r.requested_krw)}원</span></div>
      <div class="card-row"><span class="k">신청 시각</span><span class="v">${escapeHtml(r.created)}</span></div>
      <input type="number" id="matched-${r.id}" placeholder="실제 입금액(원, 다르면 수정)" value="${r.requested_krw}">
      <input type="text" id="depositor-${r.id}" placeholder="은행 명세서상 입금자명(선택)">
      <div class="card-actions">
        <button class="confirm-btn" onclick="confirmCharge('${r.id}')">입금 확인 · GDC 발행</button>
      </div>
    </div>
  `).join('');
}

async function confirmCharge(requestId) {
  const secret = getSecret();
  const matchedKrw = parseInt(document.getElementById(`matched-${requestId}`).value, 10);
  const depositorName = document.getElementById(`depositor-${requestId}`).value.trim();
  if (!matchedKrw || matchedKrw <= 0) { alert('실제 입금액을 확인해 주세요.'); return; }
  if (!confirm(`${fmt(matchedKrw)}원 만큼 GDC를 발행합니다. 되돌릴 수 없습니다. 계속할까요?`)) return;

  try {
    const res = await fetch(`${WORKER_URL}/biz/charge-confirm`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        secret, request_id: requestId, matched_krw: matchedKrw, depositor_name: depositorName,
      }),
    });
    const data = await res.json();
    if (!res.ok || !data.ok) {
      alert('확정 실패: ' + (data.message || data.error || res.status));
      return;
    }
    document.getElementById(`card-${requestId}`).remove();
    alert(`완료: ${fmt(data.charged_krw)}원 → ${data.gdc_amount}T 발행됨`);
  } catch (e) {
    alert('오류: ' + e.message);
  }
}

// 세션 내 새로고침 편의 — 시크릿을 다시 입력하지 않도록(민감정보라 sessionStorage만 사용, 자동 조회는 하지 않음)
(function () {
  const saved = sessionStorage.getItem('hondi_admin_secret');
  if (saved) document.getElementById('admin-secret').value = saved;
})();
</script>
</body>
</html>
