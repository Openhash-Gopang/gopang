name: Build manifest.json

on:
  push:
    branches: [main]
    paths:
      - 'prompts/**'
      - 'tools/build_manifest.py'
      - '!prompts/manifest.json'   # 이 파일 자체 변경은 트리거 제외 (무한루프 방지)

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: manifest.json 빌드
        run: python tools/build_manifest.py

      - name: 변경사항 있으면 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- prompts/manifest.json; then
            echo "변경 없음 — 이미 최신 상태"
          else
            git add prompts/manifest.json
            git commit -m "chore: manifest.json 자동 갱신 [skip ci]"
            git push
          fi
