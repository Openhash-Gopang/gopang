name: Deploy PB Migrations to L1 (hanlim)

# pb_migrations/*.js가 main에 push되면 L1(hanlim) PocketBase에 자동
# 적용한다. 2026-07-16 사고(마이그레이션 파일이 GitHub에만 있고
# 서버엔 한 번도 안 들어간 문제) 재발 방지용.
#
# 필요한 GitHub Secrets(Settings > Secrets and variables > Actions):
#   L1_SSH_PRIVATE_KEY  — 전용 배포키 개인키 전체
#   L1_SSH_HOST         — l1-hanlim.hondi.net
#   L1_SSH_USER         — ubuntu
#
# 이 키는 서버의 authorized_keys에 강제 커맨드(command=)로 제한돼 있어
# /opt/gopang/ops/apply-pb-migrations.sh 외의 어떤 명령도 실행할 수 없다.
# worker.js 배포(deploy-worker.yml)와 완전히 분리된 별도 파이프라인이다.

"on":
  push:
    branches: [main]
    paths:
      - 'pb_migrations/**'
  workflow_dispatch:  # 수동 실행도 가능(Actions 탭에서 Run workflow)

jobs:
  deploy-pb-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5  # git diff(HEAD~1 또는 event.before 비교)에 필요

      - name: SSH 에이전트 설정
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.L1_SSH_PRIVATE_KEY }}

      - name: known_hosts 등록
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.L1_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: 변경된 pb_migrations 파일 목록 추출
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 수동 실행 시엔 가장 최근 커밋 기준으로 비교
            FILES=$(git diff --name-only HEAD~1 HEAD -- 'pb_migrations/*.js' | xargs -n1 basename | tr '\n' ' ')
          else
            FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- 'pb_migrations/*.js' | xargs -n1 basename | tr '\n' ' ')
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "변경된 파일: $FILES"

      - name: 마이그레이션 적용 (강제 커맨드로 제한된 원격 스크립트 실행)
        if: steps.changed.outputs.files != ''
        run: |
          ssh "${{ secrets.L1_SSH_USER }}@${{ secrets.L1_SSH_HOST }}" "${{ steps.changed.outputs.files }}"
        # ★ SSH_ORIGINAL_COMMAND로 이 문자열(변경된 파일명 목록)이 서버에
        #   전달되고, apply-pb-migrations.sh가 그 파일들만 개별 검증 후
        #   받아온다. 강제 커맨드가 실제 실행을 대체하지만, 클라이언트가
        #   보내려던 커맨드 문자열 자체는 환경변수로 여전히 읽을 수 있다
        #   (SSH 표준 동작 — 별도 파일 전송 없이 파라미터만 안전하게 전달).
