name: Check GWP report compliance

on:
  push:
    branches: [main]
    paths:
      - 'gwp-registry.js'
      - 'tools/check_gwp_report_compliance.py'
  schedule:
    # 매일 1회 — 이 저장소가 변경되지 않아도 부속 서비스 저장소 15곳
    # 어딘가에서 GWP_DONE 발신 코드가 삭제/누락되면 여기서 잡는다.
    - cron: '0 21 * * *'  # 06:00 KST
  workflow_dispatch:

jobs:
  check-compliance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── GWP_REGISTRY에 등록된 모든 서비스가 GWP_DONE 보고 경로를
      # 실제로 갖고 있는지 원격에서 검사한다. 실패 시(미준수 서비스
      # 발견) 워크플로 자체가 실패한다 — 2026-07-09에 발견된 "15개 중
      # 5개+jeju가 위임 결과를 AI 비서에게 전혀 보고하지 않던" 상태를
      # 병합 전/배포 후에 계속 감시하기 위함.
      - name: Run GWP report compliance check
        run: python3 tools/check_gwp_report_compliance.py
