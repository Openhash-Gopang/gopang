name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # manifest.json 커밋을 위해 필요
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── manifest.json 생성 ──────────────────────────────────────────
      - name: Generate prompts/manifest.json
        run: python3 tools/build_manifest.py

      # ── index.html 빌드 (기존 build.py) ────────────────────────────
      - name: Build index.html
        run: python3 tools/build.py

      # ── 생성된 파일을 저장소에 커밋 (변경이 있을 때만) ──────────────
      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prompts/manifest.json index.html
          git diff --cached --quiet || git commit -m "ci: regenerate manifest.json & index.html [skip ci]"
          git push

      # ── GitHub Pages 배포 ───────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
