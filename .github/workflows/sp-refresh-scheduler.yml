name: SP refresh scheduler (Phase 4)

# 저장소 안에는 크론이 없다는 원칙(docs/SP-AUTHOR-AUTOMATION_v1_0.md,
# GWP-REGISTRY-SCALING_v1_0.md) — 이 워크플로가 "저장소 밖 스케줄러"
# 역할을 대신한다. 매일 1회 tier를 재계산하고, 마감 도래한 SP를
# SP-Author 큐에 올린다(실제 조사·갱신은 여전히 사람이 수행).

on:
  schedule:
    # 매일 00:00 UTC(KST 09:00) — 업무시간 시작에 맞춰 그날 검토할
    # 갱신 목록이 쌓여있도록 한다.
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '실제로 반영하지 않고 계획만 출력'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  refresh-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── tier 재계산 + 갱신 큐잉 ──────────────────────────────────
      # worker.js는 공개 엔드포인트라 별도 시크릿 없이 호출 가능
      # (POST /gwp-registry/register·/sp-author/queue 등은 인증 없는
      # 내부 API다 — 실서비스 확장 시 별도 인증 도입 여지는 있으나
      # 이번 범위 밖).
      - name: Run SP refresh scheduler
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python3 tools/sp_refresh_scheduler.py --dry-run
          else
            python3 tools/sp_refresh_scheduler.py
          fi

      # ── unresolved_tag_signal 집계 (2026-07-14 신설) ────────────
      # docs/SP-AUTHOR-AUTOMATION_v1_0.md §1-3(search_miss_pattern)과 동일
      # 원칙 — EXPERT/GWP 태그 해석 실패(_reportUnresolvedTag)가 같은
      # raw_id로 반복(최근 7일 내 3건 이상)되면 진짜 수요로 승격한다.
      # sp_refresh_scheduler와 관심사가 달라(하나는 기존 SP 갱신 주기,
      # 하나는 신규 미등록 수요 발굴) 별도 스크립트로 유지하되, 실행
      # 주기(매일 1회)는 공유한다 — 별도 워크플로를 새로 안 만든다.
      - name: Aggregate unresolved tag signals
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python3 tools/aggregate_unresolved_tags.py --dry-run
          else
            python3 tools/aggregate_unresolved_tags.py
          fi
