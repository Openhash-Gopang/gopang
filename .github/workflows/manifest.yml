name: Generate prompts manifest

on:
  push:
    branches: [main]
    paths:
      - 'prompts/**'
      - 'tools/build_manifest.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: manifest
  cancel-in-progress: true

jobs:
  build-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── manifest.json 생성 ──────────────────────────────────────────
      - name: Generate prompts/manifest.json
        run: python3 tools/build_manifest.py

      # ── 변경이 있을 때만 커밋 (없으면 조용히 종료) ──────────────────
      - name: Commit generated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prompts/manifest.json
          git diff --cached --quiet || git commit -m "ci: regenerate manifest.json [skip ci]"
          git push
