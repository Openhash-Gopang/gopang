<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>K 서비스 목록</title>
<meta name="description" content="혼디 K 시리즈 전문 분야(기관) 서비스 전체 목록.">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --gov:#1F2937; --pri:#2563EB; --pri-bg:#EFF6FF; --sur:#FFFFFF; --bg:#F4F6FB;
  --bdr:#E2E8F0; --txt:#1A202C; --sub:#4A5568; --hint:#94A3B8;
  --font:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif;
  --r:12px; --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);font-size:15px;color:var(--txt);background:var(--bg);
  -webkit-font-smoothing:antialiased;min-height:100dvh;
}
#top-bar{
  display:flex;align-items:center;gap:10px;padding:14px 16px;
  padding-top:calc(14px + env(safe-area-inset-top));
  background:var(--gov);color:#fff;box-shadow:var(--sh);position:sticky;top:0;z-index:5;
}
#tb-icon{font-size:20px}
#tb-title{font-weight:800;font-size:16px}
#tb-sub{font-size:11.5px;opacity:.7;font-weight:400;margin-top:1px}
#tb-close{margin-left:auto;background:rgba(255,255,255,.14);border:none;color:#fff;
  border-radius:8px;padding:7px 12px;font-size:12.5px;cursor:pointer;font-family:var(--font)}
#tb-close:active{background:rgba(255,255,255,.24)}

#content{max-width:720px;margin:0 auto;padding:18px 14px 60px}
.cat-group{margin-bottom:22px}
.cat-title{font-size:13px;font-weight:700;color:var(--sub);padding:0 4px 8px;
  display:flex;align-items:center;gap:6px}
.cat-count{font-weight:400;color:var(--hint);font-size:12px}
.svc-card{
  background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);
  padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:background .12s,border-color .12s;
}
.svc-card:hover,.svc-card:active{background:var(--pri-bg);border-color:#bfdbfe}
.svc-emoji{font-size:22px;flex-shrink:0;width:34px;text-align:center}
.svc-info{flex:1;min-width:0}
.svc-name{font-weight:700;font-size:14.5px;color:var(--txt)}
.svc-desc{font-size:12.5px;color:var(--sub);margin-top:2px;line-height:1.4}
.svc-pending{font-size:10.5px;color:#b45309;background:#fef3c7;border-radius:6px;
  padding:1px 6px;margin-left:6px;font-weight:600}
.svc-arrow{color:var(--hint);font-size:14px;flex-shrink:0}
#empty{text-align:center;color:var(--hint);padding:60px 20px;font-size:13.5px}
#load-err{text-align:center;color:#b91c1c;padding:40px 20px;font-size:13.5px}
</style>
</head>
<body>

<div id="top-bar">
  <div id="tb-icon">🗂️</div>
  <div>
    <div id="tb-title">K 서비스 목록</div>
    <div id="tb-sub">전문 분야(기관) AI 전체 보기</div>
  </div>
  <button id="tb-close">닫기</button>
</div>

<div id="content">
  <div id="list"></div>
</div>

<script src="/gwp-registry.js?v=20260707"></script>
<script>
// ── 분류 라벨 (GWP_REGISTRY category 코드 → 한글 그룹명) ──────────
const CAT_LABEL = {
  EMG: '긴급·재난', JUS: '사법·안전', GOV: '행정', MED: '의료',
  EDU: '교육', TRN: '교통·물류', MKT: '시장', BIZ: '기업·경영',
  ECO: '금융·경제', ENV: '환경', LEG: '입법',
};
// TOOL(tool-web-search 등)은 이용자향 서비스가 아니라 그림자 AI 내부
// 함수 호출용이라 이 목록에서 제외한다 — 사용자가 직접 열 대상이 아님.
const EXCLUDE_CATEGORIES = new Set(['TOOL']);

document.getElementById('tb-close').onclick = () => {
  if (window.opener && !window.opener.closed) { window.close(); }
  else { location.href = '/webapp.html'; }
};

function _openService(entry) {
  // K-Emergency(type:'tab')처럼 반드시 새 탭 확인이 필요한 서비스도,
  // 여기(K 서비스 목록)에서는 이용자가 이미 명시적으로 항목을 골라
  // 클릭한 시점이므로 별도 확인 없이 바로 새 탭으로 연다.
  window.open(entry.url, '_blank');
}

function render() {
  const listEl = document.getElementById('list');
  if (typeof GWP_REGISTRY === 'undefined' || !Array.isArray(GWP_REGISTRY)) {
    listEl.innerHTML = '<div id="load-err">서비스 목록을 불러오지 못했습니다. gwp-registry.js 로드 실패.</div>';
    return;
  }

  const visible = GWP_REGISTRY.filter(e => !EXCLUDE_CATEGORIES.has(e.category));
  if (!visible.length) {
    listEl.innerHTML = '<div id="empty">표시할 서비스가 없습니다.</div>';
    return;
  }

  // 카테고리별 그룹화 — CAT_LABEL 순서를 그대로 표시 순서로 사용
  const groups = {};
  for (const e of visible) {
    (groups[e.category] ||= []).push(e);
  }

  let html = '';
  for (const cat of Object.keys(CAT_LABEL)) {
    const items = groups[cat];
    if (!items || !items.length) continue;
    html += `<div class="cat-group">
      <div class="cat-title">${CAT_LABEL[cat]} <span class="cat-count">${items.length}개</span></div>`;
    for (const e of items) {
      const pending = e.status === 'pending' ? '<span class="svc-pending">임시등록</span>' : '';
      html += `<div class="svc-card" data-id="${e.id}">
        <div class="svc-emoji">${_emojiFor(e.category)}</div>
        <div class="svc-info">
          <div class="svc-name">${_esc(e.name)}${pending}</div>
          <div class="svc-desc">${_esc(e.description || '')}</div>
        </div>
        <div class="svc-arrow">›</div>
      </div>`;
    }
    html += `</div>`;
  }
  // CAT_LABEL에 없는 카테고리(향후 신설분 대비 방어적 처리)도 놓치지 않는다.
  for (const cat of Object.keys(groups)) {
    if (CAT_LABEL[cat]) continue;
    const items = groups[cat];
    html += `<div class="cat-group">
      <div class="cat-title">${_esc(cat)} <span class="cat-count">${items.length}개</span></div>`;
    for (const e of items) {
      html += `<div class="svc-card" data-id="${e.id}">
        <div class="svc-emoji">🔧</div>
        <div class="svc-info">
          <div class="svc-name">${_esc(e.name)}</div>
          <div class="svc-desc">${_esc(e.description || '')}</div>
        </div>
        <div class="svc-arrow">›</div>
      </div>`;
    }
    html += `</div>`;
  }

  listEl.innerHTML = html;
  listEl.querySelectorAll('.svc-card').forEach(card => {
    card.onclick = () => {
      const entry = GWP_REGISTRY.find(e => e.id === card.dataset.id);
      if (entry) _openService(entry);
    };
  });
}

function _emojiFor(cat) {
  const map = {
    EMG:'🚨', JUS:'⚖️', GOV:'🏛️', MED:'🏥', EDU:'🏫', TRN:'🚚',
    MKT:'🛒', BIZ:'💼', ECO:'💰', ENV:'🌱', LEG:'🗳️',
  };
  return map[cat] || '🔧';
}
function _esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// gwp-registry.js는 module이 아닌 일반 script라 동기 로드 — DOMContentLoaded
// 시점이면 이미 GWP_REGISTRY 전역이 준비돼 있다.
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', render);
} else {
  render();
}
</script>

</body>
</html>
