<style>
.teasers-wrap { max-width: 1080px; margin: 0 auto; padding: 90px 24px 100px; }
.teasers-head { text-align: center; margin-bottom: 48px; }
.teasers-tag {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 14px; border-radius: 99px;
  background: var(--bg-subtle, #f1f3f5); border: 1px solid var(--border2, #d1d5db);

  color: var(--text3, #374151); letter-spacing: .4px; margin-bottom: 16px;

.teasers-tag::before { content:''; width:6px; height:6px; border-radius:50%; background: var(--brand, #3ecf8e); }
.teasers-head h2 { font-size: 26px; font-weight: 800; color: var(--text, #0f172a); letter-spacing: -0.5px; margin: 0; }

.teasers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 760px) { .teasers-grid { grid-template-columns: 1fr; } }

.teaser-card {
  background: var(--surface, #fff); border: 1px solid var(--border, #e5e7eb);
  border-radius: 16px; padding: 32px 30px; box-shadow: var(--shadow-sm, 0 1px 2px rgba(0,0,0,.05));
  display: flex; flex-direction: column;
}
.teaser-icon {
  width: 44px; height: 44px; border-radius: 12px; margin-bottom: 18px;
  background: var(--brand-bg, #f0fdf8); color: var(--brand-dk, #1a9e6a);
  display: flex; align-items: center; justify-content: center;
}
.teaser-card h3 { font-size: 18px; font-weight: 700; color: var(--text, #0f172a); margin: 0 0 10px; }
.teaser-card p { font-size: 13.8px; color: var(--text2, #1e293b); line-height: 1.75; margin: 0 0 24px; flex: 1; }
.teaser-btn {
  align-self: flex-start; display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px; border-radius: 99px; border: none; cursor: pointer;
  background: var(--brand, #3ecf8e); color: #fff; font-size: 13.5px; font-weight: 700;
  font-family: 'Pretendard', sans-serif; transition: background .15s;
}
.teaser-btn:hover { background: var(--brand-dk, #1a9e6a); }
