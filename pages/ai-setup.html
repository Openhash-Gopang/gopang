<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>나만의 AI 비서 활성화 — 고팡</title>
</head>
<body>

<div class="reveal" style="max-width:760px;margin:0 auto;padding:40px 24px 80px">

  <div style="margin-bottom:24px">
    <h1 style="font-size:24px;font-weight:700;color:var(--text);margin-bottom:8px">나만의 AI 비서 활성화</h1>
    <p style="font-size:14px;color:var(--text4);line-height:1.6">귀하 한 사람만을 위한 맞춤형으로 진화합니다. 모델을 선택하면 해당 업체의 무료 API Key 발급 페이지가 새 탭에서 열리고, 단계별로 안내해 드립니다.</p>
  </div>

  <!-- 다중 등록 안내 -->
  <div style="background:var(--brand-bg);border:1px solid var(--brand-lt);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:24px">
    <p style="font-size:13px;color:var(--brand-dk);line-height:1.7;margin:0">
      💡 <b>여러 LLM을 동시에 등록</b>해두시면, 한 모델의 무료 한도가 차더라도 등록 순서대로 다음 모델로 자동 전환되어 AI 비서가 끊기지 않고 계속 동작합니다. 2~3개 모델을 함께 등록하는 것을 권장합니다.
    </p>
  </div>

  <!-- 등록된 LLM 목록 -->
  <div style="margin-bottom:24px">
    <label style="font-size:13px;font-weight:600;color:var(--text3);display:block;margin-bottom:8px">등록된 LLM (호출 순서대로 자동 전환)</label>
    <div id="_setup_list" style="display:flex;flex-direction:column;gap:8px"></div>
    <div id="_setup_list_empty" style="display:none;font-size:13px;color:var(--text4);padding:16px;text-align:center;background:var(--surface2);border-radius:var(--radius-lg)">아직 등록된 LLM이 없습니다. 아래에서 추가해 주세요.</div>
  </div>

  <hr style="border:none;border-top:1px solid var(--border);margin:28px 0">

  <!-- 새 LLM 추가 -->
  <div style="margin-bottom:24px">
    <label style="font-size:13px;font-weight:600;color:var(--text3);display:block;margin-bottom:8px">1. 추가할 LLM 모델 선택</label>
    <select id="_setup_model" style="width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-lg);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text)">
      <option value="">모델을 선택하세요</option>
      <option value="gemini-2.0-flash">Gemini 2.0 Flash (Google · 무료, 카드 불필요)</option>
      <option value="deepseek-v4-flash">DeepSeek V4 Flash (DeepSeek · 신규가입 무료 토큰)</option>
      <option value="deepseek-chat">DeepSeek V3 (DeepSeek · 신규가입 무료 토큰)</option>
      <option value="claude-sonnet-4-20250514">Claude Sonnet 4 (Anthropic · $5 체험 크레딧)</option>
      <option value="gpt-4o">GPT-4o (OpenAI · 카드 등록 필요)</option>
    </select>
  </div>

  <!-- 안내 패널 (모델 선택 시 표시) -->
  <div id="_setup_guide" style="display:none;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:24px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <span id="_setup_guide_title" style="font-size:14px;font-weight:600;color:var(--text)"></span>
      <button id="_setup_open_btn" style="background:var(--brand);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap">발급 페이지 열기 ↗</button>
    </div>
    <ol id="_setup_guide_steps" style="font-size:13.5px;color:var(--text2);line-height:1.9;padding-left:20px;margin:0"></ol>
    <div id="_setup_guide_note" style="margin-top:12px;font-size:12px;color:var(--text4);background:var(--bg);border-radius:8px;padding:10px 12px"></div>
  </div>

  <!-- API Key 입력 -->
  <div style="margin-bottom:20px">
    <label style="font-size:13px;font-weight:600;color:var(--text3);display:block;margin-bottom:8px">2. 발급받은 API Key 입력</label>
    <div style="display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface)">
      <input id="_setup_key" type="password" placeholder="여기에 API Key를 붙여넣으세요"
        style="flex:1;padding:12px 14px;border:none;outline:none;font-size:14px;font-family:inherit;min-width:0;background:transparent;color:var(--text)">
      <button id="_setup_key_toggle" type="button"
        style="padding:0 14px;height:46px;border:none;background:transparent;cursor:pointer;border-left:1px solid var(--border);flex-shrink:0">👁</button>
    </div>
  </div>

  <button id="_setup_add" style="width:100%;padding:14px;border:none;border-radius:var(--radius-lg);background:var(--brand);color:#fff;font-size:14px;font-weight:600;cursor:pointer">+ 이 LLM 추가 등록 — 휴대폰에 자동 반영됩니다</button>

  <div id="_setup_saved_msg" style="display:none;margin-top:14px;font-size:13px;color:var(--brand-dk);background:var(--brand-bg);border-radius:8px;padding:12px 14px"></div>

</div>

<script>
(function(){
  const GUIDES = {
    'gemini-2.0-flash': {
      provider: 'gemini', label: 'Gemini',
      title: 'Gemini — Google AI Studio (무료, 카드 불필요)',
      url: 'https://aistudio.google.com/apikey',
      steps: [
        'Google 계정으로 로그인합니다 (기존 G메일 계정 사용 가능).',
        '왼쪽 메뉴 또는 화면의 "Get API key" 버튼을 클릭합니다.',
        '"Create API key" 버튼을 클릭합니다.',
        '"AIza..."로 시작하는 키가 생성되면 복사 버튼을 눌러 복사합니다.',
        '아래 입력칸에 붙여넣고 "추가 등록"을 누르세요.',
      ],
      note: '카드 등록이 전혀 필요 없습니다. 무료 한도 내에서 사용 가능합니다.',
    },
    'deepseek-v4-flash': {
      provider: 'deepseek', label: 'DeepSeek',
      title: 'DeepSeek — platform.deepseek.com',
      url: 'https://platform.deepseek.com/api_keys',
      steps: [
        '이메일 또는 Google 계정으로 회원가입/로그인합니다.',
        '왼쪽 메뉴에서 "API keys"를 클릭합니다.',
        '"Create new API key" 버튼을 클릭합니다.',
        '생성된 키(sk-...)를 즉시 복사합니다 (다시 표시되지 않습니다).',
        '아래 입력칸에 붙여넣고 "추가 등록"을 누르세요.',
      ],
      note: '신규 가입 시 무료 토큰이 제공되나, 소진 후에는 소액 충전(카드)이 필요할 수 있습니다.',
    },
    'deepseek-chat': {
      provider: 'deepseek', label: 'DeepSeek V3',
      title: 'DeepSeek V3 — platform.deepseek.com',
      url: 'https://platform.deepseek.com/api_keys',
      steps: [
        '이메일 또는 Google 계정으로 회원가입/로그인합니다.',
        '왼쪽 메뉴에서 "API keys"를 클릭합니다.',
        '"Create new API key" 버튼을 클릭합니다.',
        '생성된 키(sk-...)를 즉시 복사합니다.',
        '아래 입력칸에 붙여넣고 "추가 등록"을 누르세요.',
      ],
      note: '신규 가입 시 무료 토큰이 제공되나, 소진 후에는 소액 충전(카드)이 필요할 수 있습니다.',
    },
    'claude-sonnet-4-20250514': {
      provider: 'anthropic', label: 'Claude',
      title: 'Claude — console.anthropic.com',
      url: 'https://console.anthropic.com/settings/keys',
      steps: [
        '계정을 생성하고 전화번호 인증을 완료합니다.',
        '"Settings → API Keys" 메뉴로 이동합니다.',
        '"Create Key" 버튼을 클릭하고 이름을 정합니다.',
        '생성된 키(sk-ant-...)를 즉시 복사합니다 (다시 표시되지 않습니다).',
        '아래 입력칸에 붙여넣고 "추가 등록"을 누르세요.',
      ],
      note: '신규 계정에 약 $5 체험 크레딧이 제공됩니다. 카드 등록은 선택 사항입니다.',
    },
    'gpt-4o': {
      provider: 'openai', label: 'GPT-4o',
      title: 'GPT-4o — platform.openai.com',
      url: 'https://platform.openai.com/api-keys',
      steps: [
        '계정을 생성하고 로그인합니다.',
        '"Create new secret key" 버튼을 클릭합니다.',
        '생성된 키(sk-...)를 즉시 복사합니다.',
        '"Billing" 메뉴에서 결제 수단(카드)을 등록합니다 — 사용량만큼만 청구됩니다.',
        '아래 입력칸에 붙여넣고 "추가 등록"을 누르세요.',
      ],
      note: '가입은 무료이나, 실제 사용을 위해서는 카드 등록이 필요합니다.',
    },
  };

  const sel        = document.getElementById('_setup_model');
  const guideBox   = document.getElementById('_setup_guide');
  const guideTitle = document.getElementById('_setup_guide_title');
  const guideSteps = document.getElementById('_setup_guide_steps');
  const guideNote  = document.getElementById('_setup_guide_note');
  const openBtn    = document.getElementById('_setup_open_btn');
  const keyInput   = document.getElementById('_setup_key');
  const keyToggle  = document.getElementById('_setup_key_toggle');
  const addBtn     = document.getElementById('_setup_add');
  const savedMsg   = document.getElementById('_setup_saved_msg');
  const listBox    = document.getElementById('_setup_list');
  const listEmpty  = document.getElementById('_setup_list_empty');

  function loadCfg() {
    try { return JSON.parse(localStorage.getItem('gopang_cfg') || '{}'); } catch { return {}; }
  }
  function saveCfg(cfg) {
    localStorage.setItem('gopang_cfg', JSON.stringify(cfg));
  }

  function maskKey(key) {
    if (!key) return '';
    return key.slice(0, 6) + '••••' + key.slice(-4);
  }

  function renderList() {
    const cfg = loadCfg();
    const providers = Array.isArray(cfg.providers) ? cfg.providers : [];
    listBox.innerHTML = '';
    listEmpty.style.display = providers.length ? 'none' : 'block';

    providers.forEach((p, idx) => {
      const guideEntry = Object.values(GUIDES).find(g => g.provider === p.provider) || {};
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg)';
      row.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px">
          <span style="width:22px;height:22px;border-radius:50%;background:var(--brand);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${idx + 1}</span>
          <div>
            <div style="font-size:13.5px;font-weight:600;color:var(--text)">${guideEntry.label || p.provider} <span style="color:var(--text4);font-weight:400">(${p.model})</span></div>
            <div style="font-size:11.5px;color:var(--text4);font-family:monospace">${maskKey(p.apiKey)}</div>
          </div>
        </div>
        <button data-idx="${idx}" class="_setup_remove" style="background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;padding:6px 10px">삭제</button>
      `;
      listBox.appendChild(row);
    });

    listBox.querySelectorAll('._setup_remove').forEach(btn => {
      btn.onclick = () => {
        const cfg = loadCfg();
        cfg.providers = (cfg.providers || []).filter((_, i) => i !== Number(btn.dataset.idx));
        saveCfg(cfg);
        renderList();
      };
    });
  }
  renderList();

  function renderGuide(model) {
    const g = GUIDES[model];
    if (!g) { guideBox.style.display = 'none'; return; }
    guideTitle.textContent = g.title;
    guideSteps.innerHTML = g.steps.map(s => `<li style="margin-bottom:4px">${s}</li>`).join('');
    guideNote.textContent = g.note;
    openBtn.onclick = () => window.open(g.url, '_blank');
    guideBox.style.display = 'block';
  }

  sel.addEventListener('change', () => renderGuide(sel.value));

  keyToggle.onclick = () => {
    keyInput.type = keyInput.type === 'password' ? 'text' : 'password';
  };

  addBtn.onclick = () => {
    const model = sel.value;
    const key   = keyInput.value.trim();
    if (!model) { alert('모델을 선택해 주세요.'); return; }
    if (!key)   { alert('API Key를 입력해 주세요.'); return; }

    const g = GUIDES[model];
    try {
      const cfg = loadCfg();
      if (!Array.isArray(cfg.providers)) cfg.providers = [];

      // 동일 provider 중복 등록 방지 — 있으면 키만 갱신
      const existingIdx = cfg.providers.findIndex(p => p.provider === g.provider && p.model === model);
      if (existingIdx >= 0) {
        cfg.providers[existingIdx].apiKey = key;
      } else {
        cfg.providers.push({ provider: g.provider, model, apiKey: key });
      }

      // 첫 등록이면 기본 model/키도 동기화 (이전 버전 호환)
      if (!cfg.model || cfg.providers.length === 1) cfg.model = model;
      if (g.provider === 'gemini') cfg.geminiKey = key;
      else cfg.apiKey = key;

      saveCfg(cfg);
      renderList();

      keyInput.value = '';
      sel.value = '';
      guideBox.style.display = 'none';

      savedMsg.textContent = `✅ ${g.label} 등록 완료 (${cfg.providers.length}개 등록됨) — 같은 계정으로 로그인한 휴대폰에서 바로 사용됩니다.`;
      savedMsg.style.display = 'block';
    } catch (e) {
      alert('저장 중 오류가 발생했습니다: ' + e.message);
    }
  };
})();
</script>

</body>
</html>
