<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>전문가 AI 상담</title>
<meta name="description" content="자격직 전문가 AI 페르소나와의 1:1 상담 — GWP 방식 새 탭.">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --gov:#1F2937; --pri:#2563EB; --pri-bg:#EFF6FF; --sur:#FFFFFF; --bg:#F4F6FB;
  --bdr:#E2E8F0; --txt:#1A202C; --sub:#4A5568; --hint:#94A3B8;
  --font:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif;
  --r:12px; --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  position:fixed;inset:0;margin:0;padding:0;font-family:var(--font);font-size:15px;color:var(--txt);
  background:var(--bg);display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;
}
#top-bar{
  flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top));
  background:var(--gov);color:#fff;box-shadow:var(--sh);z-index:5;
}
#tb-icon{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
#tb-title{font-weight:800;font-size:15px;line-height:1.2}
#tb-sub{font-size:11px;opacity:.7;font-weight:400}
#tb-back{margin-left:auto;flex-shrink:0;background:rgba(255,255,255,.14);border:none;color:#fff;
  border-radius:8px;padding:7px 12px;font-size:12.5px;cursor:pointer;font-family:var(--font)}
#tb-back:active{background:rgba(255,255,255,.24)}

#chat-thread{flex:1;overflow-y:auto;padding:16px 14px 90px;display:flex;flex-direction:column;gap:10px}
.bubble{max-width:86%;padding:11px 14px;border-radius:var(--r);line-height:1.55;font-size:14.5px;white-space:normal}
.bubble-ai{align-self:flex-start;background:var(--sur);border:1px solid var(--bdr);box-shadow:var(--sh)}
.bubble-user{align-self:flex-end;background:var(--pri);color:#fff}
.bubble-user i{opacity:.75;font-style:normal;font-size:12px;display:block;margin-bottom:2px}
.bubble-typing{align-self:flex-start;display:flex;align-items:center;gap:8px;padding:9px 14px;
  background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);font-size:13px;color:var(--sub)}
.spinner{width:14px;height:14px;border:2px solid rgba(37,99,235,.2);border-top-color:var(--pri);
  border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

#input-bar{
  position:fixed;left:0;right:0;bottom:0;display:flex;align-items:flex-end;gap:6px;padding:10px 12px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  background:var(--sur);border-top:1px solid var(--bdr);
}
#input-actions-left{display:flex;align-items:center;flex-shrink:0;padding-bottom:3px}
.ia-btn{
  width:35.91px;height:35.91px;border-radius:50%;background:none;border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--hint);transition:background .12s,color .12s;flex-shrink:0;
}
.ia-btn:hover,.ia-btn:active{background:var(--bg);color:var(--txt)}
.ia-btn svg{stroke:currentColor;fill:none}
.ia-btn.mic-recording{color:var(--pri);animation:mic-pulse .9s ease-in-out infinite}
@keyframes mic-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
#attach-preview{
  display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--pri-bg);
  border-top:1px solid var(--bdr);font-size:12.5px;color:var(--sub);
}
#attach-preview span{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#attach-preview button{background:none;border:none;color:var(--hint);cursor:pointer;font-size:13px;flex-shrink:0}
#chat-input{
  flex:1;resize:none;border:1px solid var(--bdr);border-radius:20px;padding:10px 16px;
  font-family:var(--font);font-size:14.5px;max-height:120px;line-height:1.4;
}
#chat-input:focus{outline:none;border-color:var(--pri)}
#send-btn{
  flex-shrink:0;width:42px;height:42px;border-radius:50%;border:none;background:var(--pri);color:#fff;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
#send-btn:disabled{opacity:.4;cursor:default}

#err-banner{display:none;padding:8px 14px;background:#FEE2E2;color:#991B1B;font-size:12.5px;text-align:center}
</style>
</head>
<body>

<div id="top-bar">
  <div id="tb-icon">🤝</div>
  <div>
    <div id="tb-title">전문가 AI</div>
    <div id="tb-sub">로딩 중…</div>
  </div>
  <button id="tb-back">고팡으로</button>
</div>

<div id="err-banner"></div>
<div id="chat-thread"></div>

<div id="attach-preview" style="display:none">
  <span id="attach-name"></span>
  <button type="button" id="attach-remove">✕</button>
</div>
<div id="input-bar">
  <div id="input-actions-left">
    <button class="ia-btn" id="btn-attach" type="button" title="파일 첨부">
      <svg width="17.87" height="17.87" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
    </button>
    <button class="ia-btn" id="btn-camera" type="button" title="카메라">
      <svg width="16.87" height="16.87" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </button>
    <button class="ia-btn" id="btn-mic" type="button" title="음성 입력">
      <svg width="15.88" height="15.88" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
  </div>
  <input type="file" id="file-input" accept="image/*,.pdf,.doc,.docx,.txt" style="display:none">
  <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none">
  <textarea id="chat-input" rows="1" placeholder="메시지를 입력하세요…"></textarea>
  <button id="send-btn">➤</button>
</div>

<script type="module">
import { EXPERT_REGISTRY, COMMON_GUARDRAILS_KEY, COMMON_MEDICAL_SAFETY_KEY, resolveExpertId }
  from '/src/gopang/ai/expert-registry.js';
// 2026-07-09: fetch(하드코딩 URL) 직접 호출 -> _loadSpByKey(manifest 키)로
// 전환. 이 페이지가 실제 EXPERT 페르소나 라이브 경로다(expert-session.js의
// _composeExpertPrompt는 2026-07-03 이후 더 이상 호출되지 않는 참고용
// 코드로 남아 있을 뿐 — 실사로 확인). SP_lawyer가 v3.2에 몇 주간 고정돼
// 있던 실제 버그가 바로 이 파일의 하드코딩 때문이었다.
import { _loadSpByKey } from '/src/gopang/ai/manifest-loader.js';

const RELAY_ENDPOINT = 'https://hondi-proxy.tensor-city.workers.dev';

// ══════════════════════════════════════════════════════════════
// GWP 파라미터 파싱 — klaw 등 기관 서비스와 완전히 동일한 규약
// ══════════════════════════════════════════════════════════════
const _qs       = new URLSearchParams(location.search);
const PERSONA   = resolveExpertId(_qs.get('persona') || '');
const GWP_TOKEN = _qs.get('token')  || '';
const RETURN    = _qs.get('return') || 'https://hondi.net';
let   GWP_CTX   = '';
if (_qs.get('ctx')) {
  try {
    GWP_CTX = (_qs.get('ctx_enc') === 'b64')
      ? decodeURIComponent(escape(atob(_qs.get('ctx'))))
      : decodeURIComponent(_qs.get('ctx'));
  } catch (e) { GWP_CTX = ''; }
}
let _gwpSeedUsed = false;

document.getElementById('tb-back').onclick = () => { location.href = RETURN; };

const def = EXPERT_REGISTRY[PERSONA];
if (!def) {
  document.getElementById('tb-sub').textContent = '알 수 없는 전문가입니다';
  const banner = document.getElementById('err-banner');
  banner.style.display = 'block';
  banner.textContent = `전문가 페르소나를 찾을 수 없습니다 (persona=${_qs.get('persona') || '(없음)'}). 고팡으로 돌아가 다시 시도해 주세요.`;

  // 2026-07-06: "초안 작성 + 검토 대기열" 원칙 — 존재하지 않는 전문가를
  // 자동으로 만들어 즉시 배포하지 않는다(자격·법적 책임이 걸린 분야에서
  // 검토 없는 페르소나가 실사용자에게 나가는 위험). 대신 기존
  // /feedback 시스템(자동 category 분류, feedback.html 관리자 검토
  // 화면 이미 존재)에 요청만 기록한다 — 새 백엔드를 만들지 않고 이미
  // 검증된 인프라를 재사용.
  try {
    const user = JSON.parse(localStorage.getItem('gopang_user_v4') || 'null');
    if (user?.ipv6 && user?.handle) {
      const requestedName = _qs.get('persona') || '(없음)';
      const contentLines = [
        `[전문가 요청] 등록되지 않은 전문가 페르소나가 요청됨: "${requestedName}"`,
        GWP_CTX ? `사용자 발화: ${GWP_CTX}` : null,
      ].filter(Boolean);
      fetch(`${RELAY_ENDPOINT}/feedback`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ guid: user.ipv6, handle: user.handle, content: contentLines.join('\n') }),
      }).catch(e => console.warn('[Expert] 전문가 요청 기록 실패(무해함, 배너는 그대로 표시됨):', e.message));
    }
  } catch (e) { /* 로그인 정보 없거나 파싱 실패 — 조용히 건너뜀, 배너는 이미 표시됨 */ }

  throw new Error('unknown persona: ' + _qs.get('persona'));
}
document.getElementById('tb-icon').textContent  = def.icon || '🤝';
document.getElementById('tb-title').textContent = def.label + ' AI';
document.getElementById('tb-sub').textContent   = '자격직 전문가 페르소나 · 최종 법적/의료적 행위는 인간 전속';
document.title = def.label + ' AI 상담';

// ══════════════════════════════════════════════════════════════
// 채팅 UI 헬퍼
// ══════════════════════════════════════════════════════════════
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function appendBubble(role, html) {
  const thread = document.getElementById('chat-thread');
  const div = document.createElement('div');
  div.className = 'bubble ' + (role === 'ai' ? 'bubble-ai' : 'bubble-user');
  div.innerHTML = html;
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
  return div;
}
function appendTyping() {
  const thread = document.getElementById('chat-thread');
  const div = document.createElement('div');
  div.className = 'bubble-typing';
  div.innerHTML = `<div class="spinner"></div><span>${escHtml(def.label)} AI가 답변을 준비하고 있습니다…</span>`;
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
  return div;
}

// ══════════════════════════════════════════════════════════════
// 시스템 프롬프트 합성 — 공통 가드레일 + (의료시) 안전모듈 + 페르소나
// 2026-07-06: 셋 중 하나라도 실패하면 조용히 저하되지 않고 명시적으로
// 실패한다. 이전엔 가드레일/의료안전모듈은 실패해도 아무 표시 없이
// 그냥 스킵됐고(페르소나 파일보다 오히려 더 위험 — 안전장치가 빠진
// 채 티도 안 나고 진행됨), 페르소나 SP만 실패 시 "[일반 전문가
// 모드로 응답]"이라는 문구를 얹어 부분 저하 상태로 계속 진행했다.
// AGENT-COMMON/webapp.html에 적용한 "실패하면 하드 실패" 원칙과
// 통일한다 — 없는 안전장치를 있는 것처럼 굴지 않는다.
async function composeExpertPrompt() {
  const parts = [];

  parts.push(await _loadSpByKey(COMMON_GUARDRAILS_KEY, '공통 가드레일')
    .catch(e => { throw new Error('공통 가드레일 로드 실패: ' + e.message); }));

  if (def.needsMedicalSafety) {
    parts.push(await _loadSpByKey(COMMON_MEDICAL_SAFETY_KEY, '의료 안전모듈')
      .catch(e => { throw new Error('의료 안전모듈 로드 실패: ' + e.message); }));
  }

  parts.push(await _loadSpByKey(def.key, def.label)
    .catch(e => { throw new Error(`${def.label} SP 로드 실패: ` + e.message); }));

  return parts.join('\n\n---\n\n');
}

// ══════════════════════════════════════════════════════════════
// AI 호출 — call-ai.js의 후보 폴백 로직을 그대로 이식(legacy → BYOK relay
// → 혼디 무료 기본 키). 같은 오리진(hondi.net)이라 localStorage를 그대로
// 공유해서 읽을 수 있다.
// ══════════════════════════════════════════════════════════════
function _loadCfg() {
  try { return JSON.parse(localStorage.getItem('gopang_cfg') || '{}'); } catch { return {}; }
}
function _loadUser() {
  try { return JSON.parse(localStorage.getItem('gopang_user_v4') || 'null'); } catch { return null; }
}
function _buildCandidates() {
  const cfg = _loadCfg();
  const candidates = [];
  if (Array.isArray(cfg.providers)) {
    for (const p of cfg.providers) {
      if (!p?.apiKey || !p?.model || !p?.baseUrl) continue;
      candidates.push({ provider: p.provider, baseUrl: p.baseUrl.replace(/\/+$/,''), model: p.model, apiKey: p.apiKey });
    }
  }
  if (!candidates.length && cfg.apiKey && cfg.endpoint && !cfg.endpoint.includes('workers.dev')) {
    candidates.push({ provider: 'legacy', baseUrl: cfg.endpoint.replace(/\/+$/,''), model: cfg.model || 'gpt-4o-mini', apiKey: cfg.apiKey });
  }
  // 최종 안전망 — 혼디 제공 무료 기본 키
  candidates.push({ provider: 'deepseek-default', baseUrl: RELAY_ENDPOINT, model: 'hondi-flash', apiKey: null });
  return candidates;
}

async function _pumpSSE(response, onJson) {
  if (!response.ok) {
    let msg = `HTTP ${response.status}`;
    try { const b = await response.json(); msg = b.message || b.error?.message || b.error || msg; } catch (e) {}
    throw new Error(msg);
  }
  const reader = response.body.getReader();
  const decoder = new TextDecoder('utf-8');
  let buf = '';
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      const t = line.trim();
      if (!t.startsWith('data:')) continue;
      const payload = t.slice(5).trim();
      if (payload === '[DONE]') continue;
      let json;
      try { json = JSON.parse(payload); } catch (e) { continue; }
      onJson(json);
    }
  }
}

async function callExpertAI(messages, onChunk) {
  const candidates = _buildCandidates();
  const user = _loadUser();
  let lastErr = null;
  for (const c of candidates) {
    try {
      const reqBody = { model: c.model, messages, max_tokens: 1200, temperature: 0.4, stream: true };
      const resp = c.provider === 'legacy'
        ? await fetch(`${c.baseUrl}/chat/completions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${c.apiKey}` },
            body: JSON.stringify(reqBody),
          })
        : c.provider === 'deepseek-default'
        ? await fetch(`${c.baseUrl}/deepseek`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...reqBody, guid: user?.ipv6 || null }),
          })
        : await fetch(`${RELAY_ENDPOINT}/llm/relay`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ provider: c.provider, baseUrl: c.baseUrl, apiKey: c.apiKey, ...reqBody }),
          });

      let fullText = '';
      await _pumpSSE(resp, (json) => {
        const delta = json.choices?.[0]?.delta?.content || '';
        if (delta) { fullText += delta; onChunk && onChunk(delta, fullText); }
      });
      return fullText;
    } catch (e) {
      lastErr = e;
      console.warn(`[Expert] ${c.provider} 실패 — 다음 후보로 전환:`, e.message);
      continue;
    }
  }
  throw lastErr || new Error('모든 호출 후보 실패');
}

// ══════════════════════════════════════════════════════════════
// 대화 상태 및 흐름
// ══════════════════════════════════════════════════════════════
let messages = [];
let systemPrompt = null;
const TERMINATION_RE = /끝났|그만|종료|돌아가|그림자\s*AI(로|에게)?\s*(돌아|연결)/;

async function ensureSystemPrompt() {
  if (systemPrompt) return systemPrompt;
  systemPrompt = await composeExpertPrompt();
  messages = [{ role: 'system', content: systemPrompt }];
  return systemPrompt;
}

async function sendTurn(text, attachment) {
  const typing = appendTyping();
  const aiBubble = appendBubble('ai', '');
  aiBubble.style.display = 'none';
  try {
    await ensureSystemPrompt();

    let content = text;
    if (attachment?.isImage) {
      // 멀티모달 image_url 블록 — 메인 webapp.html의 첨부 처리와 동일 형식.
      // (모델이 비전을 지원하지 않으면 서버/모델 쪽에서 무시되거나 오류가
      // 날 수 있음 — 이 페이지 범위에서는 형식만 맞추고 모델별 지원 여부는
      // 별도로 확인하지 않는다.)
      content = [
        { type: 'text', text: text || '(첨부 이미지를 봐주세요)' },
        { type: 'image_url', image_url: { url: attachment.dataUrl } },
      ];
    } else if (attachment) {
      content = `${text ? text + '\n\n' : ''}[첨부 파일: ${attachment.name}]`;
    }

    messages.push({ role: 'user', content });
    let shown = false;
    const full = await callExpertAI(messages, (delta, fullText) => {
      if (!shown) { typing.remove(); aiBubble.style.display = ''; shown = true; }
      aiBubble.innerHTML = escHtml(fullText).replace(/\n/g, '<br>');
      document.getElementById('chat-thread').scrollTop = 1e9;
    });
    messages.push({ role: 'assistant', content: full });

    // ── [CONNECT_HUMAN_EXPERT: 업종키워드] 태그 감지 (2026-07-06, C39 신설) ──
    // SP-COMMON-02 C39가 요구하는 "인간 전문가 연결"을 실제로 수행한다.
    // market/webapp.html의 [SEARCH] 인터셉터와 같은 패턴 — 존재하지 않는
    // 사업자를 지어내지 않고, 실제 등록된 사업자만 반환한다(C39-4).
    const connectMatch = full.match(/\[CONNECT_HUMAN_EXPERT:\s*([^\]]+)\]/);
    if (connectMatch) {
      await _connectHumanExpert(connectMatch[1].trim());
    }

    if (TERMINATION_RE.test(text)) {
      appendBubble('ai', `상담을 종료합니다. 고팡 화면으로 돌아갑니다…`);
      setTimeout(() => { location.href = RETURN; }, 1200);
    }
  } catch (e) {
    typing.remove();
    aiBubble.remove();
    appendBubble('ai', `⚠️ 응답 중 오류가 발생했습니다: ${escHtml(e.message)}. 잠시 후 다시 시도해 주세요.`);
  }
}

// market의 search_entities RPC를 호출해 관련 업종의 실제 등록 사업자를
// 찾아 보여준다. 결과가 없으면 없다고 정직하게 알린다(C39-4).
async function _connectHumanExpert(occupationKeyword) {
  const box = appendBubble('ai', `<i>market에서 "${escHtml(occupationKeyword)}" 관련 등록
    사업자를 찾는 중…</i>`);
  try {
    const user = _loadUser();
    const res = await fetch(`${RELAY_ENDPOINT}/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        p_keyword: '', p_occupation: occupationKeyword, p_address: null,
        p_entity_type: 'business', p_limit: 5, p_offset: 0, p_lang_code: 'ko',
        p_sort: 'rating', p_trust_min: null, p_gdc_only: null,
        p_exclude_guid: user?.ipv6 || null, p_handle: null, p_nickname: null,
        p_primary_guid: null, p_l1_node: null, p_l2_node: null,
      }),
    });
    const data = await res.json();
    const rows = Array.isArray(data) ? data : (data.rows || data.data || []);
    if (!res.ok || !rows.length) {
      box.innerHTML = `market에 "${escHtml(occupationKeyword)}" 관련 등록 사업자가
        아직 부족합니다. 직접 검색하시거나 아는 인간 전문가에게 문의하시는 것을
        권합니다.`;
      return;
    }
    const list = rows.slice(0, 5).map(r =>
      `· ${escHtml(r.name || r.nickname || '(이름 없음)')}` +
      (r.address ? ` (${escHtml(r.address)})` : '') +
      (r.rating_avg != null ? ` ★${r.rating_avg}` : '')
    ).join('<br>');
    box.innerHTML = `market에 등록된 관련 사업자입니다:<br>${list}<br><br>
      <i>연결하지 않고 위 AI 판단만으로 행동하실 경우의 위험은 앞서 안내드린
      대로입니다 — 실제 진행은 위 사업자와 직접 상담하신 뒤 결정하시길
      권합니다.</i>`;
  } catch (e) {
    console.warn('[Expert] CONNECT_HUMAN_EXPERT 실패:', e.message);
    box.innerHTML = `market 검색 중 오류가 발생했습니다. 직접 검색하시거나 아는
      인간 전문가에게 문의하시는 것을 권합니다.`;
  }
}

function startGreeting() {
  // GWP_CTX(그림자 AI로부터 전달된, 사용자가 방금 한 발화 원문)가 있으면
  // 정적 인사·재질문 없이 그 발화를 곧바로 첫 턴으로 사용한다 — klaw 등
  // 기관 서비스와 완전히 동일한 원칙.
  if (GWP_CTX && !_gwpSeedUsed) {
    _gwpSeedUsed = true;
    appendBubble('user', `<i>(AI 비서로부터 전달됨)</i><br>${escHtml(GWP_CTX).replace(/\n/g,'<br>')}`);
    sendTurn(GWP_CTX);
    return;
  }
  appendBubble('ai', `안녕하세요. 저는 ${escHtml(def.label)} AI입니다. 무엇을 도와드릴까요?`);
}

// ══════════════════════════════════════════════════════════════
// 입력 바
// ══════════════════════════════════════════════════════════════
const input   = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
function updateSendBtn() { sendBtn.disabled = !input.value.trim() && !_attachedFile; }
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  updateSendBtn();
});
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
});
sendBtn.addEventListener('click', doSend);

// ── 파일 첨부 / 카메라 (2026-07-06 신설) ────────────────────────
// 메인 webapp.html의 AI 패널 첨부 패턴(ia-btn, attach-preview)을 그대로
// 이식 — 이미지는 멀티모달 image_url 블록으로 보내고, 그 외 파일은
// 파일명만 텍스트로 첨부한다(메인 채팅과 동일 원칙).
let _attachedFile = null; // { name, dataUrl, isImage }

const fileInput   = document.getElementById('file-input');
const cameraInput = document.getElementById('camera-input');
const preview     = document.getElementById('attach-preview');
const previewName = document.getElementById('attach-name');

document.getElementById('btn-attach').addEventListener('click', () => fileInput.click());
document.getElementById('btn-camera').addEventListener('click', () => cameraInput.click());
document.getElementById('attach-remove').addEventListener('click', clearAttach);

fileInput.addEventListener('change', () => handleFileSelect(fileInput.files?.[0]));
cameraInput.addEventListener('change', () => handleFileSelect(cameraInput.files?.[0]));

function handleFileSelect(file) {
  if (!file) return;
  const isImage = file.type.startsWith('image/');
  const reader = new FileReader();
  reader.onload = () => {
    _attachedFile = { name: file.name, dataUrl: reader.result, isImage };
    previewName.textContent = `📎 ${file.name}`;
    preview.style.display = 'flex';
    updateSendBtn();
  };
  reader.onerror = () => console.warn('[Expert] 파일 읽기 실패:', reader.error);
  reader.readAsDataURL(file);
}

function clearAttach() {
  _attachedFile = null;
  fileInput.value = '';
  cameraInput.value = '';
  preview.style.display = 'none';
  updateSendBtn();
}

// ── 마이크(음성 입력) — 단발 토글, 1초 무음 시 자동 종료 ──────────
// 메인 webapp.html의 ai-panel-mic-btn과 동일한 단순 패턴(상시 대기
// 호출어 방식이 아니라, 눌렀을 때만 듣는 1회용 마이크).
(function () {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn = document.getElementById('btn-mic');
  if (!SR || !micBtn) { if (micBtn) micBtn.style.display = 'none'; return; }

  const SILENCE_MS = 1000;
  let recognition = null;
  let active = false;
  let baseText = '';
  let silenceTimer = null;

  function setMicVisual(on) { micBtn.classList.toggle('mic-recording', on); }
  function clearSilenceTimer() { if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; } }
  function scheduleAutoStop() {
    clearSilenceTimer();
    silenceTimer = setTimeout(() => { if (active) stopMic(); }, SILENCE_MS);
  }

  function startMic() {
    baseText = input.value ? input.value + ' ' : '';
    recognition = new SR();
    recognition.lang = 'ko-KR';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) interim += e.results[i][0].transcript;
      input.value = baseText + interim;
      input.dispatchEvent(new Event('input'));
      scheduleAutoStop();
    };
    recognition.onerror = (e) => { console.warn('[Expert Mic] 오류:', e.error); stopMic(); };
    recognition.onend = () => { if (active) stopMic(); };
    recognition.start();
    active = true;
    setMicVisual(true);
    scheduleAutoStop();
  }

  function stopMic() {
    active = false;
    clearSilenceTimer();
    setMicVisual(false);
    try { recognition?.stop(); } catch (e) {}
    recognition = null;
  }

  micBtn.addEventListener('click', () => { active ? stopMic() : startMic(); });
})();

function doSend() {
  const text = input.value.trim();
  if (!text && !_attachedFile) return;

  if (_attachedFile) {
    appendBubble('user', `${escHtml(text)}${text ? '<br>' : ''}📎 ${escHtml(_attachedFile.name)}`.trim());
  } else {
    appendBubble('user', escHtml(text).replace(/\n/g,'<br>'));
  }

  const attachment = _attachedFile;
  input.value = ''; input.style.height = 'auto';
  clearAttach();

  sendTurn(text, attachment);
}
updateSendBtn();


// 10분 무응답 자동 종료(전문가 세션 관례와 동일)
let _idleTimer = null;
function _resetIdle() {
  if (_idleTimer) clearTimeout(_idleTimer);
  _idleTimer = setTimeout(() => {
    appendBubble('ai', '10분간 응답이 없어 상담을 종료합니다. 고팡 화면으로 돌아갑니다…');
    setTimeout(() => { location.href = RETURN; }, 1500);
  }, 10 * 60 * 1000);
}
document.addEventListener('click', _resetIdle);
document.addEventListener('keydown', _resetIdle);
_resetIdle();

startGreeting();
</script>
