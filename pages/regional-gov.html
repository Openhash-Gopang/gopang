<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>전국 지방행정 AI</title>
<meta name="description" content="광역시도청·시군구청·읍면동사무소 행정 안내 — hondi.net 같은 오리진, 별도 로그인 불필요.">

<!--
  2026-07-22 신설 — 사용자 지시("hondi.net/jeju, hondi.net/seoul 형식으로
  탭 전환 시 별도 인증이 불필요하게 하십시오").

  왜 이 파일이 필요했는가: kregionalgov(전국 지방행정 AI)는 그동안
  jeju.hondi.net이라는 "별도 서브도메인"에서 서빙됐다. 브라우저 입장에서
  hondi.net과 jeju.hondi.net은 완전히 다른 출처(origin)라, 지갑
  개인키(hondi.net의 localStorage/IndexedDB)를 직접 못 읽고 매번
  postMessage로 "서명해줘" 왕복을 해야 했다 — 오늘 하루 종일 씨름한
  SSO 타이밍/팝업차단/opener 문제 전부가 여기서 비롯됐다.

  이 페이지는 hondi.net "안"에 있으므로(같은 오리진), 지갑을 그냥
  localStorage에서 직접 읽는다 — subsystem-auth.js도, gopang-sso.js의
  opener 왕복도, 서명 요청도 전혀 필요 없다. pages/expert-chat.html이
  이미 정확히 이 패턴(같은 오리진 → 직접 읽기)으로 동작하고 있어
  그 구조를 그대로 따른다.

  라우팅 로직(어느 광역시도·시군구·읍면동인지 판별해 SP를 조립하는
  부분)은 이미 전국 대응으로 일반화된 src/gopang/gov/gov-router.js를
  그대로 가져다 쓴다 — 이 파일은 새 라우팅 로직을 만들지 않고, 그
  로직을 "제주 전용 도메인이 아니라 hondi.net 자체 안에서" 실행하는
  얇은 셸(shell)일 뿐이다. AI 실제 호출(/gov/relay)도 jeju.hondi.net이
  쓰던 것과 동일한, 오리진과 무관한 공용 워커 엔드포인트를 그대로
  재사용한다.

  아직 옮기지 않은 것: jeju.hondi.net의 PDV_REQUEST/PDV_RESPONSE
  교차 오리진 중개 로직(§13)은 애초에 "다른 오리진이라 지갑을 못 읽어서"
  필요했던 우회였다 — 같은 오리진에서는 원칙적으로 PDV를 직접 읽을 수
  있어야 하는데, 그 직접 조회 경로를 이 1차 버전에서는 아직 연결하지
  않았다(범위가 커서 후속 작업으로 분리). 지금은 PDV 필드가 필요한
  질문에는 "그 정보는 지금 조회할 수 없습니다, 직접 말씀해 주시겠어요"
  정도로 안내하는 폴백만 있다 — 거짓으로 있는 척하지 않는다.
-->

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --gov:#0F6B4F; --pri:#0F6B4F; --pri-bg:#EAF7F1; --sur:#FFFFFF; --bg:#F4F6FB;
  --bdr:#E2E8F0; --txt:#1A202C; --sub:#4A5568; --hint:#94A3B8;
  --font:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif;
  --r:12px; --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  position:fixed;inset:0;margin:0;padding:0;font-family:var(--font);font-size:15px;color:var(--txt);
  background:var(--bg);display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;
}
#top-bar{
  flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top));
  background:var(--gov);color:#fff;box-shadow:var(--sh);z-index:5;
}
#tb-icon{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
#tb-sub{font-size:11px;opacity:.7;font-weight:400}
#tb-back{margin-left:auto;flex-shrink:0;background:rgba(255,255,255,.14);border:none;color:#fff;
  border-radius:8px;padding:7px 12px;font-size:12.5px;cursor:pointer;font-family:var(--font)}
#tb-back:active{background:rgba(255,255,255,.24)}
#trace-badge{font-size:10px;opacity:.65;margin-left:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

#chat-thread{flex:1;overflow-y:auto;padding:16px 14px 90px;display:flex;flex-direction:column;gap:10px}
.bubble{max-width:86%;padding:11px 14px;border-radius:var(--r);line-height:1.55;font-size:14.5px;white-space:normal}
.bubble-ai{align-self:flex-start;background:var(--sur);border:1px solid var(--bdr);box-shadow:var(--sh)}
.bubble-user{align-self:flex-end;background:var(--pri);color:#fff}
.bubble-user i{opacity:.85;font-style:normal;font-size:12px;display:block;margin-bottom:2px}
.bubble-typing{align-self:flex-start;display:flex;align-items:center;gap:8px;padding:9px 14px;
  background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);font-size:13px;color:var(--sub)}
.spinner{width:14px;height:14px;border:2px solid rgba(15,107,79,.2);border-top-color:var(--pri);
  border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

#bottom-dock{position:fixed;left:0;right:0;bottom:0;z-index:5;background:var(--sur)}
#input-bar{
  display:flex;align-items:flex-end;gap:6px;padding:10px 12px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  background:var(--sur);border-top:1px solid var(--bdr);
}
#chat-input{
  flex:1;resize:none;border:1px solid var(--bdr);border-radius:20px;padding:10px 16px;
  font-family:var(--font);font-size:14.5px;max-height:120px;line-height:1.4;
}
#chat-input:focus{outline:none;border-color:var(--pri)}
#send-btn{
  flex-shrink:0;width:42px;height:42px;border-radius:50%;border:none;background:var(--pri);color:#fff;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
#send-btn:disabled{opacity:.4;cursor:default}
.ia-btn{
  flex-shrink:0;width:36px;height:36px;border-radius:50%;border:none;background:transparent;
  color:var(--sub);display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.ia-btn:active{background:rgba(0,0,0,.06)}
.ia-btn.mic-active{background:#FEE2E2;color:#DC2626;animation:mic-pulse 1.2s ease-in-out infinite}
@keyframes mic-pulse{0%,100%{opacity:1}50%{opacity:.55}}
#attach-preview{
  display:none;align-items:center;gap:8px;padding:8px 14px;background:var(--pri-bg);
  border-top:1px solid var(--bdr);font-size:12.5px;color:var(--txt);
}
#attach-preview img{width:32px;height:32px;object-fit:cover;border-radius:6px;flex-shrink:0}
#attach-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#attach-remove{flex-shrink:0;background:none;border:none;color:var(--sub);font-size:15px;cursor:pointer;padding:2px 6px}
#err-banner{display:none;padding:8px 14px;background:#FEE2E2;color:#991B1B;font-size:12.5px;text-align:center}
</style>
</head>
<body>

<div id="top-bar">
  <div id="tb-icon">🏛</div>
  <div id="tb-sub">로딩 중…</div>
  <div id="trace-badge"></div>
  <button id="tb-back">고팡으로</button>
</div>

<div id="err-banner"></div>
<div id="chat-thread"></div>

<div id="bottom-dock">
  <div id="attach-preview">
    <img id="attach-thumb" alt="">
    <span id="attach-name"></span>
    <button id="attach-remove" type="button">✕</button>
  </div>

  <input type="file" id="file-input" accept="image/*" style="display:none">
  <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none">

  <div id="input-bar">
    <button class="ia-btn" id="attach-btn" type="button" title="파일 첨부">
      <svg width="17.87" height="17.87" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
    </button>
    <button class="ia-btn" id="camera-btn" type="button" title="카메라">
      <svg width="16.87" height="16.87" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </button>
    <textarea id="chat-input" rows="1" placeholder="메시지를 입력하세요…"></textarea>
    <button class="ia-btn" id="mic-btn" type="button" title="음성 입력">
      <svg width="15.88" height="15.88" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
    <button id="send-btn">➤</button>
  </div>
</div>

<script type="module">
// 같은 오리진(hondi.net)이므로 상대 경로로 바로 import — 재수출 셸이
// 필요 없다(jeju-router.js가 하던 역할 자체가 불필요해짐).
import { assembleGovSystemPrompt, resolveGovAgency, resolveProvinceCode }
  from '/src/gopang/gov/gov-router.js';

const PROXY = 'https://hondi-proxy.tensor-city.workers.dev';

// ── GWP 파라미터 파싱 — 다른 GWP 페이지들과 동일 규약 ──────────────
const _qs     = new URLSearchParams(location.search);
const RETURN  = _qs.get('return') || '/webapp.html';
let   GWP_CTX = '';
if (_qs.get('ctx')) {
  try {
    GWP_CTX = (_qs.get('ctx_enc') === 'b64')
      ? decodeURIComponent(escape(atob(_qs.get('ctx'))))
      : decodeURIComponent(_qs.get('ctx'));
  } catch (e) { GWP_CTX = ''; }
}

// ── 같은 오리진 직접 읽기 — SSO 왕복 전혀 불필요 ───────────────────
function _loadUser() {
  try { return JSON.parse(localStorage.getItem('gopang_user_v4') || 'null'); }
  catch { return null; }
}
function _loadCfg() {
  try { return JSON.parse(localStorage.getItem('gopang_cfg') || '{}'); } catch { return {}; }
}

document.getElementById('tb-back').onclick = () => {
  window.close();
  setTimeout(() => { if (!window.closed) location.href = RETURN; }, 150);
};

// ── 채팅 UI 헬퍼 ────────────────────────────────────────────────
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function appendBubble(role, html) {
  const thread = document.getElementById('chat-thread');
  const div = document.createElement('div');
  div.className = 'bubble ' + (role === 'ai' ? 'bubble-ai' : 'bubble-user');
  div.innerHTML = html;
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
  return div;
}
function appendTyping(label) {
  const thread = document.getElementById('chat-thread');
  const div = document.createElement('div');
  div.className = 'bubble-typing';
  div.innerHTML = `<div class="spinner"></div><span>${escHtml(label || '답변을 준비하고 있습니다')}…</span>`;
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
  return div;
}

// ── AI 호출 — jeju.hondi.net이 쓰던 것과 동일한 공용 워커 엔드포인트.
// 오리진과 무관한 순수 서버 호출이라 그대로 재사용한다. ──────────────
async function _govRelayCompletion(agencyPrompt, messages, agency, provinceCode) {
  const user = _loadUser();
  try {
    const r = await fetch(`${PROXY}/gov/relay`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        guid: user?.ipv6 || null, agency, agencyPrompt, messages, provinceCode,
        max_tokens: 2000, stream: false, tier: 'gov-flash',
      }),
    });
    if (!r.ok) {
      const errBody = await r.json().catch(() => ({}));
      if (r.status === 429) return errBody.detail || '오늘 이용 가능한 한도를 모두 사용했습니다. 내일 다시 이용해 주세요.';
      throw new Error(`gov/relay ${r.status}: ${errBody.detail || ''}`);
    }
    const d = await r.json();
    return d.choices?.[0]?.message?.content || '잠시 후 다시 시도해 주세요.';
  } catch (e) {
    console.warn('[RegionalGov] gov/relay 실패 → 폴백:', e.message);
    const r2 = await fetch(`${PROXY}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'deepseek-v4-pro', max_tokens: 1000, temperature: 0.7,
        messages: [{ role: 'system', content: agencyPrompt }, ...messages.slice(-8)],
      }),
    });
    if (!r2.ok) throw new Error(`fallback ${r2.status}`);
    const d2 = await r2.json();
    return d2.choices?.[0]?.message?.content || '오류가 발생했습니다.';
  }
}

// ── 위치 힌트 — GWP facts(메인 비서가 이미 확보한 GPS)만 사용한다.
// 같은 오리진이라 PDV를 직접 읽는 경로는 후속 작업(§13 대체) 참고. ──
let _urlFactsLocation = null;
(function initFacts() {
  const json = _qs.get('facts');
  if (!json) return;
  try {
    const raw = _qs.get('facts_enc') === 'b64' ? decodeURIComponent(escape(atob(json))) : decodeURIComponent(json);
    const facts = JSON.parse(raw);
    if (facts && typeof facts.currentLocation === 'string') _urlFactsLocation = facts.currentLocation;
  } catch (e) { console.warn('[RegionalGov] facts 파싱 실패(무시):', e.message); }
})();

// ── 대화 상태 ──────────────────────────────────────────────────
let messages = [];
let _lastAgency = 'gov_do';

async function _callAI(latestUserText, typingEl) {
  let sp = '이 지역 정부기관 안내를 도와드립니다.', trace = [], agency = 'gov_do', provinceCode = null;
  try {
    const r = await assembleGovSystemPrompt(latestUserText, _urlFactsLocation, null, (msg) => {
      if (typingEl) typingEl.querySelector('span').textContent = msg;
    });
    sp = r.systemPrompt;
    trace = r.trace || [];
    agency = resolveGovAgency(trace) || 'gov_do';
    provinceCode = resolveProvinceCode();
    _lastAgency = agency;
  } catch (e) {
    console.warn('[RegionalGov] SP 조립 실패, 최소 폴백 사용:', e.message);
  }
  const badge = document.getElementById('trace-badge');
  badge.textContent = trace.join(' > ');

  const provinceLabel = { jeju: '제주도청', seoul: '서울시청', busan: '부산시청', gyeonggi: '경기도청' }[provinceCode];
  document.title = provinceLabel ? `${provinceLabel} AI` : '전국 지방행정 AI';

  return _govRelayCompletion(sp, messages, agency, provinceCode);
}

// ── 파일첨부/카메라로 붙인 이미지 — 2026-07-22 신설 ────────────────
// 표준 OpenAI 호환 vision 메시지 포맷(content: [{type:'text'},
// {type:'image_url'}])으로 실어 보낸다. handleGovRelay()가 messages를
// 그대로 backendModel에 전달하는 구조라(worker.js 확인) 별도 서버
// 작업 없이도 vision 지원 모델이면 바로 동작한다 — 다만 tier
// 'gov-flash'가 실제로 vision을 지원하는지는 이 페이지가 보장할 수
// 없다(모델 쪽 역량 문제). 실패하면 기존과 동일하게 오류 말풍선으로
// 안내한다(사용자에게 조용히 실패하지 않음).
let _attachedFile = null;

function _fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = () => resolve(r.result);
    r.onerror = () => reject(new Error('파일을 읽지 못했습니다.'));
    r.readAsDataURL(file);
  });
}

function _setAttachedFile(file) {
  _attachedFile = file || null;
  const preview = document.getElementById('attach-preview');
  const nameEl  = document.getElementById('attach-name');
  const thumb   = document.getElementById('attach-thumb');
  if (_attachedFile) {
    nameEl.textContent = _attachedFile.name;
    thumb.src = URL.createObjectURL(_attachedFile);
    preview.style.display = 'flex';
  } else {
    preview.style.display = 'none';
    nameEl.textContent = '';
    thumb.src = '';
  }
}

async function sendMessage() {
  const inp  = document.getElementById('chat-input');
  const text = inp.value.trim();
  const file = _attachedFile;
  if (!text && !file) return;
  inp.value = '';
  inp.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  let userMsg;
  if (file) {
    let dataUrl;
    try {
      dataUrl = await _fileToDataUrl(file);
    } catch (e) {
      document.getElementById('send-btn').disabled = false;
      appendBubble('ai', `⚠️ 이미지를 읽지 못했습니다: ${escHtml(e.message)}`);
      return;
    }
    userMsg = {
      role: 'user',
      content: [
        ...(text ? [{ type: 'text', text }] : []),
        { type: 'image_url', image_url: { url: dataUrl } },
      ],
    };
    appendBubble('user',
      (text ? escHtml(text) + '<br>' : '') +
      `<img src="${dataUrl}" style="max-width:180px;max-height:160px;border-radius:8px;display:block;margin-top:4px">`
    );
    _setAttachedFile(null);
  } else {
    userMsg = { role: 'user', content: text };
    appendBubble('user', escHtml(text));
  }
  messages.push(userMsg);

  const typing = appendTyping('지역 행정 정보를 확인하고 있습니다');
  try {
    const reply = await _callAI(text, typing);
    typing.remove();
    appendBubble('ai', escHtml(reply).replace(/\n/g, '<br>'));
    messages.push({ role: 'assistant', content: reply });
  } catch (e) {
    typing.remove();
    appendBubble('ai', `⚠️ 오류가 발생했습니다: ${escHtml(e.message)}`);
  } finally {
    document.getElementById('send-btn').disabled = false;
    inp.focus();
  }
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('chat-input').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ── 파일첨부·카메라 — 2026-07-22 실장 ────────────────────────────
const fileInput   = document.getElementById('file-input');
const cameraInput = document.getElementById('camera-input');
document.getElementById('attach-btn').addEventListener('click', () => fileInput.click());
document.getElementById('camera-btn').addEventListener('click', () => cameraInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files?.[0]) _setAttachedFile(fileInput.files[0]);
  fileInput.value = '';
});
cameraInput.addEventListener('change', () => {
  if (cameraInput.files?.[0]) _setAttachedFile(cameraInput.files[0]);
  cameraInput.value = '';
});
document.getElementById('attach-remove').addEventListener('click', () => _setAttachedFile(null));

// ── 마이크(실시간 받아쓰기) — 2026-07-22 실장 ───────────────────────
// 메인 앱(webapp.html)의 ai-panel 마이크 로직(연속 인식 + onend 자동
// 재시작)을 이 페이지 규모에 맞게 단순화해 재사용한다. 무음 자동정지
// 타이머는 없음 — 버튼을 다시 눌러 수동으로 끈다(간단하고 예측 가능).
let _recognition = null;
let _micActive    = false;
const micBtn = document.getElementById('mic-btn');

function _speechRecognitionCtor() {
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}

function _startMic() {
  const SR = _speechRecognitionCtor();
  if (!SR) {
    appendBubble('ai', '이 브라우저는 음성 입력을 지원하지 않습니다.');
    return;
  }
  const inp = document.getElementById('chat-input');
  let baseText = inp.value;

  const r = new SR();
  r.lang = 'ko-KR';
  r.continuous = true;
  r.interimResults = true;

  r.onresult = (e) => {
    let finalT = '', interimT = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const res = e.results[i];
      if (res.isFinal) finalT += res[0].transcript;
      else interimT += res[0].transcript;
    }
    if (finalT) baseText = (baseText ? baseText + ' ' : '') + finalT;
    inp.value = baseText + (interimT ? ' ' + interimT : '');
    inp.dispatchEvent(new Event('input'));
  };
  r.onerror = () => { _stopMic(); };
  r.onend   = () => { if (_micActive) { try { r.start(); } catch (e) { _stopMic(); } } };

  try { r.start(); } catch (e) { return; }
  _recognition = r;
  _micActive = true;
  micBtn.classList.add('mic-active');
}

function _stopMic() {
  _micActive = false;
  micBtn.classList.remove('mic-active');
  try { _recognition?.stop(); } catch (e) { /* 무시 */ }
}

micBtn.addEventListener('click', () => { _micActive ? _stopMic() : _startMic(); });

// ── 초기화 ─────────────────────────────────────────────────────
(function init() {
  const user = _loadUser();
  if (!user?.ipv6) {
    // 같은 오리진이라 SSO 자체가 필요 없다 — 여기서 "로그인 안 됨"은
    // 정말로 이 브라우저에 로그인 기록이 없다는 뜻이다(교차 오리진
    // 타이밍 문제가 아니다). 정직하게 안내한다.
    document.getElementById('tb-sub').textContent = '로그인이 필요합니다';
    const banner = document.getElementById('err-banner');
    banner.style.display = 'block';
    banner.innerHTML = '먼저 <a href="/webapp.html" style="color:#991B1B;text-decoration:underline">AI 비서 화면</a>에서 로그인해 주세요.';
    return;
  }
  document.getElementById('tb-sub').textContent = 'Lv.L0';

  appendBubble('ai',
    '안녕하세요, 전국 지방행정 AI입니다. 광역시도청·시군구청·읍면동사무소 관련 무엇이든 말씀해 주세요.'
  );

  if (GWP_CTX) {
    setTimeout(() => {
      const inp = document.getElementById('chat-input');
      inp.value = '(AI 비서로부터 전달됨)\n' + GWP_CTX;
      sendMessage();
    }, 200);
  }
})();
</script>
