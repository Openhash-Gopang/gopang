<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혼디 순서 인식 테스트 (빨강·노랑 좌우 배치)</title>
<style>
  body{margin:0;font-family:-apple-system,'Pretendard',sans-serif;background:#111;
       color:#fff;padding:0;box-sizing:border-box;overflow:hidden}
  .wrap{position:relative;width:100vw;height:100vh}
  video{width:100%;height:100%;object-fit:cover}
  #overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
  #resultBox{
    position:absolute;top:0;left:0;width:100%;
    display:flex;flex-direction:column;align-items:center;padding-top:24px;
  }
  #bigResult{
    font-size:120px;font-weight:900;line-height:1;
    text-shadow:0 0 12px #000,0 0 24px #000;
    transition:color 0.1s;
  }
  #label{font-size:16px;margin-top:8px;background:rgba(0,0,0,0.6);padding:6px 16px;border-radius:20px}
  #debug{
    position:absolute;bottom:0;left:0;right:0;
    background:rgba(0,0,0,0.75);color:#7CFC8A;font:11px/1.5 monospace;
    padding:10px 14px;white-space:pre-wrap;max-height:30vh;overflow:auto;
  }
  #startBtn{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    padding:16px 32px;font-size:18px;font-weight:700;border:none;border-radius:12px;
    background:#1A73E8;color:#fff;cursor:pointer;z-index:10;
  }
  #err{position:absolute;top:20px;left:20px;right:20px;color:#ff6b6b;font-size:14px;
       background:rgba(0,0,0,0.7);padding:10px;border-radius:8px;display:none}
</style>
</head>
<body>
<div class="wrap">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="overlay"></canvas>
  <div id="resultBox">
    <div id="bigResult">?</div>
    <div id="label">카메라 시작 대기 중</div>
  </div>
  <div id="err"></div>
  <button id="startBtn">카메라 시작</button>
  <div id="debug"></div>
</div>

<script>
// ── 이미 동작 확인된 코드를 최소 수정 ──────────────────────────
// 가이드 박스 없음, 사용자가 맞출 필요 없음 — 기존 코드처럼 화면
// 전체에서 빨강/노랑 덩어리를 각각 찾아 중심좌표(redSx/redSy,
// yelSx/yelSy)를 그대로 구하고, "둘 다 동시에 잡히면 어느 쪽
// 중심 x좌표가 더 왼쪽인지"만 추가로 비교한다.
// 빨강이 왼쪽 → "빨강,노랑"(01), 노랑이 왼쪽 → "노랑,빨강"(10)

const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const octx = overlay.getContext('2d');
const bigResult = document.getElementById('bigResult');
const label = document.getElementById('label');
const debugEl = document.getElementById('debug');
const errEl = document.getElementById('err');
const startBtn = document.getElementById('startBtn');

let workCanvas = document.createElement('canvas');
let wctx = workCanvas.getContext('2d', { willReadFrequently: true });
let rafId = null;
let frameCount = 0;

// 빨강/노랑 판정 — 단순 RGB 임계값만 사용 (색 공간 변환도, 캘리브레이션도 없음)
function isRedPixel(r,g,b) {
  return r > 130 && (r - Math.max(g,b)) > 50;
}
function isYellowPixel(r,g,b) {
  return r > 130 && g > 110 && (r - b) > 60 && (g - b) > 40;
}

function analyze() {
  const W = video.videoWidth, H = video.videoHeight;
  if (!W || !H) { rafId = requestAnimationFrame(analyze); return; }

  // 성능을 위해 축소본에서 픽셀 스캔 (여기선 정밀도보다 "되는지 여부"가 중요)
  const scale = 0.25;
  const tW = Math.round(W*scale), tH = Math.round(H*scale);
  workCanvas.width = tW; workCanvas.height = tH;
  wctx.drawImage(video, 0, 0, tW, tH);
  const data = wctx.getImageData(0, 0, tW, tH).data;

  let redCount = 0, yellowCount = 0;
  let redSx=0, redSy=0, yelSx=0, yelSy=0;
  for (let y = 0; y < tH; y++) {
    for (let x = 0; x < tW; x++) {
      const i = (y*tW+x)*4;
      const r=data[i], g=data[i+1], b=data[i+2];
      if (isRedPixel(r,g,b)) { redCount++; redSx+=x; redSy+=y; }
      else if (isYellowPixel(r,g,b)) { yellowCount++; yelSx+=x; yelSy+=y; }
    }
  }

  const MIN_PX = Math.round(tW*tH*0.01); // 전체 화면의 1% 이상 차지해야 "인식"으로 침
  overlay.width = W; overlay.height = H;
  octx.clearRect(0,0,W,H);

  frameCount++;
  const redOk = redCount >= MIN_PX;
  const yellowOk = yellowCount >= MIN_PX;

  if (redOk && yellowOk) {
    // 둘 다 동시에 잡힘 — 중심 x좌표로 좌우 순서 판별
    const redCx = (redSx/redCount)/scale, redCy = (redSy/redCount)/scale;
    const yelCx = (yelSx/yellowCount)/scale, yelCy = (yelSy/yellowCount)/scale;
    const redFirst = redCx < yelCx;

    bigResult.textContent = redFirst ? '01' : '10';
    bigResult.style.color = '#7CFC8A';
    label.textContent = redFirst
      ? `빨강 → 노랑 순서 (빨강 ${redCount}px, 노랑 ${yellowCount}px)`
      : `노랑 → 빨강 순서 (빨강 ${redCount}px, 노랑 ${yellowCount}px)`;

    octx.strokeStyle = '#ff4444'; octx.lineWidth = 4;
    octx.strokeRect(redCx-60, redCy-60, 120, 120);
    octx.strokeStyle = '#ffe14d';
    octx.strokeRect(yelCx-60, yelCy-60, 120, 120);
    octx.strokeStyle = '#00ff88'; octx.lineWidth = 3;
    octx.beginPath(); octx.moveTo(redCx, redCy); octx.lineTo(yelCx, yelCy); octx.stroke();

    var dbgLines = [
      `frame #${frameCount}`,
      `video: ${W}x${H}  scan: ${tW}x${tH}`,
      `redCount=${redCount} (기준 ${MIN_PX})  redCx=${redCx.toFixed(0)}`,
      `yellowCount=${yellowCount} (기준 ${MIN_PX})  yelCx=${yelCx.toFixed(0)}`,
      `순서: ${redFirst ? '빨강,노랑' : '노랑,빨강'}`,
    ];
  } else if (redOk) {
    bigResult.textContent = '0';
    bigResult.style.color = '#ff4444';
    label.textContent = `빨강만 인식됨 (픽셀 ${redCount}) — 노랑도 같이 비춰주세요`;
    const cx = (redSx/redCount)/scale, cy = (redSy/redCount)/scale;
    octx.strokeStyle = '#00ff88'; octx.lineWidth = 4;
    octx.strokeRect(cx-60, cy-60, 120, 120);
    var dbgLines = [
      `frame #${frameCount}`,
      `video: ${W}x${H}  scan: ${tW}x${tH}`,
      `redCount=${redCount} (기준 ${MIN_PX})`,
      `yellowCount=${yellowCount} (기준 ${MIN_PX})`,
    ];
  } else if (yellowOk) {
    bigResult.textContent = '1';
    bigResult.style.color = '#ffe14d';
    label.textContent = `노랑만 인식됨 (픽셀 ${yellowCount}) — 빨강도 같이 비춰주세요`;
    const cx = (yelSx/yellowCount)/scale, cy = (yelSy/yellowCount)/scale;
    octx.strokeStyle = '#00ff88'; octx.lineWidth = 4;
    octx.strokeRect(cx-60, cy-60, 120, 120);
    var dbgLines = [
      `frame #${frameCount}`,
      `video: ${W}x${H}  scan: ${tW}x${tH}`,
      `redCount=${redCount} (기준 ${MIN_PX})`,
      `yellowCount=${yellowCount} (기준 ${MIN_PX})`,
    ];
  } else {
    bigResult.textContent = '?';
    bigResult.style.color = '#888';
    label.textContent = '빨강·노랑 둘 다 인식 안 됨';
    var dbgLines = [
      `frame #${frameCount}`,
      `video: ${W}x${H}  scan: ${tW}x${tH}`,
      `redCount=${redCount} (기준 ${MIN_PX})`,
      `yellowCount=${yellowCount} (기준 ${MIN_PX})`,
    ];
  }

  debugEl.textContent = dbgLines.join('\n');
  rafId = requestAnimationFrame(analyze);
}

startBtn.onclick = async () => {
  errEl.style.display = 'none';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    video.srcObject = stream;
    await video.play();
    startBtn.style.display = 'none';
    label.textContent = '스캔 중...';
    rafId = requestAnimationFrame(analyze);
  } catch (e) {
    errEl.style.display = 'block';
    errEl.textContent = `카메라 오류: ${e.name} — ${e.message}`;
    label.textContent = '카메라 시작 실패';
  }
};
</script>
</body>
</html>
